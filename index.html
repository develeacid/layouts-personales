<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LayoutOS · Navegador de componentes</title>
  <link rel="stylesheet" href="/public/css/main.css" />
  <style>
    [x-cloak] { display: none !important; }
    aside::-webkit-scrollbar { width: 4px; }
    aside::-webkit-scrollbar-track { background: transparent; }
    aside::-webkit-scrollbar-thumb { background: rgb(63 63 70); border-radius: 4px; }
    aside::-webkit-scrollbar-thumb:hover { background: rgb(82 82 91); }
  </style>
</head>
<body class="h-full bg-page antialiased">

  <div class="flex h-full" x-data="sidebar">
    <!-- Sidebar -->
    <aside
      class="h-full overflow-y-auto border-r border-zinc-800 bg-zinc-950 flex flex-col shrink-0 transition-all duration-300"
      :class="sidebarOpen ? 'w-72' : 'w-0 border-r-0 overflow-hidden'"
      @route-changed.window="currentPath = $event.detail.path"
    >
      <!-- Logo -->
      <div class="px-4 py-4 border-b border-zinc-800/60 flex items-center justify-between">
        <div class="flex items-center gap-2.5">
          <div class="w-7 h-7 bg-blue-600 rounded-lg flex items-center justify-center">
            <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z" />
            </svg>
          </div>
          <span class="text-sm font-semibold text-zinc-100 tracking-tight">LayoutOS</span>
        </div>
        <span class="text-[10px] text-zinc-600 font-mono">v0.1</span>
      </div>

      <!-- Search -->
      <div class="px-3 py-3">
        <div class="relative">
          <svg class="absolute left-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-zinc-500 pointer-events-none" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" />
          </svg>
          <input
            x-ref="searchInput"
            x-model="search"
            type="text"
            placeholder="Buscar componente..."
            class="w-full bg-zinc-900 border border-zinc-800 rounded-lg text-xs text-zinc-300 placeholder-zinc-600 pl-8 pr-8 py-2 focus:outline-none focus:border-zinc-700 focus:ring-1 focus:ring-zinc-700"
            @keydown.slash.window.prevent="$refs.searchInput.focus()"
          >
          <template x-if="!search">
            <kbd class="absolute right-2.5 top-1/2 -translate-y-1/2 text-[10px] text-zinc-600 bg-zinc-800 border border-zinc-700 rounded px-1.5 py-0.5 font-mono pointer-events-none">/</kbd>
          </template>
          <template x-if="search">
            <button @click="search = ''" class="absolute right-2.5 top-1/2 -translate-y-1/2 text-zinc-500 hover:text-zinc-300">
              <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
              </svg>
            </button>
          </template>
        </div>
      </div>

      <!-- Nav -->
      <nav id="spa-sidebar" class="flex-1 px-3 pb-3 space-y-0.5 text-sm overflow-y-auto">

        <template x-for="(section, sIdx) in filteredSections" :key="section.id">
          <div>
            <!-- Category separator -->
            <template x-if="sIdx === 0 || (section.type !== filteredSections[sIdx - 1]?.type)">
              <p class="px-2 pt-4 pb-2 text-[10px] font-semibold uppercase tracking-widest text-zinc-600" x-text="section.type === 'component' ? 'COMPONENTES' : 'PÁGINAS'"></p>
            </template>

            <!-- Section header -->
            <button
              @click="toggleSection(section.id)"
              class="w-full flex items-center gap-2 px-2 py-1.5 rounded-lg text-zinc-400 hover:text-zinc-200 hover:bg-zinc-800/50 transition-colors duration-150 group"
            >
              <!-- Chevron -->
              <svg
                class="w-3 h-3 text-zinc-600 transition-transform duration-200 shrink-0"
                :class="isSectionOpen(section.id) ? 'rotate-90' : ''"
                fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"
              >
                <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
              </svg>
              <!-- Section icon -->
              <svg class="w-4 h-4 text-zinc-500 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" x-html="sectionIcon(section.icon)"></svg>
              <!-- Title -->
              <span class="text-xs font-medium truncate" x-text="section.title"></span>
              <!-- Counter badge -->
              <span class="ml-auto text-[10px] text-zinc-600 bg-zinc-800/80 rounded-full px-1.5 py-0.5 font-mono shrink-0" x-text="section.items.length"></span>
            </button>

            <!-- Section items -->
            <div x-show="isSectionOpen(section.id)" x-collapse>
              <div class="ml-3 border-l border-zinc-800/80 pl-3 mt-0.5 mb-1">
                <template x-for="item in section.items" :key="item.href">
                  <a
                    :href="item.href"
                    class="flex items-center gap-2 py-1 px-2 rounded-md text-xs transition-colors duration-150 group/item"
                    :class="currentPath === item.href ? 'bg-blue-500/10 text-blue-400' : 'text-zinc-500 hover:text-zinc-200 hover:bg-zinc-800/50'"
                  >
                    <span
                      class="w-1.5 h-1.5 rounded-full shrink-0"
                      :class="currentPath === item.href ? 'bg-blue-400' : 'bg-zinc-700'"
                    ></span>
                    <span class="truncate" x-text="item.label"></span>
                  </a>
                </template>
              </div>
            </div>
          </div>
        </template>

      </nav>

      <!-- Footer -->
      <div class="px-4 py-3 border-t border-zinc-800/60">
        <p class="text-[11px] text-zinc-600">107 componentes · 66 páginas</p>
        <p class="text-[10px] text-zinc-700 mt-0.5">Tailwind CSS + Alpine.js</p>
      </div>
    </aside>

    <!-- Main content -->
    <div class="flex-1 flex flex-col overflow-hidden">

      <!-- Top bar -->
      <header class="h-12 border-b border-zinc-200 bg-white flex items-center px-4 gap-3 shrink-0">
        <button
          @click="sidebarOpen = !sidebarOpen"
          class="w-8 h-8 flex items-center justify-center rounded-lg text-zinc-400 hover:bg-zinc-100 hover:text-zinc-600 transition-colors duration-150 cursor-pointer"
        >
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
        <span class="text-sm text-zinc-900 font-medium">Navegador de componentes</span>
      </header>

      <!-- Iframe viewer -->
      <main id="spa-content" class="flex-1 overflow-y-auto bg-zinc-50">
        <!-- Welcome screen (shows when no component is loaded) -->
        <div id="welcome-screen" class="h-full flex items-center justify-center text-center px-6">
          <div class="space-y-4">
            <div class="w-16 h-16 bg-zinc-100 rounded-full flex items-center justify-center mx-auto">
              <svg class="w-8 h-8 text-zinc-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 5a1 1 0 011-1h14a1 1 0 011 1v2a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM4 13a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H5a1 1 0 01-1-1v-6zM16 13a1 1 0 011-1h2a1 1 0 011 1v6a1 1 0 01-1 1h-2a1 1 0 01-1-1v-6z" />
              </svg>
            </div>
            <h2 class="text-xl font-semibold text-zinc-900">LayoutOS</h2>
            <p class="text-sm text-zinc-600 max-w-md">Selecciona un componente del sidebar para previsualizarlo, o haz clic en el enlace para abrirlo en una nueva pestaña.</p>
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 pt-4 max-w-lg mx-auto">
              <div class="bg-white border border-zinc-200 rounded-xl p-3 text-center">
              <div class="bg-white border border-zinc-200 rounded-xl p-3 text-center">
                <p class="text-lg font-bold text-emerald-600">107</p>
                <p class="text-xs text-zinc-400">componentes</p>
              </div>
              <div class="bg-white border border-zinc-200 rounded-xl p-3 text-center">
                <p class="text-lg font-bold text-emerald-600">66</p>
                <p class="text-xs text-zinc-400">páginas</p>
              </div>
              <div class="bg-white border border-zinc-200 rounded-xl p-3 text-center">
                <p class="text-lg font-bold text-emerald-600">173</p>
                <p class="text-xs text-zinc-400">total</p>
              </div>
              <div class="bg-white border border-zinc-200 rounded-xl p-3 text-center">
                <p class="text-lg font-bold text-emerald-600">100%</p>
                <p class="text-xs text-zinc-400">completo</p>
              </div>
            </div>
          </div>
        </div>
      </main>

    </div>

  </div>

  <script src="/src/js/sidebar-data.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="/src/js/code-download.js"></script>
  <script src="/src/js/spa-router.js"></script>
</body>
</html>
