<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LayoutOS · Navegador de componentes</title>
  <link rel="stylesheet" href="/public/css/main.css" />
  <style>
    [x-cloak] { display: none !important; }
    aside::-webkit-scrollbar { width: 4px; }
    aside::-webkit-scrollbar-track { background: transparent; }
    aside::-webkit-scrollbar-thumb { background: rgb(212 212 216); border-radius: 4px; }
    aside::-webkit-scrollbar-thumb:hover { background: rgb(161 161 170); }
    html.dark aside::-webkit-scrollbar-thumb { background: rgb(63 63 70); }
    html.dark aside::-webkit-scrollbar-thumb:hover { background: rgb(82 82 91); }
  </style>
</head>
<body class="h-full bg-page antialiased">

  <div class="flex h-full" x-data="sidebar">
    <!-- Sidebar -->
    <aside
      class="h-full overflow-y-auto flex flex-col shrink-0 transition-all duration-300"
      :class="[
        sidebarOpen ? 'w-72' : 'w-0 border-r-0 overflow-hidden',
        darkMode ? 'bg-zinc-950 border-r border-zinc-800' : 'bg-zinc-100 border-r border-zinc-200'
      ]"
      @route-changed.window="currentPath = $event.detail.path"
    >
      <!-- Logo -->
      <div class="px-4 py-4 flex items-center justify-between" :class="darkMode ? 'border-b border-zinc-800/60' : 'border-b border-zinc-200'">
        <div class="flex items-center gap-2.5">
          <div class="w-7 h-7 bg-blue-600 rounded-lg flex items-center justify-center">
            <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z" />
            </svg>
          </div>
          <span class="text-sm font-semibold tracking-tight" :class="darkMode ? 'text-zinc-100' : 'text-zinc-900'">LayoutOS</span>
        </div>
        <span class="text-[10px] font-mono" :class="darkMode ? 'text-zinc-600' : 'text-zinc-400'">v0.1</span>
      </div>

      <!-- Search -->
      <div class="px-3 py-3">
        <div class="relative">
          <svg class="absolute left-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 pointer-events-none" :class="darkMode ? 'text-zinc-500' : 'text-zinc-400'" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" />
          </svg>
          <input
            x-ref="searchInput"
            x-model="search"
            type="text"
            placeholder="Buscar componente..."
            class="w-full rounded-lg text-xs pl-8 pr-8 py-2 focus:outline-none focus:ring-1 transition-colors"
            :class="darkMode
              ? 'bg-zinc-900 border border-zinc-800 text-zinc-300 placeholder-zinc-600 focus:border-zinc-700 focus:ring-zinc-700'
              : 'bg-white border border-zinc-300 text-zinc-700 placeholder-zinc-400 focus:border-blue-400 focus:ring-blue-200'"
            @keydown.slash.window.prevent="$refs.searchInput.focus()"
          >
          <template x-if="!search">
            <kbd class="absolute right-2.5 top-1/2 -translate-y-1/2 text-[10px] rounded px-1.5 py-0.5 font-mono pointer-events-none"
              :class="darkMode ? 'text-zinc-600 bg-zinc-800 border border-zinc-700' : 'text-zinc-400 bg-zinc-200 border border-zinc-300'"
            >/</kbd>
          </template>
          <template x-if="search">
            <button @click="search = ''" class="absolute right-2.5 top-1/2 -translate-y-1/2" :class="darkMode ? 'text-zinc-500 hover:text-zinc-300' : 'text-zinc-400 hover:text-zinc-600'">
              <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
              </svg>
            </button>
          </template>
        </div>
      </div>

      <!-- Nav -->
      <nav id="spa-sidebar" class="flex-1 px-3 pb-3 space-y-0.5 text-sm overflow-y-auto">

        <template x-for="(section, sIdx) in filteredSections" :key="section.id">
          <div>
            <!-- Category separator -->
            <template x-if="sIdx === 0 || (section.type !== filteredSections[sIdx - 1]?.type)">
              <p class="px-2 pt-4 pb-2 text-[10px] font-semibold uppercase tracking-widest" :class="darkMode ? 'text-zinc-600' : 'text-zinc-400'" x-text="section.type === 'component' ? 'COMPONENTES' : 'PÁGINAS'"></p>
            </template>

            <!-- Section header -->
            <button
              @click="toggleSection(section.id)"
              class="w-full flex items-center gap-2 px-2 py-1.5 rounded-lg transition-colors duration-150 group"
              :class="darkMode ? 'text-zinc-400 hover:text-zinc-200 hover:bg-zinc-800/50' : 'text-zinc-600 hover:text-zinc-900 hover:bg-zinc-200/60'"
            >
              <svg
                class="w-3 h-3 transition-transform duration-200 shrink-0"
                :class="[isSectionOpen(section.id) ? 'rotate-90' : '', darkMode ? 'text-zinc-600' : 'text-zinc-400']"
                fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"
              >
                <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
              </svg>
              <svg class="w-4 h-4 shrink-0" :class="darkMode ? 'text-zinc-500' : 'text-zinc-400'" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" x-html="sectionIcon(section.icon)"></svg>
              <span class="text-xs font-medium truncate" x-text="section.title"></span>
              <span class="ml-auto text-[10px] rounded-full px-1.5 py-0.5 font-mono shrink-0"
                :class="darkMode ? 'text-zinc-600 bg-zinc-800/80' : 'text-zinc-400 bg-zinc-200'"
                x-text="section.items.length"></span>
            </button>

            <!-- Section items -->
            <div x-show="isSectionOpen(section.id)" x-collapse>
              <div class="ml-3 pl-3 mt-0.5 mb-1" :class="darkMode ? 'border-l border-zinc-800/80' : 'border-l border-zinc-300/60'">
                <template x-for="item in section.items" :key="item.href">
                  <a
                    :href="item.href"
                    class="flex items-center gap-2 py-1 px-2 rounded-md text-xs transition-colors duration-150"
                    :class="currentPath === item.href
                      ? (darkMode ? 'bg-blue-500/10 text-blue-400' : 'bg-blue-50 text-blue-700 font-medium')
                      : (darkMode ? 'text-zinc-500 hover:text-zinc-200 hover:bg-zinc-800/50' : 'text-zinc-600 hover:text-zinc-900 hover:bg-zinc-200/60')"
                  >
                    <span
                      class="w-1.5 h-1.5 rounded-full shrink-0"
                      :class="currentPath === item.href
                        ? (darkMode ? 'bg-blue-400' : 'bg-blue-600')
                        : (darkMode ? 'bg-zinc-700' : 'bg-zinc-300')"
                    ></span>
                    <span class="truncate" x-text="item.label"></span>
                  </a>
                </template>
              </div>
            </div>
          </div>
        </template>

      </nav>

      <!-- Sidebar footer -->
      <div class="px-4 py-3" :class="darkMode ? 'border-t border-zinc-800/60' : 'border-t border-zinc-200'">
        <p class="text-[11px]" :class="darkMode ? 'text-zinc-600' : 'text-zinc-400'" x-text="componentCount + ' componentes · ' + pageCount + ' páginas'"></p>
        <p class="text-[10px] mt-0.5" :class="darkMode ? 'text-zinc-700' : 'text-zinc-400'">Tailwind CSS + Alpine.js</p>
      </div>
    </aside>

    <!-- Main content -->
    <div class="flex-1 flex flex-col overflow-hidden">

      <!-- Top bar -->
      <header class="h-12 flex items-center px-4 gap-3 shrink-0 transition-colors duration-200"
        :class="darkMode ? 'bg-zinc-900 border-b border-zinc-800' : 'bg-white border-b border-zinc-200'"
      >
        <button
          @click="sidebarOpen = !sidebarOpen"
          class="w-8 h-8 flex items-center justify-center rounded-lg transition-colors duration-150 cursor-pointer"
          :class="darkMode ? 'text-zinc-400 hover:bg-zinc-800 hover:text-zinc-200' : 'text-zinc-400 hover:bg-zinc-100 hover:text-zinc-600'"
        >
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
        <span class="text-sm font-medium" :class="darkMode ? 'text-zinc-100' : 'text-zinc-900'">Navegador de componentes</span>
        <div class="ml-auto">
          <button
            @click="toggleTheme()"
            class="w-8 h-8 flex items-center justify-center rounded-lg transition-colors duration-150 cursor-pointer"
            :class="darkMode ? 'text-zinc-400 hover:bg-zinc-800 hover:text-zinc-200' : 'text-zinc-400 hover:bg-zinc-100 hover:text-zinc-600'"
            :title="darkMode ? 'Cambiar a modo claro' : 'Cambiar a modo oscuro'"
          >
            <!-- Sol (light mode active) -->
            <svg x-show="!darkMode" class="w-4.5 h-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" />
            </svg>
            <!-- Luna (dark mode active) -->
            <svg x-show="darkMode" x-cloak class="w-4.5 h-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" />
            </svg>
          </button>
        </div>
      </header>

      <!-- Main content -->
      <main id="spa-content" class="flex-1 overflow-y-auto bg-zinc-50"></main>

      <!-- Download toolbar (inyectado por code-download.js) -->
      <div id="download-toolbar" class="shrink-0 hidden"></div>

      <!-- Footer -->
      <footer class="px-6 py-3 shrink-0 transition-colors duration-200"
        :class="darkMode ? 'bg-zinc-900 border-t border-zinc-800' : 'bg-white border-t border-zinc-200'"
      >
        <div class="flex items-center justify-between text-xs" :class="darkMode ? 'text-zinc-500' : 'text-zinc-400'">
          <p>Desarrollado por <span class="font-medium" :class="darkMode ? 'text-zinc-300' : 'text-zinc-600'">eleacid</span> — Desarrollador Full Stack con 5 anos de experiencia en interfaces modernas y sistemas escalables</p>
          <p class="shrink-0 ml-4">Tailwind CSS + Alpine.js · 2026</p>
        </div>
      </footer>

    </div>

  </div>

  <script src="/src/js/sidebar-data.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="/src/js/code-download.js"></script>
  <script src="/src/js/spa-router.js"></script>
</body>
</html>
