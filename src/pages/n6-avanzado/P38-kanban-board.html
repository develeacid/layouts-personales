<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LayoutOS · Kanban Board</title>
  <link rel="stylesheet" href="../../../public/css/main.css" />
</head>
<body class="h-full bg-page antialiased">
  <div class="flex h-full" x-data="kanbanBoardPage()">

    <!-- Sidebar -->
    <aside class="w-64 bg-zinc-950 dark:bg-zinc-800 text-zinc-300 h-full overflow-y-auto shrink-0 hidden lg:flex flex-col">
      <div class="px-5 py-4 border-b border-zinc-800"><span class="text-sm font-semibold text-white">LayoutOS</span></div>
      <nav class="flex-1 px-3 py-4 space-y-1">
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg text-zinc-400 dark:text-zinc-500 hover:text-white hover:bg-zinc-800/60 transition-colors">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25a2.25 2.25 0 01-2.25-2.25v-2.25z"/></svg>
          Dashboard
        </a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm font-medium rounded-lg text-white bg-zinc-800">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 4.5v15m6-15v15m-10.875 0h15.75c.621 0 1.125-.504 1.125-1.125V5.625c0-.621-.504-1.125-1.125-1.125H4.125C3.504 4.5 3 5.004 3 5.625v12.75c0 .621.504 1.125 1.125 1.125z"/></svg>
          Kanban
        </a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg text-zinc-400 dark:text-zinc-500 hover:text-white hover:bg-zinc-800/60 transition-colors">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5"/></svg>
          Calendario
        </a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg text-zinc-400 dark:text-zinc-500 hover:text-white hover:bg-zinc-800/60 transition-colors">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M20.25 8.511c.884.284 1.5 1.128 1.5 2.097v4.286c0 1.136-.847 2.1-1.98 2.193-.34.027-.68.052-1.02.072v3.091l-3-3c-1.354 0-2.694-.055-4.02-.163a2.115 2.115 0 01-.825-.242m9.345-8.334a2.126 2.126 0 00-.476-.095 48.64 48.64 0 00-8.048 0c-1.131.094-1.976 1.057-1.976 2.192v4.286c0 .837.46 1.58 1.155 1.951m9.345-8.334V6.637c0-1.621-1.152-3.026-2.76-3.235A48.455 48.455 0 0011.25 3c-2.115 0-4.198.137-6.24.402-1.608.209-2.76 1.614-2.76 3.235v6.226c0 1.621 1.152 3.026 2.76 3.235.577.075 1.157.14 1.74.194V21l4.155-4.155"/></svg>
          Chat
        </a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg text-zinc-400 dark:text-zinc-500 hover:text-white hover:bg-zinc-800/60 transition-colors">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z"/></svg>
          AI
        </a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg text-zinc-400 dark:text-zinc-500 hover:text-white hover:bg-zinc-800/60 transition-colors">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931z"/></svg>
          Editor
        </a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg text-zinc-400 dark:text-zinc-500 hover:text-white hover:bg-zinc-800/60 transition-colors">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12.75V12A2.25 2.25 0 014.5 9.75h15A2.25 2.25 0 0121.75 12v.75m-8.69-6.44l-2.12-2.12a1.5 1.5 0 00-1.061-.44H4.5A2.25 2.25 0 002.25 6v12a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9a2.25 2.25 0 00-2.25-2.25h-5.379a1.5 1.5 0 01-1.06-.44z"/></svg>
          Proyectos
        </a>
      </nav>
    </aside>

    <div class="flex-1 flex flex-col overflow-hidden">
      <!-- Header -->
      <header class="h-14 bg-white dark:bg-zinc-900 border-b border-zinc-200 dark:border-zinc-800 flex items-center justify-between px-4 sm:px-6 shrink-0">
        <div class="flex items-center gap-4">
          <h1 class="text-sm font-semibold text-zinc-900 dark:text-zinc-100">Kanban</h1>
          <select x-model="filterPriority" class="input text-xs py-1 px-2">
            <option value="">Todas las prioridades</option>
            <option value="alta">Alta</option>
            <option value="media">Media</option>
            <option value="baja">Baja</option>
          </select>
          <select x-model="filterAssigned" class="input text-xs py-1 px-2">
            <option value="">Todos</option>
            <template x-for="person in people" :key="person">
              <option :value="person" x-text="person"></option>
            </template>
          </select>
        </div>
        <button @click="showModal = true" class="btn-primary btn-sm">+ Nueva tarea</button>
      </header>

      <!-- Board -->
      <main class="flex-1 overflow-x-auto overflow-y-hidden p-6">
        <div class="flex gap-5 h-full">
          <template x-for="col in columns" :key="col">
            <div class="min-w-72 max-w-72 flex flex-col h-full">
              <div class="flex items-center justify-between mb-3">
                <h2 class="text-xs font-semibold text-zinc-500 dark:text-zinc-400 uppercase tracking-wider" x-text="col"></h2>
                <span class="text-xs text-zinc-400 dark:text-zinc-500 bg-zinc-100 dark:bg-zinc-800 rounded-full px-2 py-0.5" x-text="filteredTasks(col).length"></span>
              </div>
              <div class="flex-1 overflow-y-auto space-y-3 pb-4">
                <template x-for="task in filteredTasks(col)" :key="task.id">
                  <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl shadow-sm p-4">
                    <div class="flex items-start justify-between mb-2">
                      <h3 class="text-sm font-medium text-zinc-900 dark:text-zinc-100 leading-snug" x-text="task.title"></h3>
                      <div class="relative" x-data="{ open: false }">
                        <button @click="open = !open" class="btn-ghost btn-sm p-1">
                          <svg class="w-4 h-4 text-zinc-400 dark:text-zinc-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.75a.75.75 0 110-1.5.75.75 0 010 1.5zM12 12.75a.75.75 0 110-1.5.75.75 0 010 1.5zM12 18.75a.75.75 0 110-1.5.75.75 0 010 1.5z"/></svg>
                        </button>
                        <div x-show="open" @click.away="open = false" x-cloak class="absolute right-0 top-8 w-40 bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-lg shadow-lg z-10 py-1">
                          <div class="px-3 py-1.5 text-xs font-medium text-zinc-400 dark:text-zinc-500">Mover a</div>
                          <template x-for="target in columns.filter(c => c !== col)" :key="target">
                            <button @click="moveTask(task.id, target); open = false" class="w-full text-left px-3 py-1.5 text-sm text-zinc-700 dark:text-zinc-300 hover:bg-zinc-50 dark:hover:bg-zinc-800" x-text="target"></button>
                          </template>
                        </div>
                      </div>
                    </div>
                    <div class="flex items-center gap-2 mb-3">
                      <span class="text-xs font-medium px-2 py-0.5 rounded-full"
                        :class="task.priority === 'alta' ? 'badge-danger' : task.priority === 'media' ? 'badge-warning' : 'badge-info'"
                        x-text="task.priority"></span>
                    </div>
                    <div class="flex items-center justify-between">
                      <div class="flex items-center gap-2">
                        <div class="w-6 h-6 rounded-full bg-zinc-200 dark:bg-zinc-700 flex items-center justify-center text-xs font-medium text-zinc-600 dark:text-zinc-400" x-text="task.assigned.charAt(0)"></div>
                        <span class="text-xs text-zinc-500 dark:text-zinc-400" x-text="task.assigned"></span>
                      </div>
                      <span class="text-xs text-zinc-400 dark:text-zinc-500" x-text="task.date"></span>
                    </div>
                  </div>
                </template>
              </div>
            </div>
          </template>
        </div>
      </main>
    </div>

    <!-- Modal Nueva Tarea -->
    <div x-show="showModal" x-cloak class="fixed inset-0 z-50 flex items-center justify-center">
      <div class="absolute inset-0 bg-black/40" @click="showModal = false"></div>
      <div class="relative bg-white dark:bg-zinc-900 rounded-xl shadow-xl w-full max-w-md p-6" @click.stop>
        <h2 class="text-lg font-semibold text-zinc-900 dark:text-zinc-100 mb-4">Nueva tarea</h2>
        <div class="space-y-4">
          <div>
            <label class="label">Título</label>
            <input x-model="newTask.title" type="text" class="input w-full" placeholder="Nombre de la tarea" />
          </div>
          <div>
            <label class="label">Columna</label>
            <select x-model="newTask.column" class="input w-full">
              <template x-for="col in columns" :key="col">
                <option :value="col" x-text="col"></option>
              </template>
            </select>
          </div>
          <div>
            <label class="label">Prioridad</label>
            <select x-model="newTask.priority" class="input w-full">
              <option value="alta">Alta</option>
              <option value="media">Media</option>
              <option value="baja">Baja</option>
            </select>
          </div>
          <div>
            <label class="label">Asignado</label>
            <select x-model="newTask.assigned" class="input w-full">
              <template x-for="person in people" :key="person">
                <option :value="person" x-text="person"></option>
              </template>
            </select>
          </div>
        </div>
        <div class="flex justify-end gap-3 mt-6">
          <button @click="showModal = false" class="btn-secondary btn-sm">Cancelar</button>
          <button @click="addTask()" class="btn-primary btn-sm">Crear tarea</button>
        </div>
      </div>
    </div>
  </div>

  <style>[x-cloak] { display: none !important; }</style>
  <script>
  function kanbanBoardPage() {
    return {
      showModal: false,
      filterPriority: '',
      filterAssigned: '',
      columns: ['Backlog', 'En progreso', 'Revisión', 'Completado'],
      people: ['Ana García', 'Luis Pérez', 'Marta Ruiz', 'Carlos López'],
      newTask: { title: '', column: 'Backlog', priority: 'media', assigned: 'Ana García' },
      tasks: [
        { id: 1, title: 'Diseñar sistema de tokens', column: 'Backlog', priority: 'alta', assigned: 'Ana García', date: '28 Mar' },
        { id: 2, title: 'Configurar linting', column: 'Backlog', priority: 'baja', assigned: 'Luis Pérez', date: '27 Mar' },
        { id: 3, title: 'Documentar API REST', column: 'Backlog', priority: 'media', assigned: 'Marta Ruiz', date: '26 Mar' },
        { id: 4, title: 'Implementar auth JWT', column: 'En progreso', priority: 'alta', assigned: 'Carlos López', date: '29 Mar' },
        { id: 5, title: 'Crear componente modal', column: 'En progreso', priority: 'media', assigned: 'Ana García', date: '28 Mar' },
        { id: 6, title: 'Migrar base de datos', column: 'En progreso', priority: 'alta', assigned: 'Luis Pérez', date: '27 Mar' },
        { id: 7, title: 'Tests de integración', column: 'Revisión', priority: 'media', assigned: 'Marta Ruiz', date: '30 Mar' },
        { id: 8, title: 'Revisar PR #42', column: 'Revisión', priority: 'baja', assigned: 'Carlos López', date: '29 Mar' },
        { id: 9, title: 'Optimizar queries SQL', column: 'Revisión', priority: 'alta', assigned: 'Ana García', date: '28 Mar' },
        { id: 10, title: 'Landing page v2', column: 'Completado', priority: 'media', assigned: 'Luis Pérez', date: '25 Mar' },
        { id: 11, title: 'Setup CI/CD pipeline', column: 'Completado', priority: 'alta', assigned: 'Marta Ruiz', date: '24 Mar' },
        { id: 12, title: 'Refactorizar sidebar', column: 'Completado', priority: 'baja', assigned: 'Carlos López', date: '23 Mar' },
      ],
      filteredTasks(col) {
        return this.tasks.filter(t => {
          if (t.column !== col) return false;
          if (this.filterPriority && t.priority !== this.filterPriority) return false;
          if (this.filterAssigned && t.assigned !== this.filterAssigned) return false;
          return true;
        });
      },
      moveTask(id, target) {
        const task = this.tasks.find(t => t.id === id);
        if (task) task.column = target;
      },
      addTask() {
        if (!this.newTask.title.trim()) return;
        this.tasks.push({
          id: Date.now(),
          title: this.newTask.title,
          column: this.newTask.column,
          priority: this.newTask.priority,
          assigned: this.newTask.assigned,
          date: '31 Mar'
        });
        this.newTask = { title: '', column: 'Backlog', priority: 'media', assigned: 'Ana García' };
        this.showModal = false;
      }
    };
  }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
