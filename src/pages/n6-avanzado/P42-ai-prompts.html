        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg text-zinc-400 dark:text-zinc-500 hover:text-white hover:bg-zinc-800/60 transition-colors">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 4.5v15m6-15v15m-10.875 0h15.75c.621 0 1.125-.504 1.125-1.125V5.625c0-.621-.504-1.125-1.125-1.125H4.125C3.504 4.5 3 5.004 3 5.625v12.75c0 .621.504 1.125 1.125 1.125z"/></svg>

          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5"/></svg>

        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg text-zinc-400 dark:text-zinc-500 hover:text-white hover:bg-zinc-800/60 transition-colors">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M20.25 8.511c.884.284 1.5 1.128 1.5 2.097v4.286c0 1.136-.847 2.1-1.98 2.193-.34.027-.68.052-1.02.072v3.091l-3-3c-1.354 0-2.694-.055-4.02-.163a2.115 2.115 0 01-.825-.242m9.345-8.334a2.126 2.126 0 00-.476-.095 48.64 48.64 0 00-8.048 0c-1.131.094-1.976 1.057-1.976 2.192v4.286c0 .837.46 1.58 1.155 1.951m9.345-8.334V6.637c0-1.621-1.152-3.026-2.76-3.235A48.455 48.455 0 0011.25 3c-2.115 0-4.198.137-6.24.402-1.608.209-2.76 1.614-2.76 3.235v6.226c0 1.621 1.152 3.026 2.76 3.235.577.075 1.157.14 1.74.194V21l4.155-4.155"/></svg>

          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12.75V12A2.25 2.25 0 014.5 9.75h15A2.25 2.25 0 0121.75 12v.75m-8.69-6.44l-2.12-2.12a1.5 1.5 0 00-1.061-.44H4.5A2.25 2.25 0 002.25 6v12a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9a2.25 2.25 0 00-2.25-2.25h-5.379a1.5 1.5 0 01-1.06-.44z"/></svg>
          Proyectos

    <div class="flex-1 flex flex-col overflow-hidden">
      <!-- Header -->
      <header class="h-14 bg-white dark:bg-zinc-900 border-b border-zinc-200 dark:border-zinc-800 flex items-center px-4 sm:px-6 shrink-0">
        <h1 class="text-sm font-semibold text-zinc-900 dark:text-zinc-100">AI Assistant</h1>
      </header>

      <!-- Conversation -->
      <main class="flex-1 overflow-y-auto p-6 space-y-6">
        <template x-for="msg in messages" :key="msg.id">
          <div>
            <!-- User message -->
            <template x-if="msg.role === 'user'">
              <div class="flex justify-end mb-4">
                <div class="bg-indigo-600 text-white rounded-xl rounded-br-md px-4 py-3 max-w-2xl">
                  <p class="text-sm leading-relaxed" x-text="msg.text"></p>
                </div>
              </div>
            </template>
            <!-- AI message -->
            <template x-if="msg.role === 'ai'">
              <div class="flex gap-3 mb-4">
                <div class="w-8 h-8 rounded-full bg-zinc-900 flex items-center justify-center shrink-0">
                  <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z"/></svg>
                </div>
                <div class="max-w-2xl">
                  <p class="text-sm text-zinc-700 dark:text-zinc-300 leading-relaxed" x-text="msg.text"></p>
                  <!-- Code block -->
                  <template x-if="msg.code">
                    <div class="mt-3 bg-zinc-900 rounded-lg overflow-hidden">
                      <div class="flex items-center justify-between px-4 py-2 bg-zinc-800">
                        <span class="text-xs text-zinc-400 dark:text-zinc-500" x-text="msg.codeLang || 'javascript'"></span>
                        <button @click="copyCode(msg.code)" class="text-xs text-zinc-400 dark:text-zinc-500 hover:text-white transition-colors">Copiar</button>
                      </div>
                      <pre class="px-4 py-3 text-sm text-zinc-100 overflow-x-auto"><code x-text="msg.code"></code></pre>
                    </div>
                  </template>
                  <!-- Actions -->
                  <div class="flex items-center gap-2 mt-3">
                    <button @click="copyCode(msg.text)" class="btn-ghost btn-sm text-xs text-zinc-400 hover:text-zinc-700 dark:hover:text-zinc-300">
                      <svg class="w-3.5 h-3.5 mr-1 inline" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15.666 3.888A2.25 2.25 0 0013.5 2.25h-3c-1.03 0-1.9.693-2.166 1.638m7.332 0c.055.194.084.4.084.612v0a.75.75 0 01-.75.75H9.75a.75.75 0 01-.75-.75v0c0-.212.03-.418.084-.612m7.332 0c.646.049 1.288.11 1.927.184 1.1.128 1.907 1.077 1.907 2.185V19.5a2.25 2.25 0 01-2.25 2.25H6.75A2.25 2.25 0 014.5 19.5V6.257c0-1.108.806-2.057 1.907-2.185a48.208 48.208 0 011.927-.184"/></svg>
                      Copiar
                    </button>
                    <button class="btn-ghost btn-sm text-xs text-zinc-400 hover:text-zinc-700 dark:hover:text-zinc-300">
                      <svg class="w-3.5 h-3.5 mr-1 inline" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182"/></svg>
                      Regenerar
                    </button>
                    <button class="btn-ghost btn-sm text-xs text-zinc-400 hover:text-zinc-700 dark:hover:text-zinc-300">
                      <svg class="w-3.5 h-3.5 inline" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6.633 10.5c.806 0 1.533-.446 2.031-1.08a9.041 9.041 0 012.861-2.4c.723-.384 1.35-.956 1.653-1.715a4.498 4.498 0 00.322-1.672V3a.75.75 0 01.75-.75A2.25 2.25 0 0116.5 4.5c0 1.152-.26 2.243-.723 3.218-.266.558.107 1.282.725 1.282h3.126c1.026 0 1.945.694 2.054 1.715.045.422.068.85.068 1.285a11.95 11.95 0 01-2.649 7.521c-.388.482-.987.729-1.605.729H13.48c-.483 0-.964-.078-1.423-.23l-3.114-1.04a4.501 4.501 0 00-1.423-.23H5.904M14.25 9h2.25M5.904 18.75c.083.205.173.405.27.602.197.4-.078.898-.523.898h-.908c-.889 0-1.713-.518-1.972-1.368a12 12 0 01-.521-3.507c0-1.553.295-3.036.831-4.398C3.387 10.203 4.167 9.75 5 9.75h1.053c.472 0 .745.556.5.96a8.958 8.958 0 00-1.302 4.665c0 1.194.232 2.333.654 3.375z"/></svg>
                    </button>
                    <button class="btn-ghost btn-sm text-xs text-zinc-400 hover:text-zinc-700 dark:hover:text-zinc-300">
                      <svg class="w-3.5 h-3.5 inline" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M7.5 15h2.25m8.024-9.75c.011.05.028.1.052.148.591 1.2.924 2.55.924 3.977a8.96 8.96 0 01-.999 4.125m.023-8.25c-.076-.365.183-.75.575-.75h.908c.889 0 1.713.518 1.972 1.368.339 1.11.521 2.287.521 3.507 0 1.553-.295 3.036-.831 4.398-.306.774-1.086 1.227-1.918 1.227h-1.053c-.472 0-.745-.556-.5-.96a8.95 8.95 0 00.303-.54m.023-8.25H16.48a4.5 4.5 0 01-1.423-.23l-3.114-1.04a4.5 4.5 0 00-1.423-.23H6.504c-.618 0-1.217.247-1.605.729A11.95 11.95 0 002.25 12c0 .434.023.863.068 1.285C2.427 14.306 3.346 15 4.372 15h3.126c.618 0 .991.724.725 1.282A7.471 7.471 0 007.5 19.5a2.25 2.25 0 002.25 2.25.75.75 0 00.75-.75v-.633c0-.573.11-1.14.322-1.672.304-.76.93-1.33 1.653-1.715a9.04 9.04 0 002.86-2.4c.5-.634 1.226-1.08 2.032-1.08h.384"/></svg>
                    </button>
                  </div>
                </div>
              </div>
            </template>
          </div>
        </template>
      </main>

      <!-- Input area -->
      <div class="border-t border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-900 p-4">
        <!-- Quick prompts -->
        <div class="flex items-center gap-2 mb-3">
          <template x-for="chip in quickPrompts" :key="chip">
            <button @click="prompt = chip" class="text-xs px-3 py-1 rounded-full border border-zinc-200 dark:border-zinc-800 text-zinc-600 dark:text-zinc-400 hover:bg-zinc-50 dark:hover:bg-zinc-800 transition-colors" x-text="chip"></button>
          </template>
        </div>
        <div class="flex items-end gap-3">
          <div class="flex-1">
            <textarea x-model="prompt" @keydown.ctrl.enter="sendPrompt()" class="input w-full resize-none" rows="2" placeholder="Escribe tu prompt..."></textarea>
          </div>
          <div class="flex flex-col gap-2 shrink-0">
            <select x-model="model" class="input text-xs py-1">
              <option value="claude">Claude</option>
              <option value="gpt4">GPT-4</option>
            </select>
            <div class="flex items-center gap-2">
              <label class="text-xs text-zinc-500 dark:text-zinc-400">Temp</label>
              <input x-model="temperature" type="range" min="0" max="1" step="0.1" class="w-16 h-1 accent-indigo-600" />
              <span class="text-xs text-zinc-500 dark:text-zinc-400 min-w-6" x-text="temperature"></span>
            </div>
          </div>
          <button @click="sendPrompt()" class="btn-primary btn-sm shrink-0">Enviar</button>
        </div>
      </div>
    </div>
  </div>

  <style>[x-cloak] { display: none !important; }</style>
  <script>
  function aiPromptsPage() {
    return {
      prompt: '',
      model: 'claude',
      temperature: 0.7,
      quickPrompts: ['Resumir', 'Explicar', 'Refactorizar', 'Documentar', 'Tests'],
      messages: [
        { id: 1, role: 'user', text: '¿Cómo puedo implementar un debounce en JavaScript?' },
        { id: 2, role: 'ai', text: 'Un debounce retrasa la ejecución de una función hasta que haya pasado un tiempo sin ser llamada. Es útil para eventos como el input de búsqueda. Aquí tienes una implementación:', code: 'function debounce(fn, delay = 300) {\n  let timer;\n  return (...args) => {\n    clearTimeout(timer);\n    timer = setTimeout(() => fn(...args), delay);\n  };\n}\n\n// Uso:\nconst search = debounce((query) => {\n  fetchResults(query);\n}, 500);', codeLang: 'javascript' },
        { id: 3, role: 'user', text: 'Ahora muéstrame cómo usarlo con Alpine.js para un buscador.' },
        { id: 4, role: 'ai', text: 'En Alpine.js puedes usar $watch junto con el debounce. Aquí un ejemplo práctico de un buscador con autocompletado:', code: '<div x-data="{\n  query: \'\',\n  results: [],\n  timer: null,\n  search() {\n    clearTimeout(this.timer);\n    this.timer = setTimeout(() => {\n      // Simular búsqueda\n      this.results = [\'Resultado 1\', \'Resultado 2\'];\n    }, 300);\n  }\n}">\n  <input x-model="query" @input="search()" />\n  <ul>\n    <template x-for="r in results">\n      <li x-text="r"></li>\n    </template>\n  </ul>\n</div>', codeLang: 'html' },
        { id: 5, role: 'user', text: '¿Cuál es la diferencia entre debounce y throttle?' },
        { id: 6, role: 'ai', text: 'Debounce espera a que el usuario deje de interactuar por un tiempo antes de ejecutar. Throttle garantiza que la función se ejecute como máximo una vez cada X milisegundos, sin importar cuántas veces se llame. Ejemplo comparativo:', code: '// Throttle: ejecuta máximo 1 vez cada delay ms\nfunction throttle(fn, delay = 300) {\n  let last = 0;\n  return (...args) => {\n    const now = Date.now();\n    if (now - last >= delay) {\n      last = now;\n      fn(...args);\n    }\n  };\n}\n\n// Debounce: espera delay ms sin llamadas\n// Usar para: búsqueda, resize, validación\n\n// Throttle: ejecuta cada delay ms\n// Usar para: scroll, mousemove, polling', codeLang: 'javascript' },
        { id: 7, role: 'user', text: '¿Puedes refactorizar el debounce para que soporte cancelación?' },
        { id: 8, role: 'ai', text: 'Claro, añadimos un método cancel al debounce para poder cancelar la ejecución pendiente. Esto es útil al desmontar componentes:', code: 'function debounce(fn, delay = 300) {\n  let timer;\n  \n  const debounced = (...args) => {\n    clearTimeout(timer);\n    timer = setTimeout(() => fn(...args), delay);\n  };\n  \n  debounced.cancel = () => {\n    clearTimeout(timer);\n    timer = null;\n  };\n  \n  debounced.flush = (...args) => {\n    clearTimeout(timer);\n    fn(...args);\n  };\n  \n  return debounced;\n}\n\n// Uso:\nconst search = debounce(fetchResults, 500);\nsearch(\"query\");     // Programa ejecución\nsearch.cancel();     // Cancela\nsearch.flush(\"now\"); // Ejecuta inmediato', codeLang: 'javascript' },
        { id: 9, role: 'user', text: '¿Cómo testeo un debounce con vitest?' },
        { id: 10, role: 'ai', text: 'Para testear funciones con temporizadores, vitest ofrece fake timers que te permiten controlar el tiempo. Aquí tienes un test completo:', code: 'import { describe, it, expect, vi } from \'vitest\';\nimport { debounce } from \'./debounce\';\n\ndescribe(\'debounce\', () => {\n  beforeEach(() => vi.useFakeTimers());\n  afterEach(() => vi.restoreAllTimers());\n\n  it(\'ejecuta después del delay\', () => {\n    const fn = vi.fn();\n    const debounced = debounce(fn, 300);\n    \n    debounced(\'test\');\n    expect(fn).not.toHaveBeenCalled();\n    \n    vi.advanceTimersByTime(300);\n    expect(fn).toHaveBeenCalledWith(\'test\');\n  });\n\n  it(\'cancela ejecución pendiente\', () => {\n    const fn = vi.fn();\n    const debounced = debounce(fn, 300);\n    \n    debounced();\n    debounced.cancel();\n    vi.advanceTimersByTime(300);\n    \n    expect(fn).not.toHaveBeenCalled();\n  });\n});', codeLang: 'javascript' },
      ],
      copyCode(text) {
        navigator.clipboard.writeText(text);
      },
      sendPrompt() {
        if (!this.prompt.trim()) return;
        this.messages.push({ id: Date.now(), role: 'user', text: this.prompt });
        const userPrompt = this.prompt;
        this.prompt = '';
        setTimeout(() => {
          this.messages.push({ id: Date.now() + 1, role: 'ai', text: 'Procesando tu solicitud sobre: "' + userPrompt + '". Esta es una respuesta demo del modelo ' + this.model + ' con temperatura ' + this.temperature + '.' });
        }, 500);
      }
    };
  }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
