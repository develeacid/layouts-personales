<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LayoutOS · Chat Room</title>
  <link rel="stylesheet" href="/public/css/main.css" />
</head>
<body class="h-full bg-page antialiased">
  <div class="flex h-full" x-data="chatRoomPage()">

    <!-- Panel izquierdo: canales y DMs -->
    <aside class="w-72 bg-zinc-950 text-zinc-300 h-full overflow-y-auto shrink-0 hidden lg:flex flex-col">
      <div class="px-5 py-4 border-b border-zinc-800">
        <span class="text-sm font-semibold text-white">LayoutOS Chat</span>
      </div>
      <!-- Canales -->
      <div class="px-4 pt-4 pb-2">
        <h3 class="text-xs font-semibold uppercase tracking-wider text-zinc-500 mb-2">Canales</h3>
        <div class="space-y-0.5">
          <template x-for="channel in channels" :key="channel.name">
            <button @click="activeChannel = channel.name; activeDM = null"
              class="w-full text-left flex items-center gap-2 px-3 py-1.5 text-sm rounded-lg transition-colors"
              :class="activeChannel === channel.name ? 'text-white bg-zinc-800 font-medium' : 'text-zinc-400 hover:text-white hover:bg-zinc-800/60'">
              <span class="text-zinc-500">#</span>
              <span x-text="channel.name"></span>
              <span x-show="channel.unread > 0" class="ml-auto bg-indigo-600 text-white text-xs rounded-full px-1.5 py-0.5 leading-none" x-text="channel.unread"></span>
            </button>
          </template>
        </div>
      </div>
      <!-- DMs -->
      <div class="px-4 pt-3 pb-4">
        <h3 class="text-xs font-semibold uppercase tracking-wider text-zinc-500 mb-2">Mensajes directos</h3>
        <div class="space-y-0.5">
          <template x-for="dm in directMessages" :key="dm.name">
            <button @click="activeDM = dm.name; activeChannel = null"
              class="w-full text-left flex items-center gap-2 px-3 py-1.5 text-sm rounded-lg transition-colors"
              :class="activeDM === dm.name ? 'text-white bg-zinc-800 font-medium' : 'text-zinc-400 hover:text-white hover:bg-zinc-800/60'">
              <span class="relative">
                <span class="w-2 h-2 rounded-full absolute -right-0.5 -top-0.5" :class="dm.online ? 'bg-emerald-500' : 'bg-zinc-600'"></span>
                <span class="w-6 h-6 rounded-full bg-zinc-700 flex items-center justify-center text-xs text-zinc-300" x-text="dm.name.charAt(0)"></span>
              </span>
              <span x-text="dm.name"></span>
            </button>
          </template>
        </div>
      </div>
    </aside>

    <!-- Panel central: chat -->
    <div class="flex-1 flex flex-col overflow-hidden">
      <!-- Header del canal -->
      <header class="h-14 bg-white border-b border-zinc-200 flex items-center justify-between px-6 shrink-0">
        <div class="flex items-center gap-2">
          <span class="text-zinc-400" x-show="activeChannel">#</span>
          <h1 class="text-sm font-semibold text-zinc-900" x-text="activeChannel || activeDM || 'general'"></h1>
          <span class="text-xs text-zinc-400" x-show="activeChannel">· <span x-text="getChannelMembers()"></span> miembros</span>
        </div>
        <button @click="showInfo = !showInfo" class="btn-ghost btn-sm">
          <svg class="w-5 h-5 text-zinc-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M11.25 11.25l.041-.02a.75.75 0 011.063.852l-.708 2.836a.75.75 0 001.063.853l.041-.021M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9-3.75h.008v.008H12V8.25z"/></svg>
        </button>
      </header>

      <!-- Messages -->
      <main class="flex-1 overflow-y-auto p-6 space-y-6">
        <!-- Date separator -->
        <div class="flex items-center gap-4">
          <div class="flex-1 h-px bg-zinc-200"></div>
          <span class="text-xs text-zinc-400 font-medium">29 de marzo, 2026</span>
          <div class="flex-1 h-px bg-zinc-200"></div>
        </div>

        <template x-for="msg in currentMessages" :key="msg.id">
          <div class="flex gap-3">
            <div class="w-9 h-9 rounded-full shrink-0 flex items-center justify-center text-sm font-medium text-white"
              :class="msg.avatarColor">
              <span x-text="msg.author.charAt(0)"></span>
            </div>
            <div>
              <div class="flex items-baseline gap-2">
                <span class="text-sm font-semibold text-zinc-900" x-text="msg.author"></span>
                <span class="text-xs text-zinc-400" x-text="msg.time"></span>
              </div>
              <p class="text-sm text-zinc-700 mt-0.5 leading-relaxed" x-text="msg.text"></p>
            </div>
          </div>
        </template>

        <!-- Date separator 2 -->
        <div class="flex items-center gap-4">
          <div class="flex-1 h-px bg-zinc-200"></div>
          <span class="text-xs text-zinc-400 font-medium">30 de marzo, 2026</span>
          <div class="flex-1 h-px bg-zinc-200"></div>
        </div>

        <template x-for="msg in todayMessages" :key="msg.id">
          <div class="flex gap-3">
            <div class="w-9 h-9 rounded-full shrink-0 flex items-center justify-center text-sm font-medium text-white"
              :class="msg.avatarColor">
              <span x-text="msg.author.charAt(0)"></span>
            </div>
            <div>
              <div class="flex items-baseline gap-2">
                <span class="text-sm font-semibold text-zinc-900" x-text="msg.author"></span>
                <span class="text-xs text-zinc-400" x-text="msg.time"></span>
              </div>
              <p class="text-sm text-zinc-700 mt-0.5 leading-relaxed" x-text="msg.text"></p>
            </div>
          </div>
        </template>
      </main>

      <!-- Input -->
      <div class="border-t border-zinc-200 bg-white p-4">
        <div class="flex items-end gap-3">
          <button class="btn-ghost btn-sm p-2 shrink-0">
            <svg class="w-5 h-5 text-zinc-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M18.375 12.739l-7.693 7.693a4.5 4.5 0 01-6.364-6.364l10.94-10.94A3 3 0 1119.5 7.372L8.552 18.32m.009-.01l-.01.01m5.699-9.941l-7.81 7.81a1.5 1.5 0 002.112 2.13"/></svg>
          </button>
          <input x-model="newMessage" @keydown.enter="sendMessage()" type="text" class="input flex-1"
            :placeholder="'Mensaje en #' + (activeChannel || activeDM || 'general')" />
          <button @click="sendMessage()" class="btn-primary btn-sm">Enviar</button>
        </div>
      </div>
    </div>

    <!-- Panel derecho: info -->
    <aside x-show="showInfo" x-cloak class="w-64 bg-white border-l border-zinc-200 overflow-y-auto shrink-0 hidden xl:block">
      <div class="p-5">
        <div class="flex items-center justify-between mb-4">
          <h3 class="text-sm font-semibold text-zinc-900">Info del canal</h3>
          <button @click="showInfo = false" class="btn-ghost btn-sm p-1">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        </div>
        <div class="space-y-4">
          <div>
            <h4 class="text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-2">Descripción</h4>
            <p class="text-sm text-zinc-600">Canal para conversaciones generales del equipo.</p>
          </div>
          <div>
            <h4 class="text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-2">Miembros (6)</h4>
            <div class="space-y-2">
              <template x-for="member in infoMembers" :key="member">
                <div class="flex items-center gap-2">
                  <div class="w-7 h-7 rounded-full bg-zinc-200 flex items-center justify-center text-xs font-medium text-zinc-600" x-text="member.charAt(0)"></div>
                  <span class="text-sm text-zinc-700" x-text="member"></span>
                </div>
              </template>
            </div>
          </div>
          <div>
            <h4 class="text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-2">Archivos compartidos</h4>
            <div class="space-y-2">
              <div class="flex items-center gap-2 text-sm text-zinc-600">
                <svg class="w-4 h-4 text-zinc-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/></svg>
                mockups-v3.fig
              </div>
              <div class="flex items-center gap-2 text-sm text-zinc-600">
                <svg class="w-4 h-4 text-zinc-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/></svg>
                sprint-report.pdf
              </div>
              <div class="flex items-center gap-2 text-sm text-zinc-600">
                <svg class="w-4 h-4 text-zinc-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/></svg>
                api-docs.md
              </div>
            </div>
          </div>
        </div>
      </div>
    </aside>
  </div>

  <style>[x-cloak] { display: none !important; }</style>
  <script>
  function chatRoomPage() {
    return {
      activeChannel: 'general',
      activeDM: null,
      showInfo: true,
      newMessage: '',
      channels: [
        { name: 'general', unread: 3 },
        { name: 'diseño', unread: 0 },
        { name: 'dev', unread: 1 },
      ],
      directMessages: [
        { name: 'Ana García', online: true },
        { name: 'Luis Pérez', online: true },
        { name: 'Marta Ruiz', online: false },
        { name: 'Carlos López', online: true },
      ],
      infoMembers: ['Ana García', 'Luis Pérez', 'Marta Ruiz', 'Carlos López', 'Elena Torres', 'David Sánchez'],
      currentMessages: [
        { id: 1, author: 'Ana García', time: '09:15', text: 'Buenos días equipo. He subido los nuevos mockups al canal de diseño.', avatarColor: 'bg-indigo-500' },
        { id: 2, author: 'Luis Pérez', time: '09:22', text: 'Gracias Ana, los reviso en un momento. ¿Incluyen la vista mobile?', avatarColor: 'bg-emerald-500' },
        { id: 3, author: 'Ana García', time: '09:25', text: 'Sí, hay 3 breakpoints: mobile, tablet y desktop.', avatarColor: 'bg-indigo-500' },
        { id: 4, author: 'Carlos López', time: '10:01', text: 'El PR #47 ya está listo para review. Incluye la refactorización del módulo de auth.', avatarColor: 'bg-amber-500' },
        { id: 5, author: 'Marta Ruiz', time: '10:15', text: 'Lo asigno. Carlos, ¿cambiaste algo en las interfaces de TypeScript?', avatarColor: 'bg-rose-500' },
        { id: 6, author: 'Carlos López', time: '10:18', text: 'Sí, renombré UserAuth a AuthSession y agregué el campo refreshToken.', avatarColor: 'bg-amber-500' },
      ],
      todayMessages: [
        { id: 7, author: 'Elena Torres', time: '08:30', text: 'Recordatorio: standup en 30 minutos.', avatarColor: 'bg-purple-500' },
        { id: 8, author: 'David Sánchez', time: '08:45', text: 'Perfecto, ahí estaré. Tengo un blocker que comentar sobre el pipeline de CI.', avatarColor: 'bg-sky-500' },
        { id: 9, author: 'Ana García', time: '09:00', text: 'Ya actualicé los tokens de diseño en Figma. El link está en el canal de diseño.', avatarColor: 'bg-indigo-500' },
        { id: 10, author: 'Luis Pérez', time: '09:10', text: 'Excelente. También necesitamos definir los nuevos breakpoints para el responsive.', avatarColor: 'bg-emerald-500' },
        { id: 11, author: 'Carlos López', time: '09:30', text: 'El deploy de staging falló por un timeout en las migraciones. Estoy investigando.', avatarColor: 'bg-amber-500' },
        { id: 12, author: 'Marta Ruiz', time: '09:45', text: '¿Puede ser el índice nuevo en la tabla de sessions? Ayer tardó bastante en local.', avatarColor: 'bg-rose-500' },
      ],
      getChannelMembers() {
        return this.infoMembers.length;
      },
      sendMessage() {
        if (!this.newMessage.trim()) return;
        this.todayMessages.push({
          id: Date.now(),
          author: 'Tú',
          time: new Date().toLocaleTimeString('es', { hour: '2-digit', minute: '2-digit' }),
          text: this.newMessage,
          avatarColor: 'bg-zinc-600'
        });
        this.newMessage = '';
      }
    };
  }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
