<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LayoutOS · Unirse a Reunión</title>
  <link rel="stylesheet" href="/public/css/main.css" />
</head>
<body class="h-full bg-page antialiased">
  <div class="min-h-full flex flex-col" x-data="joinMeetingPage()">

    <!-- Minimal navbar -->
    <nav class="h-14 bg-white dark:bg-zinc-900 border-b border-zinc-200 dark:border-zinc-800 flex items-center justify-center px-4 sm:px-6 shrink-0">
      <span class="text-sm font-bold text-zinc-900 dark:text-zinc-100">LayoutOS Meet</span>
    </nav>

    <!-- Content -->
    <main class="flex-1 flex items-center justify-center px-4 sm:px-6 py-12">
      <div class="max-w-lg w-full">
        <!-- Meeting info card -->
        <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl shadow-sm p-6 mb-6">
          <div class="text-center mb-6">
            <h1 class="text-lg font-bold text-zinc-900 dark:text-zinc-100">Sprint Planning #14</h1>
            <p class="text-sm text-zinc-500 dark:text-zinc-400 mt-1">Organizado por Ana García</p>
          </div>

          <!-- Camera preview -->
          <div class="bg-zinc-900 rounded-xl aspect-video flex items-center justify-center mb-6 relative overflow-hidden">
            <div x-show="!cameraOn" class="flex flex-col items-center">
              <div class="w-20 h-20 rounded-full bg-zinc-700 flex items-center justify-center mb-3">
                <span class="text-2xl font-bold text-zinc-300">TU</span>
              </div>
              <p class="text-sm text-zinc-400 dark:text-zinc-500">La cámara está desactivada</p>
            </div>
            <div x-show="cameraOn" class="flex flex-col items-center">
              <div class="w-20 h-20 rounded-full bg-zinc-700 flex items-center justify-center mb-3">
                <svg class="w-10 h-10 text-zinc-400 dark:text-zinc-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/></svg>
              </div>
              <p class="text-sm text-zinc-400 dark:text-zinc-500">Preview de cámara</p>
            </div>
          </div>

          <!-- Controls -->
          <div class="flex items-center justify-center gap-4 mb-6">
            <!-- Mic toggle -->
            <button @click="micOn = !micOn"
              class="w-12 h-12 rounded-full flex items-center justify-center transition-colors"
              :class="micOn ? 'bg-zinc-100 dark:bg-zinc-800 text-zinc-700 dark:text-zinc-300 hover:bg-zinc-200 dark:hover:bg-zinc-700 dark:hover:bg-zinc-600' : 'bg-red-100 dark:bg-red-900 text-red-600 dark:text-red-400 hover:bg-red-200'">
              <svg x-show="micOn" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 01-3-3V4.5a3 3 0 116 0v8.25a3 3 0 01-3 3z"/></svg>
              <svg x-show="!micOn" x-cloak class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 01-3-3V4.5a3 3 0 116 0v8.25a3 3 0 01-3 3zM3.75 3.75l16.5 16.5"/></svg>
            </button>
            <!-- Camera toggle -->
            <button @click="cameraOn = !cameraOn"
              class="w-12 h-12 rounded-full flex items-center justify-center transition-colors"
              :class="cameraOn ? 'bg-zinc-100 dark:bg-zinc-800 text-zinc-700 dark:text-zinc-300 hover:bg-zinc-200 dark:hover:bg-zinc-700 dark:hover:bg-zinc-600' : 'bg-red-100 dark:bg-red-900 text-red-600 dark:text-red-400 hover:bg-red-200'">
              <svg x-show="cameraOn" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="m15.75 10.5 4.72-4.72a.75.75 0 0 1 1.28.53v11.38a.75.75 0 0 1-1.28.53l-4.72-4.72M4.5 18.75h9a2.25 2.25 0 0 0 2.25-2.25v-9a2.25 2.25 0 0 0-2.25-2.25h-9A2.25 2.25 0 0 0 2.25 7.5v9a2.25 2.25 0 0 0 2.25 2.25Z"/></svg>
              <svg x-show="!cameraOn" x-cloak class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="m15.75 10.5 4.72-4.72a.75.75 0 0 1 1.28.53v11.38a.75.75 0 0 1-1.28.53l-4.72-4.72M12 18.75H4.5a2.25 2.25 0 0 1-2.25-2.25V9m12.841 9.194L16.5 19.25m-8-17h9a2.25 2.25 0 0 1 2.25 2.25v9M3.75 3.75l16.5 16.5"/></svg>
            </button>
            <!-- Audio device dropdown -->
            <div class="relative" x-data="{ open: false }">
              <button @click="open = !open"
                class="w-12 h-12 rounded-full bg-zinc-100 dark:bg-zinc-800 text-zinc-700 dark:text-zinc-300 hover:bg-zinc-200 dark:hover:bg-zinc-700 dark:hover:bg-zinc-600 flex items-center justify-center transition-colors">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19.114 5.636a9 9 0 010 12.728M16.463 8.288a5.25 5.25 0 010 7.424M6.75 8.25l4.72-4.72a.75.75 0 011.28.53v15.88a.75.75 0 01-1.28.53l-4.72-4.72H4.51c-.88 0-1.704-.507-1.938-1.354A9.01 9.01 0 012.25 12c0-.83.112-1.633.322-2.396C2.806 8.756 3.63 8.25 4.51 8.25H6.75z"/></svg>
              </button>
              <div x-show="open" @click.away="open = false" x-cloak class="absolute bottom-14 left-1/2 -translate-x-1/2 w-56 bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-lg shadow-lg z-10 py-1">
                <div class="px-3 py-1.5 text-xs font-medium text-zinc-400 dark:text-zinc-500">Dispositivo de audio</div>
                <template x-for="device in audioDevices" :key="device">
                  <button @click="selectedDevice = device; open = false"
                    class="w-full text-left px-3 py-1.5 text-sm hover:bg-zinc-50 dark:hover:bg-zinc-800 flex items-center gap-2"
                    :class="selectedDevice === device ? 'text-indigo-600 font-medium' : 'text-zinc-700 dark:text-zinc-300'">
                    <svg x-show="selectedDevice === device" class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg>
                    <span x-text="device"></span>
                  </button>
                </template>
              </div>
            </div>
          </div>

          <!-- Name input -->
          <div class="mb-6">
            <label class="label">Tu nombre</label>
            <input x-model="userName" type="text" class="input w-full" placeholder="¿Cómo te llamas?" />
          </div>

          <!-- Join button -->
          <button class="btn-primary btn-lg w-full mb-4">Unirse ahora</button>

          <!-- People in meeting -->
          <div class="flex items-center justify-center gap-3 text-sm text-zinc-500 dark:text-zinc-400">
            <div class="flex -space-x-2">
              <div class="w-7 h-7 rounded-full bg-indigo-500 flex items-center justify-center text-xs text-white font-medium ring-2 ring-white">A</div>
              <div class="w-7 h-7 rounded-full bg-emerald-500 flex items-center justify-center text-xs text-white font-medium ring-2 ring-white">L</div>
              <div class="w-7 h-7 rounded-full bg-amber-500 flex items-center justify-center text-xs text-white font-medium ring-2 ring-white">C</div>
            </div>
            <span>3 personas ya están en la reunión</span>
          </div>
        </div>
      </div>
    </main>
  </div>

  <style>[x-cloak] { display: none !important; }</style>
  <script>
  function joinMeetingPage() {
    return {
      micOn: true,
      cameraOn: true,
      userName: '',
      selectedDevice: 'Altavoces del sistema',
      audioDevices: [
        'Altavoces del sistema',
        'Auriculares Bluetooth',
        'Monitor HDMI Audio',
      ]
    };
  }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
