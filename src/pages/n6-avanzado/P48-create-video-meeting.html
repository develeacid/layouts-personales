<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LayoutOS · Nueva Reunión</title>
  <link rel="stylesheet" href="../../../public/css/main.css" />
</head>
<body class="h-full bg-page antialiased">
  <div class="flex h-full" x-data="createMeetingPage()">

    <!-- Sidebar -->
    <aside class="w-64 bg-zinc-950 dark:bg-zinc-800 text-zinc-300 h-full overflow-y-auto shrink-0 hidden lg:flex flex-col">
      <div class="px-5 py-4 border-b border-zinc-800"><span class="text-sm font-semibold text-white">LayoutOS</span></div>
      <nav class="flex-1 px-3 py-4 space-y-1">
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg text-zinc-400 dark:text-zinc-500 hover:text-white hover:bg-zinc-800/60 transition-colors">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25a2.25 2.25 0 01-2.25-2.25v-2.25z"/></svg>
          Dashboard
        </a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg text-zinc-400 dark:text-zinc-500 hover:text-white hover:bg-zinc-800/60 transition-colors">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 4.5v15m6-15v15m-10.875 0h15.75c.621 0 1.125-.504 1.125-1.125V5.625c0-.621-.504-1.125-1.125-1.125H4.125C3.504 4.5 3 5.004 3 5.625v12.75c0 .621.504 1.125 1.125 1.125z"/></svg>
          Kanban
        </a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg text-zinc-400 dark:text-zinc-500 hover:text-white hover:bg-zinc-800/60 transition-colors">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5"/></svg>
          Calendario
        </a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg text-zinc-400 dark:text-zinc-500 hover:text-white hover:bg-zinc-800/60 transition-colors">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M20.25 8.511c.884.284 1.5 1.128 1.5 2.097v4.286c0 1.136-.847 2.1-1.98 2.193-.34.027-.68.052-1.02.072v3.091l-3-3c-1.354 0-2.694-.055-4.02-.163a2.115 2.115 0 01-.825-.242m9.345-8.334a2.126 2.126 0 00-.476-.095 48.64 48.64 0 00-8.048 0c-1.131.094-1.976 1.057-1.976 2.192v4.286c0 .837.46 1.58 1.155 1.951m9.345-8.334V6.637c0-1.621-1.152-3.026-2.76-3.235A48.455 48.455 0 0011.25 3c-2.115 0-4.198.137-6.24.402-1.608.209-2.76 1.614-2.76 3.235v6.226c0 1.621 1.152 3.026 2.76 3.235.577.075 1.157.14 1.74.194V21l4.155-4.155"/></svg>
          Chat
        </a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg text-zinc-400 dark:text-zinc-500 hover:text-white hover:bg-zinc-800/60 transition-colors">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z"/></svg>
          AI
        </a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg text-zinc-400 dark:text-zinc-500 hover:text-white hover:bg-zinc-800/60 transition-colors">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931z"/></svg>
          Editor
        </a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg text-zinc-400 dark:text-zinc-500 hover:text-white hover:bg-zinc-800/60 transition-colors">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12.75V12A2.25 2.25 0 014.5 9.75h15A2.25 2.25 0 0121.75 12v.75m-8.69-6.44l-2.12-2.12a1.5 1.5 0 00-1.061-.44H4.5A2.25 2.25 0 002.25 6v12a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9a2.25 2.25 0 00-2.25-2.25h-5.379a1.5 1.5 0 01-1.06-.44z"/></svg>
          Proyectos
        </a>
      </nav>
    </aside>

    <div class="flex-1 flex flex-col overflow-hidden">
      <!-- Header -->
      <header class="h-14 bg-white dark:bg-zinc-900 border-b border-zinc-200 dark:border-zinc-800 flex items-center px-4 sm:px-6 shrink-0">
        <h1 class="text-sm font-semibold text-zinc-900 dark:text-zinc-100">Nueva reunión</h1>
      </header>

      <main class="flex-1 overflow-y-auto p-6">
        <div class="max-w-4xl mx-auto">
          <div class="grid grid-cols-1 lg:grid-cols-5 gap-6">

            <!-- Form (3 cols) -->
            <div class="lg:col-span-3">
              <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl shadow-sm p-6 space-y-5">
                <div>
                  <label class="label">Nombre de la reunión</label>
                  <input x-model="meeting.name" type="text" class="input w-full" placeholder="Sprint Planning #14" />
                </div>

                <div class="grid grid-cols-2 gap-4">
                  <div>
                    <label class="label">Fecha</label>
                    <input x-model="meeting.date" type="date" class="input w-full" />
                  </div>
                  <div>
                    <label class="label">Hora</label>
                    <input x-model="meeting.time" type="time" class="input w-full" />
                  </div>
                </div>

                <div>
                  <label class="label">Duración</label>
                  <select x-model="meeting.duration" class="input w-full">
                    <option value="15">15 minutos</option>
                    <option value="30">30 minutos</option>
                    <option value="45">45 minutos</option>
                    <option value="60">1 hora</option>
                    <option value="90">1.5 horas</option>
                    <option value="120">2 horas</option>
                  </select>
                </div>

                <!-- Participants tags input -->
                <div>
                  <label class="label">Participantes</label>
                  <div class="border border-zinc-200 dark:border-zinc-800 rounded-lg p-2 flex flex-wrap gap-2 focus-within:ring-2 focus-within:ring-indigo-500 focus-within:border-indigo-500 dark:bg-zinc-800">
                    <template x-for="(p, i) in meeting.participants" :key="i">
                      <span class="inline-flex items-center gap-1 bg-zinc-100 dark:bg-zinc-800 text-zinc-700 dark:text-zinc-300 text-xs font-medium px-2 py-1 rounded-md">
                        <span x-text="p"></span>
                        <button @click="meeting.participants.splice(i, 1)" class="hover:text-red-500">
                          <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                        </button>
                      </span>
                    </template>
                    <input x-model="participantInput" @keydown.enter.prevent="addParticipant()" @keydown.comma.prevent="addParticipant()"
                      type="email" class="flex-1 min-w-32 border-none focus:outline-none focus:ring-0 text-sm p-1 dark:bg-transparent dark:text-zinc-100 dark:placeholder-zinc-500" placeholder="email@ejemplo.com" />
                  </div>
                </div>

                <div>
                  <label class="label">Descripción</label>
                  <textarea x-model="meeting.description" class="input w-full" rows="3" placeholder="Agenda de la reunión..."></textarea>
                </div>

                <!-- Toggles -->
                <div class="space-y-3 pt-2">
                  <h3 class="text-sm font-semibold text-zinc-900 dark:text-zinc-100">Opciones</h3>
                  <label class="flex items-center justify-between cursor-pointer">
                    <span class="text-sm text-zinc-700 dark:text-zinc-300">Cámara activada por defecto</span>
                    <button @click="meeting.cameraOn = !meeting.cameraOn" class="relative w-10 h-5 rounded-full transition-colors"
                      :class="meeting.cameraOn ? 'bg-indigo-600' : 'bg-zinc-300'">
                      <span class="absolute top-0.5 left-0.5 w-4 h-4 rounded-full bg-white dark:bg-zinc-900 transition-transform"
                        :class="meeting.cameraOn ? 'translate-x-5' : ''"></span>
                    </button>
                  </label>
                  <label class="flex items-center justify-between cursor-pointer">
                    <span class="text-sm text-zinc-700 dark:text-zinc-300">Micrófono activado por defecto</span>
                    <button @click="meeting.micOn = !meeting.micOn" class="relative w-10 h-5 rounded-full transition-colors"
                      :class="meeting.micOn ? 'bg-indigo-600' : 'bg-zinc-300'">
                      <span class="absolute top-0.5 left-0.5 w-4 h-4 rounded-full bg-white dark:bg-zinc-900 transition-transform"
                        :class="meeting.micOn ? 'translate-x-5' : ''"></span>
                    </button>
                  </label>
                  <label class="flex items-center justify-between cursor-pointer">
                    <span class="text-sm text-zinc-700 dark:text-zinc-300">Sala de espera</span>
                    <button @click="meeting.waitingRoom = !meeting.waitingRoom" class="relative w-10 h-5 rounded-full transition-colors"
                      :class="meeting.waitingRoom ? 'bg-indigo-600' : 'bg-zinc-300'">
                      <span class="absolute top-0.5 left-0.5 w-4 h-4 rounded-full bg-white dark:bg-zinc-900 transition-transform"
                        :class="meeting.waitingRoom ? 'translate-x-5' : ''"></span>
                    </button>
                  </label>
                </div>

                <div class="pt-4">
                  <button @click="createMeeting()" class="btn-primary w-full">Crear reunión</button>
                </div>
              </div>
            </div>

            <!-- Preview (2 cols) -->
            <div class="lg:col-span-2">
              <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl shadow-sm p-6 lg:sticky lg:top-6">
                <h3 class="text-sm font-semibold text-zinc-900 dark:text-zinc-100 mb-4">Vista previa</h3>
                <div class="space-y-3">
                  <div>
                    <span class="text-xs text-zinc-400 dark:text-zinc-500">Nombre</span>
                    <p class="text-sm font-medium text-zinc-900 dark:text-zinc-100" x-text="meeting.name || 'Sin nombre'"></p>
                  </div>
                  <div>
                    <span class="text-xs text-zinc-400 dark:text-zinc-500">Fecha y hora</span>
                    <p class="text-sm text-zinc-700 dark:text-zinc-300" x-text="(meeting.date || '---') + ' a las ' + (meeting.time || '---')"></p>
                  </div>
                  <div>
                    <span class="text-xs text-zinc-400 dark:text-zinc-500">Duración</span>
                    <p class="text-sm text-zinc-700 dark:text-zinc-300" x-text="meeting.duration + ' minutos'"></p>
                  </div>
                  <div>
                    <span class="text-xs text-zinc-400 dark:text-zinc-500">Participantes</span>
                    <p class="text-sm text-zinc-700 dark:text-zinc-300" x-text="meeting.participants.length > 0 ? meeting.participants.join(', ') : 'Ninguno añadido'"></p>
                  </div>
                  <div>
                    <span class="text-xs text-zinc-400 dark:text-zinc-500">Opciones</span>
                    <div class="flex flex-wrap gap-2 mt-1">
                      <span class="text-xs px-2 py-0.5 rounded-full" :class="meeting.cameraOn ? 'badge-success' : 'badge-danger'" x-text="meeting.cameraOn ? 'Cámara ON' : 'Cámara OFF'"></span>
                      <span class="text-xs px-2 py-0.5 rounded-full" :class="meeting.micOn ? 'badge-success' : 'badge-danger'" x-text="meeting.micOn ? 'Mic ON' : 'Mic OFF'"></span>
                      <span x-show="meeting.waitingRoom" class="text-xs px-2 py-0.5 rounded-full badge-info">Sala de espera</span>
                    </div>
                  </div>
                </div>

                <!-- Generated link -->
                <div x-show="generatedLink" x-cloak class="mt-6 p-3 bg-emerald-50 dark:bg-emerald-950 border border-emerald-200 dark:border-emerald-800 rounded-lg">
                  <p class="text-xs text-emerald-600 font-medium mb-1">Enlace de la reunión:</p>
                  <p class="text-xs text-emerald-800 font-mono break-all" x-text="generatedLink"></p>
                  <button @click="navigator.clipboard.writeText(generatedLink)" class="btn-ghost btn-sm text-xs text-emerald-600 mt-2">Copiar enlace</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <style>[x-cloak] { display: none !important; }</style>
  <script>
  function createMeetingPage() {
    return {
      participantInput: '',
      generatedLink: '',
      meeting: {
        name: '',
        date: '2026-04-02',
        time: '10:00',
        duration: '60',
        participants: ['ana@layout.os', 'luis@layout.os'],
        description: '',
        cameraOn: true,
        micOn: true,
        waitingRoom: false,
      },
      addParticipant() {
        const email = this.participantInput.trim().replace(',', '');
        if (email && !this.meeting.participants.includes(email)) {
          this.meeting.participants.push(email);
        }
        this.participantInput = '';
      },
      createMeeting() {
        if (!this.meeting.name.trim()) return;
        const id = Math.random().toString(36).substring(2, 10);
        this.generatedLink = 'https://meet.layoutos.app/' + id;
      }
    };
  }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
