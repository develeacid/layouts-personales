<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LayoutOS · Checkout</title>
  <link rel="stylesheet" href="/public/css/main.css" />
</head>
<body class="h-full bg-page antialiased">
  <div class="min-h-full flex flex-col" x-data="checkoutPage()">

    <!-- Navbar e-commerce -->
    <nav class="h-14 bg-white border-b border-zinc-200 flex items-center justify-between px-6 shrink-0">
      <span class="text-sm font-bold text-zinc-900">LayoutOS Store</span>
      <div class="flex items-center gap-6">
        <!-- Steps -->
        <div class="hidden sm:flex items-center gap-2">
          <template x-for="(s, i) in steps" :key="i">
            <div class="flex items-center gap-2">
              <div class="flex items-center gap-1.5">
                <span class="w-6 h-6 rounded-full flex items-center justify-center text-xs font-semibold"
                  :class="i < step ? 'bg-emerald-500 text-white' : i === step ? 'bg-indigo-600 text-white' : 'bg-zinc-200 text-zinc-500'"
                  x-text="i < step ? '&#10003;' : (i + 1)"></span>
                <span class="text-sm" :class="i === step ? 'font-semibold text-zinc-900' : 'text-zinc-400'" x-text="s"></span>
              </div>
              <svg x-show="i < steps.length - 1" class="w-4 h-4 text-zinc-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
            </div>
          </template>
        </div>
      </div>
      <span class="text-sm text-zinc-500">Checkout</span>
    </nav>

    <!-- Content -->
    <main class="flex-1 max-w-6xl mx-auto w-full px-6 py-8">
      <div class="flex flex-col lg:flex-row gap-8">

        <!-- Left: form -->
        <div class="flex-1">
          <!-- Step 1: Shipping -->
          <div x-show="step === 0">
            <h2 class="text-lg font-semibold text-zinc-900 mb-6">Dirección de envío</h2>
            <div class="bg-white border border-zinc-200 rounded-xl shadow-sm p-6 space-y-4">
              <div class="grid grid-cols-2 gap-4">
                <div>
                  <label class="label">Nombre</label>
                  <input x-model="shipping.firstName" type="text" class="input w-full" placeholder="Juan" />
                </div>
                <div>
                  <label class="label">Apellidos</label>
                  <input x-model="shipping.lastName" type="text" class="input w-full" placeholder="García" />
                </div>
              </div>
              <div>
                <label class="label">Dirección</label>
                <input x-model="shipping.address" type="text" class="input w-full" placeholder="Calle Mayor 15, 2A" />
              </div>
              <div class="grid grid-cols-3 gap-4">
                <div>
                  <label class="label">Ciudad</label>
                  <input x-model="shipping.city" type="text" class="input w-full" placeholder="Madrid" />
                </div>
                <div>
                  <label class="label">Provincia</label>
                  <input x-model="shipping.province" type="text" class="input w-full" placeholder="Madrid" />
                </div>
                <div>
                  <label class="label">Código postal</label>
                  <input x-model="shipping.zip" type="text" class="input w-full" placeholder="28001" />
                </div>
              </div>
              <div>
                <label class="label">Teléfono</label>
                <input x-model="shipping.phone" type="tel" class="input w-full" placeholder="+34 612 345 678" />
              </div>
              <div class="flex justify-end pt-2">
                <button @click="step = 1" class="btn-primary">Continuar al pago</button>
              </div>
            </div>
          </div>

          <!-- Step 2: Payment -->
          <div x-show="step === 1" x-cloak>
            <h2 class="text-lg font-semibold text-zinc-900 mb-6">Método de pago</h2>
            <div class="bg-white border border-zinc-200 rounded-xl shadow-sm p-6 space-y-4">
              <div>
                <label class="label">Número de tarjeta</label>
                <input x-model="payment.card" type="text" class="input w-full" placeholder="4242 4242 4242 4242" maxlength="19"
                  @input="formatCard()" />
              </div>
              <div>
                <label class="label">Nombre en la tarjeta</label>
                <input x-model="payment.name" type="text" class="input w-full" placeholder="JUAN GARCIA" />
              </div>
              <div class="grid grid-cols-2 gap-4">
                <div>
                  <label class="label">Fecha de expiración</label>
                  <input x-model="payment.expiry" type="text" class="input w-full" placeholder="MM/AA" maxlength="5" />
                </div>
                <div>
                  <label class="label">CVV</label>
                  <input x-model="payment.cvv" type="text" class="input w-full" placeholder="123" maxlength="4" />
                </div>
              </div>
              <div class="flex justify-between pt-2">
                <button @click="step = 0" class="btn-secondary">Volver</button>
                <button @click="step = 2" class="btn-primary">Revisar pedido</button>
              </div>
            </div>
          </div>

          <!-- Step 3: Review -->
          <div x-show="step === 2" x-cloak>
            <h2 class="text-lg font-semibold text-zinc-900 mb-6">Revisar y confirmar</h2>
            <div class="space-y-4">
              <div class="bg-white border border-zinc-200 rounded-xl shadow-sm p-6">
                <h3 class="text-sm font-semibold text-zinc-900 mb-3">Dirección de envío</h3>
                <p class="text-sm text-zinc-600" x-text="shipping.firstName + ' ' + shipping.lastName"></p>
                <p class="text-sm text-zinc-600" x-text="shipping.address"></p>
                <p class="text-sm text-zinc-600" x-text="shipping.city + ', ' + shipping.province + ' ' + shipping.zip"></p>
                <button @click="step = 0" class="text-sm text-indigo-600 hover:text-indigo-700 mt-2">Editar</button>
              </div>
              <div class="bg-white border border-zinc-200 rounded-xl shadow-sm p-6">
                <h3 class="text-sm font-semibold text-zinc-900 mb-3">Método de pago</h3>
                <p class="text-sm text-zinc-600" x-text="'Tarjeta terminada en ' + payment.card.slice(-4)"></p>
                <p class="text-sm text-zinc-600" x-text="'Expira: ' + payment.expiry"></p>
                <button @click="step = 1" class="text-sm text-indigo-600 hover:text-indigo-700 mt-2">Editar</button>
              </div>
              <div class="flex justify-between pt-2">
                <button @click="step = 1" class="btn-secondary">Volver</button>
                <button class="btn-primary btn-lg">Confirmar pedido</button>
              </div>
            </div>
          </div>
        </div>

        <!-- Right: order summary -->
        <div class="lg:w-80 shrink-0">
          <div class="bg-white border border-zinc-200 rounded-xl shadow-sm p-6 lg:sticky lg:top-8">
            <h3 class="text-sm font-semibold text-zinc-900 mb-4">Resumen del pedido</h3>
            <div class="space-y-3 mb-4">
              <template x-for="item in cart" :key="item.id">
                <div class="flex items-center gap-3">
                  <div class="w-12 h-12 bg-zinc-100 rounded-lg flex items-center justify-center text-xs text-zinc-400">IMG</div>
                  <div class="flex-1 min-w-0">
                    <p class="text-sm font-medium text-zinc-900 truncate" x-text="item.name"></p>
                    <p class="text-xs text-zinc-500" x-text="'Cant: ' + item.qty"></p>
                  </div>
                  <span class="text-sm font-medium text-zinc-900" x-text="'$' + (item.price * item.qty).toFixed(2)"></span>
                </div>
              </template>
            </div>
            <div class="border-t border-zinc-200 pt-4 space-y-2">
              <div class="flex justify-between text-sm">
                <span class="text-zinc-500">Subtotal</span>
                <span class="text-zinc-900" x-text="'$' + subtotal.toFixed(2)"></span>
              </div>
              <div class="flex justify-between text-sm">
                <span class="text-zinc-500">Envío</span>
                <span class="text-zinc-900">$4.99</span>
              </div>
              <div class="flex justify-between text-sm font-semibold border-t border-zinc-200 pt-2 mt-2">
                <span class="text-zinc-900">Total</span>
                <span class="text-zinc-900" x-text="'$' + (subtotal + 4.99).toFixed(2)"></span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <style>[x-cloak] { display: none !important; }</style>
  <script>
  function checkoutPage() {
    return {
      step: 0,
      steps: ['Envío', 'Pago', 'Confirmación'],
      shipping: { firstName: '', lastName: '', address: '', city: '', province: '', zip: '', phone: '' },
      payment: { card: '', name: '', expiry: '', cvv: '' },
      cart: [
        { id: 1, name: 'Auriculares Bluetooth Pro', price: 79.99, qty: 1 },
        { id: 2, name: 'Teclado mecánico RGB', price: 129.99, qty: 1 },
        { id: 3, name: 'Hub USB-C 7 en 1', price: 34.99, qty: 2 },
      ],
      get subtotal() {
        return this.cart.reduce((sum, item) => sum + item.price * item.qty, 0);
      },
      formatCard() {
        let v = this.payment.card.replace(/\s/g, '').replace(/\D/g, '');
        this.payment.card = v.match(/.{1,4}/g)?.join(' ') || v;
      }
    };
  }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
