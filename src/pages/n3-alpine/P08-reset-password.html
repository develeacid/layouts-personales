<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LayoutOS · Reset Password</title>
  <link rel="stylesheet" href="/public/css/main.css" />
</head>
<body class="h-full bg-page antialiased">

  <style>[x-cloak] { display: none !important; }</style>

  <div class="min-h-full flex items-center justify-center px-4 py-12" x-data="resetPasswordPage()">

    <div class="w-full max-w-md space-y-8">

      <!-- Logo -->
      <div class="text-center">
        <div class="inline-flex items-center gap-2">
          <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
            <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" /></svg>
          </div>
          <span class="text-lg font-semibold text-zinc-900 dark:text-zinc-100">LayoutOS</span>
        </div>
      </div>

      <!-- Step indicators -->
      <div class="flex items-center justify-center gap-2">
        <template x-for="s in 3" :key="s">
          <div
            class="w-2.5 h-2.5 rounded-full transition-colors duration-300"
            :class="s === step ? 'bg-blue-600' : s < step ? 'bg-blue-400' : 'bg-zinc-200'"
          ></div>
        </template>
      </div>

      <!-- Card -->
      <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl shadow-sm p-6">

        <!-- Paso 1: OTP -->
        <div x-show="step === 1" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 translate-y-2" x-transition:enter-end="opacity-100 translate-y-0">
          <div class="text-center mb-6">
            <div class="w-12 h-12 bg-blue-50 dark:bg-blue-950 rounded-full flex items-center justify-center mx-auto mb-4">
              <svg class="w-6 h-6 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg>
            </div>
            <h2 class="text-lg font-semibold text-zinc-900 dark:text-zinc-100">Verifica tu identidad</h2>
            <p class="text-sm text-zinc-500 dark:text-zinc-400 mt-1">Ingresa el codigo de 6 digitos enviado a tu***@email.com</p>
          </div>

          <!-- OTP inputs -->
          <div class="flex justify-center gap-2 mb-6" @paste.prevent="handlePaste($event)">
            <template x-for="(digit, index) in otp" :key="index">
              <input
                type="text"
                maxlength="1"
                inputmode="numeric"
                :id="'otp-' + index"
                class="w-11 h-12 text-center text-lg font-semibold border border-zinc-300 dark:border-zinc-700 rounded-lg focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 outline-none transition-all dark:bg-zinc-800 dark:text-zinc-100 dark:placeholder-zinc-500"
                :value="digit"
                @input="handleOtpInput($event, index)"
                @keydown.backspace="handleBackspace($event, index)"
                @focus="$event.target.select()"
              />
            </template>
          </div>

          <button
            @click="verifyOtp()"
            :disabled="otp.join('').length < 6"
            class="btn-primary w-full"
            :class="otp.join('').length < 6 ? 'opacity-50 cursor-not-allowed' : ''"
          >Verificar codigo</button>

          <p class="text-center text-sm text-zinc-500 dark:text-zinc-400 mt-4">
            <template x-if="countdown > 0">
              <span>Reenviar codigo en <span class="font-medium text-zinc-700 dark:text-zinc-300" x-text="countdown + 's'"></span></span>
            </template>
            <template x-if="countdown <= 0">
              <button @click="resendCode()" class="text-blue-600 hover:text-blue-700 font-medium cursor-pointer">Reenviar codigo</button>
            </template>
          </p>
        </div>

        <!-- Paso 2: Nueva contrasena -->
        <div x-show="step === 2" x-cloak x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 translate-y-2" x-transition:enter-end="opacity-100 translate-y-0">
          <div class="text-center mb-6">
            <div class="w-12 h-12 bg-blue-50 dark:bg-blue-950 rounded-full flex items-center justify-center mx-auto mb-4">
              <svg class="w-6 h-6 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
            </div>
            <h2 class="text-lg font-semibold text-zinc-900 dark:text-zinc-100">Nueva contrasena</h2>
            <p class="text-sm text-zinc-500 dark:text-zinc-400 mt-1">Crea una contrasena segura para tu cuenta</p>
          </div>

          <div class="space-y-4">
            <div>
              <label class="label">Nueva contrasena</label>
              <div class="relative">
                <input
                  :type="showPassword ? 'text' : 'password'"
                  x-model="password"
                  class="input pr-10"
                  placeholder="Minimo 8 caracteres"
                />
                <button @click="showPassword = !showPassword" class="absolute right-3 top-1/2 -translate-y-1/2 text-zinc-400 hover:text-zinc-600 cursor-pointer">
                  <svg x-show="!showPassword" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
                  <svg x-show="showPassword" x-cloak class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.542 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" /></svg>
                </button>
              </div>
            </div>

            <!-- Strength bar -->
            <div class="space-y-2">
              <div class="flex gap-1">
                <template x-for="i in 4" :key="i">
                  <div class="h-1.5 flex-1 rounded-full transition-colors duration-300"
                    :class="i <= strengthLevel ? strengthColors[strengthLevel] : 'bg-zinc-200'"
                  ></div>
                </template>
              </div>
              <p class="text-xs" :class="strengthLevel >= 3 ? 'text-emerald-600' : strengthLevel >= 2 ? 'text-amber-600' : 'text-zinc-400'" x-text="strengthLabel"></p>
            </div>

            <!-- Requirements checklist -->
            <ul class="space-y-1.5">
              <template x-for="req in requirements" :key="req.label">
                <li class="flex items-center gap-2 text-xs" :class="req.met ? 'text-emerald-600' : 'text-zinc-400'">
                  <svg x-show="req.met" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg>
                  <svg x-show="!req.met" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10" /></svg>
                  <span x-text="req.label"></span>
                </li>
              </template>
            </ul>

            <div>
              <label class="label">Confirmar contrasena</label>
              <input
                type="password"
                x-model="confirmPassword"
                class="input"
                :class="confirmPassword && password !== confirmPassword ? 'input-error' : ''"
                placeholder="Repite la contrasena"
              />
              <p x-show="confirmPassword && password !== confirmPassword" class="error-msg">Las contrasenas no coinciden</p>
            </div>

            <button
              @click="submitPassword()"
              :disabled="!canSubmitPassword"
              class="btn-primary w-full"
              :class="!canSubmitPassword ? 'opacity-50 cursor-not-allowed' : ''"
            >Actualizar contrasena</button>
          </div>
        </div>

        <!-- Paso 3: Confirmacion -->
        <div x-show="step === 3" x-cloak x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 scale-95" x-transition:enter-end="opacity-100 scale-100">
          <div class="text-center py-6">
            <div class="w-16 h-16 bg-emerald-100 dark:bg-emerald-800 rounded-full flex items-center justify-center mx-auto mb-4">
              <svg class="w-8 h-8 text-emerald-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg>
            </div>
            <h2 class="text-lg font-semibold text-zinc-900 dark:text-zinc-100">Contrasena actualizada</h2>
            <p class="text-sm text-zinc-500 dark:text-zinc-400 mt-1">Tu contrasena se ha cambiado correctamente</p>
            <button @click="goToLogin()" class="btn-primary w-full mt-6">Iniciar sesion</button>
          </div>
        </div>

      </div>

      <p class="text-center text-xs text-zinc-400 dark:text-zinc-500">&copy; 2026 LayoutOS. Todos los derechos reservados.</p>
    </div>

    <!-- Toast container -->
    <template x-teleport="body">
      <div class="fixed top-4 right-4 z-50 space-y-2 w-80">
        <template x-for="toast in toasts" :key="toast.id">
          <div
            x-show="toast.visible"
            x-transition:enter="transition ease-out duration-300"
            x-transition:enter-start="opacity-0 translate-x-8"
            x-transition:enter-end="opacity-100 translate-x-0"
            x-transition:leave="transition ease-in duration-200"
            x-transition:leave-start="opacity-100 translate-x-0"
            x-transition:leave-end="opacity-0 translate-x-8"
            class="flex items-start gap-3 bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl shadow-lg px-4 py-3"
          >
            <div class="shrink-0 mt-0.5">
              <div class="w-5 h-5 bg-emerald-100 dark:bg-emerald-800 rounded-full flex items-center justify-center">
                <svg class="w-3 h-3 text-emerald-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg>
              </div>
            </div>
            <p class="text-xs text-zinc-900 dark:text-zinc-100 flex-1 pt-0.5" x-text="toast.message"></p>
          </div>
        </template>
      </div>
    </template>
  </div>

  <script>
    function resetPasswordPage() {
      return {
        step: 1,
        otp: ['', '', '', '', '', ''],
        countdown: 30,
        countdownInterval: null,
        password: '',
        confirmPassword: '',
        showPassword: false,
        toasts: [],

        strengthColors: { 1: 'bg-rose-500', 2: 'bg-amber-500', 3: 'bg-emerald-400', 4: 'bg-emerald-600' },

        get strengthLevel() {
          let score = 0;
          if (this.password.length >= 8) score++;
          if (/[A-Z]/.test(this.password)) score++;
          if (/[0-9]/.test(this.password)) score++;
          if (/[^A-Za-z0-9]/.test(this.password)) score++;
          return score;
        },

        get strengthLabel() {
          const labels = { 0: '', 1: 'Debil', 2: 'Regular', 3: 'Fuerte', 4: 'Muy fuerte' };
          return labels[this.strengthLevel];
        },

        get requirements() {
          return [
            { label: 'Minimo 8 caracteres', met: this.password.length >= 8 },
            { label: 'Al menos una mayuscula', met: /[A-Z]/.test(this.password) },
            { label: 'Al menos un numero', met: /[0-9]/.test(this.password) },
            { label: 'Al menos un caracter especial', met: /[^A-Za-z0-9]/.test(this.password) }
          ];
        },

        get canSubmitPassword() {
          return this.strengthLevel >= 3 && this.password === this.confirmPassword && this.confirmPassword.length > 0;
        },

        init() {
          this.startCountdown();
          this.$nextTick(() => {
            const first = document.getElementById('otp-0');
            if (first) first.focus();
          });
        },

        startCountdown() {
          this.countdown = 30;
          if (this.countdownInterval) clearInterval(this.countdownInterval);
          this.countdownInterval = setInterval(() => {
            this.countdown--;
            if (this.countdown <= 0) clearInterval(this.countdownInterval);
          }, 1000);
        },

        handleOtpInput(event, index) {
          const value = event.target.value.replace(/\D/g, '');
          this.otp[index] = value.slice(-1);
          event.target.value = this.otp[index];
          if (value && index < 5) {
            document.getElementById('otp-' + (index + 1))?.focus();
          }
        },

        handleBackspace(event, index) {
          if (!this.otp[index] && index > 0) {
            document.getElementById('otp-' + (index - 1))?.focus();
          }
          this.otp[index] = '';
        },

        handlePaste(event) {
          const paste = (event.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '').slice(0, 6);
          for (let i = 0; i < 6; i++) {
            this.otp[i] = paste[i] || '';
            const el = document.getElementById('otp-' + i);
            if (el) el.value = this.otp[i];
          }
          if (paste.length > 0) {
            const focusIndex = Math.min(paste.length, 5);
            document.getElementById('otp-' + focusIndex)?.focus();
          }
        },

        verifyOtp() {
          if (this.otp.join('').length === 6) {
            this.step = 2;
          }
        },

        resendCode() {
          this.startCountdown();
          this.addToast('Codigo reenviado a tu correo');
        },

        submitPassword() {
          if (this.canSubmitPassword) {
            this.step = 3;
            this.addToast('Contrasena actualizada correctamente');
          }
        },

        goToLogin() {
          this.addToast('Redirigiendo al inicio de sesion...');
        },

        addToast(message) {
          const id = Date.now();
          this.toasts.push({ id, message, visible: true });
          setTimeout(() => {
            const toast = this.toasts.find(t => t.id === id);
            if (toast) toast.visible = false;
            setTimeout(() => { this.toasts = this.toasts.filter(t => t.id !== id); }, 300);
          }, 4000);
        }
      };
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
