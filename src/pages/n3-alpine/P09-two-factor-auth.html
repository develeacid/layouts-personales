<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LayoutOS · Two-Factor Auth</title>
  <link rel="stylesheet" href="../../../public/css/main.css" />
</head>
<body class="h-full bg-page antialiased">

  <style>[x-cloak] { display: none !important; }</style>

  <div class="min-h-full flex items-center justify-center px-4 py-12" x-data="twoFactorPage()">

    <div class="w-full max-w-md space-y-6">

      <!-- Logo -->
      <div class="text-center">
        <div class="inline-flex items-center gap-2">
          <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
            <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" /></svg>
          </div>
          <span class="text-lg font-semibold text-zinc-900 dark:text-zinc-100">LayoutOS</span>
        </div>
      </div>

      <!-- Main card -->
      <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl shadow-sm p-6">

        <!-- Shield icon -->
        <div class="text-center mb-6">
          <div class="w-14 h-14 bg-blue-50 dark:bg-blue-950 rounded-full flex items-center justify-center mx-auto mb-4">
            <svg class="w-7 h-7 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z" /></svg>
          </div>
          <h2 class="text-lg font-semibold text-zinc-900 dark:text-zinc-100">Autenticacion de dos factores</h2>
          <p class="text-sm text-zinc-500 dark:text-zinc-400 mt-1">Ingresa el codigo de tu aplicacion de autenticacion</p>
        </div>

        <!-- Toggle: App / SMS -->
        <div class="inline-flex bg-zinc-100 dark:bg-zinc-800 rounded-lg p-1 gap-1 w-full mb-6">
          <button @click="method = 'app'" :class="method === 'app' ? 'bg-white dark:bg-zinc-700 text-zinc-900 dark:text-zinc-100 shadow-xs font-medium' : 'text-zinc-500 dark:text-zinc-400 hover:text-zinc-700 dark:hover:text-zinc-300'" class="flex-1 text-xs px-3 py-1.5 rounded-md transition-all duration-150 cursor-pointer">Codigo de app</button>
          <button @click="method = 'sms'" :class="method === 'sms' ? 'bg-white dark:bg-zinc-700 text-zinc-900 dark:text-zinc-100 shadow-xs font-medium' : 'text-zinc-500 dark:text-zinc-400 hover:text-zinc-700 dark:hover:text-zinc-300'" class="flex-1 text-xs px-3 py-1.5 rounded-md transition-all duration-150 cursor-pointer">Codigo SMS</button>
        </div>

        <!-- Success state -->
        <div x-show="verified" x-cloak x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 scale-95" x-transition:enter-end="opacity-100 scale-100">
          <div class="text-center py-6">
            <div class="w-14 h-14 bg-emerald-100 dark:bg-emerald-800 rounded-full flex items-center justify-center mx-auto mb-4">
              <svg class="w-7 h-7 text-emerald-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg>
            </div>
            <h3 class="text-base font-semibold text-zinc-900 dark:text-zinc-100">Verificacion exitosa</h3>
            <p class="text-sm text-zinc-500 dark:text-zinc-400 mt-1">Redirigiendo al panel...</p>
          </div>
        </div>

        <!-- OTP form -->
        <div x-show="!verified">
          <p class="text-xs text-zinc-500 dark:text-zinc-400 mb-3 text-center" x-text="method === 'app' ? 'Abre tu app de autenticacion y escribe el codigo' : 'Enviamos un SMS al ***-**-4892'"></p>

          <!-- OTP inputs -->
          <div class="flex justify-center gap-2 mb-6" @paste.prevent="handlePaste($event)">
            <template x-for="(digit, index) in otp" :key="index">
              <input
                type="text"
                maxlength="1"
                inputmode="numeric"
                :id="'tfa-' + index"
                class="w-11 h-12 text-center text-lg font-semibold border border-zinc-300 dark:border-zinc-700 rounded-lg focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 outline-none transition-all dark:bg-zinc-800 dark:text-zinc-100 dark:placeholder-zinc-500"
                :value="digit"
                @input="handleOtpInput($event, index)"
                @keydown.backspace="handleBackspace($event, index)"
                @focus="$event.target.select()"
              />
            </template>
          </div>

          <button
            @click="verify()"
            :disabled="otp.join('').length < 6 || loading"
            class="btn-primary w-full"
            :class="(otp.join('').length < 6 || loading) ? 'opacity-50 cursor-not-allowed' : ''"
          >
            <span x-show="!loading">Verificar</span>
            <span x-show="loading" class="inline-flex items-center gap-2">
              <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
              Verificando...
            </span>
          </button>

          <p class="text-center mt-4">
            <button @click="showBackupSection = !showBackupSection" class="text-xs text-blue-600 hover:text-blue-700 font-medium cursor-pointer">
              Perdiste acceso? Usar codigo de respaldo
            </button>
          </p>
        </div>
      </div>

      <!-- Backup codes section (collapsible) -->
      <div x-show="showBackupSection" x-cloak x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 -translate-y-2" x-transition:enter-end="opacity-100 translate-y-0">
        <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl shadow-sm p-6">
          <div class="flex items-center justify-between mb-4">
            <h3 class="text-sm font-semibold text-zinc-900 dark:text-zinc-100">Codigos de respaldo</h3>
            <span class="badge-amber text-xs">Usar con cuidado</span>
          </div>
          <p class="text-xs text-zinc-500 dark:text-zinc-400 mb-4">Cada codigo solo puede usarse una vez. Guardalos en un lugar seguro.</p>

          <div class="grid grid-cols-2 gap-2 mb-4">
            <template x-for="(code, i) in backupCodes" :key="i">
              <div class="flex items-center gap-2 bg-zinc-50 dark:bg-zinc-800 rounded-lg px-3 py-2">
                <code class="text-xs font-mono text-zinc-700 dark:text-zinc-300" x-text="code.used ? '--------' : (showCodes ? code.value : code.value.slice(0, 4) + '****')"></code>
                <span x-show="code.used" class="text-xs text-zinc-400 dark:text-zinc-500">Usado</span>
              </div>
            </template>
          </div>

          <div class="flex items-center gap-3">
            <button @click="showCodes = !showCodes" class="btn-ghost text-xs flex-1">
              <span x-text="showCodes ? 'Ocultar' : 'Mostrar'"></span> codigos
            </button>
            <button @click="addToast('Codigos descargados')" class="btn-secondary text-xs flex-1">Descargar</button>
            <button @click="regenerateCodes()" class="btn-ghost text-xs flex-1">Regenerar</button>
          </div>
        </div>
      </div>

      <p class="text-center text-xs text-zinc-400 dark:text-zinc-500">&copy; 2026 LayoutOS. Todos los derechos reservados.</p>
    </div>

    <!-- Toast container -->
    <template x-teleport="body">
      <div class="fixed top-4 right-4 z-50 space-y-2 w-80">
        <template x-for="toast in toasts" :key="toast.id">
          <div
            x-show="toast.visible"
            x-transition:enter="transition ease-out duration-300"
            x-transition:enter-start="opacity-0 translate-x-8"
            x-transition:enter-end="opacity-100 translate-x-0"
            x-transition:leave="transition ease-in duration-200"
            x-transition:leave-start="opacity-100 translate-x-0"
            x-transition:leave-end="opacity-0 translate-x-8"
            class="flex items-start gap-3 bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl shadow-lg px-4 py-3"
          >
            <div class="shrink-0 mt-0.5">
              <div class="w-5 h-5 bg-emerald-100 dark:bg-emerald-800 rounded-full flex items-center justify-center">
                <svg class="w-3 h-3 text-emerald-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg>
              </div>
            </div>
            <p class="text-xs text-zinc-900 dark:text-zinc-100 flex-1 pt-0.5" x-text="toast.message"></p>
          </div>
        </template>
      </div>
    </template>
  </div>

  <script>
    function twoFactorPage() {
      return {
        method: 'app',
        otp: ['', '', '', '', '', ''],
        loading: false,
        verified: false,
        showBackupSection: false,
        showCodes: false,
        toasts: [],
        backupCodes: [
          { value: 'A7K2-M9X4', used: false },
          { value: 'B3N8-P5Q1', used: false },
          { value: 'C6R4-T2W7', used: true },
          { value: 'D1S9-U8V3', used: false },
          { value: 'E5F2-G4H6', used: false },
          { value: 'F8J1-K3L7', used: true },
          { value: 'G2M5-N9P4', used: false },
          { value: 'H7Q3-R6S1', used: false }
        ],

        init() {
          this.$nextTick(() => {
            document.getElementById('tfa-0')?.focus();
          });
        },

        handleOtpInput(event, index) {
          const value = event.target.value.replace(/\D/g, '');
          this.otp[index] = value.slice(-1);
          event.target.value = this.otp[index];
          if (value && index < 5) {
            document.getElementById('tfa-' + (index + 1))?.focus();
          }
        },

        handleBackspace(event, index) {
          if (!this.otp[index] && index > 0) {
            document.getElementById('tfa-' + (index - 1))?.focus();
          }
          this.otp[index] = '';
        },

        handlePaste(event) {
          const paste = (event.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '').slice(0, 6);
          for (let i = 0; i < 6; i++) {
            this.otp[i] = paste[i] || '';
            const el = document.getElementById('tfa-' + i);
            if (el) el.value = this.otp[i];
          }
          if (paste.length > 0) {
            const focusIndex = Math.min(paste.length, 5);
            document.getElementById('tfa-' + focusIndex)?.focus();
          }
        },

        verify() {
          if (this.otp.join('').length < 6) return;
          this.loading = true;
          setTimeout(() => {
            this.loading = false;
            this.verified = true;
            this.addToast('Identidad verificada correctamente');
            setTimeout(() => {
              this.addToast('Redirigiendo al panel principal...');
            }, 1500);
          }, 2000);
        },

        regenerateCodes() {
          const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
          this.backupCodes = this.backupCodes.map(() => {
            let code = '';
            for (let i = 0; i < 4; i++) code += chars[Math.floor(Math.random() * chars.length)];
            code += '-';
            for (let i = 0; i < 4; i++) code += chars[Math.floor(Math.random() * chars.length)];
            return { value: code, used: false };
          });
          this.addToast('Codigos regenerados');
        },

        addToast(message) {
          const id = Date.now() + Math.random();
          this.toasts.push({ id, message, visible: true });
          setTimeout(() => {
            const toast = this.toasts.find(t => t.id === id);
            if (toast) toast.visible = false;
            setTimeout(() => { this.toasts = this.toasts.filter(t => t.id !== id); }, 300);
          }, 4000);
        }
      };
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
