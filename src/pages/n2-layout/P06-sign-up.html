<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LayoutOS · Crear cuenta</title>
  <link rel="stylesheet" href="../../../public/css/main.css" />
</head>
<body class="h-full bg-page antialiased">

  <div class="min-h-full flex items-center justify-center px-4 sm:px-6 py-12" x-data="signUpPage()">
    <div class="w-full max-w-md">

      <!-- Logo -->
      <div class="text-center mb-8">
        <span class="text-lg font-semibold text-zinc-900 dark:text-zinc-100 tracking-tight">LayoutOS</span>
        <p class="text-sm text-zinc-500 dark:text-zinc-400 mt-1">Empieza gratis, sin tarjeta de crédito</p>
      </div>

      <!-- Card -->
      <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl shadow-sm p-6">
        <h1 class="text-lg font-semibold text-zinc-900 dark:text-zinc-100">Crear cuenta</h1>
        <p class="text-sm text-zinc-500 dark:text-zinc-400 mt-1">Completa tus datos para registrarte</p>

        <!-- Form -->
        <form @submit.prevent="submit" class="mt-5 space-y-4">
          <!-- Nombre -->
          <div>
            <label class="label" for="name">Nombre completo</label>
            <input
              id="name"
              type="text"
              class="input"
              :class="{ 'input-error': errors.name }"
              placeholder="Tu nombre"
              x-model="name"
              @blur="validateName"
            />
            <p class="error-msg" x-show="errors.name" x-text="errors.name" x-cloak></p>
          </div>

          <!-- Email -->
          <div>
            <label class="label" for="email">Email</label>
            <input
              id="email"
              type="email"
              class="input"
              :class="{ 'input-error': errors.email }"
              placeholder="tu@email.com"
              x-model="email"
              @blur="validateEmail"
            />
            <p class="error-msg" x-show="errors.email" x-text="errors.email" x-cloak></p>
          </div>

          <!-- Password -->
          <div>
            <label class="label" for="password">Contraseña</label>
            <div class="relative">
              <input
                id="password"
                :type="showPassword ? 'text' : 'password'"
                class="input pr-10"
                :class="{ 'input-error': errors.password }"
                placeholder="Mínimo 8 caracteres"
                x-model="password"
                @input="checkPasswordStrength"
                @blur="validatePassword"
              />
              <button
                type="button"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-zinc-400 hover:text-zinc-600 dark:hover:text-zinc-400 transition-colors duration-150"
                @click="showPassword = !showPassword"
              >
                <svg x-show="!showPassword" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                <svg x-show="showPassword" x-cloak class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
                </svg>
              </button>
            </div>
            <p class="error-msg" x-show="errors.password" x-text="errors.password" x-cloak></p>

            <!-- Strength indicator -->
            <div class="flex gap-1.5 mt-2" x-show="password.length > 0">
              <div class="h-1 flex-1 rounded-full transition-colors duration-200"
                   :class="strength >= 1 ? (strength === 1 ? 'bg-rose-400' : strength === 2 ? 'bg-amber-400' : 'bg-emerald-400') : 'bg-zinc-200'"></div>
              <div class="h-1 flex-1 rounded-full transition-colors duration-200"
                   :class="strength >= 2 ? (strength === 2 ? 'bg-amber-400' : 'bg-emerald-400') : 'bg-zinc-200'"></div>
              <div class="h-1 flex-1 rounded-full transition-colors duration-200"
                   :class="strength >= 3 ? 'bg-emerald-400' : 'bg-zinc-200'"></div>
            </div>

            <!-- Password checklist -->
            <div class="mt-2 space-y-1" x-show="password.length > 0">
              <p class="text-xs flex items-center gap-1.5"
                 :class="checks.length ? 'text-emerald-600' : 'text-zinc-400'">
                <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" /></svg>
                Mínimo 8 caracteres
              </p>
              <p class="text-xs flex items-center gap-1.5"
                 :class="checks.upper ? 'text-emerald-600' : 'text-zinc-400'">
                <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" /></svg>
                Al menos una mayúscula
              </p>
              <p class="text-xs flex items-center gap-1.5"
                 :class="checks.number ? 'text-emerald-600' : 'text-zinc-400'">
                <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" /></svg>
                Al menos un número
              </p>
            </div>
          </div>

          <!-- Confirm password -->
          <div>
            <label class="label" for="confirmPassword">Confirmar contraseña</label>
            <input
              id="confirmPassword"
              type="password"
              class="input"
              :class="{ 'input-error': errors.confirmPassword }"
              placeholder="Repite tu contraseña"
              x-model="confirmPassword"
              @blur="validateConfirmPassword"
            />
            <p class="error-msg" x-show="errors.confirmPassword" x-text="errors.confirmPassword" x-cloak></p>
          </div>

          <!-- Terms -->
          <label class="flex items-start gap-2 cursor-pointer">
            <input type="checkbox" class="w-4 h-4 rounded border-zinc-300 text-accent accent-accent mt-0.5" x-model="terms" />
            <span class="text-sm text-zinc-600 dark:text-zinc-400">
              Acepto los <a href="#" class="text-accent hover:text-accent-hover">términos y condiciones</a> y la <a href="#" class="text-accent hover:text-accent-hover">política de privacidad</a>
            </span>
          </label>

          <!-- Submit -->
          <button
            type="submit"
            class="btn-primary w-full justify-center"
            :class="{ 'opacity-50 cursor-not-allowed': !isValid }"
            :disabled="!isValid"
          >
            Crear cuenta
          </button>
        </form>

        <!-- Divider -->
        <div class="divider-label my-6">o continuar con</div>

        <!-- Social buttons -->
        <div class="space-y-3">
          <button class="btn-secondary w-full justify-center">
            <svg class="w-4 h-4" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            Continuar con Google
          </button>
          <button class="btn-secondary w-full justify-center">
            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
            Continuar con GitHub
          </button>
        </div>
      </div>

      <!-- Link login -->
      <p class="text-center text-sm text-zinc-500 dark:text-zinc-400 mt-6">
        ¿Ya tienes cuenta?
        <a href="/sign-in" class="text-accent hover:text-accent-hover font-medium transition-colors duration-150">Inicia sesión</a>
      </p>

    </div>
  </div>

  <script>
    function signUpPage() {
      return {
        name: '',
        email: '',
        password: '',
        confirmPassword: '',
        showPassword: false,
        terms: false,
        strength: 0,
        checks: { length: false, upper: false, number: false },
        errors: {
          name: '',
          email: '',
          password: '',
          confirmPassword: ''
        },
        get isValid() {
          return this.name.trim() &&
                 this.email.trim() &&
                 /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(this.email) &&
                 this.checks.length &&
                 this.checks.upper &&
                 this.checks.number &&
                 this.password === this.confirmPassword &&
                 this.confirmPassword &&
                 this.terms &&
                 !this.errors.name &&
                 !this.errors.email &&
                 !this.errors.password &&
                 !this.errors.confirmPassword;
        },
        validateName() {
          this.errors.name = !this.name.trim() ? 'El nombre es obligatorio' : '';
        },
        validateEmail() {
          if (!this.email.trim()) {
            this.errors.email = 'El email es obligatorio';
          } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(this.email)) {
            this.errors.email = 'Ingresa un email válido';
          } else {
            this.errors.email = '';
          }
        },
        validatePassword() {
          if (!this.password) {
            this.errors.password = 'La contraseña es obligatoria';
          } else if (!this.checks.length || !this.checks.upper || !this.checks.number) {
            this.errors.password = 'La contraseña no cumple los requisitos';
          } else {
            this.errors.password = '';
          }
        },
        validateConfirmPassword() {
          if (!this.confirmPassword) {
            this.errors.confirmPassword = 'Confirma tu contraseña';
          } else if (this.password !== this.confirmPassword) {
            this.errors.confirmPassword = 'Las contraseñas no coinciden';
          } else {
            this.errors.confirmPassword = '';
          }
        },
        checkPasswordStrength() {
          this.checks.length = this.password.length >= 8;
          this.checks.upper = /[A-Z]/.test(this.password);
          this.checks.number = /\d/.test(this.password);
          const passed = [this.checks.length, this.checks.upper, this.checks.number].filter(Boolean).length;
          this.strength = passed;
        },
        submit() {
          this.validateName();
          this.validateEmail();
          this.validatePassword();
          this.validateConfirmPassword();
          if (!this.isValid) return;
          // Submit logic here
        }
      };
    }
  </script>

  <style>[x-cloak] { display: none !important; }</style>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
