<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LayoutOS · Error del servidor</title>
  <link rel="stylesheet" href="/public/css/main.css" />
</head>
<body class="h-full bg-page antialiased">

  <!-- Navbar -->
  <nav class="bg-white border-b border-zinc-200 px-6 h-14 flex items-center justify-between">
    <span class="text-sm font-semibold text-zinc-900 tracking-tight">LayoutOS</span>
    <a href="/" class="text-sm text-zinc-600 hover:text-zinc-900 transition-colors duration-150 flex items-center gap-1.5">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
      Volver
    </a>
  </nav>

  <!-- Contenido centrado -->
  <div class="min-h-full flex items-center justify-center px-6" style="min-height: calc(100vh - 3.5rem)">
    <div class="text-center max-w-md">
      <!-- Icono de error -->
      <div class="mx-auto w-16 h-16 bg-rose-50 rounded-2xl flex items-center justify-center mb-6">
        <svg class="w-8 h-8 text-rose-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z" />
        </svg>
      </div>

      <p class="text-8xl font-bold text-zinc-200 leading-none select-none">500</p>
      <h1 class="text-2xl font-semibold text-zinc-900 mt-6">Error del servidor</h1>
      <p class="text-sm text-zinc-500 mt-3 leading-relaxed">
        Ocurrió un error inesperado en nuestros servidores. Nuestro equipo ha sido notificado y estamos trabajando en una solución.
      </p>

      <div class="mt-5 flex justify-center">
        <span class="badge-rose">
          <span class="w-1.5 h-1.5 bg-rose-500 rounded-full"></span>
          Servicio degradado
        </span>
      </div>

      <div class="flex items-center justify-center gap-3 mt-8">
        <button onclick="location.reload()" class="btn-primary">Reintentar</button>
        <a href="/status" class="btn-secondary">Ver estado del sistema</a>
      </div>

      <p class="text-xs text-zinc-400 mt-8">
        Error ID: <code class="bg-zinc-100 px-1.5 py-0.5 rounded text-zinc-500">err_5f3a2b1c</code>
      </p>
    </div>
  </div>

  <style>[x-cloak] { display: none !important; }</style>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
