    <div class="flex-1 flex flex-col overflow-hidden">
      <header class="h-14 bg-white dark:bg-zinc-900 border-b border-zinc-200 dark:border-zinc-800 flex items-center justify-between px-4 sm:px-6 shrink-0">
        <div class="flex items-center gap-3">
          <h1 class="text-sm font-semibold text-zinc-900 dark:text-zinc-100">LayoutOS Dashboard</h1>
          <span class="badge-green">Activo</span>
          <span class="badge-rose">Alta prioridad</span>
        </div>
        <div class="flex items-center gap-2">
          <button class="btn-secondary btn-sm">Editar</button>
          <button class="btn-ghost btn-sm">Compartir</button>
        </div>
      </header>

      <main class="flex-1 overflow-y-auto p-6">
        <div class="max-w-6xl mx-auto space-y-6">

          <!-- KPI cards -->
          <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl shadow-sm p-6">
              <p class="text-xs font-semibold text-zinc-400 dark:text-zinc-500 uppercase tracking-wider mb-1">Tareas totales</p>
              <p class="text-2xl font-bold text-zinc-900 dark:text-zinc-100">48</p>
            </div>
            <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl shadow-sm p-6">
              <p class="text-xs font-semibold text-zinc-400 dark:text-zinc-500 uppercase tracking-wider mb-1">Completadas</p>
              <p class="text-2xl font-bold text-emerald-600">35</p>
            </div>
            <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl shadow-sm p-6">
              <p class="text-xs font-semibold text-zinc-400 dark:text-zinc-500 uppercase tracking-wider mb-1">Miembros</p>
              <p class="text-2xl font-bold text-blue-600">6</p>
            </div>
            <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl shadow-sm p-6">
              <p class="text-xs font-semibold text-zinc-400 dark:text-zinc-500 uppercase tracking-wider mb-1">Dias restantes</p>
              <p class="text-2xl font-bold text-amber-600">16</p>
            </div>
          </div>

          <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

            <!-- Mini calendar -->
            <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl shadow-sm p-6">
              <h2 class="text-sm font-semibold text-zinc-900 dark:text-zinc-100 mb-4">Eventos del proyecto</h2>
              <div class="space-y-3">
                <template x-for="event in events" :key="event.id">
                  <div class="flex items-center gap-3 p-3 rounded-lg bg-zinc-50 dark:bg-zinc-800">
                    <div class="text-center shrink-0 w-12">
                      <p class="text-xs font-semibold text-zinc-400 dark:text-zinc-500 uppercase" x-text="event.month"></p>
                      <p class="text-lg font-bold text-zinc-900 dark:text-zinc-100" x-text="event.day"></p>
                    </div>
                    <div class="border-l-2 pl-3" :class="event.borderColor">
                      <p class="text-sm font-medium text-zinc-900 dark:text-zinc-100" x-text="event.title"></p>
                      <p class="text-xs text-zinc-500 dark:text-zinc-400 dark:text-zinc-500" x-text="event.time"></p>
                    </div>
                  </div>
                </template>
              </div>
            </div>

            <!-- Stepper milestones -->
            <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl shadow-sm p-6">
              <h2 class="text-sm font-semibold text-zinc-900 dark:text-zinc-100 mb-4">Hitos del proyecto</h2>
              <div class="space-y-4">
                <template x-for="(step, i) in milestones" :key="i">
                  <div class="flex gap-3">
                    <div class="flex flex-col items-center">
                      <div class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold shrink-0"
                           :class="step.status === 'done' ? 'bg-emerald-500 text-white' : step.status === 'current' ? 'bg-blue-600 text-white' : 'bg-zinc-200 dark:bg-zinc-700 text-zinc-400 dark:text-zinc-500'">
                        <template x-if="step.status === 'done'">
                          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg>
                        </template>
                        <template x-if="step.status !== 'done'">
                          <span x-text="i + 1"></span>
                        </template>
                      </div>
                      <div x-show="i < milestones.length - 1" class="w-px flex-1 mt-1"
                           :class="step.status === 'done' ? 'bg-emerald-300' : 'bg-zinc-200 dark:bg-zinc-700'"></div>
                    </div>
                    <div class="pb-4">
                      <p class="text-sm font-medium" :class="step.status === 'current' ? 'text-blue-600' : step.status === 'done' ? 'text-zinc-900 dark:text-zinc-100' : 'text-zinc-400 dark:text-zinc-500'" x-text="step.title"></p>
                      <p class="text-xs text-zinc-500 dark:text-zinc-400 dark:text-zinc-500 mt-0.5" x-text="step.date"></p>
                    </div>
                  </div>
                </template>
              </div>
            </div>
          </div>

          <!-- Activity timeline -->
          <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl shadow-sm p-6">
            <h2 class="text-sm font-semibold text-zinc-900 dark:text-zinc-100 mb-4">Actividad reciente</h2>
            <div class="space-y-4">
              <template x-for="a in activity" :key="a.id">
                <div class="flex items-start gap-3">
                  <div class="w-7 h-7 rounded-full flex items-center justify-center text-xs font-semibold shrink-0"
                       :class="a.avatarClass" x-text="a.avatar"></div>
                  <div>
                    <p class="text-sm text-zinc-700 dark:text-zinc-300"><span class="font-medium text-zinc-900 dark:text-zinc-100" x-text="a.user"></span> <span x-text="a.action"></span></p>
                    <p class="text-xs text-zinc-400 dark:text-zinc-500 mt-0.5" x-text="a.time"></p>
                  </div>
                </div>
              </template>
            </div>
          </div>

          <!-- Kanban preview -->
          <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl shadow-sm p-6">
            <h2 class="text-sm font-semibold text-zinc-900 dark:text-zinc-100 mb-4">Tablero Kanban</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
              <template x-for="col in kanban" :key="col.title">
                <div>
                  <div class="flex items-center gap-2 mb-3">
                    <div class="w-2 h-2 rounded-full" :class="col.dotColor"></div>
                    <h3 class="text-xs font-semibold text-zinc-500 dark:text-zinc-400 dark:text-zinc-500 uppercase tracking-wider" x-text="col.title"></h3>
                    <span class="text-xs text-zinc-400 dark:text-zinc-500" x-text="col.cards.length"></span>
                  </div>
                  <div class="space-y-2">
                    <template x-for="card in col.cards" :key="card.title">
                      <div class="p-3 bg-zinc-50 dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-800 rounded-lg">
                        <p class="text-sm text-zinc-900 dark:text-zinc-100 mb-1" x-text="card.title"></p>
                        <div class="flex items-center justify-between">
                          <span class="text-xs" :class="card.badgeClass" x-text="card.priority"></span>
                          <div class="w-5 h-5 rounded-full bg-zinc-200 dark:bg-zinc-700 flex items-center justify-center text-xs text-zinc-500 dark:text-zinc-400 dark:text-zinc-500" x-text="card.assignee"></div>
                        </div>
                      </div>
                    </template>
                  </div>
                </div>
              </template>
            </div>
          </div>

        </div>
      </main>
    </div>
  </div>

  <style>[x-cloak] { display: none !important; }</style>

            title: 'Completado', dotColor: 'bg-emerald-500',

              { title: 'Auth con OAuth', priority: 'Alta', badgeClass: 'badge-rose', assignee: 'CL' },

            ]
          }
        ]
      };
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
