    <div class="flex-1 flex flex-col overflow-hidden">
      <header class="h-14 bg-white dark:bg-zinc-900 border-b border-zinc-200 dark:border-zinc-800 flex items-center px-4 sm:px-6 shrink-0">
        <h1 class="text-sm font-semibold text-zinc-900 dark:text-zinc-100">Mis proyectos</h1>
      </header>

      <main class="flex-1 overflow-y-auto p-6">
        <div class="max-w-5xl mx-auto space-y-6">

          <!-- KPI cards -->
          <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl shadow-sm p-6">
              <p class="text-xs font-semibold text-zinc-400 dark:text-zinc-500 uppercase tracking-wider mb-1">Total</p>
              <p class="text-2xl font-bold text-zinc-900 dark:text-zinc-100">5</p>
              <p class="text-xs text-zinc-500 dark:text-zinc-400 dark:text-zinc-500 mt-1">proyectos asignados</p>
            </div>
            <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl shadow-sm p-6">
              <p class="text-xs font-semibold text-zinc-400 dark:text-zinc-500 uppercase tracking-wider mb-1">Activos</p>
              <p class="text-2xl font-bold text-blue-600">3</p>
              <p class="text-xs text-zinc-500 dark:text-zinc-400 dark:text-zinc-500 mt-1">en desarrollo</p>
            </div>
            <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl shadow-sm p-6">
              <p class="text-xs font-semibold text-zinc-400 dark:text-zinc-500 uppercase tracking-wider mb-1">Completados</p>
              <p class="text-2xl font-bold text-emerald-600">2</p>
              <p class="text-xs text-zinc-500 dark:text-zinc-400 dark:text-zinc-500 mt-1">este trimestre</p>
            </div>
          </div>

          <!-- Projects list -->
          <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl shadow-sm">
            <div class="px-4 sm:px-6 py-4 border-b border-zinc-200 dark:border-zinc-800">
              <h2 class="text-sm font-semibold text-zinc-900 dark:text-zinc-100">Proyectos</h2>
            </div>
            <div class="divide-y divide-zinc-100 dark:divide-zinc-800">
              <template x-for="p in projects" :key="p.id">
                <div class="px-4 sm:px-6 py-4 flex items-center gap-4 hover:bg-zinc-50 dark:hover:bg-zinc-800 dark:bg-zinc-800 transition-colors">
                  <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-2 mb-1">
                      <p class="text-sm font-medium text-zinc-900 dark:text-zinc-100" x-text="p.name"></p>
                      <span class="text-xs"
                            :class="{'badge-green': p.status === 'active', 'badge-blue': p.status === 'completed', 'badge-amber': p.status === 'paused'}"
                            x-text="p.statusLabel"></span>
                    </div>
                    <p class="text-xs text-zinc-500 dark:text-zinc-400 dark:text-zinc-500" x-text="'Rol: ' + p.role"></p>
                  </div>
                  <div class="w-40">
                    <div class="flex items-center justify-between text-xs text-zinc-500 dark:text-zinc-400 dark:text-zinc-500 mb-1">
                      <span>Progreso</span>
                      <span x-text="p.progress + '%'"></span>
                    </div>
                    <div class="w-full h-1.5 bg-zinc-100 dark:bg-zinc-800 rounded-full overflow-hidden">
                      <div class="h-full rounded-full" :class="p.progress === 100 ? 'bg-emerald-500' : 'bg-blue-600'" :style="'width:' + p.progress + '%'"></div>
                    </div>
                  </div>
                  <div class="text-right shrink-0">
                    <p class="text-xs text-zinc-400 dark:text-zinc-500">Ultimo acceso</p>
                    <p class="text-sm text-zinc-600 dark:text-zinc-400 dark:text-zinc-500" x-text="p.lastAccess"></p>
                  </div>
                </div>
              </template>
            </div>
          </div>

          <!-- Activity timeline -->
          <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl shadow-sm p-6">
            <h2 class="text-sm font-semibold text-zinc-900 dark:text-zinc-100 mb-4">Actividad reciente</h2>
            <div class="relative">
              <div class="absolute left-3 top-3 bottom-3 w-px bg-zinc-200 dark:bg-zinc-700"></div>
              <div class="space-y-5">
                <template x-for="a in activity" :key="a.id">
                  <div class="relative flex gap-4">
                    <div class="w-6 h-6 rounded-full z-10 shrink-0 flex items-center justify-center"
                         :class="a.color">
                      <svg class="w-3 h-3 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg>
                    </div>
                    <div>
                      <p class="text-sm text-zinc-700 dark:text-zinc-300"><span class="font-medium text-zinc-900 dark:text-zinc-100" x-text="a.action"></span> en <span class="font-medium text-zinc-900 dark:text-zinc-100" x-text="a.project"></span></p>
                      <p class="text-xs text-zinc-400 dark:text-zinc-500 mt-0.5" x-text="a.time"></p>
                    </div>
                  </div>
                </template>
              </div>
            </div>
          </div>

        </div>
      </main>
    </div>
  </div>

  <style>[x-cloak] { display: none !important; }</style>
