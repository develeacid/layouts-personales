<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LayoutOS · Mis Tareas</title>
  <link rel="stylesheet" href="/public/css/main.css" />
</head>
<body class="h-full bg-page antialiased">
  <div class="flex h-full" x-data="myTasksPage()">

    <!-- Sidebar -->
    <aside class="w-64 bg-zinc-950 dark:bg-zinc-800 text-zinc-300 h-full overflow-y-auto shrink-0 hidden lg:flex flex-col">
      <div class="px-5 py-4 border-b border-zinc-800"><span class="text-sm font-semibold text-white">LayoutOS</span></div>
      <nav class="flex-1 px-3 py-4 space-y-1">
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg text-zinc-400 dark:text-zinc-500 hover:text-white hover:bg-zinc-800/60 transition-colors">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25a2.25 2.25 0 01-2.25-2.25v-2.25z"/></svg>
          Dashboard
        </a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg text-zinc-400 dark:text-zinc-500 hover:text-white hover:bg-zinc-800/60 transition-colors">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/></svg>
          Facturas
        </a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg text-zinc-400 dark:text-zinc-500 hover:text-white hover:bg-zinc-800/60 transition-colors">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18.75a60.07 60.07 0 0115.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 013 6h-.75m0 0v-.375c0-.621.504-1.125 1.125-1.125H20.25M2.25 6v9m18-10.5v.75c0 .414.336.75.75.75h.75m-1.5-1.5h.375c.621 0 1.125.504 1.125 1.125v9.75c0 .621-.504 1.125-1.125 1.125h-.375m1.5-1.5H21a.75.75 0 00-.75.75v.75m0 0H3.75m0 0h-.375a1.125 1.125 0 01-1.125-1.125V15m1.5 1.5v-.75A.75.75 0 003 15h-.75M15 10.5a3 3 0 11-6 0 3 3 0 016 0zm3 0h.008v.008H18V10.5zm-12 0h.008v.008H6V10.5z"/></svg>
          Transacciones
        </a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg text-zinc-400 dark:text-zinc-500 hover:text-white hover:bg-zinc-800/60 transition-colors">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 6v.75m0 3v.75m0 3v.75m0 3V18m-9-5.25h5.25M7.5 15h3M3.375 5.25c-.621 0-1.125.504-1.125 1.125v3.026a2.999 2.999 0 010 5.198v3.026c0 .621.504 1.125 1.125 1.125h17.25c.621 0 1.125-.504 1.125-1.125v-3.026a2.999 2.999 0 010-5.198V6.375c0-.621-.504-1.125-1.125-1.125H3.375z"/></svg>
          Tickets
        </a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg text-zinc-400 dark:text-zinc-500 hover:text-white hover:bg-zinc-800/60 transition-colors">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/></svg>
          Email
        </a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm font-medium rounded-lg text-white bg-zinc-800">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          Tareas
        </a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg text-zinc-400 dark:text-zinc-500 hover:text-white hover:bg-zinc-800/60 transition-colors">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12.75V12A2.25 2.25 0 014.5 9.75h15A2.25 2.25 0 0121.75 12v.75m-8.69-6.44l-2.12-2.12a1.5 1.5 0 00-1.061-.44H4.5A2.25 2.25 0 002.25 6v12a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9a2.25 2.25 0 00-2.25-2.25h-5.379a1.5 1.5 0 01-1.06-.44z"/></svg>
          Proyectos
        </a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg text-zinc-400 dark:text-zinc-500 hover:text-white hover:bg-zinc-800/60 transition-colors">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/></svg>
          Archivos
        </a>
      </nav>
    </aside>

    <div class="flex-1 flex flex-col overflow-hidden">
      <header class="h-14 bg-white dark:bg-zinc-900 border-b border-zinc-200 dark:border-zinc-800 flex items-center justify-between px-4 sm:px-6 shrink-0">
        <div class="flex items-center gap-4">
          <h1 class="text-sm font-semibold text-zinc-900 dark:text-zinc-100">Mis tareas</h1>
          <div class="flex gap-2">
            <template x-for="f in filters" :key="f.key">
              <button @click="filter = f.key" class="btn-sm"
                      :class="filter === f.key ? 'btn-primary' : 'btn-ghost'"
                      x-text="f.label"></button>
            </template>
          </div>
        </div>
        <div class="flex border border-zinc-200 dark:border-zinc-800 rounded-lg overflow-hidden">
          <button @click="view = 'table'" class="px-3 py-1.5 text-sm transition-colors" :class="view === 'table' ? 'bg-zinc-900 text-white' : 'text-zinc-500 dark:text-zinc-400 dark:text-zinc-500 hover:bg-zinc-50 dark:bg-zinc-800'">Tabla</button>
          <button @click="view = 'kanban'" class="px-3 py-1.5 text-sm transition-colors" :class="view === 'kanban' ? 'bg-zinc-900 text-white' : 'text-zinc-500 dark:text-zinc-400 dark:text-zinc-500 hover:bg-zinc-50 dark:bg-zinc-800'">Kanban</button>
        </div>
      </header>

      <main class="flex-1 overflow-y-auto p-6">

        <!-- Table view -->
        <div x-show="view === 'table'" class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl shadow-sm">
          <table class="w-full">
            <thead>
              <tr class="border-b border-zinc-200 dark:border-zinc-800">
                <th class="text-left text-xs font-semibold text-zinc-500 dark:text-zinc-400 dark:text-zinc-500 uppercase tracking-wider px-4 sm:px-6 py-3">Tarea</th>
                <th class="text-left text-xs font-semibold text-zinc-500 dark:text-zinc-400 dark:text-zinc-500 uppercase tracking-wider px-4 sm:px-6 py-3">Proyecto</th>
                <th class="text-left text-xs font-semibold text-zinc-500 dark:text-zinc-400 dark:text-zinc-500 uppercase tracking-wider px-4 sm:px-6 py-3">Prioridad</th>
                <th class="text-left text-xs font-semibold text-zinc-500 dark:text-zinc-400 dark:text-zinc-500 uppercase tracking-wider px-4 sm:px-6 py-3">Estado</th>
                <th class="text-left text-xs font-semibold text-zinc-500 dark:text-zinc-400 dark:text-zinc-500 uppercase tracking-wider px-4 sm:px-6 py-3">Fecha limite</th>
                <th class="text-right text-xs font-semibold text-zinc-500 dark:text-zinc-400 dark:text-zinc-500 uppercase tracking-wider px-4 sm:px-6 py-3">Acciones</th>
              </tr>
            </thead>
            <tbody>
              <template x-for="t in filteredTasks" :key="t.id">
                <tr class="border-b border-zinc-100 dark:border-zinc-800 hover:bg-zinc-50 dark:bg-zinc-800 transition-colors">
                  <td class="px-4 sm:px-6 py-3">
                    <p class="text-sm font-medium text-zinc-900 dark:text-zinc-100" x-text="t.title"></p>
                  </td>
                  <td class="px-4 sm:px-6 py-3">
                    <span class="badge-blue text-xs" x-text="t.project"></span>
                  </td>
                  <td class="px-4 sm:px-6 py-3">
                    <span class="text-xs"
                          :class="{'badge-rose': t.priority === 'high', 'badge-amber': t.priority === 'medium', 'badge-zinc': t.priority === 'low'}"
                          x-text="t.priority === 'high' ? 'Alta' : t.priority === 'medium' ? 'Media' : 'Baja'"></span>
                  </td>
                  <td class="px-4 sm:px-6 py-3">
                    <span class="text-xs"
                          :class="{'badge-green': t.status === 'done', 'badge-blue': t.status === 'progress', 'badge-zinc': t.status === 'todo', 'badge-rose': t.status === 'overdue'}"
                          x-text="t.statusLabel"></span>
                  </td>
                  <td class="px-4 sm:px-6 py-3 text-sm" :class="t.status === 'overdue' ? 'text-rose-600 font-medium' : 'text-zinc-500 dark:text-zinc-400 dark:text-zinc-500'" x-text="t.deadline"></td>
                  <td class="px-4 sm:px-6 py-3 text-right">
                    <button class="btn-ghost btn-sm">
                      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 12a.75.75 0 11-1.5 0 .75.75 0 011.5 0zM12.75 12a.75.75 0 11-1.5 0 .75.75 0 011.5 0zM18.75 12a.75.75 0 11-1.5 0 .75.75 0 011.5 0z"/></svg>
                    </button>
                  </td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>

        <!-- Kanban view -->
        <div x-show="view === 'kanban'" class="grid grid-cols-1 md:grid-cols-4 gap-4 h-full">
          <template x-for="col in kanbanCols" :key="col.key">
            <div class="flex flex-col">
              <div class="flex items-center gap-2 mb-3">
                <div class="w-2 h-2 rounded-full" :class="col.dotColor"></div>
                <h3 class="text-xs font-semibold text-zinc-500 dark:text-zinc-400 dark:text-zinc-500 uppercase tracking-wider" x-text="col.label"></h3>
                <span class="text-xs text-zinc-400 dark:text-zinc-500" x-text="tasks.filter(t => t.status === col.key).length"></span>
              </div>
              <div class="flex-1 space-y-2">
                <template x-for="t in tasks.filter(t => t.status === col.key)" :key="t.id">
                  <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-lg p-3 shadow-sm">
                    <p class="text-sm font-medium text-zinc-900 dark:text-zinc-100 mb-2" x-text="t.title"></p>
                    <div class="flex items-center justify-between">
                      <span class="badge-blue text-xs" x-text="t.project"></span>
                      <span class="text-xs"
                            :class="{'badge-rose': t.priority === 'high', 'badge-amber': t.priority === 'medium', 'badge-zinc': t.priority === 'low'}"
                            x-text="t.priority === 'high' ? 'Alta' : t.priority === 'medium' ? 'Media' : 'Baja'"></span>
                    </div>
                    <p class="text-xs text-zinc-400 dark:text-zinc-500 mt-2" x-text="t.deadline"></p>
                  </div>
                </template>
              </div>
            </div>
          </template>
        </div>

      </main>
    </div>
  </div>

  <style>[x-cloak] { display: none !important; }</style>
  <script>
    function myTasksPage() {
      return {
        view: 'table',
        filter: 'all',
        filters: [
          { key: 'all', label: 'Todas' },
          { key: 'today', label: 'Hoy' },
          { key: 'week', label: 'Esta semana' },
          { key: 'overdue', label: 'Atrasadas' }
        ],
        kanbanCols: [
          { key: 'todo', label: 'Por hacer', dotColor: 'bg-zinc-400' },
          { key: 'progress', label: 'En progreso', dotColor: 'bg-blue-500' },
          { key: 'overdue', label: 'Atrasadas', dotColor: 'bg-rose-500' },
          { key: 'done', label: 'Completadas', dotColor: 'bg-emerald-500' }
        ],
        tasks: [
          { id: 1, title: 'Preparar demo para el cliente', project: 'Dashboard', priority: 'high', status: 'progress', statusLabel: 'En progreso', deadline: '31 Mar' },
          { id: 2, title: 'Corregir bug en el filtro de busqueda', project: 'Dashboard', priority: 'high', status: 'progress', statusLabel: 'En progreso', deadline: '31 Mar' },
          { id: 3, title: 'Integrar pasarela de pago Stripe', project: 'Pagos', priority: 'high', status: 'todo', statusLabel: 'Por hacer', deadline: '1 Abr' },
          { id: 4, title: 'Redactar email de lanzamiento', project: 'Marketing', priority: 'medium', status: 'todo', statusLabel: 'Por hacer', deadline: '2 Abr' },
          { id: 5, title: 'Configurar CDN para assets', project: 'Infra', priority: 'low', status: 'todo', statusLabel: 'Por hacer', deadline: '3 Abr' },
          { id: 6, title: 'Crear backups automaticos', project: 'Infra', priority: 'medium', status: 'todo', statusLabel: 'Por hacer', deadline: '3 Abr' },
          { id: 7, title: 'Auditar accesibilidad', project: 'Dashboard', priority: 'low', status: 'todo', statusLabel: 'Por hacer', deadline: '4 Abr' },
          { id: 8, title: 'Actualizar documentacion API v2', project: 'API', priority: 'medium', status: 'overdue', statusLabel: 'Atrasada', deadline: '28 Mar' },
          { id: 9, title: 'Resolver incidencia de login', project: 'Auth', priority: 'high', status: 'overdue', statusLabel: 'Atrasada', deadline: '29 Mar' },
          { id: 10, title: 'Revisar mockups de la landing', project: 'Dashboard', priority: 'high', status: 'done', statusLabel: 'Completada', deadline: '30 Mar' },
          { id: 11, title: 'Configurar pipeline CI/CD', project: 'Infra', priority: 'medium', status: 'done', statusLabel: 'Completada', deadline: '29 Mar' },
          { id: 12, title: 'Implementar autenticacion OAuth', project: 'Auth', priority: 'high', status: 'done', statusLabel: 'Completada', deadline: '28 Mar' }
        ],
        get filteredTasks() {
          if (this.filter === 'today') return this.tasks.filter(t => t.deadline === '31 Mar');
          if (this.filter === 'week') return this.tasks.filter(t => ['31 Mar', '1 Abr', '2 Abr', '3 Abr', '4 Abr', '5 Abr'].includes(t.deadline));
          if (this.filter === 'overdue') return this.tasks.filter(t => t.status === 'overdue');
          return this.tasks;
        }
      };
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
