          Dashboard
        </a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm font-medium rounded-lg text-white bg-zinc-800">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/></svg>

        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg text-zinc-400 hover:text-white hover:bg-zinc-800/60 transition-colors">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18.75a60.07 60.07 0 0115.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 013 6h-.75m0 0v-.375c0-.621.504-1.125 1.125-1.125H20.25M2.25 6v9m18-10.5v.75c0 .414.336.75.75.75h.75m-1.5-1.5h.375c.621 0 1.125.504 1.125 1.125v9.75c0 .621-.504 1.125-1.125 1.125h-.375m1.5-1.5H21a.75.75 0 00-.75.75v.75m0 0H3.75m0 0h-.375a1.125 1.125 0 01-1.125-1.125V15m1.5 1.5v-.75A.75.75 0 003 15h-.75M15 10.5a3 3 0 11-6 0 3 3 0 016 0zm3 0h.008v.008H18V10.5zm-12 0h.008v.008H6V10.5z"/></svg>
          Transacciones
        </a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg text-zinc-400 hover:text-white hover:bg-zinc-800/60 transition-colors">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 6v.75m0 3v.75m0 3v.75m0 3V18m-9-5.25h5.25M7.5 15h3M3.375 5.25c-.621 0-1.125.504-1.125 1.125v3.026a2.999 2.999 0 010 5.198v3.026c0 .621.504 1.125 1.125 1.125h17.25c.621 0 1.125-.504 1.125-1.125v-3.026a2.999 2.999 0 010-5.198V6.375c0-.621-.504-1.125-1.125-1.125H3.375z"/></svg>

        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg text-zinc-400 hover:text-white hover:bg-zinc-800/60 transition-colors">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/></svg>
          Email

        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg text-zinc-400 hover:text-white hover:bg-zinc-800/60 transition-colors">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          Tareas
        </a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg text-zinc-400 hover:text-white hover:bg-zinc-800/60 transition-colors">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12.75V12A2.25 2.25 0 014.5 9.75h15A2.25 2.25 0 0121.75 12v.75m-8.69-6.44l-2.12-2.12a1.5 1.5 0 00-1.061-.44H4.5A2.25 2.25 0 002.25 6v12a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9a2.25 2.25 0 00-2.25-2.25h-5.379a1.5 1.5 0 01-1.06-.44z"/></svg>
          Proyectos

          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/></svg>
          Archivos
        </a>
      </nav>
    </aside>

    <div class="flex-1 flex flex-col overflow-hidden">
      <header class="h-14 bg-white border-b border-zinc-200 flex items-center justify-between px-6 shrink-0">
        <h1 class="text-sm font-semibold text-zinc-900">Nueva factura</h1>
        <div class="flex items-center gap-2">
          <button class="btn-secondary btn-sm">Guardar borrador</button>
          <button class="btn-primary btn-sm">Enviar factura</button>
        </div>
      </header>

      <main class="flex-1 overflow-y-auto p-6">
        <div class="max-w-4xl mx-auto space-y-6">

          <!-- Client & dates -->
          <div class="bg-white border border-zinc-200 rounded-xl shadow-sm p-6">
            <h2 class="text-sm font-semibold text-zinc-900 mb-4">Datos del cliente</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <label class="label">Cliente</label>
                <select x-model="client" class="input">
                  <option value="">Seleccionar cliente...</option>
                  <option value="techcorp">TechCorp Solutions S.L.</option>
                  <option value="innovatech">InnovaTech Labs</option>
                  <option value="dataflow">DataFlow Analytics</option>
                </select>
              </div>
              <div>
                <label class="label">Email de contacto</label>
                <input type="email" x-model="clientEmail" class="input" placeholder="email@empresa.com" />
              </div>
              <div>
                <label class="label">Fecha de emision</label>
                <input type="date" x-model="issueDate" class="input" />
              </div>
              <div>
                <label class="label">Fecha de vencimiento</label>
                <input type="date" x-model="dueDate" class="input" />
              </div>
            </div>
          </div>

          <!-- Items table -->
          <div class="bg-white border border-zinc-200 rounded-xl shadow-sm p-6">
            <h2 class="text-sm font-semibold text-zinc-900 mb-4">Items</h2>
            <table class="w-full">
              <thead>
                <tr class="border-b border-zinc-200">
                  <th class="text-left text-xs font-semibold text-zinc-500 uppercase tracking-wider pb-3">Descripcion</th>
                  <th class="text-right text-xs font-semibold text-zinc-500 uppercase tracking-wider pb-3 w-24">Cantidad</th>
                  <th class="text-right text-xs font-semibold text-zinc-500 uppercase tracking-wider pb-3 w-32">Precio unitario</th>
                  <th class="text-right text-xs font-semibold text-zinc-500 uppercase tracking-wider pb-3 w-32">Subtotal</th>
                  <th class="w-10 pb-3"></th>
                </tr>
              </thead>
              <tbody>
                <template x-for="(item, index) in items" :key="item.id">
                  <tr class="border-b border-zinc-100">
                    <td class="py-2 pr-3">
                      <input type="text" x-model="item.description" class="input" placeholder="Descripcion del servicio..." />
                    </td>
                    <td class="py-2 pr-3">
                      <input type="number" x-model.number="item.qty" min="1" class="input text-right" />
                    </td>
                    <td class="py-2 pr-3">
                      <input type="number" x-model.number="item.price" min="0" step="0.01" class="input text-right" />
                    </td>
                    <td class="py-2 pr-3 text-right text-sm font-medium text-zinc-900" x-text="'$' + (item.qty * item.price).toFixed(2)"></td>
                    <td class="py-2">
                      <button @click="removeItem(index)" class="text-zinc-400 hover:text-rose-500 transition-colors" :disabled="items.length === 1">
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                      </button>
                    </td>
                  </tr>
                </template>
              </tbody>
            </table>
            <button @click="addItem()" class="btn-ghost btn-sm mt-4">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
              Agregar linea
            </button>
          </div>

          <!-- Summary -->
          <div class="bg-white border border-zinc-200 rounded-xl shadow-sm p-6">
            <div class="flex justify-end">
              <div class="w-80 space-y-3">
                <div class="flex justify-between text-sm">
                  <span class="text-zinc-500">Subtotal</span>
                  <span class="text-zinc-900 font-medium" x-text="'$' + subtotal.toFixed(2)"></span>
                </div>
                <div class="flex justify-between items-center text-sm gap-3">
                  <span class="text-zinc-500">Descuento (%)</span>
                  <input type="number" x-model.number="discountPercent" min="0" max="100" step="1" class="input w-20 text-right" />
                </div>
                <div class="flex justify-between text-sm">
                  <span class="text-zinc-500">Descuento</span>
                  <span class="text-rose-600" x-text="'-$' + discountAmount.toFixed(2)"></span>
                </div>
                <div class="flex justify-between text-sm">
                  <span class="text-zinc-500">IVA (21%)</span>
                  <span class="text-zinc-900" x-text="'$' + tax.toFixed(2)"></span>
                </div>
                <div class="flex justify-between text-base font-semibold border-t border-zinc-200 pt-3">
                  <span class="text-zinc-900">Total</span>
                  <span class="text-zinc-900" x-text="'$' + total.toFixed(2)"></span>
                </div>
              </div>
            </div>
          </div>

          <!-- Notes -->
          <div class="bg-white border border-zinc-200 rounded-xl shadow-sm p-6">
            <h2 class="text-sm font-semibold text-zinc-900 mb-4">Notas</h2>
            <textarea x-model="notes" class="input" rows="3" placeholder="Notas o condiciones adicionales..."></textarea>
          </div>

        </div>
      </main>
    </div>
  </div>

  <style>[x-cloak] { display: none !important; }</style>
  <script>
    function createInvoicePage() {
      return {
        client: '',
        clientEmail: '',
        issueDate: '2024-03-15',
        dueDate: '2024-04-15',
        discountPercent: 0,
        notes: '',
        nextId: 3,
        items: [
          { id: 1, description: '', qty: 1, price: 0 },
          { id: 2, description: '', qty: 1, price: 0 }
        ],
        addItem() {
          this.items.push({ id: this.nextId++, description: '', qty: 1, price: 0 });
        },
        removeItem(index) {
          if (this.items.length > 1) this.items.splice(index, 1);
        },
        get subtotal() {
          return this.items.reduce((sum, i) => sum + i.qty * i.price, 0);
        },
        get discountAmount() {
          return this.subtotal * (this.discountPercent / 100);
        },
        get taxable() {
          return this.subtotal - this.discountAmount;
        },
        get tax() {
          return this.taxable * 0.21;
        },
        get total() {
          return this.taxable + this.tax;
        }
      };
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
