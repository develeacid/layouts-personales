        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg text-zinc-400 dark:text-zinc-500 hover:text-white hover:bg-zinc-800/60 transition-colors">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18.75a60.07 60.07 0 0115.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 013 6h-.75m0 0v-.375c0-.621.504-1.125 1.125-1.125H20.25M2.25 6v9m18-10.5v.75c0 .414.336.75.75.75h.75m-1.5-1.5h.375c.621 0 1.125.504 1.125 1.125v9.75c0 .621-.504 1.125-1.125 1.125h-.375m1.5-1.5H21a.75.75 0 00-.75.75v.75m0 0H3.75m0 0h-.375a1.125 1.125 0 01-1.125-1.125V15m1.5 1.5v-.75A.75.75 0 003 15h-.75M15 10.5a3 3 0 11-6 0 3 3 0 016 0zm3 0h.008v.008H18V10.5zm-12 0h.008v.008H6V10.5z"/></svg>
          Transacciones
        </a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg text-zinc-400 dark:text-zinc-500 hover:text-white hover:bg-zinc-800/60 transition-colors">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 6v.75m0 3v.75m0 3v.75m0 3V18m-9-5.25h5.25M7.5 15h3M3.375 5.25c-.621 0-1.125.504-1.125 1.125v3.026a2.999 2.999 0 010 5.198v3.026c0 .621.504 1.125 1.125 1.125h17.25c.621 0 1.125-.504 1.125-1.125v-3.026a2.999 2.999 0 010-5.198V6.375c0-.621-.504-1.125-1.125-1.125H3.375z"/></svg>
          Tickets
        </a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm font-medium rounded-lg text-white bg-zinc-800">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/></svg>

        </a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg text-zinc-400 dark:text-zinc-500 hover:text-white hover:bg-zinc-800/60 transition-colors">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          Tareas
        </a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg text-zinc-400 dark:text-zinc-500 hover:text-white hover:bg-zinc-800/60 transition-colors">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12.75V12A2.25 2.25 0 014.5 9.75h15A2.25 2.25 0 0121.75 12v.75m-8.69-6.44l-2.12-2.12a1.5 1.5 0 00-1.061-.44H4.5A2.25 2.25 0 002.25 6v12a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9a2.25 2.25 0 00-2.25-2.25h-5.379a1.5 1.5 0 01-1.06-.44z"/></svg>
          Proyectos
        </a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg text-zinc-400 dark:text-zinc-500 hover:text-white hover:bg-zinc-800/60 transition-colors">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/></svg>
          Archivos
        </a>
      </nav>
    </aside>

    <div class="flex-1 flex flex-col overflow-hidden">
      <header class="h-14 bg-white dark:bg-zinc-900 border-b border-zinc-200 dark:border-zinc-800 flex items-center px-4 sm:px-6 shrink-0">
        <h1 class="text-sm font-semibold text-zinc-900 dark:text-zinc-100">Bandeja de entrada</h1>
      </header>

      <main class="flex-1 overflow-hidden flex">
        <!-- Email list -->
        <div class="w-96 border-r border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-900 flex flex-col shrink-0">
          <!-- Search -->
          <div class="p-3 border-b border-zinc-200 dark:border-zinc-800">
            <input type="text" x-model="search" class="input" placeholder="Buscar emails..." />
          </div>
          <!-- Filters -->
          <div class="flex gap-1 px-3 py-2 border-b border-zinc-200 dark:border-zinc-800">
            <template x-for="f in filters" :key="f.key">
              <button @click="filter = f.key" class="btn-sm"
                      :class="filter === f.key ? 'btn-primary' : 'btn-ghost'"
                      x-text="f.label"></button>
            </template>
          </div>
          <!-- List -->
          <div class="flex-1 overflow-y-auto">
            <template x-for="email in filteredEmails" :key="email.id">
              <div @click="selectEmail(email)"
                   class="px-4 py-3 border-b border-zinc-100 dark:border-zinc-800 cursor-pointer transition-colors"
                   :class="selectedEmail?.id === email.id ? 'bg-blue-50 dark:bg-blue-950' : 'hover:bg-zinc-50 dark:bg-zinc-800'">
                <div class="flex items-center gap-3">
                  <input type="checkbox" class="rounded border-zinc-300 dark:border-zinc-700 text-blue-600" @click.stop />
                  <div class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-semibold shrink-0"
                       :class="email.read ? 'bg-zinc-100 dark:bg-zinc-800 text-zinc-500 dark:text-zinc-400 dark:text-zinc-500' : 'bg-blue-100 dark:bg-blue-900 text-blue-700 dark:text-blue-400'"
                       x-text="email.avatar"></div>
                  <div class="flex-1 min-w-0">
                    <div class="flex items-center justify-between">
                      <span class="text-sm truncate" :class="email.read ? 'text-zinc-600 dark:text-zinc-400 dark:text-zinc-500' : 'font-semibold text-zinc-900 dark:text-zinc-100'" x-text="email.from"></span>
                      <span class="text-xs text-zinc-400 dark:text-zinc-500 shrink-0 ml-2" x-text="email.date"></span>
                    </div>
                    <p class="text-sm truncate" :class="email.read ? 'text-zinc-500 dark:text-zinc-400 dark:text-zinc-500' : 'font-medium text-zinc-800 dark:text-zinc-200'" x-text="email.subject"></p>
                    <p class="text-xs text-zinc-400 dark:text-zinc-500 truncate" x-text="email.preview"></p>
                  </div>
                  <div class="flex flex-col items-center gap-1 shrink-0">
                    <button @click.stop="email.starred = !email.starred" class="text-zinc-300 hover:text-amber-400 transition-colors"
                            :class="email.starred ? 'text-amber-400' : ''">
                      <svg class="w-4 h-4" :fill="email.starred ? 'currentColor' : 'none'" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M11.48 3.499a.562.562 0 011.04 0l2.125 5.111a.563.563 0 00.475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 00-.182.557l1.285 5.385a.562.562 0 01-.84.61l-4.725-2.885a.563.563 0 00-.586 0L6.982 20.54a.562.562 0 01-.84-.61l1.285-5.386a.562.562 0 00-.182-.557l-4.204-3.602a.563.563 0 01.321-.988l5.518-.442a.563.563 0 00.475-.345L11.48 3.5z"/></svg>
                    </button>
                    <div x-show="!email.read" class="w-2 h-2 rounded-full bg-blue-600"></div>
                  </div>
                </div>
              </div>
            </template>
          </div>
        </div>

        <!-- Preview -->
        <div class="flex-1 overflow-y-auto bg-white dark:bg-zinc-900">
          <template x-if="selectedEmail">
            <div class="p-6">
              <div class="flex items-center justify-between mb-6">
                <h2 class="text-lg font-semibold text-zinc-900 dark:text-zinc-100" x-text="selectedEmail.subject"></h2>
                <div class="flex items-center gap-2">
                  <button class="btn-ghost btn-sm">Responder</button>
                  <button class="btn-ghost btn-sm">Reenviar</button>
                  <button class="btn-ghost btn-sm">Archivar</button>
                </div>
              </div>
              <div class="flex items-center gap-3 mb-6">
                <div class="w-10 h-10 rounded-full flex items-center justify-center text-sm font-semibold bg-blue-100 dark:bg-blue-900 text-blue-700 dark:text-blue-400" x-text="selectedEmail.avatar"></div>
                <div>
                  <p class="text-sm font-medium text-zinc-900 dark:text-zinc-100" x-text="selectedEmail.from"></p>
                  <p class="text-xs text-zinc-500 dark:text-zinc-400 dark:text-zinc-500">Para: <span x-text="selectedEmail.to"></span></p>
                </div>
                <span class="ml-auto text-xs text-zinc-400 dark:text-zinc-500" x-text="selectedEmail.fullDate"></span>
              </div>
              <div class="prose prose-sm max-w-none text-zinc-700 dark:text-zinc-300" x-html="selectedEmail.body"></div>
              <!-- Attachments -->
              <template x-if="selectedEmail.attachments && selectedEmail.attachments.length">
                <div class="mt-6 pt-4 border-t border-zinc-200 dark:border-zinc-800">
                  <p class="text-xs font-semibold text-zinc-400 dark:text-zinc-500 uppercase tracking-wider mb-3">Adjuntos</p>
                  <div class="flex flex-wrap gap-2">
                    <template x-for="att in selectedEmail.attachments" :key="att.name">
                      <div class="flex items-center gap-2 px-3 py-2 bg-zinc-50 dark:bg-zinc-800 rounded-lg border border-zinc-200 dark:border-zinc-800">
                        <span class="text-sm" x-text="att.icon"></span>
                        <span class="text-sm text-zinc-700 dark:text-zinc-300" x-text="att.name"></span>
                        <span class="text-xs text-zinc-400 dark:text-zinc-500" x-text="att.size"></span>
                      </div>
                    </template>
                  </div>
                </div>
              </template>
            </div>
          </template>
          <template x-if="!selectedEmail">
            <div class="flex items-center justify-center h-full text-zinc-400 dark:text-zinc-500">
              <div class="text-center">
                <svg class="w-12 h-12 mx-auto mb-3 text-zinc-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1"><path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/></svg>
                <p class="text-sm">Selecciona un email para verlo</p>
              </div>
            </div>
          </template>
        </div>
      </main>
    </div>
  </div>

  <style>[x-cloak] { display: none !important; }</style>
  <script>
    function mailingInboxPage() {
      return {
        search: '',
        filter: 'all',
        selectedEmail: null,
        filters: [
          { key: 'all', label: 'Todos' },
          { key: 'unread', label: 'No leidos' },
          { key: 'starred', label: 'Destacados' }
        ],
        emails: [
          { id: 1, from: 'Ana Garcia', avatar: 'AG', to: 'yo@layoutos.com', subject: 'Revision del presupuesto Q2', preview: 'Hola, adjunto el presupuesto actualizado para...', body: '<p>Hola,</p><p>Adjunto el presupuesto actualizado para el segundo trimestre. He incluido las modificaciones que discutimos en la reunion del viernes.</p><p>Por favor, revisalo y confirma si esta todo correcto antes del cierre del mes.</p><p>Saludos,<br>Ana</p>', date: 'Hoy', fullDate: '31 Mar 2024, 10:30', read: false, starred: true, attachments: [{ icon: '📄', name: 'presupuesto-Q2.xlsx', size: '245 KB' }] },
          { id: 2, from: 'Carlos Mendez', avatar: 'CM', to: 'yo@layoutos.com', subject: 'Deploy a produccion listo', preview: 'El deploy se completo exitosamente...', body: '<p>Equipo,</p><p>El deploy a produccion se completo exitosamente a las 14:00. Todos los tests pasaron y el monitoreo esta activo.</p><p>Estare pendiente de cualquier incidencia durante las proximas horas.</p>', date: 'Hoy', fullDate: '31 Mar 2024, 09:15', read: false, starred: false, attachments: [] },
          { id: 3, from: 'Laura Torres', avatar: 'LT', to: 'yo@layoutos.com', subject: 'Agenda reunion de equipo', preview: 'Buenos dias, comparto la agenda para la reunion...', body: '<p>Buenos dias,</p><p>Comparto la agenda para la reunion de equipo del miercoles:</p><ul><li>Revision de sprint</li><li>Planificacion de tareas</li><li>Feedback del cliente</li></ul><p>Por favor, agreguen temas si lo consideran necesario.</p>', date: 'Ayer', fullDate: '30 Mar 2024, 16:45', read: true, starred: false, attachments: [] },
          { id: 4, from: 'Pedro Ruiz', avatar: 'PR', to: 'yo@layoutos.com', subject: 'Propuesta de diseno v3', preview: 'Adjunto la tercera iteracion del diseno...', body: '<p>Hola,</p><p>Adjunto la tercera iteracion del diseno para la pagina de inicio. He incorporado el feedback de las sesiones de testing con usuarios.</p><p>Los cambios principales son en la seccion hero y la navegacion mobile.</p>', date: 'Ayer', fullDate: '30 Mar 2024, 11:20', read: false, starred: true, attachments: [{ icon: '🖼️', name: 'diseno-v3.fig', size: '12 MB' }, { icon: '📄', name: 'changelog.pdf', size: '89 KB' }] },
          { id: 5, from: 'Sofia Navarro', avatar: 'SN', to: 'yo@layoutos.com', subject: 'Informe de ventas Marzo', preview: 'Aqui esta el resumen de ventas del mes...', body: '<p>Equipo,</p><p>Aqui esta el resumen de ventas de marzo. Hemos superado el objetivo en un 12%.</p><p>Los puntos destacados son el crecimiento en la region norte y la retencion de clientes enterprise.</p>', date: '28 Mar', fullDate: '28 Mar 2024, 14:00', read: true, starred: false, attachments: [{ icon: '📄', name: 'ventas-marzo.xlsx', size: '340 KB' }] },
          { id: 6, from: 'Miguel Santos', avatar: 'MS', to: 'yo@layoutos.com', subject: 'Actualizacion de dependencias', preview: 'He preparado un PR con las actualizaciones...', body: '<p>Hola,</p><p>He preparado un PR con las actualizaciones de dependencias. Todas las pruebas pasan correctamente.</p><p>Link al PR: #234</p>', date: '27 Mar', fullDate: '27 Mar 2024, 09:30', read: true, starred: false, attachments: [] },
          { id: 7, from: 'Elena Diaz', avatar: 'ED', to: 'yo@layoutos.com', subject: 'Nuevo cliente onboarding', preview: 'Tenemos un nuevo cliente que necesita...', body: '<p>Hola equipo,</p><p>Tenemos un nuevo cliente que necesita onboarding esta semana. Es una empresa de logistica con 200 usuarios.</p><p>Necesitaremos coordinar con soporte tecnico para la configuracion inicial.</p>', date: '26 Mar', fullDate: '26 Mar 2024, 15:10', read: false, starred: false, attachments: [] },
          { id: 8, from: 'Roberto Vega', avatar: 'RV', to: 'yo@layoutos.com', subject: 'Feedback sesion de testing', preview: 'Comparto los resultados de la sesion...', body: '<p>Equipo,</p><p>Comparto los resultados de la sesion de testing con usuarios. En general, la experiencia fue positiva. Los principales puntos a mejorar son la velocidad de carga y la navegacion en mobile.</p>', date: '25 Mar', fullDate: '25 Mar 2024, 13:45', read: true, starred: true, attachments: [{ icon: '📄', name: 'testing-results.pdf', size: '1.2 MB' }] },
          { id: 9, from: 'Patricia Gomez', avatar: 'PG', to: 'yo@layoutos.com', subject: 'Contrato renovacion proveedor', preview: 'Adjunto el contrato de renovacion para...', body: '<p>Hola,</p><p>Adjunto el contrato de renovacion del proveedor de hosting. Las condiciones son las mismas que el ano anterior con un ajuste del 3%.</p>', date: '24 Mar', fullDate: '24 Mar 2024, 10:00', read: true, starred: false, attachments: [{ icon: '📄', name: 'contrato-2024.pdf', size: '456 KB' }] },
          { id: 10, from: 'Daniel Herrera', avatar: 'DH', to: 'yo@layoutos.com', subject: 'API docs actualizados', preview: 'He actualizado la documentacion de la API...', body: '<p>Hola,</p><p>He actualizado la documentacion de la API con los nuevos endpoints. Tambien agregue ejemplos de uso para cada uno.</p><p>Pueden verlo en docs.layoutos.com/api</p>', date: '23 Mar', fullDate: '23 Mar 2024, 11:30', read: true, starred: false, attachments: [] }
        ],
        get filteredEmails() {
          let result = this.emails;
          if (this.filter === 'unread') result = result.filter(e => !e.read);
          if (this.filter === 'starred') result = result.filter(e => e.starred);
          if (this.search) {
            const q = this.search.toLowerCase();
            result = result.filter(e => e.from.toLowerCase().includes(q) || e.subject.toLowerCase().includes(q));
          }
          return result;
        },
        selectEmail(email) {
          this.selectedEmail = email;
          email.read = true;
        }
      };
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
