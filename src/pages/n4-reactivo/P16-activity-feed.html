<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LayoutOS · Actividad</title>
  <link rel="stylesheet" href="/public/css/main.css" />
</head>
<body class="h-full bg-page antialiased">
  <div class="flex h-full" x-data="activityFeedPage()">
    <!-- Sidebar -->
    <aside class="w-64 bg-zinc-950 text-zinc-300 h-full overflow-y-auto shrink-0 hidden lg:flex flex-col">
      <div class="px-5 py-4 border-b border-zinc-800">
        <span class="text-sm font-semibold text-white">LayoutOS</span>
      </div>
      <nav class="flex-1 px-3 py-4 space-y-1">
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg bg-blue-600 text-white">Dashboard</a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg hover:bg-zinc-800 hover:text-white">Usuarios</a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg hover:bg-zinc-800 hover:text-white">Productos</a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg hover:bg-zinc-800 hover:text-white">Billing</a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg hover:bg-zinc-800 hover:text-white">Facturas</a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg hover:bg-zinc-800 hover:text-white">Transacciones</a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg hover:bg-zinc-800 hover:text-white">Eventos</a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg hover:bg-zinc-800 hover:text-white">Integraciones</a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg hover:bg-zinc-800 hover:text-white">API Keys</a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg hover:bg-zinc-800 hover:text-white">Soporte</a>
      </nav>
    </aside>

    <!-- Main -->
    <div class="flex-1 flex flex-col overflow-hidden">
      <header class="h-14 bg-white border-b border-zinc-200 flex items-center px-6 shrink-0">
        <h1 class="text-sm font-semibold text-zinc-900">Actividad</h1>
      </header>

      <main class="flex-1 overflow-y-auto p-6">
        <!-- Filters -->
        <div class="flex flex-wrap items-center gap-2 mb-6">
          <template x-for="f in filters" :key="f">
            <button
              class="btn-sm"
              :class="activeFilter === f ? 'btn-primary' : 'btn-secondary'"
              @click="activeFilter = f"
              x-text="f"
            ></button>
          </template>
        </div>

        <!-- Timeline grouped by date -->
        <template x-for="group in groupedItems" :key="group.date">
          <div class="mb-8">
            <h2 class="text-xs font-semibold text-zinc-400 uppercase tracking-wider mb-4" x-text="group.date"></h2>
            <div class="space-y-4">
              <template x-for="item in group.items" :key="item.id">
                <div class="flex gap-4 items-start">
                  <div class="w-9 h-9 rounded-full flex items-center justify-center text-xs font-semibold" :class="item.avatarBg" x-text="item.initials"></div>
                  <div class="flex-1 card">
                    <div class="flex items-start justify-between">
                      <div>
                        <p class="text-sm text-zinc-900">
                          <span class="font-medium" x-text="item.user"></span>
                          <span class="text-zinc-500" x-text="item.action"></span>
                          <span class="font-medium text-blue-600" x-text="item.target"></span>
                        </p>
                        <p x-show="item.detail" class="text-sm text-zinc-500 mt-1" x-text="item.detail"></p>
                      </div>
                      <span class="text-xs text-zinc-400 whitespace-nowrap ml-4" x-text="item.time"></span>
                    </div>
                  </div>
                </div>
              </template>
            </div>
          </div>
        </template>

        <!-- Load more -->
        <div class="text-center mt-6">
          <button class="btn-secondary" @click="loadMore()">Cargar mas</button>
        </div>
      </main>
    </div>
  </div>

  <style>[x-cloak] { display: none !important; }</style>
  <script>
    function activityFeedPage() {
      return {
        filters: ['Todos', 'Comentarios', 'Commits', 'Tareas'],
        activeFilter: 'Todos',
        items: [
          { id: 1, user: 'Ana Garcia', initials: 'AG', avatarBg: 'bg-blue-100 text-blue-700', action: 'comento en', target: 'PR #142', detail: 'Excelente implementacion, solo falta ajustar los tests.', time: '10:30', type: 'Comentarios', date: 'Hoy' },
          { id: 2, user: 'Carlos Lopez', initials: 'CL', avatarBg: 'bg-green-100 text-green-700', action: 'subio commit a', target: 'main', detail: 'fix: corregir validacion de formularios', time: '09:45', type: 'Commits', date: 'Hoy' },
          { id: 3, user: 'Maria Torres', initials: 'MT', avatarBg: 'bg-amber-100 text-amber-700', action: 'completo la tarea', target: 'Disenar modal de confirmacion', detail: '', time: '09:12', type: 'Tareas', date: 'Hoy' },
          { id: 4, user: 'Pedro Ruiz', initials: 'PR', avatarBg: 'bg-rose-100 text-rose-700', action: 'creo la tarea', target: 'Optimizar queries de busqueda', detail: '', time: '08:30', type: 'Tareas', date: 'Hoy' },
          { id: 5, user: 'Laura Diaz', initials: 'LD', avatarBg: 'bg-purple-100 text-purple-700', action: 'comento en', target: 'Issue #89', detail: 'Esto deberia solucionarse con el PR #145.', time: '08:00', type: 'Comentarios', date: 'Hoy' },
          { id: 6, user: 'Jorge Mendez', initials: 'JM', avatarBg: 'bg-teal-100 text-teal-700', action: 'subio 3 commits a', target: 'feature/auth', detail: '', time: '18:20', type: 'Commits', date: 'Ayer' },
          { id: 7, user: 'Sofia Herrera', initials: 'SH', avatarBg: 'bg-orange-100 text-orange-700', action: 'completo la tarea', target: 'Migrar base de datos', detail: '', time: '16:45', type: 'Tareas', date: 'Ayer' },
          { id: 8, user: 'Diego Morales', initials: 'DM', avatarBg: 'bg-cyan-100 text-cyan-700', action: 'comento en', target: 'PR #139', detail: 'Necesitamos revisar el manejo de errores aqui.', time: '15:30', type: 'Comentarios', date: 'Ayer' },
          { id: 9, user: 'Elena Castro', initials: 'EC', avatarBg: 'bg-indigo-100 text-indigo-700', action: 'subio commit a', target: 'develop', detail: 'feat: agregar endpoint de exportacion', time: '14:00', type: 'Commits', date: 'Ayer' },
          { id: 10, user: 'Roberto Vega', initials: 'RV', avatarBg: 'bg-pink-100 text-pink-700', action: 'creo la tarea', target: 'Implementar cache de sesiones', detail: '', time: '11:15', type: 'Tareas', date: 'Ayer' },
          { id: 11, user: 'Ana Garcia', initials: 'AG', avatarBg: 'bg-blue-100 text-blue-700', action: 'subio 5 commits a', target: 'feature/dashboard', detail: '', time: '17:00', type: 'Commits', date: '28 Mar' },
          { id: 12, user: 'Carlos Lopez', initials: 'CL', avatarBg: 'bg-green-100 text-green-700', action: 'comento en', target: 'Issue #85', detail: 'Ya esta resuelto en la ultima version.', time: '14:30', type: 'Comentarios', date: '28 Mar' },
          { id: 13, user: 'Maria Torres', initials: 'MT', avatarBg: 'bg-amber-100 text-amber-700', action: 'completo la tarea', target: 'Revisar accesibilidad', detail: '', time: '10:00', type: 'Tareas', date: '28 Mar' },
          { id: 14, user: 'Pedro Ruiz', initials: 'PR', avatarBg: 'bg-rose-100 text-rose-700', action: 'subio commit a', target: 'hotfix/login', detail: 'fix: resolver timeout en login', time: '09:00', type: 'Commits', date: '28 Mar' },
          { id: 15, user: 'Laura Diaz', initials: 'LD', avatarBg: 'bg-purple-100 text-purple-700', action: 'creo la tarea', target: 'Escribir tests de integracion', detail: '', time: '08:30', type: 'Tareas', date: '28 Mar' }
        ],
        get filteredItems() {
          if (this.activeFilter === 'Todos') return this.items;
          return this.items.filter(i => i.type === this.activeFilter);
        },
        get groupedItems() {
          const groups = {};
          this.filteredItems.forEach(item => {
            if (!groups[item.date]) groups[item.date] = [];
            groups[item.date].push(item);
          });
          return Object.entries(groups).map(([date, items]) => ({ date, items }));
        },
        loadMore() {
          // Simulated load
        }
      };
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
