<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LayoutOS · API Keys</title>
  <link rel="stylesheet" href="../../../public/css/main.css" />
</head>
<body class="h-full bg-page antialiased">
  <div class="flex h-full" x-data="apiKeysPage()">
    <!-- Sidebar -->
    <aside class="w-64 bg-zinc-950 dark:bg-zinc-800 text-zinc-300 h-full overflow-y-auto shrink-0 hidden lg:flex flex-col">
      <div class="px-5 py-4 border-b border-zinc-800">
        <span class="text-sm font-semibold text-white">LayoutOS</span>
      </div>
      <nav class="flex-1 px-3 py-4 space-y-1">
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg hover:bg-zinc-800 hover:text-white">Dashboard</a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg hover:bg-zinc-800 hover:text-white">Usuarios</a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg hover:bg-zinc-800 hover:text-white">Productos</a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg hover:bg-zinc-800 hover:text-white">Billing</a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg hover:bg-zinc-800 hover:text-white">Facturas</a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg hover:bg-zinc-800 hover:text-white">Transacciones</a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg hover:bg-zinc-800 hover:text-white">Eventos</a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg hover:bg-zinc-800 hover:text-white">Integraciones</a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg bg-blue-600 text-white">API Keys</a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg hover:bg-zinc-800 hover:text-white">Soporte</a>
      </nav>
    </aside>

    <!-- Main -->
    <div class="flex-1 flex flex-col overflow-hidden">
      <header class="h-14 bg-white dark:bg-zinc-900 border-b border-zinc-200 dark:border-zinc-800 flex items-center justify-between px-4 sm:px-6 shrink-0">
        <h1 class="text-sm font-semibold text-zinc-900 dark:text-zinc-100">API Keys</h1>
        <button class="btn-primary btn-sm" @click="showCreateModal = true">Crear nueva key</button>
      </header>

      <main class="flex-1 overflow-y-auto p-6">
        <div class="space-y-4">
          <template x-for="key in keys" :key="key.id">
            <div class="card">
              <div class="flex flex-col sm:flex-row sm:items-center gap-4">
                <div class="flex-1">
                  <div class="flex items-center gap-3 mb-2">
                    <h3 class="text-sm font-semibold text-zinc-900 dark:text-zinc-100" x-text="key.name"></h3>
                    <span :class="key.status === 'Activa' ? 'badge-green' : 'badge-rose'" x-text="key.status"></span>
                  </div>
                  <div class="flex items-center gap-2 mb-2">
                    <code class="text-sm bg-zinc-100 dark:bg-zinc-800 px-2 py-1 rounded font-mono text-zinc-600 dark:text-zinc-400 dark:text-zinc-500" x-text="key.partial"></code>
                    <button class="btn-ghost btn-sm" @click="copyKey(key.partial)">Copiar</button>
                  </div>
                  <div class="flex flex-wrap items-center gap-2 mb-2">
                    <template x-for="perm in key.permissions" :key="perm">
                      <span class="badge-blue" x-text="perm"></span>
                    </template>
                  </div>
                  <p class="text-xs text-zinc-400 dark:text-zinc-500" x-text="'Ultimo uso: ' + key.lastUsed"></p>
                </div>
                <div class="flex items-center gap-2">
                  <button class="btn-danger btn-sm" @click="revokeKey(key)" x-show="key.status === 'Activa'">Revocar</button>
                </div>
              </div>
            </div>
          </template>
        </div>
      </main>
    </div>

    <!-- Modal crear key -->
    <div x-show="showCreateModal" x-cloak class="fixed inset-0 z-50 flex items-center justify-center">
      <div class="absolute inset-0 bg-black/50" @click="showCreateModal = false"></div>
      <div class="relative bg-white dark:bg-zinc-900 rounded-xl shadow-lg w-full max-w-md p-6" @click.stop>
        <h2 class="text-lg font-semibold text-zinc-900 dark:text-zinc-100 mb-4">Crear nueva API Key</h2>
        <div class="space-y-4">
          <div>
            <label class="label">Nombre</label>
            <input type="text" class="input w-full" x-model="newKey.name" placeholder="Ej: Produccion Backend" />
          </div>
          <div>
            <label class="label">Permisos</label>
            <div class="space-y-2 mt-1">
              <template x-for="perm in availablePermissions" :key="perm">
                <label class="flex items-center gap-2 text-sm text-zinc-700 dark:text-zinc-300">
                  <input type="checkbox" class="rounded border-zinc-300 dark:border-zinc-700" :value="perm" x-model="newKey.permissions" />
                  <span x-text="perm"></span>
                </label>
              </template>
            </div>
          </div>
          <div>
            <label class="label">Fecha de expiracion</label>
            <input type="date" class="input w-full" x-model="newKey.expiry" />
          </div>
        </div>
        <div class="flex justify-end gap-3 mt-6">
          <button class="btn-secondary btn-sm" @click="showCreateModal = false">Cancelar</button>
          <button class="btn-primary btn-sm" @click="createKey()">Crear key</button>
        </div>
      </div>
    </div>

    <!-- Modal key creada -->
    <div x-show="showKeyModal" x-cloak class="fixed inset-0 z-50 flex items-center justify-center">
      <div class="absolute inset-0 bg-black/50"></div>
      <div class="relative bg-white dark:bg-zinc-900 rounded-xl shadow-lg w-full max-w-md p-6" @click.stop>
        <h2 class="text-lg font-semibold text-zinc-900 dark:text-zinc-100 mb-2">API Key creada</h2>
        <div class="bg-amber-50 dark:bg-amber-950 border border-amber-200 dark:border-amber-800 rounded-lg p-3 mb-4">
          <p class="text-sm text-amber-800 font-medium">No podras ver esta key de nuevo. Copiala ahora.</p>
        </div>
        <div class="flex items-center gap-2 bg-zinc-100 dark:bg-zinc-800 rounded-lg p-3">
          <code class="text-sm font-mono text-zinc-800 dark:text-zinc-200 flex-1 break-all" x-text="createdKeyFull"></code>
          <button class="btn-primary btn-sm" @click="copyKey(createdKeyFull)">Copiar</button>
        </div>
        <div class="flex justify-end mt-6">
          <button class="btn-secondary btn-sm" @click="showKeyModal = false">Cerrar</button>
        </div>
      </div>
    </div>
  </div>

  <style>[x-cloak] { display: none !important; }</style>
  <script>
    function apiKeysPage() {
      return {
        showCreateModal: false,
        showKeyModal: false,
        createdKeyFull: '',
        availablePermissions: ['Lectura', 'Escritura', 'Eliminacion', 'Admin'],
        newKey: { name: '', permissions: [], expiry: '' },
        keys: [
          { id: 1, name: 'Produccion Backend', partial: 'sk-prod-****-****-a1b2', status: 'Activa', permissions: ['Lectura', 'Escritura'], lastUsed: 'Hace 2 horas' },
          { id: 2, name: 'Staging Frontend', partial: 'sk-stg-****-****-c3d4', status: 'Activa', permissions: ['Lectura'], lastUsed: 'Hace 1 dia' },
          { id: 3, name: 'CI/CD Pipeline', partial: 'sk-ci-****-****-e5f6', status: 'Activa', permissions: ['Lectura', 'Escritura', 'Eliminacion'], lastUsed: 'Hace 5 min' },
          { id: 4, name: 'Testing (expirada)', partial: 'sk-test-****-****-g7h8', status: 'Revocada', permissions: ['Lectura'], lastUsed: 'Hace 30 dias' }
        ],
        generateKey() {
          const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
          let key = 'sk-';
          for (let i = 0; i < 4; i++) {
            for (let j = 0; j < 4; j++) key += chars[Math.floor(Math.random() * chars.length)];
            if (i < 3) key += '-';
          }
          return key;
        },
        createKey() {
          if (!this.newKey.name || this.newKey.permissions.length === 0) return;
          const fullKey = this.generateKey();
          const partial = fullKey.substring(0, 6) + '****-****-' + fullKey.substring(fullKey.length - 4);
          this.keys.unshift({
            id: this.keys.length + 1,
            name: this.newKey.name,
            partial,
            status: 'Activa',
            permissions: [...this.newKey.permissions],
            lastUsed: 'Nunca'
          });
          this.createdKeyFull = fullKey;
          this.newKey = { name: '', permissions: [], expiry: '' };
          this.showCreateModal = false;
          this.showKeyModal = true;
        },
        revokeKey(key) {
          key.status = 'Revocada';
        },
        copyKey(text) {
          navigator.clipboard.writeText(text);
        }
      };
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
