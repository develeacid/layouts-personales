<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LayoutOS · Productos</title>
  <link rel="stylesheet" href="/public/css/main.css" />
</head>
<body class="h-full bg-page antialiased">
  <div class="flex h-full" x-data="productsPage()">
    <!-- Sidebar -->
    <aside class="w-64 bg-zinc-950 text-zinc-300 h-full overflow-y-auto shrink-0 hidden lg:flex flex-col">
      <div class="px-5 py-4 border-b border-zinc-800">
        <span class="text-sm font-semibold text-white">LayoutOS</span>
      </div>
      <nav class="flex-1 px-3 py-4 space-y-1">
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg hover:bg-zinc-800 hover:text-white">Dashboard</a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg hover:bg-zinc-800 hover:text-white">Usuarios</a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg bg-blue-600 text-white">Productos</a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg hover:bg-zinc-800 hover:text-white">Billing</a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg hover:bg-zinc-800 hover:text-white">Facturas</a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg hover:bg-zinc-800 hover:text-white">Transacciones</a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg hover:bg-zinc-800 hover:text-white">Eventos</a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg hover:bg-zinc-800 hover:text-white">Integraciones</a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg hover:bg-zinc-800 hover:text-white">API Keys</a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg hover:bg-zinc-800 hover:text-white">Soporte</a>
      </nav>
    </aside>

    <!-- Main -->
    <div class="flex-1 flex flex-col overflow-hidden">
      <header class="h-14 bg-white border-b border-zinc-200 flex items-center justify-between px-6 shrink-0">
        <h1 class="text-sm font-semibold text-zinc-900">Productos</h1>
        <div class="flex items-center gap-3">
          <div class="flex border border-zinc-200 rounded-lg overflow-hidden">
            <button class="px-3 py-1.5 text-sm transition-colors" :class="view === 'grid' ? 'bg-zinc-100 text-zinc-900' : 'text-zinc-400 hover:text-zinc-600'" @click="view = 'grid'">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
            </button>
            <button class="px-3 py-1.5 text-sm transition-colors" :class="view === 'list' ? 'bg-zinc-100 text-zinc-900' : 'text-zinc-400 hover:text-zinc-600'" @click="view = 'list'">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
            </button>
          </div>
          <button class="btn-primary btn-sm">Nuevo producto</button>
        </div>
      </header>

      <main class="flex-1 overflow-y-auto p-6">
        <!-- Filters -->
        <div class="flex flex-wrap items-center gap-3 mb-6">
          <input type="text" class="input w-64" placeholder="Buscar productos..." x-model="search" />
          <select class="input w-44" x-model="filterCategory">
            <option value="">Todas las categorias</option>
            <option value="Electronica">Electronica</option>
            <option value="Ropa">Ropa</option>
            <option value="Hogar">Hogar</option>
            <option value="Deporte">Deporte</option>
          </select>
          <select class="input w-36" x-model="filterPrice">
            <option value="">Precio</option>
            <option value="low">Menos de $50</option>
            <option value="mid">$50 - $200</option>
            <option value="high">Mas de $200</option>
          </select>
        </div>

        <!-- Grid view -->
        <div x-show="view === 'grid'" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
          <template x-for="p in filteredProducts" :key="p.id">
            <div class="card p-0 overflow-hidden">
              <div class="h-40 bg-zinc-100 flex items-center justify-center">
                <svg class="w-12 h-12 text-zinc-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1"><path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
              </div>
              <div class="p-4">
                <div class="flex items-start justify-between mb-2">
                  <h3 class="text-sm font-semibold text-zinc-900" x-text="p.name"></h3>
                  <span :class="p.stock > 0 ? 'badge-green' : 'badge-rose'" x-text="p.stock > 0 ? 'En stock' : 'Agotado'"></span>
                </div>
                <p class="text-xs text-zinc-500 mb-2" x-text="p.category"></p>
                <div class="flex items-center justify-between">
                  <span class="text-sm font-bold text-zinc-900" x-text="'$' + p.price"></span>
                  <div class="flex items-center gap-1">
                    <svg class="w-3.5 h-3.5 text-amber-400" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
                    <span class="text-xs text-zinc-500" x-text="p.rating"></span>
                  </div>
                </div>
              </div>
            </div>
          </template>
        </div>

        <!-- List view -->
        <div x-show="view === 'list'" class="card overflow-hidden p-0">
          <table class="w-full text-sm">
            <thead>
              <tr class="border-b border-zinc-200 bg-zinc-50 text-left">
                <th class="px-4 py-3 font-medium text-zinc-600">Producto</th>
                <th class="px-4 py-3 font-medium text-zinc-600">Categoria</th>
                <th class="px-4 py-3 font-medium text-zinc-600">Precio</th>
                <th class="px-4 py-3 font-medium text-zinc-600">Stock</th>
                <th class="px-4 py-3 font-medium text-zinc-600">Rating</th>
              </tr>
            </thead>
            <tbody>
              <template x-for="p in filteredProducts" :key="p.id">
                <tr class="border-b border-zinc-100 hover:bg-zinc-50">
                  <td class="px-4 py-3 font-medium text-zinc-900" x-text="p.name"></td>
                  <td class="px-4 py-3 text-zinc-500" x-text="p.category"></td>
                  <td class="px-4 py-3 text-zinc-900 font-medium" x-text="'$' + p.price"></td>
                  <td class="px-4 py-3">
                    <span :class="p.stock > 0 ? 'badge-green' : 'badge-rose'" x-text="p.stock > 0 ? p.stock + ' uds' : 'Agotado'"></span>
                  </td>
                  <td class="px-4 py-3 text-zinc-500" x-text="p.rating"></td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>

        <!-- Pagination -->
        <div class="flex items-center justify-between mt-6">
          <span class="text-sm text-zinc-500">Mostrando <span x-text="filteredProducts.length"></span> productos</span>
          <div class="flex items-center gap-1">
            <button class="btn-ghost btn-sm">Anterior</button>
            <button class="btn-ghost btn-sm bg-blue-50 text-blue-600">1</button>
            <button class="btn-ghost btn-sm">2</button>
            <button class="btn-ghost btn-sm">Siguiente</button>
          </div>
        </div>
      </main>
    </div>
  </div>

  <style>[x-cloak] { display: none !important; }</style>
  <script>
    function productsPage() {
      return {
        view: 'grid',
        search: '',
        filterCategory: '',
        filterPrice: '',
        products: [
          { id: 1, name: 'Auriculares Pro', category: 'Electronica', price: 89, stock: 24, rating: 4.5 },
          { id: 2, name: 'Camiseta Classic', category: 'Ropa', price: 29, stock: 156, rating: 4.2 },
          { id: 3, name: 'Lampara LED', category: 'Hogar', price: 45, stock: 0, rating: 3.8 },
          { id: 4, name: 'Balon Futbol', category: 'Deporte', price: 35, stock: 42, rating: 4.7 },
          { id: 5, name: 'Teclado Mecanico', category: 'Electronica', price: 149, stock: 18, rating: 4.9 },
          { id: 6, name: 'Sudadera Zip', category: 'Ropa', price: 59, stock: 88, rating: 4.0 },
          { id: 7, name: 'Monitor 27"', category: 'Electronica', price: 349, stock: 7, rating: 4.6 },
          { id: 8, name: 'Esterilla Yoga', category: 'Deporte', price: 25, stock: 200, rating: 4.3 }
        ],
        get filteredProducts() {
          return this.products.filter(p => {
            const matchSearch = p.name.toLowerCase().includes(this.search.toLowerCase());
            const matchCategory = !this.filterCategory || p.category === this.filterCategory;
            let matchPrice = true;
            if (this.filterPrice === 'low') matchPrice = p.price < 50;
            if (this.filterPrice === 'mid') matchPrice = p.price >= 50 && p.price <= 200;
            if (this.filterPrice === 'high') matchPrice = p.price > 200;
            return matchSearch && matchCategory && matchPrice;
          });
        }
      };
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
