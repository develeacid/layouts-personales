<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LayoutOS · Integraciones</title>
  <link rel="stylesheet" href="../../../public/css/main.css" />
</head>
<body class="h-full bg-page antialiased">
  <div class="flex h-full" x-data="integrationsPage()">
    <!-- Sidebar -->
    <aside class="w-64 bg-zinc-950 dark:bg-zinc-800 text-zinc-300 h-full overflow-y-auto shrink-0 hidden lg:flex flex-col">
      <div class="px-5 py-4 border-b border-zinc-800">
        <span class="text-sm font-semibold text-white">LayoutOS</span>
      </div>
      <nav class="flex-1 px-3 py-4 space-y-1">
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg hover:bg-zinc-800 hover:text-white">Dashboard</a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg hover:bg-zinc-800 hover:text-white">Usuarios</a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg hover:bg-zinc-800 hover:text-white">Productos</a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg hover:bg-zinc-800 hover:text-white">Billing</a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg hover:bg-zinc-800 hover:text-white">Facturas</a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg hover:bg-zinc-800 hover:text-white">Transacciones</a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg hover:bg-zinc-800 hover:text-white">Eventos</a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg bg-blue-600 text-white">Integraciones</a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg hover:bg-zinc-800 hover:text-white">API Keys</a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg hover:bg-zinc-800 hover:text-white">Soporte</a>
      </nav>
    </aside>

    <!-- Main -->
    <div class="flex-1 flex flex-col overflow-hidden">
      <header class="h-14 bg-white dark:bg-zinc-900 border-b border-zinc-200 dark:border-zinc-800 flex items-center px-4 sm:px-6 shrink-0">
        <h1 class="text-sm font-semibold text-zinc-900 dark:text-zinc-100">Integraciones</h1>
      </header>

      <main class="flex-1 overflow-y-auto p-6 space-y-8">
        <!-- Toast -->
        <div x-show="toast" x-transition x-cloak class="fixed top-4 right-4 z-50 card border-green-200 dark:border-green-800 bg-green-50 dark:bg-green-950 text-green-800 text-sm">
          <span x-text="toastMessage"></span>
        </div>

        <!-- Connected -->
        <div>
          <h2 class="text-sm font-semibold text-zinc-900 dark:text-zinc-100 mb-4">Conectadas (<span x-text="connectedIntegrations.length"></span>)</h2>
          <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
            <template x-for="int in connectedIntegrations" :key="int.name">
              <div class="card">
                <div class="flex items-start gap-4">
                  <div class="w-10 h-10 rounded-lg flex items-center justify-center text-white text-sm font-bold" :class="int.iconBg" x-text="int.icon"></div>
                  <div class="flex-1">
                    <div class="flex items-center justify-between mb-1">
                      <h3 class="text-sm font-semibold text-zinc-900 dark:text-zinc-100" x-text="int.name"></h3>
                      <span class="badge-green">Conectado</span>
                    </div>
                    <p class="text-sm text-zinc-500 dark:text-zinc-400 dark:text-zinc-500 mb-3" x-text="int.description"></p>
                    <button
                      class="relative w-11 h-6 rounded-full bg-blue-600 transition-colors cursor-pointer"
                      @click="toggleIntegration(int)"
                    >
                      <span class="absolute top-0.5 left-0 w-5 h-5 bg-white dark:bg-zinc-900 rounded-full shadow-sm transition-transform translate-x-5"></span>
                    </button>
                  </div>
                </div>
              </div>
            </template>
          </div>
        </div>

        <!-- Available -->
        <div>
          <h2 class="text-sm font-semibold text-zinc-900 dark:text-zinc-100 mb-4">Disponibles (<span x-text="availableIntegrations.length"></span>)</h2>
          <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
            <template x-for="int in availableIntegrations" :key="int.name">
              <div class="card">
                <div class="flex items-start gap-4">
                  <div class="w-10 h-10 rounded-lg flex items-center justify-center text-white text-sm font-bold" :class="int.iconBg" x-text="int.icon"></div>
                  <div class="flex-1">
                    <div class="flex items-center justify-between mb-1">
                      <h3 class="text-sm font-semibold text-zinc-900 dark:text-zinc-100" x-text="int.name"></h3>
                      <span class="badge-zinc">Disponible</span>
                    </div>
                    <p class="text-sm text-zinc-500 dark:text-zinc-400 dark:text-zinc-500 mb-3" x-text="int.description"></p>
                    <button
                      class="btn-primary btn-sm"
                      @click="toggleIntegration(int)"
                    >Conectar</button>
                  </div>
                </div>
              </div>
            </template>
          </div>
        </div>
      </main>
    </div>
  </div>

  <style>[x-cloak] { display: none !important; }</style>
  <script>
    function integrationsPage() {
      return {
        toast: false,
        toastMessage: '',
        integrations: [
          { name: 'Slack', description: 'Recibe notificaciones y actualizaciones en tus canales.', icon: 'S', iconBg: 'bg-purple-600', connected: true },
          { name: 'GitHub', description: 'Sincroniza repositorios, PRs y issues automaticamente.', icon: 'GH', iconBg: 'bg-zinc-800', connected: true },
          { name: 'Notion', description: 'Conecta tus bases de datos y documentos.', icon: 'N', iconBg: 'bg-zinc-900', connected: false },
          { name: 'Figma', description: 'Importa disenos y prototipos directamente.', icon: 'F', iconBg: 'bg-rose-500', connected: false },
          { name: 'Jira', description: 'Sincroniza epics, stories y sprints.', icon: 'J', iconBg: 'bg-blue-600', connected: true },
          { name: 'Stripe', description: 'Gestiona pagos y suscripciones.', icon: '$', iconBg: 'bg-indigo-600', connected: false }
        ],
        get connectedIntegrations() {
          return this.integrations.filter(i => i.connected);
        },
        get availableIntegrations() {
          return this.integrations.filter(i => !i.connected);
        },
        toggleIntegration(int) {
          int.connected = !int.connected;
          this.toastMessage = int.connected ? int.name + ' conectado correctamente' : int.name + ' desconectado';
          this.toast = true;
          setTimeout(() => this.toast = false, 2500);
        }
      };
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
