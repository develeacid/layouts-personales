<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LayoutOS · En Llamada</title>
  <link rel="stylesheet" href="/public/css/main.css" />
</head>
<body class="h-full bg-zinc-900 antialiased">
  <div class="h-full flex flex-col" x-data="inCallPage()">
    <!-- Top bar -->
    <div class="h-12 flex items-center justify-between px-4 sm:px-6 bg-zinc-900/80 border-b border-zinc-800">
      <div class="flex items-center gap-3">
        <span class="text-sm font-medium text-white">Llamada grupal</span>
        <span class="text-xs text-zinc-500 dark:text-zinc-400">4 participantes</span>
      </div>
      <div class="flex items-center gap-4">
        <span class="text-sm font-mono text-zinc-400 dark:text-zinc-500" x-text="timer"></span>
        <!-- Speaker view toggle -->
        <button class="flex items-center gap-1.5 text-xs px-3 py-1.5 rounded-lg transition"
          :class="speakerView ? 'bg-indigo-600 text-white' : 'bg-zinc-800 text-zinc-400 dark:text-zinc-500 hover:text-white'"
          @click="speakerView = !speakerView">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="15" rx="2" ry="2"/><polyline points="17 2 12 7 7 2"/></svg>
          Speaker view
        </button>
      </div>
    </div>

    <div class="flex-1 flex overflow-hidden">
      <!-- Video grid -->
      <div class="flex-1 p-4">
        <!-- Speaker view -->
        <div x-show="speakerView" class="h-full flex flex-col gap-3">
          <div class="flex-1 rounded-xl bg-zinc-800 flex items-center justify-center ring-2 ring-emerald-500">
            <div class="flex flex-col items-center gap-3">
              <div class="w-20 h-20 rounded-full bg-indigo-600 flex items-center justify-center text-2xl font-bold text-white">AG</div>
              <span class="text-sm text-white font-medium">Ana Garcia</span>
              <span class="text-xs text-emerald-400">Hablando</span>
            </div>
          </div>
          <div class="flex gap-3 h-24">
            <template x-for="p in participants.filter(p => p.name !== 'Ana Garcia')" :key="p.name">
              <div class="flex-1 rounded-lg bg-zinc-800 flex items-center justify-center">
                <div class="flex items-center gap-2">
                  <div class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold text-white" :class="p.bg" x-text="p.initials"></div>
                  <span class="text-xs text-zinc-300" x-text="p.name"></span>
                </div>
              </div>
            </template>
          </div>
        </div>

        <!-- Grid view -->
        <div x-show="!speakerView" class="grid grid-cols-2 gap-3 h-full">
          <template x-for="p in participants" :key="p.name">
            <div class="rounded-xl bg-zinc-800 flex items-center justify-center relative"
              :class="p.speaking ? 'ring-2 ring-emerald-500' : ''">
              <div class="flex flex-col items-center gap-2">
                <div class="w-16 h-16 rounded-full flex items-center justify-center text-xl font-bold text-white" :class="p.bg" x-text="p.initials"></div>
                <span class="text-sm text-white font-medium" x-text="p.name"></span>
              </div>
              <div class="absolute bottom-3 left-3 flex items-center gap-1.5">
                <span class="w-6 h-6 rounded-full flex items-center justify-center" :class="p.mic ? 'bg-zinc-700/80 text-white' : 'bg-rose-500/80 text-white'">
                  <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/></svg>
                </span>
              </div>
            </div>
          </template>
        </div>
      </div>

      <!-- Side panel: Chat + Participants -->
      <div x-show="panelOpen" x-transition class="w-80 border-l border-zinc-800 flex flex-col" style="background-color: rgb(30 30 30);">
        <!-- Panel tabs -->
        <div class="border-b border-zinc-800 flex">
          <button class="flex-1 py-3 text-xs font-medium text-center border-b-2 transition"
            :class="panelTab === 'chat' ? 'border-white text-white' : 'border-transparent text-zinc-500 dark:text-zinc-400 hover:text-zinc-300'"
            @click="panelTab = 'chat'">Chat</button>
          <button class="flex-1 py-3 text-xs font-medium text-center border-b-2 transition"
            :class="panelTab === 'participants' ? 'border-white text-white' : 'border-transparent text-zinc-500 dark:text-zinc-400 hover:text-zinc-300'"
            @click="panelTab = 'participants'">Participantes</button>
        </div>

        <!-- Chat -->
        <div x-show="panelTab === 'chat'" class="flex-1 flex flex-col">
          <div class="flex-1 overflow-y-auto p-4 space-y-3">
            <template x-for="msg in chatMessages" :key="msg.text">
              <div>
                <p class="text-xs font-medium text-zinc-400 dark:text-zinc-500" x-text="msg.from"></p>
                <p class="text-sm text-zinc-200 mt-0.5" x-text="msg.text"></p>
              </div>
            </template>
          </div>
          <div class="p-3 border-t border-zinc-800">
            <input type="text" placeholder="Mensaje..." class="w-full text-sm bg-zinc-800 border border-zinc-700 rounded-lg px-3 py-2 text-white placeholder-zinc-500 focus:outline-none focus:ring-1 focus:ring-zinc-600" />
          </div>
        </div>

        <!-- Participants -->
        <div x-show="panelTab === 'participants'" class="flex-1 overflow-y-auto p-4 space-y-2">
          <template x-for="p in participants" :key="p.name">
            <div class="flex items-center gap-3 p-2 rounded-lg hover:bg-zinc-800/50">
              <div class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold text-white" :class="p.bg" x-text="p.initials"></div>
              <div class="flex-1">
                <p class="text-sm text-white" x-text="p.name"></p>
              </div>
              <div class="flex gap-1">
                <span class="w-5 h-5 rounded flex items-center justify-center" :class="p.mic ? 'text-zinc-400' : 'text-rose-500'">
                  <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/></svg>
                </span>
                <span class="w-5 h-5 rounded flex items-center justify-center" :class="p.cam ? 'text-zinc-400' : 'text-rose-500'">
                  <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
                </span>
              </div>
            </div>
          </template>
        </div>
      </div>
    </div>

    <!-- Controls -->
    <div class="h-20 bg-zinc-900 border-t border-zinc-800 flex items-center justify-center gap-3">
      <button class="w-12 h-12 rounded-full flex items-center justify-center transition"
        :class="micOn ? 'bg-zinc-700 text-white hover:bg-zinc-600' : 'bg-rose-500 text-white'"
        @click="micOn = !micOn">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/></svg>
      </button>
      <button class="w-12 h-12 rounded-full flex items-center justify-center transition"
        :class="camOn ? 'bg-zinc-700 text-white hover:bg-zinc-600' : 'bg-rose-500 text-white'"
        @click="camOn = !camOn">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
      </button>
      <button class="w-12 h-12 rounded-full bg-zinc-700 text-white flex items-center justify-center hover:bg-zinc-600 transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      </button>
      <button class="w-12 h-12 rounded-full flex items-center justify-center transition"
        :class="panelOpen ? 'bg-indigo-600 text-white' : 'bg-zinc-700 text-white hover:bg-zinc-600'"
        @click="panelOpen = !panelOpen">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </button>
      <button class="w-12 h-12 rounded-full bg-rose-600 text-white flex items-center justify-center hover:bg-rose-700 transition ml-4">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z" transform="rotate(135 12 12)"/></svg>
      </button>
    </div>
  </div>

  <style>[x-cloak] { display: none !important; }</style>
  <script>
    function inCallPage() {
      return {
        micOn: true,
        camOn: true,
        panelOpen: false,
        panelTab: 'chat',
        speakerView: false,
        timer: '00:15:32',
        participants: [
          { name: 'Tu', initials: 'TU', bg: 'bg-indigo-600', mic: true, cam: true, speaking: false },
          { name: 'Ana Garcia', initials: 'AG', bg: 'bg-pink-600', mic: true, cam: true, speaking: true },
          { name: 'Carlos Lopez', initials: 'CL', bg: 'bg-emerald-600', mic: false, cam: true, speaking: false },
          { name: 'Maria Torres', initials: 'MT', bg: 'bg-amber-600', mic: true, cam: false, speaking: false }
        ],
        chatMessages: [
          { from: 'Ana Garcia', text: 'Podemos revisar el ultimo punto?' },
          { from: 'Tu', text: 'Si, comparto pantalla' },
          { from: 'Carlos Lopez', text: 'Perfecto' }
        ]
      };
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
