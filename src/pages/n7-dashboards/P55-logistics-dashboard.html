<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LayoutOS · Logistica Dashboard</title>
  <link rel="stylesheet" href="/public/css/main.css" />
</head>
<body class="h-full bg-page antialiased">
  <div class="flex h-full" x-data="logisticsDashboard()">
    <!-- Sidebar -->
    <aside class="w-64 bg-zinc-950 text-zinc-300 h-full overflow-y-auto shrink-0 hidden lg:flex flex-col">
      <div class="px-5 py-4 border-b border-zinc-800">
        <span class="text-sm font-semibold text-white">LayoutOS</span>
        <span class="ml-2 text-xs text-teal-400">Logistics</span>
      </div>
      <nav class="flex-1 px-3 py-4 space-y-1">
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm font-medium text-white bg-zinc-800 rounded-lg">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          Panel
        </a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm text-zinc-400 hover:text-white hover:bg-zinc-800/50 rounded-lg transition">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
          Envios
        </a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm text-zinc-400 hover:text-white hover:bg-zinc-800/50 rounded-lg transition">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 22s-8-4.5-8-11.8A8 8 0 0 1 12 2a8 8 0 0 1 8 8.2c0 7.3-8 11.8-8 11.8z"/><circle cx="12" cy="10" r="3"/></svg>
          Rastreo
        </a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm text-zinc-400 hover:text-white hover:bg-zinc-800/50 rounded-lg transition">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg>
          Reportes
        </a>
      </nav>
    </aside>

    <!-- Main -->
    <div class="flex-1 flex flex-col overflow-hidden">
      <header class="h-14 bg-white border-b border-zinc-200 flex items-center justify-between px-6 shrink-0">
        <h1 class="text-sm font-semibold text-zinc-900">Centro Logistico</h1>
        <div class="flex items-center gap-3">
          <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-medium bg-rose-50 text-rose-700 border border-rose-200">8 envios demorados</span>
        </div>
      </header>

      <main class="flex-1 overflow-y-auto p-6">
        <!-- KPIs -->
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
          <div class="bg-white border border-zinc-200 rounded-xl shadow-sm p-6">
            <p class="text-xs text-zinc-500 uppercase tracking-wide">Envios activos</p>
            <p class="text-2xl font-bold text-zinc-900 mt-1">156</p>
          </div>
          <div class="bg-white border border-zinc-200 rounded-xl shadow-sm p-6">
            <p class="text-xs text-zinc-500 uppercase tracking-wide">Entregados hoy</p>
            <p class="text-2xl font-bold text-emerald-600 mt-1">42</p>
          </div>
          <div class="bg-white border border-zinc-200 rounded-xl shadow-sm p-6">
            <p class="text-xs text-zinc-500 uppercase tracking-wide">En transito</p>
            <p class="text-2xl font-bold text-blue-600 mt-1">89</p>
          </div>
          <div class="bg-white border border-zinc-200 rounded-xl shadow-sm p-6 border-rose-200">
            <p class="text-xs text-rose-500 uppercase tracking-wide">Demorados</p>
            <p class="text-2xl font-bold text-rose-600 mt-1">8</p>
          </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">
          <!-- Shipment tracking timeline -->
          <div class="bg-white border border-zinc-200 rounded-xl shadow-sm p-6">
            <h2 class="text-sm font-semibold text-zinc-900 mb-1">Seguimiento #TRK-89234</h2>
            <p class="text-xs text-zinc-500 mb-5">Bogota a Medellin</p>
            <div class="space-y-0">
              <template x-for="(step, i) in trackingSteps" :key="step.label">
                <div class="flex gap-3">
                  <div class="flex flex-col items-center">
                    <div class="w-3 h-3 rounded-full border-2 mt-0.5"
                      :class="step.done ? 'bg-teal-500 border-teal-500' : step.current ? 'bg-white border-teal-500' : 'bg-white border-zinc-300'"></div>
                    <div class="w-px flex-1" :class="step.done || step.current ? 'bg-teal-300' : 'bg-zinc-200'" x-show="i < trackingSteps.length - 1"></div>
                  </div>
                  <div class="pb-5">
                    <p class="text-sm font-medium" :class="step.done || step.current ? 'text-zinc-800' : 'text-zinc-400'" x-text="step.label"></p>
                    <p class="text-xs text-zinc-400" x-text="step.time"></p>
                  </div>
                </div>
              </template>
            </div>
          </div>

          <!-- Shipments table -->
          <div class="lg:col-span-2 bg-white border border-zinc-200 rounded-xl shadow-sm">
            <div class="px-6 py-4 border-b border-zinc-100">
              <h2 class="text-sm font-semibold text-zinc-900">Envios recientes</h2>
            </div>
            <div class="overflow-x-auto">
              <table class="w-full text-sm">
                <thead>
                  <tr class="border-b border-zinc-100 text-left">
                    <th class="px-6 py-3 text-xs font-medium text-zinc-500 uppercase">Tracking</th>
                    <th class="px-6 py-3 text-xs font-medium text-zinc-500 uppercase">Destino</th>
                    <th class="px-6 py-3 text-xs font-medium text-zinc-500 uppercase">Carrier</th>
                    <th class="px-6 py-3 text-xs font-medium text-zinc-500 uppercase">Estado</th>
                    <th class="px-6 py-3 text-xs font-medium text-zinc-500 uppercase">ETA</th>
                  </tr>
                </thead>
                <tbody>
                  <template x-for="s in shipments" :key="s.tracking">
                    <tr class="border-b border-zinc-50 hover:bg-zinc-50 transition" :class="s.delayed ? 'bg-rose-50/50' : ''">
                      <td class="px-6 py-3 font-mono text-xs font-bold text-zinc-800" x-text="s.tracking"></td>
                      <td class="px-6 py-3 text-zinc-600" x-text="s.destination"></td>
                      <td class="px-6 py-3 text-zinc-600" x-text="s.carrier"></td>
                      <td class="px-6 py-3">
                        <span class="px-2 py-0.5 rounded-full text-xs font-medium"
                          :class="{
                            'bg-emerald-50 text-emerald-700': s.status === 'Entregado',
                            'bg-blue-50 text-blue-700': s.status === 'En transito',
                            'bg-rose-50 text-rose-700': s.status === 'Demorado',
                            'bg-amber-50 text-amber-700': s.status === 'En bodega'
                          }"
                          x-text="s.status"></span>
                      </td>
                      <td class="px-6 py-3 text-xs" :class="s.delayed ? 'text-rose-600 font-medium' : 'text-zinc-500'" x-text="s.eta"></td>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- Delayed alerts -->
        <div class="bg-white border border-rose-200 rounded-xl shadow-sm p-6">
          <h2 class="text-sm font-semibold text-rose-700 mb-4">Alertas: envios demorados</h2>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
            <template x-for="alert in delayedAlerts" :key="alert.tracking">
              <div class="flex items-center justify-between p-3 bg-rose-50 rounded-lg">
                <div>
                  <p class="text-sm font-medium text-zinc-800" x-text="alert.tracking"></p>
                  <p class="text-xs text-zinc-500" x-text="alert.reason"></p>
                </div>
                <span class="text-xs font-medium text-rose-600" x-text="alert.delay"></span>
              </div>
            </template>
          </div>
        </div>
      </main>
    </div>
  </div>

  <style>[x-cloak] { display: none !important; }</style>
  <script>
    function logisticsDashboard() {
      return {
        trackingSteps: [
          { label: 'Recogido en origen', time: '28 Mar, 14:30', done: true },
          { label: 'En centro de distribucion', time: '29 Mar, 08:15', done: true },
          { label: 'En transito a destino', time: '30 Mar, 06:00', current: true },
          { label: 'En reparto local', time: 'Estimado 31 Mar', done: false },
          { label: 'Entregado', time: '', done: false }
        ],
        shipments: [
          { tracking: 'TRK-89234', destination: 'Medellin', carrier: 'Servientrega', status: 'En transito', eta: '31 Mar', delayed: false },
          { tracking: 'TRK-89230', destination: 'Cali', carrier: 'Coordinadora', status: 'Entregado', eta: '30 Mar', delayed: false },
          { tracking: 'TRK-89228', destination: 'Barranquilla', carrier: 'TCC', status: 'Demorado', eta: '29 Mar (+2d)', delayed: true },
          { tracking: 'TRK-89225', destination: 'Cartagena', carrier: 'Envia', status: 'En transito', eta: '1 Abr', delayed: false },
          { tracking: 'TRK-89220', destination: 'Bucaramanga', carrier: 'Servientrega', status: 'En bodega', eta: '31 Mar', delayed: false },
          { tracking: 'TRK-89218', destination: 'Pereira', carrier: 'TCC', status: 'Demorado', eta: '28 Mar (+3d)', delayed: true }
        ],
        delayedAlerts: [
          { tracking: 'TRK-89228', reason: 'Condiciones climaticas adversas', delay: '+2 dias' },
          { tracking: 'TRK-89218', reason: 'Problema en aduana interna', delay: '+3 dias' },
          { tracking: 'TRK-89210', reason: 'Direccion incorrecta - requiere verificacion', delay: '+1 dia' },
          { tracking: 'TRK-89205', reason: 'Vehiculo de reparto averiado', delay: '+1 dia' }
        ]
      };
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
