<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LayoutOS · Llamada Entrante</title>
  <link rel="stylesheet" href="../../../public/css/main.css" />
</head>
<body class="h-full bg-zinc-900 antialiased">
  <div class="h-full flex flex-col items-center justify-center" x-data="incomingCall()">
    <!-- Avatar with ring pulse -->
    <div class="relative mb-8">
      <div class="w-32 h-32 rounded-full bg-emerald-600 flex items-center justify-center text-4xl font-bold text-white relative z-10">
        CL
      </div>
      <!-- Ring animations -->
      <div class="absolute inset-0 rounded-full border-2 border-emerald-400/40 animate-ping"></div>
      <div class="absolute -inset-3 rounded-full border border-emerald-400/20 animate-pulse"></div>
      <div class="absolute -inset-6 rounded-full border border-emerald-400/10 animate-pulse" style="animation-delay: 500ms"></div>
    </div>

    <!-- Name -->
    <h2 class="text-2xl font-bold text-white mb-2">Carlos Lopez</h2>
    <p class="text-sm text-zinc-400 dark:text-zinc-500 mb-2">Llamada entrante</p>
    <p class="text-xs text-zinc-500 dark:text-zinc-400 mb-10">+57 300 123 4567</p>

    <!-- Video toggle -->
    <div class="flex items-center gap-3 mb-10">
      <span class="text-sm text-zinc-400 dark:text-zinc-500">Video</span>
      <button class="w-12 h-7 rounded-full transition relative" :class="videoOn ? 'bg-emerald-500' : 'bg-zinc-700'" @click="videoOn = !videoOn">
        <span class="absolute top-0.5 w-6 h-6 rounded-full bg-white dark:bg-zinc-900 shadow transition-transform"
          :class="videoOn ? 'translate-x-5' : 'translate-x-0.5'"></span>
      </button>
    </div>

    <!-- Accept / Reject -->
    <div class="flex items-center gap-8">
      <button class="flex flex-col items-center gap-2 group">
        <div class="w-16 h-16 rounded-full bg-rose-600 text-white flex items-center justify-center hover:bg-rose-700 transition group-hover:scale-105 transform">
          <svg class="w-7 h-7" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z" transform="rotate(135 12 12)"/></svg>
        </div>
        <span class="text-xs text-zinc-400 dark:text-zinc-500">Rechazar</span>
      </button>
      <button class="flex flex-col items-center gap-2 group">
        <div class="w-16 h-16 rounded-full bg-emerald-600 text-white flex items-center justify-center hover:bg-emerald-700 transition group-hover:scale-105 transform animate-pulse">
          <svg class="w-7 h-7" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        </div>
        <span class="text-xs text-zinc-400 dark:text-zinc-500">Aceptar</span>
      </button>
    </div>
  </div>

  <style>[x-cloak] { display: none !important; }</style>
  <script>
    function incomingCall() {
      return {
        videoOn: true
      };
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
