<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LayoutOS · Taller Automotriz</title>
  <link rel="stylesheet" href="/public/css/main.css" />
</head>
<body class="h-full bg-page antialiased">
  <div class="flex h-full" x-data="carServiceDashboard()">
    <!-- Sidebar -->
    <aside class="w-64 bg-zinc-950 text-zinc-300 h-full overflow-y-auto shrink-0 hidden lg:flex flex-col">
      <div class="px-5 py-4 border-b border-zinc-800">
        <span class="text-sm font-semibold text-white">LayoutOS</span>
        <span class="ml-2 text-xs text-orange-400">Taller</span>
      </div>
      <nav class="flex-1 px-3 py-4 space-y-1">
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm font-medium text-white bg-zinc-800 rounded-lg">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          Panel
        </a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm text-zinc-400 hover:text-white hover:bg-zinc-800/50 rounded-lg transition">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Citas
        </a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm text-zinc-400 hover:text-white hover:bg-zinc-800/50 rounded-lg transition">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          Historial
        </a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm text-zinc-400 hover:text-white hover:bg-zinc-800/50 rounded-lg transition">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
          Clientes
        </a>
      </nav>
    </aside>

    <!-- Main -->
    <div class="flex-1 flex flex-col overflow-hidden">
      <header class="h-14 bg-white border-b border-zinc-200 flex items-center justify-between px-6 shrink-0">
        <h1 class="text-sm font-semibold text-zinc-900">Taller Automotriz</h1>
        <div class="flex items-center gap-3">
          <button class="btn-sm btn-primary">Nueva cita</button>
        </div>
      </header>

      <main class="flex-1 overflow-y-auto p-6">
        <!-- KPIs -->
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
          <div class="bg-white border border-zinc-200 rounded-xl shadow-sm p-6">
            <p class="text-xs text-zinc-500 uppercase tracking-wide">Vehiculos hoy</p>
            <p class="text-2xl font-bold text-zinc-900 mt-1">12</p>
          </div>
          <div class="bg-white border border-zinc-200 rounded-xl shadow-sm p-6">
            <p class="text-xs text-zinc-500 uppercase tracking-wide">En servicio</p>
            <p class="text-2xl font-bold text-blue-600 mt-1">5</p>
          </div>
          <div class="bg-white border border-zinc-200 rounded-xl shadow-sm p-6">
            <p class="text-xs text-zinc-500 uppercase tracking-wide">Completados</p>
            <p class="text-2xl font-bold text-emerald-600 mt-1">7</p>
          </div>
          <div class="bg-white border border-zinc-200 rounded-xl shadow-sm p-6">
            <p class="text-xs text-zinc-500 uppercase tracking-wide">Pendientes cita</p>
            <p class="text-2xl font-bold text-amber-600 mt-1">3</p>
          </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
          <!-- Stepper -->
          <div class="bg-white border border-zinc-200 rounded-xl shadow-sm p-6">
            <h2 class="text-sm font-semibold text-zinc-900 mb-1">Estado del vehiculo</h2>
            <p class="text-xs text-zinc-500 mb-5">Toyota Corolla 2023 - ABC-123</p>
            <div class="flex items-center gap-2">
              <template x-for="(step, i) in vehicleSteps" :key="step.label">
                <div class="flex items-center gap-2" :class="i < vehicleSteps.length - 1 ? 'flex-1' : ''">
                  <div class="flex flex-col items-center">
                    <div class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold border-2 transition"
                      :class="i <= currentStep ? 'bg-emerald-500 border-emerald-500 text-white' : 'bg-white border-zinc-300 text-zinc-400'"
                      x-text="i + 1"></div>
                    <span class="text-xs mt-1.5 text-center" :class="i <= currentStep ? 'text-emerald-700 font-medium' : 'text-zinc-400'" x-text="step.label"></span>
                  </div>
                  <div class="flex-1 h-0.5 mt-[-1rem]" :class="i < currentStep ? 'bg-emerald-500' : 'bg-zinc-200'" x-show="i < vehicleSteps.length - 1"></div>
                </div>
              </template>
            </div>
          </div>

          <!-- Mini calendar -->
          <div class="bg-white border border-zinc-200 rounded-xl shadow-sm p-6">
            <h2 class="text-sm font-semibold text-zinc-900 mb-4">Citas del dia</h2>
            <div class="space-y-3">
              <template x-for="appt in appointments" :key="appt.time">
                <div class="flex items-center gap-3 p-3 rounded-lg border border-zinc-100">
                  <div class="text-center min-w-fit">
                    <p class="text-sm font-bold text-zinc-900" x-text="appt.time"></p>
                  </div>
                  <div class="w-px h-8 bg-zinc-200"></div>
                  <div class="flex-1">
                    <p class="text-sm text-zinc-800 font-medium" x-text="appt.client"></p>
                    <p class="text-xs text-zinc-500" x-text="appt.service"></p>
                  </div>
                  <span class="px-2 py-0.5 rounded-full text-xs font-medium"
                    :class="appt.confirmed ? 'bg-emerald-50 text-emerald-700' : 'bg-amber-50 text-amber-700'"
                    x-text="appt.confirmed ? 'Confirmada' : 'Pendiente'"></span>
                </div>
              </template>
            </div>
          </div>
        </div>

        <!-- Vehicles in service -->
        <div class="bg-white border border-zinc-200 rounded-xl shadow-sm">
          <div class="px-6 py-4 border-b border-zinc-100">
            <h2 class="text-sm font-semibold text-zinc-900">Vehiculos en servicio</h2>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead>
                <tr class="border-b border-zinc-100 text-left">
                  <th class="px-6 py-3 text-xs font-medium text-zinc-500 uppercase">Placa</th>
                  <th class="px-6 py-3 text-xs font-medium text-zinc-500 uppercase">Modelo</th>
                  <th class="px-6 py-3 text-xs font-medium text-zinc-500 uppercase">Servicio</th>
                  <th class="px-6 py-3 text-xs font-medium text-zinc-500 uppercase">Estado</th>
                  <th class="px-6 py-3 text-xs font-medium text-zinc-500 uppercase">Mecanico</th>
                </tr>
              </thead>
              <tbody>
                <template x-for="v in vehicles" :key="v.plate">
                  <tr class="border-b border-zinc-50 hover:bg-zinc-50 transition">
                    <td class="px-6 py-3 font-mono text-xs font-bold text-zinc-800" x-text="v.plate"></td>
                    <td class="px-6 py-3 text-zinc-700" x-text="v.model"></td>
                    <td class="px-6 py-3 text-zinc-600" x-text="v.service"></td>
                    <td class="px-6 py-3">
                      <span class="px-2 py-0.5 rounded-full text-xs font-medium"
                        :class="{
                          'bg-blue-50 text-blue-700': v.status === 'Diagnostico',
                          'bg-amber-50 text-amber-700': v.status === 'En reparacion',
                          'bg-emerald-50 text-emerald-700': v.status === 'Listo',
                          'bg-zinc-100 text-zinc-600': v.status === 'Esperando piezas'
                        }"
                        x-text="v.status"></span>
                    </td>
                    <td class="px-6 py-3 text-zinc-600" x-text="v.mechanic"></td>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>
        </div>
        <!-- Estado de vehículos -->
        <div class="bg-white rounded-xl border border-zinc-200 p-5 mt-6">
          <h3 class="text-sm font-semibold text-zinc-900 mb-4">Progreso del día</h3>
          <div x-ref="chart" x-init="initChart()" class="w-full h-56"></div>
        </div>
      </main>
    </div>
  </div>

  <style>[x-cloak] { display: none !important; }</style>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <script>
    function carServiceDashboard() {
      return {
        currentStep: 2,
        vehicleSteps: [
          { label: 'Recibido' },
          { label: 'Diagnostico' },
          { label: 'Reparacion' },
          { label: 'Listo' }
        ],
        appointments: [
          { time: '08:30', client: 'Roberto Mendez', service: 'Cambio de aceite', confirmed: true },
          { time: '10:00', client: 'Lucia Fernandez', service: 'Revision frenos', confirmed: true },
          { time: '11:30', client: 'Carlos Paredes', service: 'Alineacion', confirmed: false },
          { time: '14:00', client: 'Ana Bermudez', service: 'Diagnostico general', confirmed: true },
          { time: '16:00', client: 'Diego Salazar', service: 'Cambio de bateria', confirmed: false }
        ],
        _resizeHandler: null,
        initChart() {
          this.$refs.chart._ec = echarts.init(this.$refs.chart);
          this.renderChart();
          this._resizeHandler = () => this.$refs.chart._ec.resize();
          window.addEventListener('resize', this._resizeHandler);
        },
        renderChart() {
          var completed = this.vehicles.filter(function(v) { return v.status === 'Listo'; }).length;
          var total = this.vehicles.length;
          var pct = Math.round((completed / total) * 100);
          this.$refs.chart._ec.setOption({
            series: [{
              type: 'gauge',
              center: ['50%', '60%'],
              startAngle: 210,
              endAngle: -30,
              min: 0,
              max: 100,
              progress: { show: true, width: 18, roundCap: true, itemStyle: { color: '#10b981' } },
              axisLine: { lineStyle: { width: 18, color: [[1, '#f4f4f5']] }, roundCap: true },
              axisTick: { show: false },
              splitLine: { show: false },
              axisLabel: { show: false },
              pointer: { show: false },
              anchor: { show: false },
              title: { show: false },
              detail: {
                valueAnimation: true,
                fontSize: 22,
                fontWeight: 'bold',
                color: '#10b981',
                offsetCenter: [0, 0],
                formatter: function(v) { return v + '%\n{sub|' + completed + ' de ' + total + ' completados}'; },
                rich: { sub: { fontSize: 11, color: '#71717a', lineHeight: 24 } }
              },
              data: [{ value: pct }]
            }]
          });
        },
        vehicles: [
          { plate: 'ABC-123', model: 'Toyota Corolla 2023', service: 'Cambio de aceite y filtros', status: 'En reparacion', mechanic: 'Juan Perez' },
          { plate: 'DEF-456', model: 'Honda Civic 2022', service: 'Revision frenos', status: 'Diagnostico', mechanic: 'Miguel Torres' },
          { plate: 'GHI-789', model: 'Nissan Sentra 2021', service: 'Suspension delantera', status: 'Esperando piezas', mechanic: 'Juan Perez' },
          { plate: 'JKL-012', model: 'Mazda 3 2024', service: 'Alineacion y balanceo', status: 'Listo', mechanic: 'Carlos Rios' },
          { plate: 'MNO-345', model: 'Hyundai Elantra 2023', service: 'Cambio de bateria', status: 'En reparacion', mechanic: 'Miguel Torres' }
        ]
      };
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
