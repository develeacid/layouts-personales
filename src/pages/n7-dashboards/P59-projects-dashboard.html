<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LayoutOS · Projects Dashboard</title>
  <link rel="stylesheet" href="../../../public/css/main.css" />
</head>
<body class="h-full bg-page antialiased">
  <div class="flex h-full" x-data="projectsDashboard()">
    <!-- Sidebar -->
    <aside class="w-64 bg-zinc-950 dark:bg-zinc-800 text-zinc-300 h-full overflow-y-auto shrink-0 hidden lg:flex flex-col">
      <div class="px-5 py-4 border-b border-zinc-800">
        <span class="text-sm font-semibold text-white">LayoutOS</span>
        <span class="ml-2 text-xs text-indigo-400">Projects</span>
      </div>
      <nav class="flex-1 px-3 py-4 space-y-1">
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm font-medium text-white bg-zinc-800 rounded-lg">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          Dashboard
        </a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm text-zinc-400 dark:text-zinc-500 hover:text-white hover:bg-zinc-800/50 rounded-lg transition">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
          Proyectos
        </a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm text-zinc-400 dark:text-zinc-500 hover:text-white hover:bg-zinc-800/50 rounded-lg transition">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Equipo
        </a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm text-zinc-400 dark:text-zinc-500 hover:text-white hover:bg-zinc-800/50 rounded-lg transition">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Calendario
        </a>
      </nav>
    </aside>

    <!-- Main -->
    <div class="flex-1 flex flex-col overflow-hidden">
      <header class="h-14 bg-white dark:bg-zinc-900 border-b border-zinc-200 dark:border-zinc-800 flex items-center justify-between px-4 sm:px-6 shrink-0">
        <h1 class="text-sm font-semibold text-zinc-900 dark:text-zinc-100">Gestion de Proyectos</h1>
        <div class="flex items-center gap-3">
          <button class="btn-sm btn-primary">Nuevo proyecto</button>
        </div>
      </header>

      <main class="flex-1 overflow-y-auto p-6">
        <!-- KPIs -->
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
          <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl shadow-sm p-6">
            <p class="text-xs text-zinc-500 dark:text-zinc-400 uppercase tracking-wide">Proyectos activos</p>
            <p class="text-2xl font-bold text-zinc-900 dark:text-zinc-100 mt-1">8</p>
          </div>
          <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl shadow-sm p-6">
            <p class="text-xs text-zinc-500 dark:text-zinc-400 uppercase tracking-wide">Tareas pendientes</p>
            <p class="text-2xl font-bold text-amber-600 mt-1">34</p>
          </div>
          <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl shadow-sm p-6">
            <p class="text-xs text-zinc-500 dark:text-zinc-400 uppercase tracking-wide">Completadas semana</p>
            <p class="text-2xl font-bold text-emerald-600 mt-1">12</p>
          </div>
          <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl shadow-sm p-6">
            <p class="text-xs text-zinc-500 dark:text-zinc-400 uppercase tracking-wide">Equipo</p>
            <p class="text-2xl font-bold text-indigo-600 mt-1">6</p>
          </div>
        </div>

        <!-- Kanban -->
        <div class="mb-6">
          <h2 class="text-sm font-semibold text-zinc-900 dark:text-zinc-100 mb-4">Tablero Kanban</h2>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <template x-for="col in kanbanCols" :key="col.title">
              <div class="bg-zinc-50 dark:bg-zinc-800 rounded-xl p-4">
                <div class="flex items-center justify-between mb-3">
                  <h3 class="text-xs font-semibold uppercase tracking-wide" :class="col.titleColor" x-text="col.title"></h3>
                  <span class="text-xs text-zinc-400 dark:text-zinc-500 bg-white dark:bg-zinc-900 rounded-full px-2 py-0.5" x-text="col.cards.length"></span>
                </div>
                <div class="space-y-3">
                  <template x-for="card in col.cards" :key="card.title">
                    <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-lg p-3 shadow-sm">
                      <p class="text-sm font-medium text-zinc-800 dark:text-zinc-200" x-text="card.title"></p>
                      <div class="flex items-center justify-between mt-2">
                        <span class="px-2 py-0.5 rounded text-xs font-medium" :class="card.tagColor" x-text="card.tag"></span>
                        <div class="w-6 h-6 rounded-full flex items-center justify-center text-xs font-medium text-white" :class="card.avatarBg" x-text="card.assignee"></div>
                      </div>
                    </div>
                  </template>
                </div>
              </div>
            </template>
          </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
          <!-- Milestones stepper -->
          <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl shadow-sm p-6">
            <h2 class="text-sm font-semibold text-zinc-900 dark:text-zinc-100 mb-1">Proyecto: Rediseno Web</h2>
            <p class="text-xs text-zinc-500 dark:text-zinc-400 mb-5">Milestones</p>
            <div class="space-y-0">
              <template x-for="(ms, i) in milestones" :key="ms.label">
                <div class="flex gap-3">
                  <div class="flex flex-col items-center">
                    <div class="w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold border-2"
                      :class="ms.done ? 'bg-indigo-500 border-indigo-500 text-white' : ms.current ? 'bg-white dark:bg-zinc-900 border-indigo-500 text-indigo-500' : 'bg-white dark:bg-zinc-900 border-zinc-300 dark:border-zinc-700 text-zinc-400 dark:text-zinc-500'">
                      <span x-show="ms.done">&#10003;</span>
                      <span x-show="!ms.done" x-text="i + 1"></span>
                    </div>
                    <div class="w-px flex-1" :class="ms.done ? 'bg-indigo-400' : 'bg-zinc-200 dark:bg-zinc-700'" x-show="i < milestones.length - 1"></div>
                  </div>
                  <div class="pb-5">
                    <p class="text-sm font-medium" :class="ms.done || ms.current ? 'text-zinc-800 dark:text-zinc-200' : 'text-zinc-400'" x-text="ms.label"></p>
                    <p class="text-xs text-zinc-400 dark:text-zinc-500" x-text="ms.date"></p>
                  </div>
                </div>
              </template>
            </div>
          </div>

          <!-- Team activity + mini calendar -->
          <div class="space-y-6">
            <!-- Team activity -->
            <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl shadow-sm p-6">
              <h2 class="text-sm font-semibold text-zinc-900 dark:text-zinc-100 mb-4">Actividad del equipo</h2>
              <div class="space-y-3">
                <template x-for="act in teamActivity" :key="act.text">
                  <div class="flex items-start gap-3">
                    <div class="w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold text-white mt-0.5" :class="act.bg" x-text="act.initials"></div>
                    <div>
                      <p class="text-sm text-zinc-700 dark:text-zinc-300" x-text="act.text"></p>
                      <p class="text-xs text-zinc-400 dark:text-zinc-500" x-text="act.time"></p>
                    </div>
                  </div>
                </template>
              </div>
            </div>

            <!-- Mini calendar deadlines -->
            <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl shadow-sm p-6">
              <h2 class="text-sm font-semibold text-zinc-900 dark:text-zinc-100 mb-4">Proximas deadlines</h2>
              <div class="space-y-2">
                <template x-for="dl in deadlines" :key="dl.task">
                  <div class="flex items-center justify-between p-2.5 rounded-lg border border-zinc-100 dark:border-zinc-800">
                    <div>
                      <p class="text-sm text-zinc-800 dark:text-zinc-200" x-text="dl.task"></p>
                      <p class="text-xs text-zinc-400 dark:text-zinc-500" x-text="dl.project"></p>
                    </div>
                    <span class="text-xs font-medium px-2 py-0.5 rounded-full" :class="dl.urgent ? 'bg-rose-50 dark:bg-rose-950 text-rose-600 dark:text-rose-400' : 'bg-zinc-100 dark:bg-zinc-800 text-zinc-600 dark:text-zinc-400'" x-text="dl.date"></span>
                  </div>
                </template>
              </div>
            </div>
          </div>
        </div>

        <!-- Progreso de milestones -->
        <div class="bg-white dark:bg-zinc-900 rounded-xl border border-zinc-200 dark:border-zinc-800 p-5 mt-6">
          <h3 class="text-sm font-semibold text-zinc-900 dark:text-zinc-100 mb-4">Progreso de milestones</h3>
          <div x-ref="chart" x-init="initChart()" class="w-full h-56"></div>
        </div>
      </main>
    </div>
  </div>

  <style>[x-cloak] { display: none !important; }</style>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <script>
    function projectsDashboard() {
      return {
        kanbanCols: [
          {
            title: 'Por hacer',
            titleColor: 'text-zinc-500 dark:text-zinc-400',
            cards: [
              { title: 'Disenar landing page', tag: 'Diseno', tagColor: 'bg-pink-100 dark:bg-pink-900 text-pink-600 dark:text-pink-400', assignee: 'ML', avatarBg: 'bg-pink-500' },
              { title: 'Configurar CI/CD', tag: 'DevOps', tagColor: 'bg-cyan-100 dark:bg-cyan-900 text-cyan-600 dark:text-cyan-400', assignee: 'JR', avatarBg: 'bg-cyan-500' },
              { title: 'Escribir tests E2E', tag: 'QA', tagColor: 'bg-amber-100 dark:bg-amber-900 text-amber-600 dark:text-amber-400', assignee: 'SC', avatarBg: 'bg-amber-500' }
            ]
          },
          {
            title: 'En progreso',
            titleColor: 'text-blue-600',
            cards: [
              { title: 'API de autenticacion', tag: 'Backend', tagColor: 'bg-violet-100 dark:bg-violet-900 text-violet-600 dark:text-violet-400', assignee: 'AP', avatarBg: 'bg-violet-500' },
              { title: 'Dashboard de metricas', tag: 'Frontend', tagColor: 'bg-blue-100 dark:bg-blue-900 text-blue-600 dark:text-blue-400', assignee: 'LG', avatarBg: 'bg-blue-500' }
            ]
          },
          {
            title: 'Completado',
            titleColor: 'text-emerald-600',
            cards: [
              { title: 'Setup base de datos', tag: 'Backend', tagColor: 'bg-violet-100 dark:bg-violet-900 text-violet-600 dark:text-violet-400', assignee: 'AP', avatarBg: 'bg-violet-500' },
              { title: 'Wireframes aprobados', tag: 'Diseno', tagColor: 'bg-pink-100 dark:bg-pink-900 text-pink-600 dark:text-pink-400', assignee: 'ML', avatarBg: 'bg-pink-500' }
            ]
          }
        ],
        milestones: [
          { label: 'Kickoff y planificacion', date: '1 Mar 2026', done: true },
          { label: 'Diseno UI/UX completo', date: '15 Mar 2026', done: true },
          { label: 'Desarrollo MVP', date: '31 Mar 2026', current: true },
          { label: 'Testing y QA', date: '15 Abr 2026', done: false },
          { label: 'Lanzamiento', date: '30 Abr 2026', done: false }
        ],
        teamActivity: [
          { initials: 'AP', bg: 'bg-violet-500', text: 'Andres completo la API de login', time: 'Hace 20 min' },
          { initials: 'ML', bg: 'bg-pink-500', text: 'Maria subio los mockups finales', time: 'Hace 1h' },
          { initials: 'LG', bg: 'bg-blue-500', text: 'Luis creo 3 componentes nuevos', time: 'Hace 2h' },
          { initials: 'JR', bg: 'bg-cyan-500', text: 'Jorge configuro el staging server', time: 'Hace 3h' }
        ],
        _resizeHandler: null,
        initChart() {
          this.$refs.chart._ec = echarts.init(this.$refs.chart);
          this.renderChart();
          this._resizeHandler = () => this.$refs.chart._ec.resize();
          window.addEventListener('resize', this._resizeHandler);
        },
        renderChart() {
          var ms = this.milestones.slice().reverse();
          var data = ms.map(function(m) {
            return m.done ? 100 : (m.current ? 60 : 0);
          });
          var colors = ms.map(function(m) {
            return m.done ? '#10b981' : (m.current ? '#3b82f6' : '#e4e4e7');
          });
          this.$refs.chart._ec.setOption({
            tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
            grid: { left: 160, right: 30, top: 10, bottom: 20 },
            yAxis: { type: 'category', data: ms.map(function(m) { return m.label; }) },
            xAxis: { type: 'value', max: 100, axisLabel: { formatter: '{value}%' } },
            series: [{
              data: data.map(function(v, i) { return { value: v, itemStyle: { color: colors[i], borderRadius: [0, 4, 4, 0] } }; }),
              type: 'bar',
              label: { show: true, position: 'right', formatter: function(p) { return p.value > 0 ? p.value + '%' : ''; }, fontSize: 11, color: '#374151' }
            }]
          });
        },
        deadlines: [
          { task: 'Entrega MVP', project: 'Rediseno Web', date: '31 Mar', urgent: true },
          { task: 'Review de codigo', project: 'API v2', date: '2 Abr', urgent: false },
          { task: 'Presentacion cliente', project: 'App Movil', date: '5 Abr', urgent: false },
          { task: 'Sprint retrospectiva', project: 'General', date: '7 Abr', urgent: false }
        ]
      };
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
