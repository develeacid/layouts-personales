<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LayoutOS · C15 Headers</title>
  <link rel="stylesheet" href="/public/css/main.css" />
</head>
<body class="h-full bg-page antialiased">

  <div class="space-y-16 py-16">

    <div class="max-w-5xl mx-auto px-6">
      <p class="text-xs font-medium uppercase tracking-wide text-zinc-400">C15 · Nivel 2</p>
      <h1 class="text-2xl font-semibold tracking-tight text-zinc-900 mt-1">Headers</h1>
      <p class="text-sm text-zinc-600 mt-1">Navbar estática: logo, links, botón.</p>
    </div>

    <!-- Variante 1: Simple -->
    <section class="space-y-3 max-w-5xl mx-auto px-6">
      <h2 class="text-xs font-medium uppercase tracking-wide text-zinc-400">Simple</h2>
      <nav class="bg-white border border-zinc-200 rounded-xl px-6 h-14 flex items-center justify-between">
        <span class="text-sm font-semibold text-zinc-900 tracking-tight">LayoutOS</span>
        <div class="hidden sm:flex items-center gap-6">
          <a href="#" class="text-sm text-zinc-600 hover:text-zinc-900 transition-colors duration-150">Producto</a>
          <a href="#" class="text-sm text-zinc-600 hover:text-zinc-900 transition-colors duration-150">Precios</a>
          <a href="#" class="text-sm text-zinc-600 hover:text-zinc-900 transition-colors duration-150">Docs</a>
          <a href="#" class="text-sm text-zinc-600 hover:text-zinc-900 transition-colors duration-150">Blog</a>
        </div>
        <div class="flex items-center gap-2">
          <button class="btn-ghost text-xs">Iniciar sesión</button>
          <button class="btn-primary text-xs">Registrarse</button>
        </div>
      </nav>
    </section>

    <!-- Variante 2: Con borde inferior -->
    <section class="space-y-3 max-w-5xl mx-auto px-6">
      <h2 class="text-xs font-medium uppercase tracking-wide text-zinc-400">Con borde inferior</h2>
      <nav class="bg-white border-b border-zinc-200 px-6 h-14 flex items-center justify-between">
        <div class="flex items-center gap-8">
          <span class="text-sm font-semibold text-zinc-900 tracking-tight">LayoutOS</span>
          <div class="hidden sm:flex items-center gap-1">
            <a href="#" class="text-sm text-zinc-900 font-medium px-3 py-1.5 rounded-lg bg-zinc-100">Dashboard</a>
            <a href="#" class="text-sm text-zinc-600 hover:text-zinc-900 px-3 py-1.5 rounded-lg hover:bg-zinc-50 transition-colors duration-150">Proyectos</a>
            <a href="#" class="text-sm text-zinc-600 hover:text-zinc-900 px-3 py-1.5 rounded-lg hover:bg-zinc-50 transition-colors duration-150">Equipo</a>
            <a href="#" class="text-sm text-zinc-600 hover:text-zinc-900 px-3 py-1.5 rounded-lg hover:bg-zinc-50 transition-colors duration-150">Settings</a>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <button class="w-8 h-8 flex items-center justify-center rounded-lg text-zinc-400 hover:bg-zinc-100 hover:text-zinc-600 transition-colors duration-150 cursor-pointer">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" /></svg>
          </button>
          <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center text-xs font-semibold text-blue-700">JD</div>
        </div>
      </nav>
    </section>

    <!-- Variante 3: Dark -->
    <section class="space-y-3 max-w-5xl mx-auto px-6">
      <h2 class="text-xs font-medium uppercase tracking-wide text-zinc-400">Dark</h2>
      <nav class="bg-zinc-950 rounded-xl px-6 h-14 flex items-center justify-between">
        <div class="flex items-center gap-8">
          <span class="text-sm font-semibold text-white tracking-tight">LayoutOS</span>
          <div class="hidden sm:flex items-center gap-6">
            <a href="#" class="text-sm text-zinc-400 hover:text-white transition-colors duration-150">Producto</a>
            <a href="#" class="text-sm text-zinc-400 hover:text-white transition-colors duration-150">Recursos</a>
            <a href="#" class="text-sm text-zinc-400 hover:text-white transition-colors duration-150">Precios</a>
            <a href="#" class="text-sm text-zinc-400 hover:text-white transition-colors duration-150">Contacto</a>
          </div>
        </div>
        <div class="flex items-center gap-2">
          <button class="text-sm text-zinc-400 hover:text-white px-3 py-1.5 transition-colors duration-150 cursor-pointer">Login</button>
          <button class="btn-primary text-xs">Comenzar</button>
        </div>
      </nav>
    </section>

    <!-- Variante 4: Centrada -->
    <section class="space-y-3 max-w-5xl mx-auto px-6">
      <h2 class="text-xs font-medium uppercase tracking-wide text-zinc-400">Centrada</h2>
      <nav class="bg-white border border-zinc-200 rounded-xl px-6 h-14 flex items-center justify-center gap-8">
        <button class="btn-ghost text-xs">Login</button>
        <a href="#" class="text-sm text-zinc-600 hover:text-zinc-900 transition-colors duration-150">Producto</a>
        <a href="#" class="text-sm text-zinc-600 hover:text-zinc-900 transition-colors duration-150">Precios</a>
        <span class="text-sm font-semibold text-zinc-900 tracking-tight">LayoutOS</span>
        <a href="#" class="text-sm text-zinc-600 hover:text-zinc-900 transition-colors duration-150">Blog</a>
        <a href="#" class="text-sm text-zinc-600 hover:text-zinc-900 transition-colors duration-150">Contacto</a>
        <button class="btn-primary text-xs">Registrarse</button>
      </nav>
    </section>

  </div>

</body>
</html>
