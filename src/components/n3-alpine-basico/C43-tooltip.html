<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LayoutOS · C43 Tooltip</title>
  <link rel="stylesheet" href="/public/css/main.css" />
</head>
<body class="h-full bg-page antialiased">

  <div class="max-w-3xl mx-auto px-6 py-16 space-y-16">

    <header>
      <p class="text-xs font-medium uppercase tracking-wide text-zinc-400">C43 · Nivel 3</p>
      <h1 class="text-2xl font-semibold tracking-tight text-zinc-900 mt-1">Tooltip</h1>
      <p class="text-sm text-zinc-600 mt-1">Hover tooltip: posición, delay, contenido.</p>
    </header>

    <!-- Tooltips -->
    <section class="space-y-8">
      <h2 class="text-xs font-medium uppercase tracking-wide text-zinc-400">Posiciones</h2>
      <div class="flex flex-wrap items-center gap-6">
        <!-- Top -->
        <div class="relative" x-data="{ show: false }">
          <button @mouseenter="show = true" @mouseleave="show = false" class="btn-secondary text-xs">Top</button>
          <div x-show="show" x-transition:enter="transition ease-out duration-150" x-transition:enter-start="opacity-0 translate-y-1" x-transition:enter-end="opacity-100 translate-y-0"
            x-transition:leave="transition ease-in duration-100" x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
            class="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 px-3 py-1.5 bg-zinc-900 text-white text-xs rounded-lg whitespace-nowrap pointer-events-none">
            Tooltip arriba
            <div class="absolute top-full left-1/2 -translate-x-1/2 -mt-1 w-2 h-2 bg-zinc-900 rotate-45"></div>
          </div>
        </div>
        <!-- Bottom -->
        <div class="relative" x-data="{ show: false }">
          <button @mouseenter="show = true" @mouseleave="show = false" class="btn-secondary text-xs">Bottom</button>
          <div x-show="show" x-transition:enter="transition ease-out duration-150" x-transition:enter-start="opacity-0 -translate-y-1" x-transition:enter-end="opacity-100 translate-y-0"
            x-transition:leave="transition ease-in duration-100" x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
            class="absolute top-full left-1/2 -translate-x-1/2 mt-2 px-3 py-1.5 bg-zinc-900 text-white text-xs rounded-lg whitespace-nowrap pointer-events-none">
            Tooltip abajo
            <div class="absolute bottom-full left-1/2 -translate-x-1/2 mt-1 w-2 h-2 bg-zinc-900 rotate-45"></div>
          </div>
        </div>
        <!-- Left -->
        <div class="relative" x-data="{ show: false }">
          <button @mouseenter="show = true" @mouseleave="show = false" class="btn-secondary text-xs">Left</button>
          <div x-show="show" x-transition:enter="transition ease-out duration-150" x-transition:enter-start="opacity-0 translate-x-1" x-transition:enter-end="opacity-100 translate-x-0"
            x-transition:leave="transition ease-in duration-100" x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
            class="absolute right-full top-1/2 -translate-y-1/2 mr-2 px-3 py-1.5 bg-zinc-900 text-white text-xs rounded-lg whitespace-nowrap pointer-events-none">
            Tooltip izquierda
          </div>
        </div>
        <!-- Right -->
        <div class="relative" x-data="{ show: false }">
          <button @mouseenter="show = true" @mouseleave="show = false" class="btn-secondary text-xs">Right</button>
          <div x-show="show" x-transition:enter="transition ease-out duration-150" x-transition:enter-start="opacity-0 -translate-x-1" x-transition:enter-end="opacity-100 translate-x-0"
            x-transition:leave="transition ease-in duration-100" x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
            class="absolute left-full top-1/2 -translate-y-1/2 ml-2 px-3 py-1.5 bg-zinc-900 text-white text-xs rounded-lg whitespace-nowrap pointer-events-none">
            Tooltip derecha
          </div>
        </div>
      </div>

      <!-- En contexto -->
      <h2 class="text-xs font-medium uppercase tracking-wide text-zinc-400">En contexto</h2>
      <div class="flex items-center gap-3">
        <div class="relative" x-data="{ show: false }">
          <button @mouseenter="show = true" @mouseleave="show = false" class="w-8 h-8 flex items-center justify-center rounded-lg text-zinc-400 hover:bg-zinc-100 hover:text-zinc-600 transition-colors duration-150 cursor-pointer">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>
          </button>
          <div x-show="show" x-transition class="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 px-2.5 py-1 bg-zinc-900 text-white text-xs rounded-lg whitespace-nowrap pointer-events-none">Editar</div>
        </div>
        <div class="relative" x-data="{ show: false }">
          <button @mouseenter="show = true" @mouseleave="show = false" class="w-8 h-8 flex items-center justify-center rounded-lg text-zinc-400 hover:bg-zinc-100 hover:text-zinc-600 transition-colors duration-150 cursor-pointer">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z" /></svg>
          </button>
          <div x-show="show" x-transition class="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 px-2.5 py-1 bg-zinc-900 text-white text-xs rounded-lg whitespace-nowrap pointer-events-none">Compartir</div>
        </div>
        <div class="relative" x-data="{ show: false }">
          <button @mouseenter="show = true" @mouseleave="show = false" class="w-8 h-8 flex items-center justify-center rounded-lg text-rose-400 hover:bg-rose-50 hover:text-rose-600 transition-colors duration-150 cursor-pointer">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
          </button>
          <div x-show="show" x-transition class="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 px-2.5 py-1 bg-zinc-900 text-white text-xs rounded-lg whitespace-nowrap pointer-events-none">Eliminar</div>
        </div>
      </div>
    </section>

  </div>

  <style>[x-cloak] { display: none !important; }</style>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
