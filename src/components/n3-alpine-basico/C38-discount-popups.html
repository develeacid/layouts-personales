<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LayoutOS · C38 Discount Popups</title>
  <link rel="stylesheet" href="/public/css/main.css" />
</head>
<body class="h-full bg-page antialiased">

  <div class="max-w-3xl mx-auto px-4 sm:px-6 py-16 space-y-16">

    <header>
      <p class="text-xs font-medium uppercase tracking-wide text-zinc-400 dark:text-zinc-500">C38 · Nivel 3</p>
      <h1 class="text-2xl font-semibold tracking-tight text-zinc-900 dark:text-zinc-100 mt-1">Discount Popups</h1>
      <p class="text-sm text-zinc-600 dark:text-zinc-400 mt-1">Popup con delay, cierre y localStorage guard.</p>
    </header>

    <p class="text-sm text-zinc-600 dark:text-zinc-400">El popup aparece automáticamente después de 2 segundos (solo una vez gracias a localStorage).</p>
  </div>

  <!-- Popup con delay -->
  <div
    x-data="{
      show: false,
      init() {
        if (!localStorage.getItem('discountSeen')) {
          setTimeout(() => this.show = true, 2000);
        }
      },
      dismiss() {
        this.show = false;
        localStorage.setItem('discountSeen', 'true');
      }
    }"
  >
    <template x-teleport="body">
      <div x-show="show" x-cloak class="fixed inset-0 z-modal flex items-center justify-center p-4">
        <div x-show="show"
          x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
          x-transition:leave="transition ease-in duration-200" x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
          class="fixed inset-0 bg-zinc-950/50" @click="dismiss()"></div>
        <div x-show="show"
          x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 scale-95 translate-y-4" x-transition:enter-end="opacity-100 scale-100 translate-y-0"
          x-transition:leave="transition ease-in duration-200" x-transition:leave-start="opacity-100 scale-100" x-transition:leave-end="opacity-0 scale-95"
          class="relative bg-white dark:bg-zinc-900 rounded-xl shadow-xl max-w-sm w-full overflow-hidden" @keydown.escape.window="dismiss()">
          <div class="bg-gradient-to-br from-blue-600 to-blue-700 px-6 py-8 text-center">
            <p class="text-4xl font-bold text-white">20% OFF</p>
            <p class="text-sm text-blue-100 mt-2">En tu primera compra</p>
          </div>
          <div class="p-6 space-y-4 text-center">
            <p class="text-sm text-zinc-600 dark:text-zinc-400">Usa el código <span class="font-mono font-semibold text-zinc-900 dark:text-zinc-100 bg-zinc-100 dark:bg-zinc-800 px-2 py-0.5 rounded">LAYOUT20</span> en el checkout.</p>
            <form class="flex gap-2">
              <input class="input" type="email" placeholder="tu@email.com" />
              <button @click.prevent="dismiss()" class="btn-primary shrink-0">Obtener</button>
            </form>
            <button @click="dismiss()" class="text-xs text-zinc-400 dark:text-zinc-500 hover:text-zinc-600 cursor-pointer transition-colors duration-150">No, gracias</button>
          </div>
        </div>
      </div>
    </template>
  </div>

  <style>[x-cloak] { display: none !important; }</style>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
