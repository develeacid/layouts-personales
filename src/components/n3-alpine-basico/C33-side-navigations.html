<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LayoutOS · C33 Side Navigations</title>
  <link rel="stylesheet" href="../../../public/css/main.css" />
</head>
<body class="h-full bg-page antialiased">

  <div class="flex h-full" x-data="{ collapsed: false, active: 'dashboard', submenuOpen: false }">

    <!-- Sidebar dark -->
    <aside
      class="h-full bg-zinc-950 dark:bg-zinc-800 flex flex-col transition-all duration-300 overflow-hidden shrink-0"
      :class="collapsed ? 'w-16' : 'w-64'"
    >
      <!-- Logo -->
      <div class="px-4 py-4 flex items-center justify-between">
        <span class="text-white font-semibold text-sm tracking-tight whitespace-nowrap" x-show="!collapsed" x-transition>LayoutOS</span>
        <button
          @click="collapsed = !collapsed"
          class="w-8 h-8 flex items-center justify-center rounded-lg text-zinc-400 dark:text-zinc-500 hover:bg-zinc-800 hover:text-white transition-colors duration-150 cursor-pointer shrink-0"
        >
          <svg class="w-5 h-5 transition-transform duration-300" :class="collapsed && 'rotate-180'" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M11 19l-7-7 7-7m8 14l-7-7 7-7" /></svg>
        </button>
      </div>

      <!-- Nav -->
      <nav class="flex-1 px-2 py-2 space-y-1 overflow-y-auto">
        <a href="#" @click.prevent="active = 'dashboard'" :class="active === 'dashboard' ? 'bg-blue-600 text-white font-medium' : 'text-zinc-400 dark:text-zinc-500 hover:bg-zinc-800 hover:text-white'" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg transition-all duration-150 cursor-pointer">
          <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 5a1 1 0 011-1h14a1 1 0 011 1v2a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM4 13a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H5a1 1 0 01-1-1v-6zM16 13a1 1 0 011-1h2a1 1 0 011 1v6a1 1 0 01-1 1h-2a1 1 0 01-1-1v-6z" /></svg>
          <span x-show="!collapsed" x-transition class="whitespace-nowrap">Dashboard</span>
        </a>

        <!-- Submenu -->
        <div>
          <button @click="submenuOpen = !submenuOpen; active = 'projects'" :class="active === 'projects' ? 'bg-blue-600 text-white font-medium' : 'text-zinc-400 dark:text-zinc-500 hover:bg-zinc-800 hover:text-white'" class="w-full flex items-center gap-3 px-3 py-2 text-sm rounded-lg transition-all duration-150 cursor-pointer">
            <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z" /></svg>
            <span x-show="!collapsed" x-transition class="whitespace-nowrap flex-1 text-left">Proyectos</span>
            <svg x-show="!collapsed" class="w-4 h-4 shrink-0 transition-transform duration-150" :class="submenuOpen && 'rotate-180'" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" /></svg>
          </button>
          <div x-show="submenuOpen && !collapsed" x-transition x-cloak class="ml-8 mt-1 space-y-1">
            <a href="#" class="block text-xs text-zinc-500 hover:text-white py-1.5 transition-colors duration-150">Todos los proyectos</a>
            <a href="#" class="block text-xs text-zinc-500 hover:text-white py-1.5 transition-colors duration-150">Mis tareas</a>
            <a href="#" class="block text-xs text-zinc-500 hover:text-white py-1.5 transition-colors duration-150">Archivados</a>
          </div>
        </div>

        <a href="#" @click.prevent="active = 'users'" :class="active === 'users' ? 'bg-blue-600 text-white font-medium' : 'text-zinc-400 dark:text-zinc-500 hover:bg-zinc-800 hover:text-white'" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg transition-all duration-150 cursor-pointer">
          <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
          <span x-show="!collapsed" x-transition class="whitespace-nowrap">Usuarios</span>
        </a>

        <a href="#" @click.prevent="active = 'settings'" :class="active === 'settings' ? 'bg-blue-600 text-white font-medium' : 'text-zinc-400 dark:text-zinc-500 hover:bg-zinc-800 hover:text-white'" class="flex items-center gap-3 px-3 py-2 text-sm rounded-lg transition-all duration-150 cursor-pointer">
          <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
          <span x-show="!collapsed" x-transition class="whitespace-nowrap">Settings</span>
        </a>
      </nav>

      <!-- User -->
      <div class="px-2 py-3 border-t border-zinc-800">
        <div class="flex items-center gap-3 px-3 py-2">
          <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center text-xs font-semibold text-blue-600 dark:text-blue-400 shrink-0">JD</div>
          <div x-show="!collapsed" x-transition class="min-w-0">
            <p class="text-sm font-medium text-white truncate">Juan Díaz</p>
            <p class="text-xs text-zinc-500 truncate">juan@layoutos.com</p>
          </div>
        </div>
      </div>
    </aside>

    <!-- Content -->
    <main class="flex-1 overflow-y-auto p-8">
      <p class="text-xs font-medium uppercase tracking-wide text-zinc-400 dark:text-zinc-500">C33 · Nivel 3</p>
      <h1 class="text-2xl font-semibold tracking-tight text-zinc-900 dark:text-zinc-100 mt-1">Side Navigations</h1>
      <p class="text-sm text-zinc-600 dark:text-zinc-400 mt-2">Sidebar colapsable con active state, submenús y transiciones. Prueba el botón de colapsar y los items de navegación.</p>
    </main>

  </div>

  <style>[x-cloak] { display: none !important; }</style>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
