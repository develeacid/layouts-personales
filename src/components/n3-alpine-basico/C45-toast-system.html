<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LayoutOS · C45 Toast System</title>
  <link rel="stylesheet" href="/public/css/main.css" />
</head>
<body class="h-full bg-page antialiased">

  <div class="max-w-3xl mx-auto px-4 sm:px-6 py-16 space-y-16" x-data="toastSystem()">

    <header>
      <p class="text-xs font-medium uppercase tracking-wide text-zinc-400 dark:text-zinc-500">C45 · Nivel 3</p>
      <h1 class="text-2xl font-semibold tracking-tight text-zinc-900 dark:text-zinc-100 mt-1">Toast System</h1>
      <p class="text-sm text-zinc-600 dark:text-zinc-400 mt-1">Toasts apilables: tipos, auto-dismiss, queue.</p>
    </header>

    <section class="relative flex flex-wrap gap-3">
      <button @click="addToast('success', 'Guardado correctamente')" class="btn-primary text-xs">Success</button>
      <button @click="addToast('error', 'No se pudo procesar el pago')" class="btn-danger text-xs">Error</button>
      <button @click="addToast('warning', 'Tu sesión expirará en 5 minutos')" class="inline-flex items-center gap-2 px-4 py-2 text-xs font-medium rounded-lg bg-amber-600 text-white hover:bg-amber-700 active:scale-95 transition-all duration-150 cursor-pointer">Warning</button>
      <button @click="addToast('info', 'Nueva versión disponible')" class="btn-secondary text-xs">Info</button>
    </section>

    <!-- Toast container -->
    <template x-teleport="body">
      <div class="fixed top-4 right-4 z-toast space-y-2 w-80">
        <template x-for="toast in toasts" :key="toast.id">
          <div
            x-show="toast.visible"
            x-transition:enter="transition ease-out duration-300"
            x-transition:enter-start="opacity-0 translate-x-8"
            x-transition:enter-end="opacity-100 translate-x-0"
            x-transition:leave="transition ease-in duration-200"
            x-transition:leave-start="opacity-100 translate-x-0"
            x-transition:leave-end="opacity-0 translate-x-8"
            class="flex items-start gap-3 bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl shadow-lg px-4 py-3"
          >
            <!-- Icon -->
            <div class="shrink-0 mt-0.5">
              <template x-if="toast.type === 'success'">
                <div class="w-5 h-5 bg-emerald-100 rounded-full flex items-center justify-center">
                  <svg class="w-3 h-3 text-emerald-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg>
                </div>
              </template>
              <template x-if="toast.type === 'error'">
                <div class="w-5 h-5 bg-rose-100 rounded-full flex items-center justify-center">
                  <svg class="w-3 h-3 text-rose-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
                </div>
              </template>
              <template x-if="toast.type === 'warning'">
                <div class="w-5 h-5 bg-amber-100 rounded-full flex items-center justify-center">
                  <svg class="w-3 h-3 text-amber-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01" /></svg>
                </div>
              </template>
              <template x-if="toast.type === 'info'">
                <div class="w-5 h-5 bg-blue-100 rounded-full flex items-center justify-center">
                  <svg class="w-3 h-3 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01" /></svg>
                </div>
              </template>
            </div>
            <p class="text-xs text-zinc-900 dark:text-zinc-100 flex-1 pt-0.5" x-text="toast.message"></p>
            <button @click="removeToast(toast.id)" class="shrink-0 w-5 h-5 flex items-center justify-center rounded text-zinc-400 dark:text-zinc-500 hover:text-zinc-600 cursor-pointer">
              <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
            </button>
          </div>
        </template>
      </div>
    </template>

  </div>

  <script>
    function toastSystem() {
      return {
        toasts: [],
        addToast(type, message) {
          const id = Date.now();
          this.toasts.push({ id, type, message, visible: true });
          setTimeout(() => this.removeToast(id), 4000);
        },
        removeToast(id) {
          const toast = this.toasts.find(t => t.id === id);
          if (toast) toast.visible = false;
          setTimeout(() => {
            this.toasts = this.toasts.filter(t => t.id !== id);
          }, 300);
        }
      };
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
