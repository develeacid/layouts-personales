<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LayoutOS · C42 Notification Panel</title>
  <link rel="stylesheet" href="/public/css/main.css" />
</head>
<body class="h-full bg-page antialiased">

  <div class="max-w-3xl mx-auto px-4 sm:px-6 py-16 space-y-16" x-data="notificationPanel()">

    <header>
      <p class="text-xs font-medium uppercase tracking-wide text-zinc-400 dark:text-zinc-500">C42 · Nivel 3</p>
      <h1 class="text-2xl font-semibold tracking-tight text-zinc-900 dark:text-zinc-100 mt-1">Notification Panel</h1>
      <p class="text-sm text-zinc-600 dark:text-zinc-400 mt-1">Panel deslizable: lista, read/unread, clear all.</p>
    </header>

    <button @click="open = true" class="btn-primary relative">
      Abrir notificaciones
      <span x-show="unreadCount > 0" class="absolute -top-1 -right-1 w-5 h-5 bg-rose-500 text-white text-[10px] font-bold rounded-full flex items-center justify-center" x-text="unreadCount"></span>
    </button>

    <!-- Panel drawer -->
    <template x-teleport="body">
      <div x-show="open" x-cloak class="fixed inset-0 z-sidebar">
        <div x-show="open"
          x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
          x-transition:leave="transition ease-in duration-200" x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
          class="fixed inset-0 bg-zinc-950/50" @click="open = false"></div>
        <div x-show="open"
          x-transition:enter="transition ease-out duration-300" x-transition:enter-start="translate-x-full" x-transition:enter-end="translate-x-0"
          x-transition:leave="transition ease-in duration-200" x-transition:leave-start="translate-x-0" x-transition:leave-end="translate-x-full"
          class="fixed right-0 top-0 h-full w-80 bg-white dark:bg-zinc-900 shadow-xl flex flex-col" @keydown.escape.window="open = false">
          <!-- Header -->
          <div class="px-4 py-3 border-b border-zinc-200 dark:border-zinc-800 flex items-center justify-between shrink-0">
            <h3 class="text-sm font-semibold text-zinc-900 dark:text-zinc-100">Notificaciones</h3>
            <div class="flex items-center gap-2">
              <button @click="markAllRead()" class="text-xs text-blue-600 hover:text-blue-700 font-medium transition-colors duration-150 cursor-pointer">Marcar todas</button>
              <button @click="open = false" class="w-7 h-7 flex items-center justify-center rounded-lg text-zinc-400 dark:text-zinc-500 hover:bg-zinc-100 hover:text-zinc-600 transition-colors duration-150 cursor-pointer">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
              </button>
            </div>
          </div>
          <!-- List -->
          <div class="flex-1 overflow-y-auto divide-y divide-zinc-100 dark:divide-zinc-800">
            <template x-for="(item, index) in items" :key="item.id">
              <div @click="item.read = true" :class="!item.read && 'bg-blue-50/50 dark:bg-blue-950/50'" class="px-4 py-3 flex gap-3 cursor-pointer hover:bg-zinc-50 transition-colors duration-150">
                <div class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-semibold shrink-0"
                  :class="item.color">
                  <span x-text="item.avatar"></span>
                </div>
                <div class="flex-1 min-w-0">
                  <p class="text-xs text-zinc-900 dark:text-zinc-100" x-html="item.message"></p>
                  <p class="text-xs text-zinc-400 dark:text-zinc-500 mt-0.5" x-text="item.time"></p>
                </div>
                <span x-show="!item.read" class="w-2 h-2 bg-blue-500 rounded-full shrink-0 mt-1.5"></span>
              </div>
            </template>
          </div>
          <!-- Footer -->
          <div class="px-4 py-3 border-t border-zinc-200 dark:border-zinc-800 shrink-0">
            <button @click="items = []; open = false" class="text-xs text-zinc-400 dark:text-zinc-500 hover:text-zinc-600 font-medium transition-colors duration-150 cursor-pointer">Limpiar todo</button>
          </div>
        </div>
      </div>
    </template>

  </div>

  <style>[x-cloak] { display: none !important; }</style>
  <script>
    function notificationPanel() {
      return {
        open: false,
        items: [
          { id: 1, avatar: 'AM', color: 'bg-blue-100 text-blue-700', message: '<b>Ana Morales</b> te asignó una tarea', time: 'Hace 5 min', read: false },
          { id: 2, avatar: 'CL', color: 'bg-emerald-100 text-emerald-700', message: '<b>Carlos López</b> comentó en tu PR', time: 'Hace 1h', read: false },
          { id: 3, avatar: 'MK', color: 'bg-violet-100 text-violet-700', message: '<b>María Kim</b> subió 3 archivos', time: 'Hace 2h', read: false },
          { id: 4, avatar: 'JD', color: 'bg-amber-100 text-amber-700', message: '<b>Juan Díaz</b> aprobó tu merge request', time: 'Hace 4h', read: true },
          { id: 5, avatar: 'PR', color: 'bg-rose-100 text-rose-700', message: '<b>Paula Ríos</b> mencionó en #general', time: 'Ayer', read: true },
        ],
        get unreadCount() { return this.items.filter(i => !i.read).length; },
        markAllRead() { this.items.forEach(i => i.read = true); }
      };
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
