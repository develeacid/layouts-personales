<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LayoutOS · C35 E-commerce Navbars</title>
  <link rel="stylesheet" href="/public/css/main.css" />
</head>
<body class="h-full bg-page antialiased">

  <div class="max-w-5xl mx-auto px-4 sm:px-6 py-16 space-y-16">

    <header>
      <p class="text-xs font-medium uppercase tracking-wide text-zinc-400 dark:text-zinc-500">C35 · Nivel 3</p>
      <h1 class="text-2xl font-semibold tracking-tight text-zinc-900 dark:text-zinc-100 mt-1">E-commerce Navbars</h1>
      <p class="text-sm text-zinc-600 dark:text-zinc-400 mt-1">Navbar con carrito, búsqueda y categorías.</p>
    </header>

    <nav class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl" x-data="{ searchOpen: false, cartOpen: false, cartItems: 3 }">
      <div class="px-6 h-14 flex items-center justify-between gap-4">
        <span class="text-sm font-semibold text-zinc-900 dark:text-zinc-100 tracking-tight shrink-0">TiendaOS</span>

        <!-- Categories -->
        <div class="hidden md:flex items-center gap-4">
          <a href="#" class="text-sm text-zinc-600 dark:text-zinc-400 hover:text-zinc-900 dark:hover:text-zinc-100 transition-colors duration-150">Electrónica</a>
          <a href="#" class="text-sm text-zinc-600 dark:text-zinc-400 hover:text-zinc-900 dark:hover:text-zinc-100 transition-colors duration-150">Ropa</a>
          <a href="#" class="text-sm text-zinc-600 dark:text-zinc-400 hover:text-zinc-900 dark:hover:text-zinc-100 transition-colors duration-150">Hogar</a>
          <a href="#" class="text-sm text-zinc-600 dark:text-zinc-400 hover:text-zinc-900 dark:hover:text-zinc-100 transition-colors duration-150">Ofertas</a>
        </div>

        <!-- Search bar -->
        <div class="flex-1 max-w-sm hidden sm:block" :class="searchOpen && 'sm:block'">
          <div class="relative">
            <svg class="w-4 h-4 text-zinc-400 dark:text-zinc-500 absolute left-3 top-1/2 -translate-y-1/2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
            <input class="w-full border border-zinc-200 dark:border-zinc-800 rounded-lg bg-white dark:bg-zinc-800 pl-9 pr-3 py-1.5 text-sm text-zinc-900 dark:text-zinc-100 placeholder-zinc-400 dark:placeholder-zinc-500 focus:outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-100 transition-all duration-150" type="text" placeholder="Buscar productos..." />
          </div>
        </div>

        <div class="flex items-center gap-1">
          <!-- Search mobile -->
          <button @click="searchOpen = !searchOpen" class="sm:hidden w-8 h-8 flex items-center justify-center rounded-lg text-zinc-400 dark:text-zinc-500 hover:bg-zinc-100 dark:hover:bg-zinc-800 hover:text-zinc-600 dark:hover:text-zinc-400 transition-colors duration-150 cursor-pointer">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
          </button>

          <!-- User -->
          <a href="#" class="w-8 h-8 flex items-center justify-center rounded-lg text-zinc-400 dark:text-zinc-500 hover:bg-zinc-100 dark:hover:bg-zinc-800 hover:text-zinc-600 dark:hover:text-zinc-400 transition-colors duration-150">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
          </a>

          <!-- Cart -->
          <div class="relative">
            <button @click="cartOpen = !cartOpen" class="relative w-8 h-8 flex items-center justify-center rounded-lg text-zinc-400 dark:text-zinc-500 hover:bg-zinc-100 dark:hover:bg-zinc-800 hover:text-zinc-600 dark:hover:text-zinc-400 transition-colors duration-150 cursor-pointer">
              <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" /></svg>
              <span x-show="cartItems > 0" class="absolute -top-0.5 -right-0.5 w-4 h-4 bg-blue-600 text-white text-[10px] font-bold rounded-full flex items-center justify-center" x-text="cartItems"></span>
            </button>

            <!-- Cart dropdown -->
            <div
              x-show="cartOpen" @click.outside="cartOpen = false" x-cloak
              x-transition:enter="transition ease-out duration-200"
              x-transition:enter-start="opacity-0 -translate-y-1"
              x-transition:enter-end="opacity-100 translate-y-0"
              x-transition:leave="transition ease-in duration-150"
              x-transition:leave-start="opacity-100 translate-y-0"
              x-transition:leave-end="opacity-0 -translate-y-1"
              class="absolute right-0 top-full mt-2 w-72 bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl shadow-lg z-dropdown"
            >
              <div class="px-4 py-3 border-b border-zinc-200 dark:border-zinc-800">
                <p class="text-sm font-semibold text-zinc-900 dark:text-zinc-100">Carrito (<span x-text="cartItems"></span>)</p>
              </div>
              <div class="divide-y divide-zinc-100 dark:divide-zinc-800 max-h-48 overflow-y-auto">
                <div class="px-4 py-3 flex gap-3">
                  <div class="w-12 h-12 bg-zinc-100 dark:bg-zinc-800 rounded-lg flex items-center justify-center text-zinc-400 dark:text-zinc-500 text-xs shrink-0">Img</div>
                  <div class="flex-1 min-w-0">
                    <p class="text-xs font-medium text-zinc-900 dark:text-zinc-100 truncate">Auriculares Pro Max</p>
                    <p class="text-xs text-zinc-400 dark:text-zinc-500">1 × $349.00</p>
                  </div>
                </div>
                <div class="px-4 py-3 flex gap-3">
                  <div class="w-12 h-12 bg-zinc-100 dark:bg-zinc-800 rounded-lg flex items-center justify-center text-zinc-400 dark:text-zinc-500 text-xs shrink-0">Img</div>
                  <div class="flex-1 min-w-0">
                    <p class="text-xs font-medium text-zinc-900 dark:text-zinc-100 truncate">Cargador USB-C 65W</p>
                    <p class="text-xs text-zinc-400 dark:text-zinc-500">2 × $29.00</p>
                  </div>
                </div>
              </div>
              <div class="px-4 py-3 border-t border-zinc-200 dark:border-zinc-800">
                <div class="flex items-center justify-between mb-3">
                  <span class="text-xs text-zinc-400 dark:text-zinc-500">Subtotal</span>
                  <span class="text-sm font-semibold text-zinc-900 dark:text-zinc-100">$407.00</span>
                </div>
                <button class="btn-primary w-full justify-center text-xs">Ir al checkout</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </nav>

  </div>

  <style>[x-cloak] { display: none !important; }</style>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
