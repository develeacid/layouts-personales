<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LayoutOS · C40 Dropdown Filters</title>
  <link rel="stylesheet" href="../../../public/css/main.css" />
</head>
<body class="h-full bg-page antialiased">

  <div class="max-w-3xl mx-auto px-4 sm:px-6 py-16 space-y-16">

    <header>
      <p class="text-xs font-medium uppercase tracking-wide text-zinc-400 dark:text-zinc-500">C40 · Nivel 3</p>
      <h1 class="text-2xl font-semibold tracking-tight text-zinc-900 dark:text-zinc-100 mt-1">Dropdown Filters</h1>
      <p class="text-sm text-zinc-600 dark:text-zinc-400 mt-1">Filtros en dropdown, selección múltiple.</p>
    </header>

    <section class="relative space-y-6">
      <div class="flex flex-wrap gap-3">
        <!-- Single select -->
        <div class="relative" x-data="{ open: false, selected: 'Todos' }">
          <button @click="open = !open" class="btn-secondary text-xs flex items-center gap-2 cursor-pointer">
            <span>Estado:</span>
            <span class="font-semibold" x-text="selected"></span>
            <svg class="w-4 h-4 text-zinc-400 dark:text-zinc-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" /></svg>
          </button>
          <div x-show="open" @click.outside="open = false" x-cloak
            x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 -translate-y-1" x-transition:enter-end="opacity-100 translate-y-0"
            x-transition:leave="transition ease-in duration-150" x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
            class="absolute left-0 top-full mt-1 w-44 bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl shadow-lg p-1 z-dropdown">
            <template x-for="option in ['Todos', 'Activo', 'Pendiente', 'Completado', 'Archivado']">
              <button @click="selected = option; open = false"
                :class="selected === option ? 'bg-blue-50 dark:bg-blue-950 text-blue-600 dark:text-blue-400 font-medium' : 'text-zinc-600 dark:text-zinc-400 hover:bg-zinc-50 dark:hover:bg-zinc-800'"
                class="w-full text-left text-xs px-3 py-2 rounded-lg transition-colors duration-150 cursor-pointer" x-text="option"></button>
            </template>
          </div>
        </div>

        <!-- Multi-select -->
        <div class="relative" x-data="{ open: false, selected: [] }">
          <button @click="open = !open" class="btn-secondary text-xs flex items-center gap-2 cursor-pointer">
            <span>Tags:</span>
            <span class="font-semibold" x-text="selected.length ? selected.join(', ') : 'Todos'"></span>
            <svg class="w-4 h-4 text-zinc-400 dark:text-zinc-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" /></svg>
          </button>
          <div x-show="open" @click.outside="open = false" x-cloak
            x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 -translate-y-1" x-transition:enter-end="opacity-100 translate-y-0"
            x-transition:leave="transition ease-in duration-150" x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
            class="absolute left-0 top-full mt-1 w-48 bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl shadow-lg p-1 z-dropdown">
            <template x-for="tag in ['Diseño', 'Frontend', 'Backend', 'DevOps', 'QA']">
              <label class="flex items-center gap-2 px-3 py-2 text-xs text-zinc-600 dark:text-zinc-400 hover:bg-zinc-50 dark:hover:bg-zinc-800 rounded-lg cursor-pointer transition-colors duration-150">
                <input type="checkbox" :value="tag"
                  @change="selected.includes(tag) ? selected = selected.filter(t => t !== tag) : selected.push(tag)"
                  :checked="selected.includes(tag)"
                  class="w-3.5 h-3.5 rounded border-zinc-300 text-blue-600 focus:ring-blue-500" />
                <span x-text="tag"></span>
              </label>
            </template>
            <div class="border-t border-zinc-200 dark:border-zinc-800 mt-1 pt-1">
              <button @click="selected = []; open = false" class="w-full text-left text-xs px-3 py-2 text-zinc-400 dark:text-zinc-500 hover:text-zinc-600 dark:hover:text-zinc-400 rounded-lg transition-colors duration-150 cursor-pointer">Limpiar filtros</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Active filters -->
      <div x-data class="flex items-center gap-2 text-xs text-zinc-400 dark:text-zinc-500">
        <span>Tip: Los filtros se combinan. Prueba seleccionar varios tags.</span>
      </div>
    </section>

  </div>

  <style>[x-cloak] { display: none !important; }</style>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
