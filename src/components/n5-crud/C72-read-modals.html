<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LayoutOS · C72 Modal de lectura</title>
  <link rel="stylesheet" href="../../../public/css/main.css" />
</head>
<body class="h-full bg-page antialiased">

  <div class="max-w-4xl mx-auto px-4 sm:px-6 py-16 space-y-16">

    <header>
      <p class="text-xs font-medium uppercase tracking-wide text-zinc-400 dark:text-zinc-500">C72 · Nivel 5</p>
      <h1 class="text-2xl font-semibold tracking-tight text-zinc-900 dark:text-zinc-100 mt-1">Modal de lectura</h1>
      <p class="text-sm text-zinc-600 dark:text-zinc-500 mt-1">Modales de solo visualización para detalles de elementos.</p>
    </header>

    <!-- Variante 1: Modal detalle de tarea -->
    <section class="relative space-y-4" x-data="readModal()">
      <h2 class="text-sm font-semibold text-zinc-900 dark:text-zinc-100">Variante 1 — Detalle de tarea</h2>

      <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl shadow-sm overflow-hidden">
        <table class="w-full text-sm">
          <thead>
            <tr class="border-b border-zinc-200 dark:border-zinc-800 bg-zinc-50 dark:bg-zinc-800">
              <th class="text-left px-4 py-3 font-medium text-zinc-500">Tarea</th>
              <th class="text-left px-4 py-3 font-medium text-zinc-500">Asignado</th>
              <th class="text-left px-4 py-3 font-medium text-zinc-500">Estado</th>
              <th class="text-left px-4 py-3 font-medium text-zinc-500">Prioridad</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-zinc-100 dark:divide-zinc-800">
            <template x-for="item in items" :key="item.id">
              <tr @click="openDetail(item)" class="hover:bg-zinc-50 dark:hover:bg-zinc-800 dark:bg-zinc-800 transition-colors duration-100 cursor-pointer">
                <td class="px-4 py-3 font-medium text-zinc-900 dark:text-zinc-100 hover:text-blue-600" x-text="item.title"></td>
                <td class="px-4 py-3 text-zinc-600 dark:text-zinc-500" x-text="item.assignee"></td>
                <td class="px-4 py-3">
                  <span class="text-xs font-medium px-2 py-0.5 rounded-full"
                    :class="{
                      'badge-zinc': item.status === 'Pendiente',
                      'badge-blue': item.status === 'En progreso',
                      'badge-green': item.status === 'Completada'
                    }"
                    x-text="item.status"></span>
                </td>
                <td class="px-4 py-3">
                  <span class="text-xs font-medium px-2 py-0.5 rounded-full"
                    :class="{
                      'badge-green': item.priority === 'Baja',
                      'badge-blue': item.priority === 'Media',
                      'badge-amber': item.priority === 'Alta',
                      'badge-rose': item.priority === 'Urgente'
                    }"
                    x-text="item.priority"></span>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>

      <!-- Modal detalle tarea -->
      <template x-teleport="body">
        <div x-show="open" x-cloak class="fixed inset-0 z-20 flex items-center justify-center p-4" @keydown.escape.window="open = false">
          <div x-show="open"
            x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
            x-transition:leave="transition ease-in duration-200" x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
            class="fixed inset-0 bg-zinc-950/50 dark:bg-zinc-800/50" @click="open = false"></div>
          <div x-show="open"
            x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 scale-95" x-transition:enter-end="opacity-100 scale-100"
            x-transition:leave="transition ease-in duration-200" x-transition:leave-start="opacity-100 scale-100" x-transition:leave-end="opacity-0 scale-95"
            class="relative bg-white dark:bg-zinc-900 rounded-xl shadow-xl max-w-lg w-full mx-4 overflow-hidden">
            <template x-if="selectedItem">
              <div>
                <!-- Header -->
                <div class="p-6 pb-4">
                  <div class="flex items-start justify-between">
                    <div class="space-y-2">
                      <h3 class="text-lg font-semibold text-zinc-900 dark:text-zinc-100" x-text="selectedItem.title"></h3>
                      <div class="flex gap-2">
                        <span class="text-xs font-medium px-2 py-0.5 rounded-full"
                          :class="{
                            'badge-zinc': selectedItem.status === 'Pendiente',
                            'badge-blue': selectedItem.status === 'En progreso',
                            'badge-green': selectedItem.status === 'Completada'
                          }"
                          x-text="selectedItem.status"></span>
                        <span class="text-xs font-medium px-2 py-0.5 rounded-full"
                          :class="{
                            'badge-green': selectedItem.priority === 'Baja',
                            'badge-blue': selectedItem.priority === 'Media',
                            'badge-amber': selectedItem.priority === 'Alta',
                            'badge-rose': selectedItem.priority === 'Urgente'
                          }"
                          x-text="selectedItem.priority"></span>
                      </div>
                    </div>
                    <button @click="open = false" class="w-8 h-8 flex items-center justify-center rounded-lg text-zinc-400 dark:text-zinc-500 hover:bg-zinc-100 dark:hover:bg-zinc-800 dark:bg-zinc-800 hover:text-zinc-600 dark:hover:text-zinc-400 dark:text-zinc-500 transition-colors duration-150 cursor-pointer">
                      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
                    </button>
                  </div>
                </div>
                <!-- Body -->
                <div class="px-6 pb-4 space-y-4">
                  <div>
                    <p class="text-xs font-medium text-zinc-400 dark:text-zinc-500 uppercase tracking-wide">Descripción</p>
                    <p class="text-sm text-zinc-600 dark:text-zinc-400 mt-1 leading-relaxed" x-text="selectedItem.description"></p>
                  </div>
                  <div class="grid grid-cols-2 gap-4">
                    <div>
                      <p class="text-xs font-medium text-zinc-400 dark:text-zinc-500 uppercase tracking-wide">Asignado</p>
                      <div class="flex items-center gap-2 mt-1.5">
                        <div class="w-7 h-7 rounded-full bg-zinc-200 dark:bg-zinc-700 flex items-center justify-center text-xs font-semibold text-zinc-600 dark:text-zinc-500" x-text="selectedItem.assignee.split(' ').map(n => n[0]).join('')"></div>
                        <span class="text-sm text-zinc-900 dark:text-zinc-100" x-text="selectedItem.assignee"></span>
                      </div>
                    </div>
                    <div>
                      <p class="text-xs font-medium text-zinc-400 dark:text-zinc-500 uppercase tracking-wide">Fecha creación</p>
                      <p class="text-sm text-zinc-600 dark:text-zinc-400 mt-1" x-text="selectedItem.createdAt"></p>
                    </div>
                    <div>
                      <p class="text-xs font-medium text-zinc-400 dark:text-zinc-500 uppercase tracking-wide">Fecha límite</p>
                      <p class="text-sm text-zinc-600 dark:text-zinc-400 mt-1" x-text="selectedItem.dueDate"></p>
                    </div>
                  </div>
                </div>
                <!-- Footer -->
                <div class="px-6 py-4 bg-zinc-50 dark:bg-zinc-800 border-t border-zinc-200 dark:border-zinc-800 flex justify-end gap-2">
                  <button @click="open = false" class="btn-secondary">Cerrar</button>
                  <button class="btn-primary">Editar</button>
                </div>
              </div>
            </template>
          </div>
        </div>
      </template>
    </section>

    <!-- Variante 2: Modal detalle de usuario -->
    <section class="relative space-y-4" x-data="readModalUsers()">
      <h2 class="text-sm font-semibold text-zinc-900 dark:text-zinc-100">Variante 2 — Detalle de usuario</h2>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <template x-for="item in items" :key="item.id">
          <div @click="openDetail(item)" class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl shadow-sm p-4 flex items-center gap-4 cursor-pointer hover:border-zinc-300 transition-colors duration-150">
            <div class="w-10 h-10 rounded-full flex items-center justify-center text-sm font-semibold shrink-0"
              :class="item.avatarColor"
              x-text="item.name.split(' ').map(n => n[0]).join('')"></div>
            <div class="min-w-0">
              <p class="text-sm font-medium text-zinc-900 dark:text-zinc-100 truncate" x-text="item.name"></p>
              <p class="text-xs text-zinc-500 truncate" x-text="item.email"></p>
            </div>
            <span class="ml-auto text-xs font-medium px-2 py-0.5 rounded-full shrink-0"
              :class="{
                'badge-blue': item.role === 'Admin',
                'badge-green': item.role === 'Editor',
                'badge-zinc': item.role === 'Viewer'
              }"
              x-text="item.role"></span>
          </div>
        </template>
      </div>

      <!-- Modal detalle usuario -->
      <template x-teleport="body">
        <div x-show="open" x-cloak class="fixed inset-0 z-20 flex items-center justify-center p-4" @keydown.escape.window="open = false">
          <div x-show="open"
            x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
            x-transition:leave="transition ease-in duration-200" x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
            class="fixed inset-0 bg-zinc-950/50 dark:bg-zinc-800/50" @click="open = false"></div>
          <div x-show="open"
            x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 scale-95" x-transition:enter-end="opacity-100 scale-100"
            x-transition:leave="transition ease-in duration-200" x-transition:leave-start="opacity-100 scale-100" x-transition:leave-end="opacity-0 scale-95"
            class="relative bg-white dark:bg-zinc-900 rounded-xl shadow-xl max-w-lg w-full mx-4 overflow-hidden">
            <template x-if="selectedItem">
              <div>
                <!-- Header con avatar -->
                <div class="p-6 pb-4 text-center">
                  <div class="w-16 h-16 rounded-full flex items-center justify-center text-xl font-bold mx-auto"
                    :class="selectedItem.avatarColor"
                    x-text="selectedItem.name.split(' ').map(n => n[0]).join('')"></div>
                  <h3 class="text-lg font-semibold text-zinc-900 dark:text-zinc-100 mt-3" x-text="selectedItem.name"></h3>
                  <p class="text-sm text-zinc-500" x-text="selectedItem.email"></p>
                  <div class="flex justify-center gap-2 mt-2">
                    <span class="text-xs font-medium px-2 py-0.5 rounded-full"
                      :class="{
                        'badge-blue': selectedItem.role === 'Admin',
                        'badge-green': selectedItem.role === 'Editor',
                        'badge-zinc': selectedItem.role === 'Viewer'
                      }"
                      x-text="selectedItem.role"></span>
                    <span class="badge-zinc text-xs" x-text="selectedItem.department"></span>
                  </div>
                </div>
                <!-- Stats -->
                <div class="px-6 pb-4">
                  <div class="grid grid-cols-2 gap-4">
                    <div class="bg-zinc-50 dark:bg-zinc-800 rounded-xl p-4 text-center">
                      <p class="text-2xl font-bold text-zinc-900 dark:text-zinc-100" x-text="selectedItem.tasksAssigned"></p>
                      <p class="text-xs text-zinc-500 mt-1">Tareas asignadas</p>
                    </div>
                    <div class="bg-zinc-50 dark:bg-zinc-800 rounded-xl p-4 text-center">
                      <p class="text-2xl font-bold text-emerald-600" x-text="selectedItem.tasksCompleted"></p>
                      <p class="text-xs text-zinc-500 mt-1">Completadas</p>
                    </div>
                  </div>
                </div>
                <!-- Footer -->
                <div class="px-6 py-4 bg-zinc-50 dark:bg-zinc-800 border-t border-zinc-200 dark:border-zinc-800 flex justify-end gap-2">
                  <button @click="open = false" class="btn-secondary">Cerrar</button>
                  <button class="btn-ghost">Enviar mensaje</button>
                  <button class="btn-primary">Editar perfil</button>
                </div>
              </div>
            </template>
          </div>
        </div>
      </template>
    </section>

  </div>

  <style>[x-cloak] { display: none !important; }</style>
  <script>
    function readModal() {
      return {
        open: false,
        selectedItem: null,
        items: [
          { id: 1, title: 'Diseñar landing page', description: 'Crear el diseño visual completo de la página principal incluyendo hero, features, pricing y footer. Usar el sistema de diseño actual y tokens definidos.', assignee: 'Ana García', priority: 'Alta', status: 'En progreso', createdAt: '15 Mar 2026', dueDate: '15 Abr 2026' },
          { id: 2, title: 'Configurar CI/CD', description: 'Implementar pipeline de integración continua y despliegue automático con GitHub Actions. Incluir tests, linting y deploy a staging.', assignee: 'Carlos López', priority: 'Media', status: 'Pendiente', createdAt: '18 Mar 2026', dueDate: '20 Abr 2026' },
          { id: 3, title: 'Escribir tests E2E', description: 'Crear suite de tests end-to-end con Playwright cubriendo los flujos críticos de usuario: registro, login, crear proyecto y eliminar cuenta.', assignee: 'María Ruiz', priority: 'Baja', status: 'Completada', createdAt: '10 Mar 2026', dueDate: '10 Abr 2026' },
          { id: 4, title: 'Optimizar consultas SQL', description: 'Analizar y mejorar las queries más lentas del dashboard. Añadir índices necesarios y refactorizar joins complejos.', assignee: 'Pedro Sánchez', priority: 'Urgente', status: 'En progreso', createdAt: '20 Mar 2026', dueDate: '8 Abr 2026' }
        ],
        openDetail(item) {
          this.selectedItem = { ...item };
          this.open = true;
        }
      };
    }

    function readModalUsers() {
      return {
        open: false,
        selectedItem: null,
        items: [
          { id: 1, name: 'Ana García', email: 'ana.garcia@empresa.com', role: 'Admin', department: 'Ingeniería', avatarColor: 'bg-blue-100 dark:bg-blue-900 text-blue-600 dark:text-blue-400', tasksAssigned: 12, tasksCompleted: 8 },
          { id: 2, name: 'Carlos López', email: 'carlos.lopez@empresa.com', role: 'Editor', department: 'Diseño', avatarColor: 'bg-emerald-100 dark:bg-emerald-900 text-emerald-600 dark:text-emerald-400', tasksAssigned: 9, tasksCompleted: 7 },
          { id: 3, name: 'María Ruiz', email: 'maria.ruiz@empresa.com', role: 'Admin', department: 'Producto', avatarColor: 'bg-amber-100 dark:bg-amber-900 text-amber-600 dark:text-amber-400', tasksAssigned: 15, tasksCompleted: 13 },
          { id: 4, name: 'Pedro Sánchez', email: 'pedro.sanchez@empresa.com', role: 'Viewer', department: 'Marketing', avatarColor: 'bg-rose-100 dark:bg-rose-900 text-rose-600 dark:text-rose-400', tasksAssigned: 6, tasksCompleted: 4 }
        ],
        openDetail(item) {
          this.selectedItem = { ...item };
          this.open = true;
        }
      };
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
