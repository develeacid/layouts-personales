<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LayoutOS · C71 Modal de edición</title>
  <link rel="stylesheet" href="../../../public/css/main.css" />
</head>
<body class="h-full bg-page antialiased">

  <div class="max-w-4xl mx-auto px-4 sm:px-6 py-16 space-y-16">

    <header>
      <p class="text-xs font-medium uppercase tracking-wide text-zinc-400 dark:text-zinc-500">C71 · Nivel 5</p>
      <h1 class="text-2xl font-semibold tracking-tight text-zinc-900 dark:text-zinc-100 mt-1">Modal de edición</h1>
      <p class="text-sm text-zinc-600 dark:text-zinc-500 mt-1">Modales para editar elementos con datos precargados.</p>
    </header>

    <!-- Variante 1: Modal editar tarea completa -->
    <section class="relative space-y-4" x-data="updateModal()">
      <h2 class="text-sm font-semibold text-zinc-900 dark:text-zinc-100">Variante 1 — Editar tarea</h2>

      <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl shadow-sm overflow-hidden">
        <table class="w-full text-sm">
          <thead>
            <tr class="border-b border-zinc-200 dark:border-zinc-800 bg-zinc-50 dark:bg-zinc-800">
              <th class="text-left px-4 py-3 font-medium text-zinc-500">Tarea</th>
              <th class="text-left px-4 py-3 font-medium text-zinc-500">Asignado</th>
              <th class="text-left px-4 py-3 font-medium text-zinc-500">Prioridad</th>
              <th class="text-left px-4 py-3 font-medium text-zinc-500">Estado</th>
              <th class="px-4 py-3"></th>
            </tr>
          </thead>
          <tbody class="divide-y divide-zinc-100 dark:divide-zinc-800">
            <template x-for="item in items" :key="item.id">
              <tr class="hover:bg-zinc-50 dark:hover:bg-zinc-800 dark:bg-zinc-800 transition-colors duration-100">
                <td class="px-4 py-3 font-medium text-zinc-900 dark:text-zinc-100" x-text="item.title"></td>
                <td class="px-4 py-3 text-zinc-600 dark:text-zinc-500" x-text="item.assignee"></td>
                <td class="px-4 py-3">
                  <span class="text-xs font-medium px-2 py-0.5 rounded-full"
                    :class="{
                      'badge-green': item.priority === 'Baja',
                      'badge-blue': item.priority === 'Media',
                      'badge-amber': item.priority === 'Alta',
                      'badge-rose': item.priority === 'Urgente'
                    }"
                    x-text="item.priority"></span>
                </td>
                <td class="px-4 py-3">
                  <span class="text-xs font-medium px-2 py-0.5 rounded-full"
                    :class="{
                      'badge-zinc': item.status === 'Pendiente',
                      'badge-blue': item.status === 'En progreso',
                      'badge-green': item.status === 'Completada'
                    }"
                    x-text="item.status"></span>
                </td>
                <td class="px-4 py-3 text-right">
                  <button @click="openEdit(item)" class="btn-ghost btn-sm" title="Editar">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg>
                  </button>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>

      <!-- Modal editar -->
      <template x-teleport="body">
        <div x-show="open" x-cloak class="fixed inset-0 z-20 flex items-center justify-center p-4" @keydown.escape.window="open = false">
          <div x-show="open"
            x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
            x-transition:leave="transition ease-in duration-200" x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
            class="fixed inset-0 bg-zinc-950/50 dark:bg-zinc-800/50" @click="open = false"></div>
          <div x-show="open"
            x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 scale-95" x-transition:enter-end="opacity-100 scale-100"
            x-transition:leave="transition ease-in duration-200" x-transition:leave-start="opacity-100 scale-100" x-transition:leave-end="opacity-0 scale-95"
            class="relative bg-white dark:bg-zinc-900 rounded-xl shadow-xl max-w-lg w-full mx-4 p-6 space-y-5">
            <div class="flex items-center justify-between">
              <h3 class="text-base font-semibold text-zinc-900 dark:text-zinc-100">Editar tarea</h3>
              <button @click="open = false" class="w-8 h-8 flex items-center justify-center rounded-lg text-zinc-400 dark:text-zinc-500 hover:bg-zinc-100 dark:hover:bg-zinc-800 dark:bg-zinc-800 hover:text-zinc-600 dark:hover:text-zinc-400 dark:text-zinc-500 transition-colors duration-150 cursor-pointer">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
              </button>
            </div>

            <template x-if="editingItem">
              <form @submit.prevent="save()" class="space-y-4">
                <div>
                  <label class="label">Título</label>
                  <input type="text" x-model="editingItem.title" class="input" />
                </div>
                <div>
                  <label class="label">Descripción</label>
                  <textarea x-model="editingItem.description" class="input" rows="3"></textarea>
                </div>
                <div>
                  <label class="label">Asignado</label>
                  <select x-model="editingItem.assignee" class="input">
                    <option value="Ana García">Ana García</option>
                    <option value="Carlos López">Carlos López</option>
                    <option value="María Ruiz">María Ruiz</option>
                    <option value="Pedro Sánchez">Pedro Sánchez</option>
                  </select>
                </div>
                <div>
                  <label class="label">Prioridad</label>
                  <div class="flex gap-4 mt-1">
                    <template x-for="p in ['Baja', 'Media', 'Alta', 'Urgente']" :key="p">
                      <label class="flex items-center gap-1.5 text-sm text-zinc-600 dark:text-zinc-400 cursor-pointer">
                        <input type="radio" x-model="editingItem.priority" :value="p" class="accent-zinc-900" />
                        <span x-text="p"></span>
                      </label>
                    </template>
                  </div>
                </div>
                <div>
                  <label class="label">Fecha límite</label>
                  <input type="date" x-model="editingItem.dueDate" class="input" />
                </div>
                <div class="flex justify-end gap-2 pt-2">
                  <button type="button" @click="open = false" class="btn-secondary">Cancelar</button>
                  <button type="submit" class="btn-primary">Guardar cambios</button>
                </div>
              </form>
            </template>
          </div>
        </div>
      </template>
    </section>

    <!-- Variante 2: Modal edición inline compacto -->
    <section class="relative space-y-4" x-data="updateModalInline()">
      <h2 class="text-sm font-semibold text-zinc-900 dark:text-zinc-100">Variante 2 — Edición inline compacta</h2>

      <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl shadow-sm overflow-hidden">
        <table class="w-full text-sm">
          <thead>
            <tr class="border-b border-zinc-200 dark:border-zinc-800 bg-zinc-50 dark:bg-zinc-800">
              <th class="text-left px-4 py-3 font-medium text-zinc-500">Tarea</th>
              <th class="text-left px-4 py-3 font-medium text-zinc-500">Estado</th>
              <th class="text-left px-4 py-3 font-medium text-zinc-500">Prioridad</th>
              <th class="px-4 py-3"></th>
            </tr>
          </thead>
          <tbody class="divide-y divide-zinc-100 dark:divide-zinc-800">
            <template x-for="item in items" :key="item.id">
              <tr class="hover:bg-zinc-50 dark:hover:bg-zinc-800 dark:bg-zinc-800 transition-colors duration-100">
                <td class="px-4 py-3 font-medium text-zinc-900 dark:text-zinc-100" x-text="item.title"></td>
                <td class="px-4 py-3">
                  <span class="text-xs font-medium px-2 py-0.5 rounded-full"
                    :class="{
                      'badge-zinc': item.status === 'Pendiente',
                      'badge-blue': item.status === 'En progreso',
                      'badge-green': item.status === 'Completada'
                    }"
                    x-text="item.status"></span>
                </td>
                <td class="px-4 py-3">
                  <span class="text-xs font-medium px-2 py-0.5 rounded-full"
                    :class="{
                      'badge-green': item.priority === 'Baja',
                      'badge-blue': item.priority === 'Media',
                      'badge-amber': item.priority === 'Alta',
                      'badge-rose': item.priority === 'Urgente'
                    }"
                    x-text="item.priority"></span>
                </td>
                <td class="px-4 py-3 text-right">
                  <button @click="openEdit(item)" class="btn-ghost btn-sm" title="Editar">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg>
                  </button>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>

      <!-- Modal inline compacto -->
      <template x-teleport="body">
        <div x-show="open" x-cloak class="fixed inset-0 z-20 flex items-center justify-center p-4" @keydown.escape.window="open = false">
          <div x-show="open"
            x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
            x-transition:leave="transition ease-in duration-200" x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
            class="fixed inset-0 bg-zinc-950/50 dark:bg-zinc-800/50" @click="open = false"></div>
          <div x-show="open"
            x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 scale-95" x-transition:enter-end="opacity-100 scale-100"
            x-transition:leave="transition ease-in duration-200" x-transition:leave-start="opacity-100 scale-100" x-transition:leave-end="opacity-0 scale-95"
            class="relative bg-white dark:bg-zinc-900 rounded-xl shadow-xl max-w-sm w-full mx-4 p-5 space-y-4">
            <h3 class="text-base font-semibold text-zinc-900 dark:text-zinc-100">Edición rápida</h3>

            <template x-if="editingItem">
              <div class="space-y-3">
                <div>
                  <label class="label">Título</label>
                  <input type="text" x-model="editingItem.title" class="input" />
                </div>
                <div>
                  <label class="label">Estado</label>
                  <select x-model="editingItem.status" class="input">
                    <option value="Pendiente">Pendiente</option>
                    <option value="En progreso">En progreso</option>
                    <option value="Completada">Completada</option>
                  </select>
                </div>
                <div>
                  <label class="label">Prioridad</label>
                  <select x-model="editingItem.priority" class="input">
                    <option value="Baja">Baja</option>
                    <option value="Media">Media</option>
                    <option value="Alta">Alta</option>
                    <option value="Urgente">Urgente</option>
                  </select>
                </div>
                <div class="flex justify-end gap-2 pt-1">
                  <button @click="open = false" class="btn-secondary btn-sm">Cancelar</button>
                  <button @click="save()" class="btn-primary btn-sm">Guardar</button>
                </div>
              </div>
            </template>
          </div>
        </div>
      </template>
    </section>

  </div>

  <style>[x-cloak] { display: none !important; }</style>
  <script>
    function updateModal() {
      return {
        open: false,
        editingItem: null,
        items: [
          { id: 1, title: 'Diseñar landing page', description: 'Crear el diseño visual de la página principal', assignee: 'Ana García', priority: 'Alta', status: 'En progreso', dueDate: '2026-04-15' },
          { id: 2, title: 'Configurar CI/CD', description: 'Pipeline de deploy automático', assignee: 'Carlos López', priority: 'Media', status: 'Pendiente', dueDate: '2026-04-20' },
          { id: 3, title: 'Escribir tests E2E', description: 'Tests de integración con Playwright', assignee: 'María Ruiz', priority: 'Baja', status: 'Completada', dueDate: '2026-04-10' },
          { id: 4, title: 'Optimizar consultas SQL', description: 'Mejorar rendimiento de queries lentas', assignee: 'Pedro Sánchez', priority: 'Urgente', status: 'En progreso', dueDate: '2026-04-08' },
          { id: 5, title: 'Documentar API REST', description: 'Swagger y ejemplos de uso', assignee: 'Ana García', priority: 'Media', status: 'Pendiente', dueDate: '2026-04-25' }
        ],
        openEdit(item) {
          this.editingItem = { ...item };
          this.open = true;
        },
        save() {
          const idx = this.items.findIndex(i => i.id === this.editingItem.id);
          if (idx !== -1) this.items[idx] = { ...this.editingItem };
          this.open = false;
          this.editingItem = null;
        }
      };
    }

    function updateModalInline() {
      return {
        open: false,
        editingItem: null,
        items: [
          { id: 1, title: 'Migrar base de datos', priority: 'Alta', status: 'Pendiente' },
          { id: 2, title: 'Actualizar dependencias', priority: 'Media', status: 'En progreso' },
          { id: 3, title: 'Revisar accesibilidad', priority: 'Baja', status: 'Completada' },
          { id: 4, title: 'Corregir bug en login', priority: 'Urgente', status: 'En progreso' }
        ],
        openEdit(item) {
          this.editingItem = { ...item };
          this.open = true;
        },
        save() {
          const idx = this.items.findIndex(i => i.id === this.editingItem.id);
          if (idx !== -1) this.items[idx] = { ...this.editingItem };
          this.open = false;
          this.editingItem = null;
        }
      };
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
