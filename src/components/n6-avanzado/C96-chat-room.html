<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LayoutOS · C96 Chat Room</title>
  <link rel="stylesheet" href="/public/css/main.css" />
</head>
<body class="h-full bg-page antialiased">
  <div class="max-w-6xl mx-auto px-6 py-16 space-y-16">
    <header>
      <p class="text-xs font-medium uppercase tracking-wide text-zinc-400">C96 · Nivel 6</p>
      <h1 class="text-2xl font-semibold tracking-tight text-zinc-900 mt-1">Chat Room</h1>
      <p class="text-sm text-zinc-600 mt-1">Chat room completo con canales, mensajes y panel de info.</p>
    </header>

    <section x-data="chatRoom()" class="bg-white border border-zinc-200 rounded-xl shadow-sm overflow-hidden" style="height: 640px;">
      <div class="flex h-full relative">

        <!-- Sidebar overlay mobile -->
        <div x-show="showSidebar" @click="showSidebar = false" class="absolute inset-0 bg-black/30 z-10 lg:hidden" x-cloak></div>

        <!-- Left Sidebar -->
        <aside class="w-64 shrink-0 border-r border-zinc-200 bg-zinc-50 flex flex-col z-20 absolute lg:relative h-full transition-transform duration-200"
          :class="showSidebar ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'">
          <!-- Sidebar header -->
          <div class="p-4 border-b border-zinc-200">
            <h3 class="text-sm font-semibold text-zinc-900">LayoutOS Workspace</h3>
            <p class="text-xs text-zinc-500">12 miembros en linea</p>
          </div>

          <div class="flex-1 overflow-y-auto p-3 space-y-4">
            <!-- Channels -->
            <div>
              <p class="text-xs font-semibold text-zinc-400 uppercase tracking-wide px-2 mb-1">Canales</p>
              <template x-for="ch in channels" :key="ch.id">
                <button @click="selectChannel(ch.id); showSidebar = false"
                  class="w-full flex items-center justify-between px-2 py-1.5 rounded-lg text-left transition-colors"
                  :class="activeChannel === ch.id ? 'bg-blue-50 text-blue-700' : 'text-zinc-600 hover:bg-zinc-100'">
                  <span class="text-sm flex items-center gap-1.5">
                    <span class="text-zinc-400">#</span>
                    <span x-text="ch.name" :class="activeChannel === ch.id ? 'font-medium' : ''"></span>
                  </span>
                  <span x-show="ch.unread > 0"
                    class="text-xs font-bold bg-blue-600 text-white rounded-full w-5 h-5 flex items-center justify-center"
                    x-text="ch.unread"></span>
                </button>
              </template>
            </div>

            <!-- Direct messages -->
            <div>
              <p class="text-xs font-semibold text-zinc-400 uppercase tracking-wide px-2 mb-1">Mensajes directos</p>
              <template x-for="dm in directMessages" :key="dm.id">
                <button class="w-full flex items-center gap-2 px-2 py-1.5 rounded-lg text-left text-zinc-600 hover:bg-zinc-100 transition-colors">
                  <div class="relative">
                    <div class="w-7 h-7 rounded-full bg-zinc-200 flex items-center justify-center text-xs font-medium text-zinc-600" x-text="dm.avatar"></div>
                    <div class="absolute -bottom-0.5 -right-0.5 w-2.5 h-2.5 rounded-full border-2 border-zinc-50"
                      :class="dm.online ? 'bg-green-500' : 'bg-zinc-300'"></div>
                  </div>
                  <span class="text-sm" x-text="dm.name"></span>
                </button>
              </template>
            </div>
          </div>
        </aside>

        <!-- Main chat panel -->
        <div class="flex-1 flex flex-col min-w-0">
          <!-- Chat header -->
          <div class="px-4 py-3 border-b border-zinc-200 flex items-center justify-between shrink-0">
            <div class="flex items-center gap-3">
              <button @click="showSidebar = !showSidebar" class="lg:hidden btn-ghost btn-sm">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
              </button>
              <div>
                <h3 class="text-sm font-semibold text-zinc-900 flex items-center gap-1">
                  <span class="text-zinc-400">#</span>
                  <span x-text="currentChannelObj.name"></span>
                </h3>
                <p class="text-xs text-zinc-500" x-text="currentChannelObj.members + ' miembros'"></p>
              </div>
            </div>
            <div class="flex items-center gap-1">
              <button class="btn-ghost btn-sm">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
              </button>
              <button @click="showInfo = !showInfo" class="btn-ghost btn-sm"
                :class="showInfo ? 'bg-zinc-100' : ''">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
              </button>
            </div>
          </div>

          <!-- Messages area -->
          <div class="flex-1 overflow-y-auto px-4 py-4 space-y-1" x-ref="messagesArea">
            <template x-for="(group, gi) in channelMessages" :key="gi">
              <div>
                <!-- Date separator -->
                <div class="flex items-center gap-3 my-4">
                  <div class="flex-1 h-px bg-zinc-200"></div>
                  <span class="text-xs font-medium text-zinc-400" x-text="group.date"></span>
                  <div class="flex-1 h-px bg-zinc-200"></div>
                </div>

                <template x-for="msg in group.messages" :key="msg.id">
                  <div class="flex items-start gap-3 py-1.5 hover:bg-zinc-50 rounded-lg px-2 -mx-2 transition-colors group">
                    <div class="w-8 h-8 rounded-full bg-zinc-200 flex items-center justify-center text-xs font-medium text-zinc-600 shrink-0 mt-0.5" x-text="msg.avatar"></div>
                    <div class="min-w-0 flex-1">
                      <div class="flex items-baseline gap-2">
                        <span class="text-sm font-semibold text-zinc-900" x-text="msg.user"></span>
                        <span class="text-xs text-zinc-400" x-text="msg.time"></span>
                      </div>
                      <p class="text-sm text-zinc-700 leading-relaxed" x-text="msg.text"></p>
                      <!-- Reactions -->
                      <div x-show="msg.reactions && msg.reactions.length" class="flex gap-1 mt-1">
                        <template x-for="r in (msg.reactions || [])" :key="r.emoji">
                          <span class="inline-flex items-center gap-1 text-xs bg-zinc-100 hover:bg-zinc-200 rounded-full px-2 py-0.5 cursor-pointer transition-colors">
                            <span x-text="r.emoji"></span>
                            <span class="text-zinc-500" x-text="r.count"></span>
                          </span>
                        </template>
                      </div>
                    </div>
                  </div>
                </template>
              </div>
            </template>
          </div>

          <!-- Message input -->
          <div class="px-4 py-3 border-t border-zinc-200 shrink-0">
            <div class="flex items-end gap-2">
              <button class="btn-ghost btn-sm shrink-0 mb-0.5">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/></svg>
              </button>
              <div class="flex-1 relative">
                <textarea x-model="newMessage" @keydown.enter.prevent="sendMessage()"
                  rows="1"
                  class="input resize-none pr-10"
                  :placeholder="'Mensaje en #' + currentChannelObj.name"></textarea>
              </div>
              <button class="btn-ghost btn-sm shrink-0 mb-0.5">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
              </button>
              <button @click="sendMessage()" class="btn-primary btn-sm shrink-0 mb-0.5" :disabled="!newMessage.trim()">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
              </button>
            </div>
          </div>
        </div>

        <!-- Right sidebar: info -->
        <aside x-show="showInfo" x-cloak
          class="w-64 shrink-0 border-l border-zinc-200 bg-zinc-50 overflow-y-auto hidden lg:block">
          <div class="p-4 space-y-4">
            <div>
              <h3 class="text-sm font-semibold text-zinc-900 flex items-center gap-1">
                <span class="text-zinc-400">#</span>
                <span x-text="currentChannelObj.name"></span>
              </h3>
              <p class="text-xs text-zinc-500 mt-1" x-text="currentChannelObj.description"></p>
            </div>

            <div class="border-t border-zinc-200 pt-3">
              <p class="text-xs font-semibold text-zinc-400 uppercase tracking-wide mb-2">Miembros</p>
              <div class="space-y-2">
                <template x-for="member in currentChannelObj.memberList" :key="member">
                  <div class="flex items-center gap-2">
                    <div class="w-6 h-6 rounded-full bg-zinc-200 flex items-center justify-center text-xs font-medium text-zinc-600" x-text="member.split(' ').map(w=>w[0]).join('')"></div>
                    <span class="text-sm text-zinc-700" x-text="member"></span>
                  </div>
                </template>
              </div>
            </div>

            <div class="border-t border-zinc-200 pt-3">
              <p class="text-xs font-semibold text-zinc-400 uppercase tracking-wide mb-2">Archivos compartidos</p>
              <div class="space-y-2">
                <div class="flex items-center gap-2 text-sm text-zinc-600">
                  <svg class="w-4 h-4 text-zinc-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                  <span>diseño-v3.fig</span>
                </div>
                <div class="flex items-center gap-2 text-sm text-zinc-600">
                  <svg class="w-4 h-4 text-zinc-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                  <span>sprint-plan.md</span>
                </div>
                <div class="flex items-center gap-2 text-sm text-zinc-600">
                  <svg class="w-4 h-4 text-zinc-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                  <span>mockup-landing.png</span>
                </div>
              </div>
            </div>
          </div>
        </aside>
      </div>
    </section>
  </div>

  <style>[x-cloak] { display: none !important; }</style>
  <script>
  function chatRoom() {
    return {
      channels: [
        { id: 'general', name: 'general', unread: 3, members: 12, description: 'Canal principal del equipo para anuncios y conversacion general.', memberList: ['Ana Martinez', 'Luis Castro', 'Maria Reyes', 'Juan Perez', 'Sofia Ruiz'] },
        { id: 'diseno', name: 'diseño', unread: 0, members: 5, description: 'Discusion sobre diseño, UI/UX y sistemas de componentes.', memberList: ['Ana Martinez', 'Sofia Ruiz', 'Pedro Gomez'] },
        { id: 'desarrollo', name: 'desarrollo', unread: 7, members: 8, description: 'Frontend, backend, infra y todo lo tecnico.', memberList: ['Luis Castro', 'Juan Perez', 'Maria Reyes', 'Pedro Gomez'] },
        { id: 'random', name: 'random', unread: 0, members: 12, description: 'Memes, offtopic y buena vibra.', memberList: ['Ana Martinez', 'Luis Castro', 'Maria Reyes', 'Juan Perez', 'Sofia Ruiz'] }
      ],
      directMessages: [
        { id: 'dm1', name: 'Ana Martinez', avatar: 'AM', online: true },
        { id: 'dm2', name: 'Luis Castro', avatar: 'LC', online: true },
        { id: 'dm3', name: 'Pedro Gomez', avatar: 'PG', online: false },
        { id: 'dm4', name: 'Sofia Ruiz', avatar: 'SR', online: false }
      ],
      activeChannel: 'general',
      messages: {
        general: [
          { date: 'Ayer', messages: [
            { id: 1, user: 'Ana Martinez', avatar: 'AM', time: '14:22', text: 'Hola equipo, ya estan listos los mockups del dashboard. Los subi al canal de diseño.', reactions: [{ emoji: '👍', count: 4 }] },
            { id: 2, user: 'Luis Castro', avatar: 'LC', time: '14:35', text: 'Genial Ana, los reviso en un rato. Estoy terminando el refactor del modulo de auth.', reactions: [] },
            { id: 3, user: 'Maria Reyes', avatar: 'MR', time: '15:10', text: 'Recordatorio: manana tenemos retro a las 10am. No falten.', reactions: [{ emoji: '✅', count: 6 }] },
            { id: 4, user: 'Juan Perez', avatar: 'JP', time: '16:00', text: 'Alguien sabe si ya se resolvio el bug del login en Safari? Los QA reportaron que sigue fallando.', reactions: [] },
            { id: 5, user: 'Sofia Ruiz', avatar: 'SR', time: '16:15', text: 'Si, Juan! Lo fixeé ayer. Era un problema con las cookies SameSite. Ya esta en staging.', reactions: [{ emoji: '🎉', count: 3 }] },
          ]},
          { date: 'Hoy', messages: [
            { id: 6, user: 'Luis Castro', avatar: 'LC', time: '09:05', text: 'Buenos dias! El deploy de anoche fue exitoso. Todo en verde en produccion.', reactions: [{ emoji: '🚀', count: 5 }] },
            { id: 7, user: 'Ana Martinez', avatar: 'AM', time: '09:12', text: 'Excelente! Ya vi los nuevos componentes en prod, se ven increibles.', reactions: [] },
            { id: 8, user: 'Maria Reyes', avatar: 'MR', time: '09:30', text: 'Recordatorio: la retro empieza en 30 minutos. Preparen sus puntos.', reactions: [] },
            { id: 9, user: 'Juan Perez', avatar: 'JP', time: '09:45', text: 'Ya termine el PR de la nueva feature de notificaciones. Alguien puede hacer code review?', reactions: [] },
            { id: 10, user: 'Pedro Gomez', avatar: 'PG', time: '10:02', text: 'Yo lo reviso, Juan. Dame 20 minutos.', reactions: [{ emoji: '👀', count: 1 }] },
            { id: 11, user: 'Sofia Ruiz', avatar: 'SR', time: '10:30', text: 'Equipo, acabo de publicar la guia de accesibilidad en la wiki. Echenle un ojo cuando puedan.', reactions: [{ emoji: '💯', count: 4 }, { emoji: '📖', count: 2 }] },
            { id: 12, user: 'Ana Martinez', avatar: 'AM', time: '11:00', text: 'Voy a empezar con el rediseño del onboarding flow. Si tienen feedback del actual, mandenmelo por DM.', reactions: [] },
          ]}
        ],
        diseno: [
          { date: 'Hoy', messages: [
            { id: 20, user: 'Ana Martinez', avatar: 'AM', time: '09:15', text: 'Subi los mockups del dashboard v3 al Figma. El link esta en la descripcion del canal.', reactions: [] },
            { id: 21, user: 'Sofia Ruiz', avatar: 'SR', time: '09:40', text: 'Se ven geniales, Ana. Solo un comentario: el contraste del texto secundario podria mejorar.', reactions: [] },
          ]}
        ],
        desarrollo: [
          { date: 'Hoy', messages: [
            { id: 30, user: 'Luis Castro', avatar: 'LC', time: '08:50', text: 'El pipeline de CI tarda 12 minutos. Voy a ver si puedo optimizar los tests.', reactions: [{ emoji: '⏱️', count: 2 }] },
            { id: 31, user: 'Juan Perez', avatar: 'JP', time: '09:00', text: 'Paralelizar los tests de integracion podria bajar el tiempo a la mitad.', reactions: [] },
            { id: 32, user: 'Maria Reyes', avatar: 'MR', time: '09:20', text: 'Les comparto el RFC del nuevo sistema de cache: notion.so/cache-rfc', reactions: [] },
          ]}
        ],
        random: [
          { date: 'Hoy', messages: [
            { id: 40, user: 'Pedro Gomez', avatar: 'PG', time: '12:00', text: 'Alguien quiere ir por tacos?', reactions: [{ emoji: '🌮', count: 7 }] },
            { id: 41, user: 'Sofia Ruiz', avatar: 'SR', time: '12:05', text: 'Yo me apunto! Los de la esquina estan buenisimos.', reactions: [] },
          ]}
        ]
      },
      newMessage: '',
      showInfo: false,
      showSidebar: false,
      nextMsgId: 100,

      get currentChannelObj() {
        return this.channels.find(c => c.id === this.activeChannel) || this.channels[0];
      },

      get channelMessages() {
        return this.messages[this.activeChannel] || [];
      },

      sendMessage() {
        if (!this.newMessage.trim()) return;
        const channelMsgs = this.messages[this.activeChannel];
        const todayGroup = channelMsgs.find(g => g.date === 'Hoy');
        const msg = {
          id: this.nextMsgId++,
          user: 'Tu',
          avatar: 'TU',
          time: new Date().toLocaleTimeString('es', { hour: '2-digit', minute: '2-digit' }),
          text: this.newMessage,
          reactions: []
        };
        if (todayGroup) {
          todayGroup.messages.push(msg);
        } else {
          channelMsgs.push({ date: 'Hoy', messages: [msg] });
        }
        this.newMessage = '';
        this.$nextTick(() => {
          if (this.$refs.messagesArea) {
            this.$refs.messagesArea.scrollTop = this.$refs.messagesArea.scrollHeight;
          }
        });
      },

      selectChannel(id) {
        this.activeChannel = id;
        const ch = this.channels.find(c => c.id === id);
        if (ch) ch.unread = 0;
      }
    };
  }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
