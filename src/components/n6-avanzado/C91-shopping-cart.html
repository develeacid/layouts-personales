<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LayoutOS · C91 Shopping Cart</title>
  <link rel="stylesheet" href="/public/css/main.css" />
</head>
<body class="h-full bg-page antialiased">
  <div class="max-w-5xl mx-auto px-4 sm:px-6 py-16 space-y-16">
    <header>
      <p class="text-xs font-medium uppercase tracking-wide text-zinc-400 dark:text-zinc-500">C91 · Nivel 6</p>
      <h1 class="text-2xl font-semibold tracking-tight text-zinc-900 dark:text-zinc-100 mt-1">Shopping Cart</h1>
      <p class="text-sm text-zinc-600 dark:text-zinc-400 mt-1">Carrito de compras completo con gestion de items, cupones y resumen.</p>
    </header>

    <section class="relative" x-data="shoppingCart()">
      <!-- Estado vacio -->
      <div x-show="items.length === 0" class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl shadow-sm p-12 text-center">
        <div class="w-16 h-16 bg-zinc-100 dark:bg-zinc-800 rounded-full flex items-center justify-center mx-auto mb-4">
          <svg class="w-8 h-8 text-zinc-400 dark:text-zinc-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 00-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 00-16.536-1.84M7.5 14.25L5.106 5.272M6 20.25a.75.75 0 11-1.5 0 .75.75 0 011.5 0zm12.75 0a.75.75 0 11-1.5 0 .75.75 0 011.5 0z" />
          </svg>
        </div>
        <h3 class="text-lg font-semibold text-zinc-900 dark:text-zinc-100">Tu carrito esta vacio</h3>
        <p class="text-sm text-zinc-500 mt-1">Explora nuestros productos y agrega algo al carrito.</p>
        <button class="btn-primary mt-4">Seguir comprando</button>
      </div>

      <!-- Carrito con items -->
      <div x-show="items.length > 0" class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <!-- Lista de items -->
        <div class="lg:col-span-2 space-y-4">
          <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl shadow-sm divide-y divide-zinc-100 dark:divide-zinc-800">
            <template x-for="item in items" :key="item.id">
              <div class="p-4 flex gap-4"
                x-transition:leave="transition ease-in duration-200"
                x-transition:leave-start="opacity-100"
                x-transition:leave-end="opacity-0">
                <!-- Imagen -->
                <div class="w-20 h-20 bg-zinc-100 dark:bg-zinc-800 rounded-lg flex items-center justify-center shrink-0">
                  <svg class="w-8 h-8 text-zinc-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.41a2.25 2.25 0 013.182 0l2.909 2.91M3.75 21h16.5A2.25 2.25 0 0022.5 18.75V5.25A2.25 2.25 0 0020.25 3H3.75A2.25 2.25 0 001.5 5.25v13.5A2.25 2.25 0 003.75 21z" />
                  </svg>
                </div>
                <!-- Info -->
                <div class="flex-1 min-w-0">
                  <div class="flex items-start justify-between gap-2">
                    <div>
                      <h3 class="text-sm font-medium text-zinc-900 dark:text-zinc-100" x-text="item.name"></h3>
                      <p class="text-xs text-zinc-500 mt-0.5" x-text="item.variant"></p>
                    </div>
                    <button @click="removeItem(item.id)"
                      class="text-zinc-400 dark:text-zinc-500 hover:text-rose-500 transition-colors duration-150 shrink-0">
                      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                      </svg>
                    </button>
                  </div>
                  <div class="flex items-center justify-between mt-3">
                    <div class="flex items-center gap-1">
                      <!-- Selector cantidad -->
                      <div class="inline-flex items-center border border-zinc-200 dark:border-zinc-800 rounded-lg">
                        <button @click="updateQuantity(item.id, item.qty - 1)"
                          class="px-2 py-1 text-zinc-500 hover:text-zinc-900 dark:hover:text-zinc-100 dark:text-zinc-100 transition-colors duration-150"
                          :class="item.qty <= 1 && 'opacity-50 cursor-not-allowed'">
                          <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 12h-15" />
                          </svg>
                        </button>
                        <span class="px-3 py-1 text-sm font-medium text-zinc-900 dark:text-zinc-100 min-w-8 text-center" x-text="item.qty"></span>
                        <button @click="updateQuantity(item.id, item.qty + 1)"
                          class="px-2 py-1 text-zinc-500 hover:text-zinc-900 dark:hover:text-zinc-100 dark:text-zinc-100 transition-colors duration-150">
                          <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                          </svg>
                        </button>
                      </div>
                      <span class="text-xs text-zinc-400 dark:text-zinc-500 ml-2" x-text="'$' + item.price.toFixed(2) + ' c/u'"></span>
                    </div>
                    <span class="text-sm font-semibold text-zinc-900 dark:text-zinc-100" x-text="'$' + (item.price * item.qty).toFixed(2)"></span>
                  </div>
                </div>
              </div>
            </template>
          </div>
        </div>

        <!-- Resumen -->
        <div class="lg:col-span-1">
          <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl shadow-sm p-6 space-y-4 sticky top-6">
            <h3 class="text-base font-semibold text-zinc-900 dark:text-zinc-100">Resumen del pedido</h3>

            <div class="space-y-3 text-sm">
              <div class="flex items-center justify-between">
                <span class="text-zinc-600 dark:text-zinc-400 dark:text-zinc-500">Subtotal</span>
                <span class="font-medium text-zinc-900 dark:text-zinc-100" x-text="'$' + subtotal.toFixed(2)"></span>
              </div>
              <div class="flex items-center justify-between">
                <span class="text-zinc-600 dark:text-zinc-400 dark:text-zinc-500">Envio</span>
                <span class="font-medium" :class="shipping === 0 ? 'text-emerald-600' : 'text-zinc-900'"
                  x-text="shipping === 0 ? 'Gratis' : '$' + shipping.toFixed(2)"></span>
              </div>
              <template x-if="couponApplied">
                <div class="flex items-center justify-between">
                  <span class="text-emerald-600">Descuento (10%)</span>
                  <span class="font-medium text-emerald-600" x-text="'-$' + discount.toFixed(2)"></span>
                </div>
              </template>
            </div>

            <!-- Cupon -->
            <div class="border-t border-zinc-200 dark:border-zinc-800 pt-4">
              <template x-if="!couponApplied">
                <div class="flex gap-2">
                  <input type="text" class="input flex-1" placeholder="Codigo de cupon" x-model="coupon" />
                  <button @click="applyCoupon()" class="btn-secondary btn-sm">Aplicar</button>
                </div>
              </template>
              <template x-if="couponApplied">
                <div class="flex items-center justify-between bg-emerald-50 dark:bg-emerald-950 px-3 py-2 rounded-lg">
                  <span class="text-sm text-emerald-600 dark:text-emerald-400 font-medium">SAVE10</span>
                  <button @click="couponApplied = false; coupon = ''" class="text-emerald-600 hover:text-emerald-800 text-xs font-medium">Quitar</button>
                </div>
              </template>
            </div>

            <!-- Total -->
            <div class="border-t border-zinc-200 dark:border-zinc-800 pt-4">
              <div class="flex items-center justify-between">
                <span class="text-base font-semibold text-zinc-900 dark:text-zinc-100">Total</span>
                <span class="text-xl font-bold text-zinc-900 dark:text-zinc-100" x-text="'$' + total.toFixed(2)"></span>
              </div>
            </div>

            <button class="btn-primary btn-lg w-full">Proceder al pago</button>

            <p x-show="shipping > 0" class="text-xs text-zinc-500 text-center">
              Envio gratis en compras superiores a $100.00
            </p>
          </div>
        </div>
      </div>
    </section>
  </div>

  <style>[x-cloak] { display: none !important; }</style>
  <script>
    function shoppingCart() {
      return {
        items: [
          { id: 1, name: 'Auriculares Premium Wireless', variant: 'Negro / Talla M', price: 149.99, qty: 1 },
          { id: 2, name: 'Teclado Mecanico RGB', variant: 'Layout ES / Switches Red', price: 129.99, qty: 1 },
          { id: 3, name: 'Mouse Ergonomico Pro', variant: 'Gris / Inalambrico', price: 49.99, qty: 2 },
          { id: 4, name: 'Cable USB-C Premium', variant: '2 metros / Trenzado', price: 12.99, qty: 1 }
        ],
        coupon: '',
        couponApplied: false,
        get subtotal() {
          return this.items.reduce((sum, item) => sum + item.price * item.qty, 0);
        },
        get shipping() {
          return this.subtotal >= 100 ? 0 : 5.00;
        },
        get discount() {
          return this.couponApplied ? this.subtotal * 0.10 : 0;
        },
        get total() {
          return this.subtotal + this.shipping - this.discount;
        },
        updateQuantity(id, qty) {
          if (qty < 1) return;
          const item = this.items.find(i => i.id === id);
          if (item) item.qty = qty;
        },
        removeItem(id) {
          this.items = this.items.filter(i => i.id !== id);
        },
        applyCoupon() {
          if (this.coupon.toUpperCase() === 'SAVE10') {
            this.couponApplied = true;
          }
        }
      }
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
