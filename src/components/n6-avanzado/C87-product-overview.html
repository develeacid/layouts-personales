<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LayoutOS · C87 Product Overview</title>
  <link rel="stylesheet" href="/public/css/main.css" />
</head>
<body class="h-full bg-page antialiased">
  <div class="max-w-5xl mx-auto px-4 sm:px-6 py-16 space-y-16">
    <header>
      <p class="text-xs font-medium uppercase tracking-wide text-zinc-400 dark:text-zinc-500">C87 · Nivel 6</p>
      <h1 class="text-2xl font-semibold tracking-tight text-zinc-900 dark:text-zinc-100 mt-1">Product Overview</h1>
      <p class="text-sm text-zinc-600 dark:text-zinc-400 mt-1">Detalle de producto completo con galeria, variantes y acciones.</p>
    </header>

    <section class="relative" x-data="productOverview()">
      <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl shadow-sm p-6">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
          <!-- Galeria -->
          <div class="space-y-4">
            <div class="bg-zinc-100 dark:bg-zinc-800 aspect-square rounded-lg flex items-center justify-center overflow-hidden">
              <div class="text-center">
                <svg class="w-20 h-20 text-zinc-300 mx-auto" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.41a2.25 2.25 0 013.182 0l2.909 2.91M3.75 21h16.5A2.25 2.25 0 0022.5 18.75V5.25A2.25 2.25 0 0020.25 3H3.75A2.25 2.25 0 001.5 5.25v13.5A2.25 2.25 0 003.75 21z" />
                </svg>
                <p class="text-sm text-zinc-400 dark:text-zinc-500 mt-2" x-text="'Imagen ' + (selectedImage + 1)"></p>
              </div>
            </div>
            <div class="grid grid-cols-4 gap-3">
              <template x-for="(img, index) in images" :key="index">
                <button @click="selectedImage = index"
                  class="bg-zinc-100 dark:bg-zinc-800 aspect-square rounded-lg flex items-center justify-center border-2 transition-all duration-150"
                  :class="selectedImage === index ? 'border-blue-600' : 'border-transparent hover:border-zinc-300'">
                  <svg class="w-8 h-8 text-zinc-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.41a2.25 2.25 0 013.182 0l2.909 2.91M3.75 21h16.5A2.25 2.25 0 0022.5 18.75V5.25A2.25 2.25 0 0020.25 3H3.75A2.25 2.25 0 001.5 5.25v13.5A2.25 2.25 0 003.75 21z" />
                  </svg>
                </button>
              </template>
            </div>
          </div>

          <!-- Info -->
          <div class="space-y-5">
            <div>
              <h2 class="text-xl font-semibold text-zinc-900 dark:text-zinc-100">Auriculares Premium Wireless</h2>
              <div class="flex items-center gap-2 mt-2">
                <div class="flex items-center gap-0.5">
                  <template x-for="star in 5" :key="star">
                    <svg class="w-4 h-4" :class="star <= 4 ? 'text-amber-400 fill-amber-400' : 'text-zinc-200 fill-zinc-200'" viewBox="0 0 20 20" fill="currentColor">
                      <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
                    </svg>
                  </template>
                </div>
                <span class="text-sm text-zinc-500">4.5 · 128 resenas</span>
              </div>
            </div>

            <!-- Precio -->
            <div class="flex items-baseline gap-3">
              <span class="text-3xl font-bold text-zinc-900 dark:text-zinc-100">$149.99</span>
              <span class="text-lg text-zinc-400 dark:text-zinc-500 line-through">$199.99</span>
              <span class="badge-amber">-25%</span>
            </div>

            <!-- Badges -->
            <div class="flex flex-wrap gap-2">
              <span class="inline-flex items-center gap-1 text-xs font-medium px-2.5 py-1 rounded-full bg-emerald-50 dark:bg-emerald-950 text-emerald-600">
                <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
                </svg>
                En stock
              </span>
              <span class="inline-flex items-center gap-1 text-xs font-medium px-2.5 py-1 rounded-full bg-blue-50 dark:bg-blue-950 text-blue-600">
                <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 18.75a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m3 0h6m-9 0H3.375a1.125 1.125 0 01-1.125-1.125V14.25m17.25 4.5a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m3 0h1.125c.621 0 1.129-.504 1.09-1.124a17.902 17.902 0 00-3.213-9.193 2.056 2.056 0 00-1.58-.86H14.25M16.5 18.75h-2.25m0-11.177v-.958c0-.568-.422-1.048-.987-1.106a48.554 48.554 0 00-10.026 0 1.106 1.106 0 00-.987 1.106v7.635m12-6.677v6.677m0 4.5v-4.5m0 0h-12" />
                </svg>
                Envio gratis
              </span>
              <span class="inline-flex items-center gap-1 text-xs font-medium px-2.5 py-1 rounded-full bg-amber-50 dark:bg-amber-950 text-amber-600">
                Quedan 3
              </span>
            </div>

            <!-- Color -->
            <div>
              <p class="text-sm font-medium text-zinc-900 dark:text-zinc-100 mb-2">Color: <span class="font-normal text-zinc-500" x-text="colors.find(c => c.value === selectedColor)?.label"></span></p>
              <div class="flex items-center gap-3">
                <template x-for="color in colors" :key="color.value">
                  <button @click="selectedColor = color.value"
                    class="w-8 h-8 rounded-full border-2 transition-all duration-150"
                    :class="selectedColor === color.value ? 'border-blue-600 scale-110' : 'border-zinc-200 hover:border-zinc-400'"
                    :style="'background-color: ' + color.hex">
                  </button>
                </template>
              </div>
            </div>

            <!-- Talla -->
            <div>
              <p class="text-sm font-medium text-zinc-900 dark:text-zinc-100 mb-2">Talla</p>
              <div class="flex items-center gap-2">
                <template x-for="size in sizes" :key="size.value">
                  <button @click="!size.disabled && (selectedSize = size.value)"
                    class="px-4 py-2 text-sm font-medium rounded-lg border transition-all duration-150"
                    :class="size.disabled
                      ? 'bg-zinc-50 dark:bg-zinc-800 text-zinc-300 border-zinc-200 dark:border-zinc-800 cursor-not-allowed line-through'
                      : selectedSize === size.value
                        ? 'bg-blue-600 text-white border-blue-600'
                        : 'bg-white dark:bg-zinc-900 text-zinc-600 dark:text-zinc-400 border-zinc-200 dark:border-zinc-800 hover:border-zinc-400'"
                    :disabled="size.disabled"
                    x-text="size.value">
                  </button>
                </template>
              </div>
            </div>

            <!-- Cantidad -->
            <div>
              <p class="text-sm font-medium text-zinc-900 dark:text-zinc-100 mb-2">Cantidad</p>
              <div class="inline-flex items-center border border-zinc-200 dark:border-zinc-800 rounded-lg">
                <button @click="quantity > 1 && quantity--"
                  class="px-3 py-2 text-zinc-500 hover:text-zinc-900 dark:hover:text-zinc-100 dark:text-zinc-100 transition-colors duration-150"
                  :class="quantity <= 1 && 'opacity-50 cursor-not-allowed'">
                  <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 12h-15" />
                  </svg>
                </button>
                <span class="px-4 py-2 text-sm font-medium text-zinc-900 dark:text-zinc-100 min-w-10 text-center" x-text="quantity"></span>
                <button @click="quantity++"
                  class="px-3 py-2 text-zinc-500 hover:text-zinc-900 dark:hover:text-zinc-100 dark:text-zinc-100 transition-colors duration-150">
                  <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                  </svg>
                </button>
              </div>
            </div>

            <!-- Acciones -->
            <div class="flex items-center gap-3 pt-2">
              <button class="btn-primary btn-lg flex-1">Agregar al carrito</button>
              <button class="w-12 h-12 border border-zinc-200 dark:border-zinc-800 rounded-lg flex items-center justify-center hover:bg-zinc-50 dark:hover:bg-zinc-800 dark:bg-zinc-800 transition-colors duration-150">
                <svg class="w-5 h-5 text-zinc-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z" />
                </svg>
              </button>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <style>[x-cloak] { display: none !important; }</style>
  <script>
    function productOverview() {
      return {
        selectedImage: 0,
        selectedColor: 'black',
        selectedSize: 'M',
        quantity: 1,
        images: [
          { id: 1, alt: 'Vista frontal' },
          { id: 2, alt: 'Vista lateral' },
          { id: 3, alt: 'Vista trasera' },
          { id: 4, alt: 'Detalle' }
        ],
        colors: [
          { value: 'black', label: 'Negro', hex: '#18181b' },
          { value: 'white', label: 'Blanco', hex: '#f4f4f5' },
          { value: 'blue', label: 'Azul', hex: '#2563eb' },
          { value: 'rose', label: 'Rosa', hex: '#e11d48' }
        ],
        sizes: [
          { value: 'S', disabled: false },
          { value: 'M', disabled: false },
          { value: 'L', disabled: false },
          { value: 'XL', disabled: true }
        ]
      }
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
