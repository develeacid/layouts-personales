<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LayoutOS · C86 Product Cards</title>
  <link rel="stylesheet" href="/public/css/main.css" />
</head>
<body class="h-full bg-page antialiased">
  <div class="max-w-5xl mx-auto px-4 sm:px-6 py-16 space-y-16">
    <header>
      <p class="text-xs font-medium uppercase tracking-wide text-zinc-400 dark:text-zinc-500">C86 · Nivel 6</p>
      <h1 class="text-2xl font-semibold tracking-tight text-zinc-900 dark:text-zinc-100 mt-1">Product Cards</h1>
      <p class="text-sm text-zinc-600 dark:text-zinc-400 mt-1">Cards de producto e-commerce con favoritos, ratings y variantes de layout.</p>
    </header>

    <!-- Variante 1: Card vertical -->
    <section class="relative space-y-4" x-data="productCards()">
      <h2 class="text-sm font-medium text-zinc-900 dark:text-zinc-100">Variante 1 — Card vertical</h2>

      <div class="max-w-xs">
        <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl shadow-sm hover:shadow-md hover:-translate-y-px transition-all duration-200 overflow-hidden">
          <div class="relative">
            <div class="bg-zinc-100 dark:bg-zinc-800 aspect-square rounded-t-lg flex items-center justify-center">
              <svg class="w-16 h-16 text-zinc-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1">
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.41a2.25 2.25 0 013.182 0l2.909 2.91M3.75 21h16.5A2.25 2.25 0 0022.5 18.75V5.25A2.25 2.25 0 0020.25 3H3.75A2.25 2.25 0 001.5 5.25v13.5A2.25 2.25 0 003.75 21z" />
              </svg>
            </div>
            <span class="badge-blue absolute top-3 left-3">Nuevo</span>
            <button @click="toggleFavorite(products[0].id)"
              class="absolute top-3 right-3 w-8 h-8 bg-white dark:bg-zinc-900 rounded-full shadow-sm flex items-center justify-center hover:scale-110 transition-all duration-150">
              <svg class="w-5 h-5 transition-colors duration-150"
                :class="products[0].favorite ? 'text-rose-500 fill-rose-500' : 'text-zinc-400'"
                fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z" />
              </svg>
            </button>
          </div>
          <div class="p-4 space-y-2">
            <h3 class="text-sm font-medium text-zinc-900 dark:text-zinc-100" x-text="products[0].name"></h3>
            <div class="flex items-center gap-1">
              <template x-for="star in 5" :key="star">
                <svg class="w-4 h-4" :class="star <= Math.round(products[0].rating) ? 'text-amber-400 fill-amber-400' : 'text-zinc-200 fill-zinc-200'" viewBox="0 0 20 20" fill="currentColor">
                  <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
                </svg>
              </template>
              <span class="text-xs text-zinc-500 ml-1" x-text="products[0].rating"></span>
            </div>
            <p class="text-lg font-semibold text-zinc-900 dark:text-zinc-100" x-text="'$' + products[0].price.toFixed(2)"></p>
            <button class="btn-primary w-full mt-2">Agregar al carrito</button>
          </div>
        </div>
      </div>
    </section>

    <!-- Variante 2: Card horizontal -->
    <section class="relative space-y-4" x-data="productCards()">
      <h2 class="text-sm font-medium text-zinc-900 dark:text-zinc-100">Variante 2 — Card horizontal</h2>

      <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl shadow-sm hover:shadow-md hover:-translate-y-px transition-all duration-200 overflow-hidden flex">
        <div class="bg-zinc-100 dark:bg-zinc-800 w-48 shrink-0 flex items-center justify-center">
          <svg class="w-12 h-12 text-zinc-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1">
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.41a2.25 2.25 0 013.182 0l2.909 2.91M3.75 21h16.5A2.25 2.25 0 0022.5 18.75V5.25A2.25 2.25 0 0020.25 3H3.75A2.25 2.25 0 001.5 5.25v13.5A2.25 2.25 0 003.75 21z" />
          </svg>
        </div>
        <div class="p-4 flex flex-col justify-between flex-1">
          <div class="space-y-1">
            <div class="flex items-center justify-between">
              <h3 class="text-sm font-medium text-zinc-900 dark:text-zinc-100" x-text="products[1].name"></h3>
              <span class="badge-amber">Oferta -20%</span>
            </div>
            <div class="flex items-center gap-1">
              <template x-for="star in 5" :key="star">
                <svg class="w-4 h-4" :class="star <= Math.round(products[1].rating) ? 'text-amber-400 fill-amber-400' : 'text-zinc-200 fill-zinc-200'" viewBox="0 0 20 20" fill="currentColor">
                  <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
                </svg>
              </template>
              <span class="text-xs text-zinc-500 ml-1" x-text="products[1].rating"></span>
            </div>
            <p class="text-sm text-zinc-500 line-clamp-2">Producto de alta calidad con materiales premium y acabado profesional.</p>
          </div>
          <div class="flex items-center justify-between mt-3">
            <div class="flex items-center gap-2">
              <span class="text-lg font-semibold text-zinc-900 dark:text-zinc-100" x-text="'$' + products[1].price.toFixed(2)"></span>
              <span class="text-sm text-zinc-400 dark:text-zinc-500 line-through" x-text="'$' + (products[1].price * 1.25).toFixed(2)"></span>
            </div>
            <div class="flex items-center gap-2">
              <button @click="toggleFavorite(products[1].id)"
                class="w-8 h-8 border border-zinc-200 dark:border-zinc-800 rounded-lg flex items-center justify-center hover:bg-zinc-50 dark:bg-zinc-800 transition-colors duration-150">
                <svg class="w-4 h-4 transition-colors duration-150"
                  :class="products[1].favorite ? 'text-rose-500 fill-rose-500' : 'text-zinc-400'"
                  fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z" />
                </svg>
              </button>
              <button class="btn-primary btn-sm">Agregar</button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Variante 3: Grid de 4 cards -->
    <section class="relative space-y-4" x-data="productCards()">
      <h2 class="text-sm font-medium text-zinc-900 dark:text-zinc-100">Variante 3 — Grid de 4 cards</h2>

      <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
        <template x-for="product in products" :key="product.id">
          <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl shadow-sm hover:shadow-md hover:-translate-y-px transition-all duration-200 overflow-hidden">
            <div class="relative">
              <div class="bg-zinc-100 dark:bg-zinc-800 aspect-square flex items-center justify-center">
                <svg class="w-12 h-12 text-zinc-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.41a2.25 2.25 0 013.182 0l2.909 2.91M3.75 21h16.5A2.25 2.25 0 0022.5 18.75V5.25A2.25 2.25 0 0020.25 3H3.75A2.25 2.25 0 001.5 5.25v13.5A2.25 2.25 0 003.75 21z" />
                </svg>
              </div>
              <span x-show="product.badge" x-text="product.badge"
                :class="product.badge === 'Nuevo' ? 'badge-blue' : 'badge-amber'"
                class="absolute top-2 left-2"></span>
              <button @click="toggleFavorite(product.id)"
                class="absolute top-2 right-2 w-7 h-7 bg-white dark:bg-zinc-900 rounded-full shadow-sm flex items-center justify-center hover:scale-110 transition-all duration-150">
                <svg class="w-4 h-4 transition-colors duration-150"
                  :class="product.favorite ? 'text-rose-500 fill-rose-500' : 'text-zinc-400'"
                  fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z" />
                </svg>
              </button>
            </div>
            <div class="p-3 space-y-1.5">
              <h3 class="text-sm font-medium text-zinc-900 dark:text-zinc-100 truncate" x-text="product.name"></h3>
              <div class="flex items-center gap-0.5">
                <template x-for="star in 5" :key="star">
                  <svg class="w-3.5 h-3.5" :class="star <= Math.round(product.rating) ? 'text-amber-400 fill-amber-400' : 'text-zinc-200 fill-zinc-200'" viewBox="0 0 20 20" fill="currentColor">
                    <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
                  </svg>
                </template>
                <span class="text-xs text-zinc-500 ml-1" x-text="product.rating"></span>
              </div>
              <div class="flex items-center gap-2">
                <span class="text-base font-semibold text-zinc-900 dark:text-zinc-100" x-text="'$' + product.price.toFixed(2)"></span>
                <span x-show="product.oldPrice" class="text-xs text-zinc-400 dark:text-zinc-500 line-through" x-text="product.oldPrice ? '$' + product.oldPrice.toFixed(2) : ''"></span>
              </div>
              <button class="btn-primary btn-sm w-full mt-1">Agregar al carrito</button>
            </div>
          </div>
        </template>
      </div>
    </section>
  </div>

  <style>[x-cloak] { display: none !important; }</style>
  <script>
    function productCards() {
      return {
        products: [
          { id: 1, name: 'Audífonos Inalámbricos Pro', price: 79.99, oldPrice: null, rating: 4.5, badge: 'Nuevo', favorite: false },
          { id: 2, name: 'Teclado Mecánico RGB', price: 129.99, oldPrice: 159.99, rating: 4.8, badge: 'Oferta -20%', favorite: false },
          { id: 3, name: 'Mouse Ergonómico', price: 49.99, oldPrice: null, rating: 4.2, badge: null, favorite: false },
          { id: 4, name: 'Monitor 4K Ultra HD', price: 349.99, oldPrice: 399.99, rating: 4.7, badge: 'Oferta -12%', favorite: false }
        ],
        toggleFavorite(id) {
          const product = this.products.find(p => p.id === id);
          if (product) product.favorite = !product.favorite;
        }
      }
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
