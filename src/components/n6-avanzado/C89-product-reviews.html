<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LayoutOS · C89 Product Reviews</title>
  <link rel="stylesheet" href="/public/css/main.css" />
</head>
<body class="h-full bg-page antialiased">
  <div class="max-w-5xl mx-auto px-4 sm:px-6 py-16 space-y-16">
    <header>
      <p class="text-xs font-medium uppercase tracking-wide text-zinc-400 dark:text-zinc-500">C89 · Nivel 6</p>
      <h1 class="text-2xl font-semibold tracking-tight text-zinc-900 dark:text-zinc-100 mt-1">Product Reviews</h1>
      <p class="text-sm text-zinc-600 dark:text-zinc-400 mt-1">Resenas de producto con resumen, filtros y formulario de escritura.</p>
    </header>

    <section class="relative" x-data="productReviews()">
      <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl shadow-sm p-6 space-y-8">

        <!-- Resumen -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
          <!-- Promedio -->
          <div class="text-center md:text-left">
            <div class="text-5xl font-bold text-zinc-900 dark:text-zinc-100">4.5</div>
            <div class="flex items-center justify-center md:justify-start gap-0.5 mt-2">
              <template x-for="star in 5" :key="star">
                <svg class="w-5 h-5" :class="star <= 4 ? 'text-amber-400 fill-amber-400' : 'text-amber-400 fill-amber-200'" viewBox="0 0 20 20" fill="currentColor">
                  <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
                </svg>
              </template>
            </div>
            <p class="text-sm text-zinc-500 mt-1">Basado en 128 resenas</p>
          </div>

          <!-- Distribucion -->
          <div class="col-span-2 space-y-2">
            <template x-for="stars in [5, 4, 3, 2, 1]" :key="stars">
              <div class="flex items-center gap-3">
                <span class="text-sm text-zinc-600 dark:text-zinc-400 dark:text-zinc-500 w-16 shrink-0" x-text="stars + ' estrellas'"></span>
                <div class="flex-1 bg-zinc-100 dark:bg-zinc-800 rounded-full h-2 overflow-hidden">
                  <div class="bg-amber-400 h-full rounded-full transition-all duration-300"
                    :style="'width: ' + {5: '55%', 4: '28%', 3: '10%', 2: '5%', 1: '2%'}[stars]">
                  </div>
                </div>
                <span class="text-xs text-zinc-500 w-8 text-right" x-text="{5: '70', 4: '36', 3: '13', 2: '6', 1: '3'}[stars]"></span>
              </div>
            </template>
          </div>
        </div>

        <!-- Filtros y boton escribir -->
        <div class="flex flex-wrap items-center justify-between gap-4 border-t border-zinc-200 dark:border-zinc-800 pt-6">
          <div class="flex flex-wrap gap-2">
            <button @click="filter = 'all'"
              class="px-3 py-1.5 text-sm font-medium rounded-lg border transition-colors duration-150"
              :class="filter === 'all' ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-zinc-600 border-zinc-200 hover:border-zinc-400'">
              Todas
            </button>
            <template x-for="s in [5, 4, 3, 2, 1]" :key="s">
              <button @click="filter = s"
                class="px-3 py-1.5 text-sm font-medium rounded-lg border transition-colors duration-150"
                :class="filter === s ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-zinc-600 border-zinc-200 hover:border-zinc-400'"
                x-text="s + ' estrellas'">
              </button>
            </template>
          </div>
          <button @click="showForm = !showForm" class="btn-primary btn-sm">Escribir resena</button>
        </div>

        <!-- Formulario de resena -->
        <div x-show="showForm" x-cloak x-transition:enter="transition ease-out duration-200"
          x-transition:enter-start="opacity-0 -translate-y-2" x-transition:enter-end="opacity-100 translate-y-0"
          class="border border-zinc-200 dark:border-zinc-800 rounded-lg p-5 space-y-4 bg-zinc-50 dark:bg-zinc-800">
          <h3 class="text-sm font-semibold text-zinc-900 dark:text-zinc-100">Tu resena</h3>
          <div>
            <label class="label">Calificacion</label>
            <div class="flex items-center gap-1 mt-1">
              <template x-for="star in 5" :key="star">
                <button @click="newReview.rating = star" class="focus:outline-none">
                  <svg class="w-7 h-7 transition-colors duration-150"
                    :class="star <= newReview.rating ? 'text-amber-400 fill-amber-400' : 'text-zinc-300 hover:text-amber-200'"
                    viewBox="0 0 20 20" fill="currentColor">
                    <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
                  </svg>
                </button>
              </template>
            </div>
          </div>
          <div>
            <label class="label">Titulo</label>
            <input type="text" class="input" x-model="newReview.title" placeholder="Resume tu experiencia" />
          </div>
          <div>
            <label class="label">Resena</label>
            <textarea class="input" rows="4" x-model="newReview.text" placeholder="Cuenta tu experiencia con el producto..."></textarea>
          </div>
          <div class="flex items-center gap-3">
            <button @click="submitReview()" class="btn-primary btn-sm">Enviar resena</button>
            <button @click="showForm = false" class="btn-ghost btn-sm">Cancelar</button>
          </div>
        </div>

        <!-- Lista de resenas -->
        <div class="space-y-6">
          <template x-for="review in filteredReviews" :key="review.id">
            <div class="border-t border-zinc-200 dark:border-zinc-800 pt-6">
              <div class="flex items-start gap-4">
                <div class="w-10 h-10 rounded-full bg-zinc-200 flex items-center justify-center shrink-0">
                  <span class="text-sm font-medium text-zinc-600 dark:text-zinc-400 dark:text-zinc-500" x-text="review.name.charAt(0)"></span>
                </div>
                <div class="flex-1 min-w-0">
                  <div class="flex items-center justify-between">
                    <div>
                      <p class="text-sm font-medium text-zinc-900 dark:text-zinc-100" x-text="review.name"></p>
                      <div class="flex items-center gap-2 mt-0.5">
                        <div class="flex items-center gap-0.5">
                          <template x-for="star in 5" :key="star">
                            <svg class="w-3.5 h-3.5" :class="star <= review.rating ? 'text-amber-400 fill-amber-400' : 'text-zinc-200 fill-zinc-200'" viewBox="0 0 20 20" fill="currentColor">
                              <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
                            </svg>
                          </template>
                        </div>
                        <span class="text-xs text-zinc-400 dark:text-zinc-500" x-text="review.date"></span>
                      </div>
                    </div>
                  </div>
                  <h4 class="text-sm font-medium text-zinc-900 dark:text-zinc-100 mt-2" x-text="review.title"></h4>
                  <p class="text-sm text-zinc-600 dark:text-zinc-400 dark:text-zinc-500 mt-1 leading-relaxed" x-text="review.text"></p>
                  <button @click="toggleHelpful(review.id)"
                    class="mt-3 inline-flex items-center gap-1.5 text-xs font-medium transition-colors duration-150"
                    :class="review.helpfulByUser ? 'text-blue-600' : 'text-zinc-400 hover:text-zinc-600 dark:hover:text-zinc-400'">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M6.633 10.5c.806 0 1.533-.446 2.031-1.08a9.041 9.041 0 012.861-2.4c.723-.384 1.35-.956 1.653-1.715a4.498 4.498 0 00.322-1.672V3a.75.75 0 01.75-.75A2.25 2.25 0 0116.5 4.5c0 1.152-.26 2.243-.723 3.218-.266.558.107 1.282.725 1.282h3.126c1.026 0 1.945.694 2.054 1.715.045.422.068.85.068 1.285a11.95 11.95 0 01-2.649 7.521c-.388.482-.987.729-1.605.729H13.48c-.483 0-.964-.078-1.423-.23l-3.114-1.04a4.501 4.501 0 00-1.423-.23H5.904M14.25 9h2.25M5.904 18.75c.083.205.173.405.27.602.197.4-.078.898-.523.898h-.908c-.889 0-1.713-.518-1.972-1.368a12 12 0 01-.521-3.507c0-1.553.295-3.036.831-4.398C3.387 10.203 4.167 9.75 5 9.75h1.053c.472 0 .745.556.5.96a8.958 8.958 0 00-1.302 4.665c0 1.194.232 2.333.654 3.375z" />
                    </svg>
                    Util (<span x-text="review.helpful"></span>)
                  </button>
                </div>
              </div>
            </div>
          </template>
        </div>
      </div>
    </section>
  </div>

  <style>[x-cloak] { display: none !important; }</style>
  <script>
    function productReviews() {
      return {
        filter: 'all',
        showForm: false,
        newReview: { rating: 0, title: '', text: '' },
        reviews: [
          { id: 1, name: 'Maria Garcia', date: '15 Mar 2026', rating: 5, title: 'Excelente calidad de sonido', text: 'Los mejores auriculares que he tenido. La cancelacion de ruido es increible y la bateria dura todo el dia. Muy comodos para uso prolongado.', helpful: 24, helpfulByUser: false },
          { id: 2, name: 'Carlos Lopez', date: '12 Mar 2026', rating: 5, title: 'Superan las expectativas', text: 'Compre estos auriculares para trabajar desde casa y son perfectos. El sonido es cristalino y la conexion multipunto es genial.', helpful: 18, helpfulByUser: false },
          { id: 3, name: 'Ana Martinez', date: '8 Mar 2026', rating: 4, title: 'Muy buenos pero algo pesados', text: 'La calidad de audio es fantastica y el ANC funciona muy bien. Mi unica queja es que despues de 3 horas se sienten un poco pesados.', helpful: 12, helpfulByUser: false },
          { id: 4, name: 'Pedro Sanchez', date: '3 Mar 2026', rating: 4, title: 'Gran relacion calidad-precio', text: 'Por este precio es dificil encontrar algo mejor. El sonido es muy equilibrado y la construccion se siente premium.', helpful: 9, helpfulByUser: false },
          { id: 5, name: 'Laura Fernandez', date: '28 Feb 2026', rating: 3, title: 'Buenos pero esperaba mas', text: 'El sonido es bueno pero no excepcional. La cancelacion de ruido funciona bien en ambientes de oficina pero no tanto en exteriores.', helpful: 5, helpfulByUser: false },
          { id: 6, name: 'Diego Torres', date: '20 Feb 2026', rating: 5, title: 'Imprescindibles', text: 'Llevo dos meses usandolos a diario y estoy encantado. La carga rapida es muy util y el estuche es compacto y elegante.', helpful: 15, helpfulByUser: false }
        ],
        get filteredReviews() {
          if (this.filter === 'all') return this.reviews;
          return this.reviews.filter(r => r.rating === this.filter);
        },
        submitReview() {
          if (!this.newReview.rating || !this.newReview.title || !this.newReview.text) return;
          this.reviews.unshift({
            id: Date.now(),
            name: 'Tu',
            date: 'Ahora',
            rating: this.newReview.rating,
            title: this.newReview.title,
            text: this.newReview.text,
            helpful: 0,
            helpfulByUser: false
          });
          this.newReview = { rating: 0, title: '', text: '' };
          this.showForm = false;
        },
        toggleHelpful(id) {
          const review = this.reviews.find(r => r.id === id);
          if (review) {
            review.helpfulByUser = !review.helpfulByUser;
            review.helpful += review.helpfulByUser ? 1 : -1;
          }
        }
      }
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
