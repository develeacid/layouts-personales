<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LayoutOS · C95 Calendario Interactivo</title>
  <link rel="stylesheet" href="/public/css/main.css" />
</head>
<body class="h-full bg-page antialiased">
  <div class="max-w-6xl mx-auto px-4 sm:px-6 py-16 space-y-16">
    <header>
      <p class="text-xs font-medium uppercase tracking-wide text-zinc-400 dark:text-zinc-500">C95 · Nivel 6</p>
      <h1 class="text-2xl font-semibold tracking-tight text-zinc-900 dark:text-zinc-100 mt-1">Calendario Interactivo</h1>
      <p class="text-sm text-zinc-600 dark:text-zinc-400 mt-1">Calendario con vistas mes, semana y dia.</p>
    </header>

    <section x-data="interactiveCalendar()" class="relative space-y-6">
      <!-- Header nav -->
      <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
        <div class="flex items-center gap-3">
          <button @click="prevPeriod()" class="btn-ghost btn-sm">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
          </button>
          <h2 class="text-lg font-semibold text-zinc-900 dark:text-zinc-100 min-w-48 text-center" x-text="headerTitle"></h2>
          <button @click="nextPeriod()" class="btn-ghost btn-sm">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
          </button>
          <button @click="goToday()" class="btn-secondary btn-sm">Hoy</button>
        </div>

        <!-- View selector pills -->
        <div class="flex bg-zinc-100 dark:bg-zinc-800 rounded-lg p-1 gap-0.5">
          <button @click="view = 'month'" class="text-sm font-medium px-3 py-1.5 rounded-md transition-colors"
            :class="view === 'month' ? 'bg-white text-zinc-900 shadow-sm' : 'text-zinc-500 hover:text-zinc-700'">Mes</button>
          <button @click="view = 'week'" class="text-sm font-medium px-3 py-1.5 rounded-md transition-colors"
            :class="view === 'week' ? 'bg-white text-zinc-900 shadow-sm' : 'text-zinc-500 hover:text-zinc-700'">Semana</button>
          <button @click="view = 'day'" class="text-sm font-medium px-3 py-1.5 rounded-md transition-colors"
            :class="view === 'day' ? 'bg-white text-zinc-900 shadow-sm' : 'text-zinc-500 hover:text-zinc-700'">Dia</button>
        </div>
      </div>

      <!-- Month View -->
      <div x-show="view === 'month'" class="flex gap-6">
        <div class="flex-1">
          <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl shadow-sm overflow-hidden">
            <!-- Weekday headers -->
            <div class="grid grid-cols-7 border-b border-zinc-200 dark:border-zinc-800">
              <template x-for="day in ['Lun','Mar','Mie','Jue','Vie','Sab','Dom']">
                <div class="text-xs font-medium text-zinc-500 text-center py-2" x-text="day"></div>
              </template>
            </div>
            <!-- Day cells -->
            <div class="grid grid-cols-7">
              <template x-for="(cell, i) in calendarDays" :key="i">
                <div @click="cell.day ? selectDate(cell.fullDate) : null"
                  class="min-h-24 border-b border-r border-zinc-100 p-1.5 cursor-pointer transition-colors hover:bg-zinc-50 dark:bg-zinc-800"
                  :class="{
                    'bg-blue-50 dark:bg-blue-950': cell.fullDate === selectedDate,
                    'bg-zinc-50/50': !cell.currentMonth
                  }">
                  <span class="text-xs font-medium inline-flex items-center justify-center w-6 h-6 rounded-full"
                    :class="{
                      'bg-blue-600 text-white': cell.isToday,
                      'text-zinc-900 dark:text-zinc-100': cell.currentMonth && !cell.isToday,
                      'text-zinc-300': !cell.currentMonth
                    }"
                    x-text="cell.day"></span>
                  <div class="mt-0.5 space-y-0.5">
                    <template x-for="ev in getEventsForDate(cell.fullDate)" :key="ev.id">
                      <div class="text-xs truncate rounded px-1 py-0.5 font-medium"
                        :class="ev.colorClass"
                        x-text="ev.title"></div>
                    </template>
                  </div>
                </div>
              </template>
            </div>
          </div>
        </div>

        <!-- Side panel: selected day events -->
        <div x-show="selectedDate" class="w-72 shrink-0 hidden lg:block">
          <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl shadow-sm p-4 space-y-3">
            <h3 class="text-sm font-semibold text-zinc-900 dark:text-zinc-100" x-text="formatSelectedDate()"></h3>
            <template x-for="ev in getEventsForDate(selectedDate)" :key="ev.id">
              <div class="flex items-start gap-3 py-2 border-t border-zinc-100">
                <div class="w-2 h-2 rounded-full mt-1.5 shrink-0" :class="ev.dotClass"></div>
                <div>
                  <p class="text-sm font-medium text-zinc-900 dark:text-zinc-100" x-text="ev.title"></p>
                  <p class="text-xs text-zinc-500" x-text="ev.time"></p>
                  <span class="text-xs font-medium mt-1 inline-block" :class="ev.colorClass" x-text="ev.type"></span>
                </div>
              </div>
            </template>
            <p x-show="getEventsForDate(selectedDate).length === 0" class="text-sm text-zinc-400 dark:text-zinc-500">Sin eventos</p>
            <button @click="openEventModal()" class="btn-primary btn-sm w-full mt-2">Agregar evento</button>
          </div>
        </div>
      </div>

      <!-- Week View -->
      <div x-show="view === 'week'">
        <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl shadow-sm overflow-hidden overflow-x-auto">
          <!-- Week headers -->
          <div class="grid grid-cols-8 border-b border-zinc-200 dark:border-zinc-800">
            <div class="p-2 border-r border-zinc-100"></div>
            <template x-for="wd in weekDays" :key="wd.date">
              <div class="p-2 text-center border-r border-zinc-100"
                :class="wd.isToday ? 'bg-blue-50' : ''">
                <p class="text-xs text-zinc-500" x-text="wd.label"></p>
                <p class="text-sm font-semibold" :class="wd.isToday ? 'text-blue-600' : 'text-zinc-900'" x-text="wd.num"></p>
              </div>
            </template>
          </div>
          <!-- Hour rows -->
          <template x-for="hour in dayHours" :key="hour">
            <div class="grid grid-cols-8 border-b border-zinc-100 min-h-14">
              <div class="p-1 pr-2 text-right border-r border-zinc-100">
                <span class="text-xs text-zinc-400 dark:text-zinc-500" x-text="hour + ':00'"></span>
              </div>
              <template x-for="wd in weekDays" :key="wd.date">
                <div class="border-r border-zinc-100 p-0.5 relative"
                  :class="wd.isToday ? 'bg-blue-50/30' : ''"
                  @click="selectedDate = wd.date; newEvent.startHour = hour; openEventModal()">
                  <template x-for="ev in getEventsForDateAndHour(wd.date, hour)" :key="ev.id">
                    <div class="text-xs rounded px-1.5 py-1 font-medium mb-0.5"
                      :class="ev.colorClass"
                      x-text="ev.title"></div>
                  </template>
                </div>
              </template>
            </div>
          </template>
        </div>
      </div>

      <!-- Day View -->
      <div x-show="view === 'day'">
        <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl shadow-sm overflow-hidden max-w-2xl mx-auto">
          <div class="p-4 border-b border-zinc-200 dark:border-zinc-800 text-center">
            <p class="text-sm font-semibold text-zinc-900 dark:text-zinc-100" x-text="formatSelectedDate()"></p>
          </div>
          <template x-for="hour in dayHours" :key="hour">
            <div class="flex border-b border-zinc-100 min-h-16"
              @click="newEvent.startHour = hour; openEventModal()">
              <div class="w-20 shrink-0 p-2 text-right border-r border-zinc-100">
                <span class="text-xs text-zinc-400 dark:text-zinc-500" x-text="hour + ':00'"></span>
              </div>
              <div class="flex-1 p-1 space-y-1">
                <template x-for="ev in getEventsForDateAndHour(selectedDate, hour)" :key="ev.id">
                  <div class="rounded-lg px-3 py-2" :class="ev.colorClass">
                    <p class="text-sm font-medium" x-text="ev.title"></p>
                    <p class="text-xs opacity-75" x-text="ev.time"></p>
                  </div>
                </template>
              </div>
            </div>
          </template>
        </div>
      </div>

      <!-- Event Modal -->
      <template x-teleport="body">
        <div x-show="showEventModal" x-cloak
          class="fixed inset-0 z-50 flex items-center justify-center p-4"
          @keydown.escape.window="showEventModal = false">
          <div class="absolute inset-0 bg-black/40" @click="showEventModal = false"></div>
          <div class="relative bg-white dark:bg-zinc-900 rounded-xl shadow-xl border border-zinc-200 dark:border-zinc-800 w-full max-w-md p-6 space-y-4" @click.stop>
            <h3 class="text-lg font-semibold text-zinc-900 dark:text-zinc-100">Nuevo evento</h3>
            <div class="space-y-3">
              <div>
                <label class="label">Titulo</label>
                <input x-model="newEvent.title" type="text" class="input" placeholder="Nombre del evento" />
              </div>
              <div class="grid grid-cols-2 gap-3">
                <div>
                  <label class="label">Hora inicio</label>
                  <select x-model.number="newEvent.startHour" class="input">
                    <template x-for="h in dayHours" :key="h">
                      <option :value="h" x-text="h + ':00'"></option>
                    </template>
                  </select>
                </div>
                <div>
                  <label class="label">Hora fin</label>
                  <select x-model.number="newEvent.endHour" class="input">
                    <template x-for="h in dayHours" :key="h">
                      <option :value="h" x-text="h + ':00'"></option>
                    </template>
                  </select>
                </div>
              </div>
              <div>
                <label class="label">Tipo</label>
                <select x-model="newEvent.type" class="input">
                  <option value="Reunion">Reunion</option>
                  <option value="Tarea">Tarea</option>
                  <option value="Personal">Personal</option>
                  <option value="Deadline">Deadline</option>
                </select>
              </div>
            </div>
            <div class="flex items-center justify-end gap-2 pt-2">
              <button @click="showEventModal = false" class="btn-secondary btn-sm">Cancelar</button>
              <button @click="addEvent()" class="btn-primary btn-sm">Crear evento</button>
            </div>
          </div>
        </div>
      </template>
    </section>
  </div>

  <style>[x-cloak] { display: none !important; }</style>
  <script>
  function interactiveCalendar() {
    const today = new Date();
    const todayStr = formatDate(today);

    function formatDate(d) {
      return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    }

    function getMonday(d) {
      const day = d.getDay();
      const diff = d.getDate() - day + (day === 0 ? -6 : 1);
      return new Date(d.getFullYear(), d.getMonth(), diff);
    }

    const typeColors = {
      Reunion:  { colorClass: 'bg-blue-100 text-blue-800', dotClass: 'bg-blue-500' },
      Tarea:    { colorClass: 'bg-green-100 text-green-800', dotClass: 'bg-green-500' },
      Personal: { colorClass: 'bg-amber-100 text-amber-800', dotClass: 'bg-amber-500' },
      Deadline: { colorClass: 'bg-rose-100 text-rose-800', dotClass: 'bg-rose-500' }
    };

    // Generate demo events for current month
    const y = today.getFullYear();
    const m = today.getMonth();
    const demoEvents = [
      { id: 1, title: 'Standup diario', date: formatDate(new Date(y,m,today.getDate())), startHour: 9, endHour: 10, type: 'Reunion', time: '9:00 - 10:00' },
      { id: 2, title: 'Revisar PRs pendientes', date: formatDate(new Date(y,m,today.getDate())), startHour: 11, endHour: 12, type: 'Tarea', time: '11:00 - 12:00' },
      { id: 3, title: 'Almuerzo equipo', date: formatDate(new Date(y,m,today.getDate())), startHour: 13, endHour: 14, type: 'Personal', time: '13:00 - 14:00' },
      { id: 4, title: 'Sprint planning', date: formatDate(new Date(y,m,today.getDate()+1)), startHour: 10, endHour: 12, type: 'Reunion', time: '10:00 - 12:00' },
      { id: 5, title: 'Entrega de mockups', date: formatDate(new Date(y,m,today.getDate()+2)), startHour: 17, endHour: 18, type: 'Deadline', time: '17:00 - 18:00' },
      { id: 6, title: 'Code review sesion', date: formatDate(new Date(y,m,today.getDate()+3)), startHour: 14, endHour: 15, type: 'Tarea', time: '14:00 - 15:00' },
      { id: 7, title: 'Retro del sprint', date: formatDate(new Date(y,m,today.getDate()-1)), startHour: 16, endHour: 17, type: 'Reunion', time: '16:00 - 17:00' },
      { id: 8, title: 'Dentista', date: formatDate(new Date(y,m,today.getDate()-2)), startHour: 10, endHour: 11, type: 'Personal', time: '10:00 - 11:00' },
      { id: 9, title: 'Deploy a produccion', date: formatDate(new Date(y,m,today.getDate()+4)), startHour: 9, endHour: 10, type: 'Deadline', time: '9:00 - 10:00' },
      { id: 10, title: 'Workshop accesibilidad', date: formatDate(new Date(y,m,today.getDate()+1)), startHour: 15, endHour: 17, type: 'Reunion', time: '15:00 - 17:00' },
    ];

    return {
      view: 'month',
      currentMonth: today.getMonth(),
      currentYear: today.getFullYear(),
      currentWeekStart: getMonday(today),
      selectedDate: todayStr,
      events: demoEvents.map(e => ({...e, ...typeColors[e.type]})),
      showEventModal: false,
      newEvent: { title: '', startHour: 9, endHour: 10, type: 'Reunion' },
      nextId: 11,

      get headerTitle() {
        const months = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
        if (this.view === 'month') return months[this.currentMonth] + ' ' + this.currentYear;
        if (this.view === 'week') {
          const end = new Date(this.currentWeekStart);
          end.setDate(end.getDate() + 6);
          return this.currentWeekStart.getDate() + ' - ' + end.getDate() + ' ' + months[end.getMonth()];
        }
        return this.selectedDate ? new Date(this.selectedDate + 'T12:00:00').toLocaleDateString('es', { weekday: 'long', day: 'numeric', month: 'long' }) : '';
      },

      get calendarDays() {
        const first = new Date(this.currentYear, this.currentMonth, 1);
        let startDay = first.getDay() - 1;
        if (startDay < 0) startDay = 6;
        const daysInMonth = new Date(this.currentYear, this.currentMonth + 1, 0).getDate();
        const cells = [];
        // Prev month
        const prevDays = new Date(this.currentYear, this.currentMonth, 0).getDate();
        for (let i = startDay - 1; i >= 0; i--) {
          const d = prevDays - i;
          const pm = this.currentMonth === 0 ? 11 : this.currentMonth - 1;
          const py = this.currentMonth === 0 ? this.currentYear - 1 : this.currentYear;
          cells.push({ day: d, currentMonth: false, isToday: false, fullDate: formatDate(new Date(py, pm, d)) });
        }
        // Current month
        for (let d = 1; d <= daysInMonth; d++) {
          const fd = formatDate(new Date(this.currentYear, this.currentMonth, d));
          cells.push({ day: d, currentMonth: true, isToday: fd === todayStr, fullDate: fd });
        }
        // Next month fill
        const remaining = 42 - cells.length;
        for (let d = 1; d <= remaining; d++) {
          const nm = this.currentMonth === 11 ? 0 : this.currentMonth + 1;
          const ny = this.currentMonth === 11 ? this.currentYear + 1 : this.currentYear;
          cells.push({ day: d, currentMonth: false, isToday: false, fullDate: formatDate(new Date(ny, nm, d)) });
        }
        return cells;
      },

      get weekDays() {
        const days = [];
        const labels = ['Lun','Mar','Mie','Jue','Vie','Sab','Dom'];
        for (let i = 0; i < 7; i++) {
          const d = new Date(this.currentWeekStart);
          d.setDate(d.getDate() + i);
          const fd = formatDate(d);
          days.push({ date: fd, label: labels[i], num: d.getDate(), isToday: fd === todayStr });
        }
        return days;
      },

      get dayHours() {
        const h = [];
        for (let i = 8; i <= 18; i++) h.push(i);
        return h;
      },

      getEventsForDate(date) {
        if (!date) return [];
        return this.events.filter(e => e.date === date);
      },

      getEventsForDateAndHour(date, hour) {
        return this.events.filter(e => e.date === date && e.startHour === hour);
      },

      selectDate(date) {
        this.selectedDate = date;
      },

      formatSelectedDate() {
        if (!this.selectedDate) return '';
        return new Date(this.selectedDate + 'T12:00:00').toLocaleDateString('es', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
      },

      openEventModal() {
        this.newEvent = { title: '', startHour: this.newEvent.startHour || 9, endHour: (this.newEvent.startHour || 9) + 1, type: 'Reunion' };
        this.showEventModal = true;
      },

      addEvent() {
        if (!this.newEvent.title.trim()) return;
        const colors = typeColors[this.newEvent.type] || typeColors.Reunion;
        this.events.push({
          id: this.nextId++,
          title: this.newEvent.title,
          date: this.selectedDate,
          startHour: this.newEvent.startHour,
          endHour: this.newEvent.endHour,
          type: this.newEvent.type,
          time: this.newEvent.startHour + ':00 - ' + this.newEvent.endHour + ':00',
          ...colors
        });
        this.showEventModal = false;
      },

      prevPeriod() {
        if (this.view === 'month') {
          if (this.currentMonth === 0) { this.currentMonth = 11; this.currentYear--; }
          else this.currentMonth--;
        } else if (this.view === 'week') {
          const d = new Date(this.currentWeekStart);
          d.setDate(d.getDate() - 7);
          this.currentWeekStart = d;
        } else {
          const d = new Date(this.selectedDate + 'T12:00:00');
          d.setDate(d.getDate() - 1);
          this.selectedDate = formatDate(d);
        }
      },

      nextPeriod() {
        if (this.view === 'month') {
          if (this.currentMonth === 11) { this.currentMonth = 0; this.currentYear++; }
          else this.currentMonth++;
        } else if (this.view === 'week') {
          const d = new Date(this.currentWeekStart);
          d.setDate(d.getDate() + 7);
          this.currentWeekStart = d;
        } else {
          const d = new Date(this.selectedDate + 'T12:00:00');
          d.setDate(d.getDate() + 1);
          this.selectedDate = formatDate(d);
        }
      },

      goToday() {
        this.currentMonth = today.getMonth();
        this.currentYear = today.getFullYear();
        this.currentWeekStart = getMonday(today);
        this.selectedDate = todayStr;
      }
    };
  }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
