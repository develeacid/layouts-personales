<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LayoutOS · C64 Cards de API Key</title>
  <link rel="stylesheet" href="/public/css/main.css" />
</head>
<body class="h-full bg-page antialiased">
  <div class="max-w-3xl mx-auto px-6 py-16 space-y-16">
    <header>
      <p class="text-xs font-medium uppercase tracking-wide text-zinc-400">C64 · Nivel 4</p>
      <h1 class="text-2xl font-semibold tracking-tight text-zinc-900 mt-1">Cards de API Key</h1>
      <p class="text-sm text-zinc-600 mt-1">Gestión de API keys con visibilidad toggle, copiar, revocar y permisos.</p>
    </header>

    <!-- Variante 1: API Key simple -->
    <section class="space-y-4" x-data="apiKeyCard()">
      <h2 class="text-xs font-medium uppercase tracking-wide text-zinc-400">API Key simple</h2>
      <div class="bg-white border border-zinc-200 rounded-xl shadow-sm p-6 space-y-4">
        <div class="flex items-start justify-between">
          <div>
            <h3 class="text-sm font-semibold text-zinc-900" x-text="keys[0].name"></h3>
            <p class="text-xs text-zinc-500 mt-0.5">Creada el <span x-text="keys[0].created"></span></p>
          </div>
          <span
            class="text-xs"
            :class="keys[0].status === 'active' ? 'badge-green' : 'badge-rose'"
            x-text="keys[0].status === 'active' ? 'Activa' : 'Revocada'"
          ></span>
        </div>

        <div class="flex items-center gap-3 bg-zinc-50 rounded-lg px-4 py-3">
          <code class="flex-1 text-sm font-mono text-zinc-700 truncate" x-text="keys[0].showFull ? keys[0].key : keys[0].key.substring(0, 3) + '****...****' + keys[0].key.slice(-4)"></code>
          <button
            class="text-zinc-400 hover:text-zinc-600 transition-colors duration-150 cursor-pointer"
            @click="toggleVisibility(keys[0].id)"
          >
            <svg x-show="!keys[0].showFull" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
            <svg x-show="keys[0].showFull" x-cloak class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>
          </button>
          <button
            class="text-zinc-400 hover:text-zinc-600 transition-colors duration-150 cursor-pointer"
            @click="copyKey(keys[0].key)"
          >
            <span x-show="!keys[0].copied">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
            </span>
            <span x-show="keys[0].copied" x-cloak class="text-emerald-500">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
            </span>
          </button>
        </div>

        <div x-show="keys[0].status === 'active'" class="flex items-center gap-2">
          <template x-if="!keys[0].confirmRevoke">
            <button class="btn-danger text-xs py-1.5 px-3" @click="keys[0].confirmRevoke = true">Revocar</button>
          </template>
          <template x-if="keys[0].confirmRevoke">
            <div class="flex items-center gap-2">
              <span class="text-xs text-zinc-600">Estas seguro?</span>
              <button class="btn-danger text-xs py-1.5 px-3" @click="revokeKey(keys[0].id)">Si</button>
              <button class="btn-secondary text-xs py-1.5 px-3" @click="keys[0].confirmRevoke = false">No</button>
            </div>
          </template>
        </div>

        <div x-show="keys[0].status === 'revoked'" x-cloak>
          <span class="text-xs text-zinc-500">Esta key ha sido revocada</span>
        </div>
      </div>
    </section>

    <!-- Variante 2: Lista de API Keys -->
    <section class="space-y-4" x-data="apiKeyCard()">
      <h2 class="text-xs font-medium uppercase tracking-wide text-zinc-400">Lista de API Keys</h2>
      <div class="space-y-3">
        <div class="flex items-center justify-between">
          <h3 class="text-sm font-semibold text-zinc-900">Tus API Keys</h3>
          <button class="btn-primary text-xs" @click="generateKey()">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
            Crear nueva key
          </button>
        </div>

        <div class="space-y-2">
          <template x-for="key in keys" :key="key.id">
            <div class="bg-white border border-zinc-200 rounded-xl shadow-sm p-4">
              <div class="flex items-start justify-between gap-4">
                <div class="flex-1 min-w-0">
                  <div class="flex items-center gap-2">
                    <span class="text-sm font-medium text-zinc-900" x-text="key.name"></span>
                    <span
                      class="text-xs"
                      :class="key.status === 'active' ? 'badge-green' : 'badge-rose'"
                      x-text="key.status === 'active' ? 'Activa' : 'Revocada'"
                    ></span>
                  </div>
                  <div class="flex items-center gap-3 mt-1">
                    <code class="text-xs font-mono text-zinc-500" x-text="key.showFull ? key.key : key.key.substring(0, 3) + '****...****' + key.key.slice(-4)"></code>
                    <button class="text-zinc-400 hover:text-zinc-600 transition-colors duration-150 cursor-pointer" @click="toggleVisibility(key.id)">
                      <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                    </button>
                    <button class="text-zinc-400 hover:text-zinc-600 transition-colors duration-150 cursor-pointer" @click="copyKey(key.key)">
                      <span x-show="!key.copied"><svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg></span>
                      <span x-show="key.copied" x-cloak class="text-emerald-500"><svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg></span>
                    </button>
                  </div>
                  <p class="text-xs text-zinc-400 mt-1">Ultimo uso: <span x-text="key.lastUsed"></span></p>
                </div>

                <div x-show="key.status === 'active'" class="shrink-0">
                  <template x-if="!key.confirmRevoke">
                    <button class="btn-ghost text-xs py-1 px-2 text-rose-600 hover:bg-rose-50" @click="key.confirmRevoke = true">Revocar</button>
                  </template>
                  <template x-if="key.confirmRevoke">
                    <div class="flex items-center gap-1">
                      <button class="btn-danger text-xs py-1 px-2" @click="revokeKey(key.id)">Si</button>
                      <button class="btn-secondary text-xs py-1 px-2" @click="key.confirmRevoke = false">No</button>
                    </div>
                  </template>
                </div>
              </div>
            </div>
          </template>
        </div>
      </div>
    </section>

    <!-- Variante 3: Key con permisos -->
    <section class="space-y-4" x-data="apiKeyCard()">
      <h2 class="text-xs font-medium uppercase tracking-wide text-zinc-400">Key con permisos</h2>
      <div class="bg-white border border-zinc-200 rounded-xl shadow-sm p-6 space-y-4">
        <div class="flex items-start justify-between">
          <div>
            <h3 class="text-sm font-semibold text-zinc-900" x-text="keys[0].name"></h3>
            <p class="text-xs text-zinc-500 mt-0.5">Creada el <span x-text="keys[0].created"></span></p>
          </div>
          <span class="badge-green text-xs">Activa</span>
        </div>

        <div class="flex items-center gap-3 bg-zinc-50 rounded-lg px-4 py-3">
          <code class="flex-1 text-sm font-mono text-zinc-700 truncate" x-text="keys[0].showFull ? keys[0].key : keys[0].key.substring(0, 3) + '****...****' + keys[0].key.slice(-4)"></code>
          <button class="text-zinc-400 hover:text-zinc-600 transition-colors duration-150 cursor-pointer" @click="toggleVisibility(keys[0].id)">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
          </button>
          <button class="text-zinc-400 hover:text-zinc-600 transition-colors duration-150 cursor-pointer" @click="copyKey(keys[0].key)">
            <span x-show="!keys[0].copied"><svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg></span>
            <span x-show="keys[0].copied" x-cloak class="text-emerald-500"><svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg></span>
          </button>
        </div>

        <div class="space-y-3">
          <div>
            <span class="text-xs font-medium text-zinc-500 uppercase tracking-wide">Permisos</span>
            <div class="flex items-center gap-2 mt-1.5">
              <template x-for="perm in keys[0].permissions" :key="perm">
                <span
                  class="text-xs"
                  :class="{
                    'badge-green': perm === 'Read',
                    'badge-amber': perm === 'Write',
                    'badge-rose': perm === 'Admin'
                  }"
                  x-text="perm"
                ></span>
              </template>
            </div>
          </div>

          <div class="flex items-center justify-between text-xs text-zinc-500 pt-2 border-t border-zinc-100">
            <span>Expira: 15 Mar 2025</span>
            <span>1,234 requests hoy</span>
          </div>
        </div>
      </div>
    </section>
  </div>

  <style>[x-cloak] { display: none !important; }</style>
  <script>
    function apiKeyCard() {
      return {
        keys: [
          {
            id: 1,
            name: 'Production API Key',
            key: 'sk-proj-a8f3k9d2m5n7p1q4r6t0u8v3w5x2y9z1a3b2',
            created: '15 Mar 2024',
            lastUsed: 'hace 2h',
            status: 'active',
            permissions: ['Read', 'Write', 'Admin'],
            showFull: false,
            confirmRevoke: false,
            copied: false
          },
          {
            id: 2,
            name: 'Staging API Key',
            key: 'sk-stag-b7e2j4m8p1s5v9x3a6d0g3k7n1q5t8w2z6c9',
            created: '10 Feb 2024',
            lastUsed: 'hace 1d',
            status: 'active',
            permissions: ['Read', 'Write'],
            showFull: false,
            confirmRevoke: false,
            copied: false
          },
          {
            id: 3,
            name: 'Development Key',
            key: 'sk-dev-c4f1h6k9n3q7t0w4z8b2e5i8l1o5r9u2x6a0',
            created: '5 Ene 2024',
            lastUsed: 'hace 5d',
            status: 'active',
            permissions: ['Read'],
            showFull: false,
            confirmRevoke: false,
            copied: false
          },
          {
            id: 4,
            name: 'Legacy Key (deprecated)',
            key: 'sk-old-d9g3j7m1p5s9v3y7b1e4h8k2n6q0t4w8z1d5',
            created: '20 Nov 2023',
            lastUsed: 'hace 30d',
            status: 'revoked',
            permissions: ['Read'],
            showFull: false,
            confirmRevoke: false,
            copied: false
          }
        ],

        generateKey() {
          const newKey = 'sk-' + Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
          this.keys.unshift({
            id: Date.now(),
            name: 'New API Key',
            key: newKey,
            created: 'Ahora',
            lastUsed: 'nunca',
            status: 'active',
            permissions: ['Read'],
            showFull: true,
            confirmRevoke: false,
            copied: false
          });
        },

        copyKey(key) {
          const target = this.keys.find(k => k.key === key);
          if (!target) return;
          navigator.clipboard.writeText(key).then(() => {
            target.copied = true;
            setTimeout(() => { target.copied = false; }, 2000);
          });
        },

        revokeKey(id) {
          const key = this.keys.find(k => k.id === id);
          if (key) {
            key.status = 'revoked';
            key.confirmRevoke = false;
          }
        },

        toggleVisibility(id) {
          const key = this.keys.find(k => k.id === id);
          if (key) key.showFull = !key.showFull;
        }
      };
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
