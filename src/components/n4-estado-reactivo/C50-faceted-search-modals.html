<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LayoutOS · C50 Faceted Search Modals</title>
  <link rel="stylesheet" href="/public/css/main.css" />
</head>
<body class="h-full bg-page antialiased">

  <div class="max-w-5xl mx-auto px-4 sm:px-6 py-16 space-y-16" x-data="facetedSearchModal()">

    <header>
      <p class="text-xs font-medium uppercase tracking-wide text-zinc-400 dark:text-zinc-500">C50 · Nivel 4</p>
      <h1 class="text-2xl font-semibold tracking-tight text-zinc-900 dark:text-zinc-100 mt-1">Faceted Search Modals</h1>
      <p class="text-sm text-zinc-600 dark:text-zinc-400 mt-1">Filtros combinados dentro de un modal con badges de filtros activos y resultados reactivos.</p>
    </header>

    <!-- Toolbar -->
    <section class="relative space-y-4">
      <div class="flex items-center gap-4 flex-wrap">
        <button @click="modalOpen = true" class="btn-primary text-sm flex items-center gap-2">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z" /></svg>
          Filtros
          <span x-show="activeFilterCount > 0" x-text="activeFilterCount" class="bg-white/20 text-white text-xs font-medium rounded-full px-1.5 py-0.5 leading-none"></span>
        </button>

        <p class="text-sm text-zinc-600 dark:text-zinc-400">
          <span x-text="filteredItems.length" class="font-semibold text-zinc-900 dark:text-zinc-100"></span> resultados encontrados
        </p>
      </div>

      <!-- Active filter badges -->
      <div x-show="activeFilterCount > 0" class="flex items-center gap-2 flex-wrap">
        <template x-for="cat in selectedCategories" :key="'cat-' + cat">
          <span class="inline-flex items-center gap-1 bg-blue-100 text-blue-600 dark:text-blue-400 text-xs font-medium px-2.5 py-1 rounded-full">
            <span x-text="cat"></span>
            <button @click="selectedCategories = selectedCategories.filter(c => c !== cat)" class="hover:text-blue-900">
              <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
            </button>
          </span>
        </template>

        <template x-if="selectedStatus !== 'Todos'">
          <span class="inline-flex items-center gap-1 bg-blue-100 text-blue-600 dark:text-blue-400 text-xs font-medium px-2.5 py-1 rounded-full">
            Estado: <span x-text="selectedStatus"></span>
            <button @click="selectedStatus = 'Todos'" class="hover:text-blue-900">
              <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
            </button>
          </span>
        </template>

        <template x-if="priceMin !== null || priceMax !== null">
          <span class="inline-flex items-center gap-1 bg-blue-100 text-blue-600 dark:text-blue-400 text-xs font-medium px-2.5 py-1 rounded-full">
            Valor: <span x-text="(priceMin ?? '0') + ' – ' + (priceMax ?? '∞')"></span>
            <button @click="priceMin = null; priceMax = null" class="hover:text-blue-900">
              <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
            </button>
          </span>
        </template>

        <template x-if="selectedDate !== 'Todo'">
          <span class="inline-flex items-center gap-1 bg-blue-100 text-blue-600 dark:text-blue-400 text-xs font-medium px-2.5 py-1 rounded-full">
            Fecha: <span x-text="selectedDate"></span>
            <button @click="selectedDate = 'Todo'" class="hover:text-blue-900">
              <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
            </button>
          </span>
        </template>

        <button @click="clearAll()" class="text-xs text-zinc-500 hover:text-zinc-600 dark:hover:text-zinc-400 underline underline-offset-2">Limpiar todo</button>
      </div>
    </section>

    <!-- Results -->
    <section class="relative space-y-4">
      <div class="grid gap-3">
        <template x-for="item in filteredItems" :key="item.id">
          <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl shadow-sm p-6 flex items-center justify-between gap-4">
            <div class="min-w-0">
              <div class="flex items-center gap-2">
                <h3 class="text-sm font-semibold text-zinc-900 dark:text-zinc-100 truncate" x-text="item.name"></h3>
                <span class="text-xs font-medium px-2 py-0.5 rounded-full"
                  :class="{
                    'bg-emerald-100 text-emerald-600 dark:text-emerald-400': item.status === 'Activo',
                    'bg-amber-100 text-amber-600 dark:text-amber-400': item.status === 'Pendiente',
                    'bg-zinc-100 dark:bg-zinc-800 text-zinc-600 dark:text-zinc-400': item.status === 'Completado'
                  }"
                  x-text="item.status"></span>
              </div>
              <p class="text-xs text-zinc-500 mt-1">
                <span x-text="item.category"></span> · <span x-text="item.date"></span>
              </p>
            </div>
            <span class="text-sm font-semibold text-zinc-900 dark:text-zinc-100 shrink-0" x-text="'$' + item.value"></span>
          </div>
        </template>

        <template x-if="filteredItems.length === 0">
          <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl shadow-sm p-12 text-center">
            <svg class="w-10 h-10 text-zinc-300 mx-auto mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
            <p class="text-sm text-zinc-500">No se encontraron resultados con los filtros actuales.</p>
            <button @click="clearAll()" class="text-sm text-blue-600 hover:text-blue-600 dark:hover:text-blue-400 font-medium mt-2">Limpiar filtros</button>
          </div>
        </template>
      </div>
    </section>

    <!-- Modal -->
    <template x-teleport="body">
      <div x-show="modalOpen" x-cloak class="fixed inset-0 z-20 flex items-center justify-center p-4"
        @keydown.escape.window="modalOpen = false">

        <!-- Overlay -->
        <div x-show="modalOpen"
          x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
          x-transition:leave="transition ease-in duration-200" x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
          class="fixed inset-0 bg-zinc-950/50" @click="modalOpen = false"></div>

        <!-- Panel -->
        <div x-show="modalOpen"
          x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 scale-95" x-transition:enter-end="opacity-100 scale-100"
          x-transition:leave="transition ease-in duration-200" x-transition:leave-start="opacity-100 scale-100" x-transition:leave-end="opacity-0 scale-95"
          class="relative bg-white dark:bg-zinc-900 rounded-xl shadow-xl max-w-lg w-full max-h-[80vh] flex flex-col">

          <!-- Header -->
          <div class="flex items-center justify-between px-6 py-4 border-b border-zinc-200 dark:border-zinc-800">
            <h2 class="text-lg font-semibold text-zinc-900 dark:text-zinc-100">Filtros</h2>
            <button @click="modalOpen = false" class="btn-ghost p-1 rounded-lg">
              <svg class="w-5 h-5 text-zinc-400 dark:text-zinc-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
            </button>
          </div>

          <!-- Body -->
          <div class="overflow-y-auto px-6 py-5 space-y-6 flex-1">

            <!-- Category checkboxes -->
            <fieldset>
              <legend class="text-sm font-semibold text-zinc-900 dark:text-zinc-100 mb-3">Categoria</legend>
              <div class="grid grid-cols-2 gap-2">
                <template x-for="cat in categories" :key="cat">
                  <label class="flex items-center gap-2 text-sm text-zinc-600 dark:text-zinc-400 cursor-pointer hover:text-zinc-900 dark:hover:text-zinc-100">
                    <input type="checkbox" :value="cat" x-model="selectedCategories"
                      class="rounded border-zinc-300 text-blue-600 focus:ring-blue-200 focus:ring-2" />
                    <span x-text="cat"></span>
                  </label>
                </template>
              </div>
            </fieldset>

            <!-- Status radio -->
            <fieldset>
              <legend class="text-sm font-semibold text-zinc-900 dark:text-zinc-100 mb-3">Estado</legend>
              <div class="flex flex-wrap gap-3">
                <template x-for="status in statuses" :key="status">
                  <label class="flex items-center gap-2 text-sm text-zinc-600 dark:text-zinc-400 cursor-pointer hover:text-zinc-900 dark:hover:text-zinc-100">
                    <input type="radio" name="status" :value="status" x-model="selectedStatus"
                      class="border-zinc-300 text-blue-600 focus:ring-blue-200 focus:ring-2" />
                    <span x-text="status"></span>
                  </label>
                </template>
              </div>
            </fieldset>

            <!-- Price range -->
            <fieldset>
              <legend class="text-sm font-semibold text-zinc-900 dark:text-zinc-100 mb-3">Rango de valor</legend>
              <div class="flex items-center gap-3">
                <input type="number" x-model.number="priceMin" placeholder="Min"
                  class="w-full border border-zinc-300 rounded-lg px-3 py-2 text-sm text-zinc-900 dark:text-zinc-100 placeholder-zinc-400 focus:outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-200 transition-all duration-150" />
                <span class="text-zinc-400 dark:text-zinc-500 text-sm shrink-0">–</span>
                <input type="number" x-model.number="priceMax" placeholder="Max"
                  class="w-full border border-zinc-300 rounded-lg px-3 py-2 text-sm text-zinc-900 dark:text-zinc-100 placeholder-zinc-400 focus:outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-200 transition-all duration-150" />
              </div>
            </fieldset>

            <!-- Date select -->
            <fieldset>
              <legend class="text-sm font-semibold text-zinc-900 dark:text-zinc-100 mb-3">Fecha</legend>
              <select x-model="selectedDate"
                class="w-full border border-zinc-300 rounded-lg px-3 py-2 text-sm text-zinc-900 dark:text-zinc-100 focus:outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-200 transition-all duration-150">
                <template x-for="d in dateOptions" :key="d">
                  <option :value="d" x-text="d"></option>
                </template>
              </select>
            </fieldset>
          </div>

          <!-- Footer -->
          <div class="flex items-center justify-between px-6 py-4 border-t border-zinc-200 dark:border-zinc-800">
            <button @click="clearAll()" class="btn-ghost text-sm">Limpiar todo</button>
            <button @click="modalOpen = false" class="btn-primary text-sm">Aplicar filtros</button>
          </div>
        </div>
      </div>
    </template>

  </div>

  <style>[x-cloak] { display: none !important; }</style>

  <script>
    function facetedSearchModal() {
      return {
        modalOpen: false,
        categories: ['Diseno', 'Frontend', 'Backend', 'DevOps', 'QA'],
        statuses: ['Todos', 'Activo', 'Pendiente', 'Completado'],
        dateOptions: ['Todo', 'Ultima semana', 'Ultimo mes', 'Ultimos 3 meses'],

        selectedCategories: [],
        selectedStatus: 'Todos',
        priceMin: null,
        priceMax: null,
        selectedDate: 'Todo',

        items: [
          { id: 1, name: 'Rediseno dashboard principal', category: 'Diseno', status: 'Activo', value: 2400, date: '2026-03-28', daysAgo: 3 },
          { id: 2, name: 'Componentes de formulario', category: 'Frontend', status: 'Completado', value: 1800, date: '2026-03-15', daysAgo: 16 },
          { id: 3, name: 'API de autenticacion', category: 'Backend', status: 'Activo', value: 3200, date: '2026-03-25', daysAgo: 6 },
          { id: 4, name: 'Pipeline CI/CD', category: 'DevOps', status: 'Pendiente', value: 2800, date: '2026-02-20', daysAgo: 39 },
          { id: 5, name: 'Tests de integracion', category: 'QA', status: 'Activo', value: 1500, date: '2026-03-30', daysAgo: 1 },
          { id: 6, name: 'Sistema de notificaciones', category: 'Frontend', status: 'Pendiente', value: 2100, date: '2026-03-10', daysAgo: 21 },
          { id: 7, name: 'Microservicio de pagos', category: 'Backend', status: 'Completado', value: 4500, date: '2026-01-15', daysAgo: 75 },
          { id: 8, name: 'Auditoria de seguridad', category: 'QA', status: 'Pendiente', value: 3800, date: '2026-03-22', daysAgo: 9 },
          { id: 9, name: 'Iconografia y assets', category: 'Diseno', status: 'Completado', value: 900, date: '2026-02-28', daysAgo: 31 },
          { id: 10, name: 'Monitoreo con Grafana', category: 'DevOps', status: 'Activo', value: 1200, date: '2026-03-29', daysAgo: 2 },
        ],

        get activeFilterCount() {
          let count = 0;
          if (this.selectedCategories.length > 0) count += this.selectedCategories.length;
          if (this.selectedStatus !== 'Todos') count++;
          if (this.priceMin !== null || this.priceMax !== null) count++;
          if (this.selectedDate !== 'Todo') count++;
          return count;
        },

        get filteredItems() {
          return this.items.filter(item => {
            if (this.selectedCategories.length > 0 && !this.selectedCategories.includes(item.category)) return false;
            if (this.selectedStatus !== 'Todos' && item.status !== this.selectedStatus) return false;
            if (this.priceMin !== null && item.value < this.priceMin) return false;
            if (this.priceMax !== null && item.value > this.priceMax) return false;
            if (this.selectedDate !== 'Todo') {
              if (this.selectedDate === 'Ultima semana' && item.daysAgo > 7) return false;
              if (this.selectedDate === 'Ultimo mes' && item.daysAgo > 30) return false;
              if (this.selectedDate === 'Ultimos 3 meses' && item.daysAgo > 90) return false;
            }
            return true;
          });
        },

        clearAll() {
          this.selectedCategories = [];
          this.selectedStatus = 'Todos';
          this.priceMin = null;
          this.priceMax = null;
          this.selectedDate = 'Todo';
        }
      };
    }
  </script>

  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
