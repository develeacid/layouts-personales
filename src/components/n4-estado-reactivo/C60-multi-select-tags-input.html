<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LayoutOS · C60 Multi Select Tags Input</title>
  <link rel="stylesheet" href="../../../public/css/main.css" />
</head>
<body class="h-full bg-page antialiased">
  <div class="max-w-3xl mx-auto px-4 sm:px-6 py-16 space-y-16">
    <header>
      <p class="text-xs font-medium uppercase tracking-wide text-zinc-400 dark:text-zinc-500">C60 · Nivel 4</p>
      <h1 class="text-2xl font-semibold tracking-tight text-zinc-900 dark:text-zinc-100 mt-1">Multi Select Tags Input</h1>
      <p class="text-sm text-zinc-600 dark:text-zinc-400 mt-1">Input de tags con autocompletado, categorias y limite configurable.</p>
    </header>

    <!-- Variante 1: Tags input basico -->
    <section class="relative space-y-4">
      <h2 class="text-sm font-medium text-zinc-900 dark:text-zinc-100">Variante 1 — Tags input basico</h2>

      <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl shadow-sm p-6" x-data="{ tags: [], input: '', maxTags: 10, addTag() { const val = this.input.trim(); if (val && this.tags.length < this.maxTags && !this.tags.includes(val)) { this.tags.push(val); } this.input = ''; }, removeTag(index) { this.tags.splice(index, 1); } }">
        <label class="block text-sm font-medium text-zinc-600 dark:text-zinc-400 mb-2">Tecnologias</label>
        <div class="flex flex-wrap gap-2 border border-zinc-300 dark:border-zinc-700 rounded-lg px-3 py-2 focus-within:ring-2 focus-within:ring-blue-600 focus-within:border-blue-600 transition-colors min-h-10">
          <template x-for="(tag, index) in tags" :key="index">
            <span class="bg-blue-100 text-blue-600 dark:text-blue-400 text-xs font-medium px-2.5 py-0.5 rounded-full inline-flex items-center gap-1">
              <span x-text="tag"></span>
              <button type="button" @click="removeTag(index)" class="hover:text-blue-900">
                <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                </svg>
              </button>
            </span>
          </template>
          <input
            type="text"
            x-model="input"
            @keydown.enter.prevent="addTag()"
            @keydown.comma.prevent="addTag()"
            @keydown.backspace="if (!input && tags.length) removeTag(tags.length - 1)"
            :disabled="tags.length >= maxTags"
            :placeholder="tags.length >= maxTags ? 'Limite alcanzado' : 'Escribe y presiona Enter...'"
            class="flex-1 min-w-24 border-0 p-0 text-sm text-zinc-900 dark:text-zinc-100 placeholder-zinc-400 focus:outline-none focus:ring-0 bg-transparent disabled:cursor-not-allowed"
          />
        </div>
        <p class="text-xs text-zinc-400 dark:text-zinc-500 mt-2"><span x-text="tags.length"></span> / <span x-text="maxTags"></span> tags</p>
      </div>
    </section>

    <!-- Variante 2: Con sugerencias autocomplete -->
    <section class="relative space-y-4">
      <h2 class="text-sm font-medium text-zinc-900 dark:text-zinc-100">Variante 2 — Con sugerencias autocomplete</h2>

      <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl shadow-sm p-6" x-data="tagsInput()" @click.outside="showSuggestions = false">
        <label class="block text-sm font-medium text-zinc-600 dark:text-zinc-400 mb-2">Stack tecnologico</label>
        <div class="relative">
          <div class="flex flex-wrap gap-2 border border-zinc-300 dark:border-zinc-700 rounded-lg px-3 py-2 focus-within:ring-2 focus-within:ring-blue-600 focus-within:border-blue-600 transition-colors min-h-10">
            <template x-for="(tag, index) in tags" :key="index">
              <span class="bg-blue-100 text-blue-600 dark:text-blue-400 text-xs font-medium px-2.5 py-0.5 rounded-full inline-flex items-center gap-1">
                <span x-text="tag"></span>
                <button type="button" @click="removeTag(index)" class="hover:text-blue-900">
                  <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                  </svg>
                </button>
              </span>
            </template>
            <input
              type="text"
              x-model="input"
              @input="showSuggestions = input.trim().length >= 2"
              @keydown.enter.prevent="if (filteredSuggestions.length) selectSuggestion(filteredSuggestions[0]); else addTag(input.trim())"
              @keydown.backspace="if (!input && tags.length) removeTag(tags.length - 1)"
              @keydown.escape="showSuggestions = false"
              :disabled="tags.length >= 10"
              :placeholder="tags.length >= 10 ? 'Limite alcanzado' : 'Escribe 2+ caracteres...'"
              class="flex-1 min-w-24 border-0 p-0 text-sm text-zinc-900 dark:text-zinc-100 placeholder-zinc-400 focus:outline-none focus:ring-0 bg-transparent disabled:cursor-not-allowed"
            />
          </div>

          <!-- Dropdown sugerencias -->
          <div
            x-show="showSuggestions && filteredSuggestions.length > 0"
            x-cloak
            x-transition:enter="transition ease-out duration-150"
            x-transition:enter-start="opacity-0 -translate-y-1"
            x-transition:enter-end="opacity-100 translate-y-0"
            x-transition:leave="transition ease-in duration-100"
            x-transition:leave-start="opacity-100 translate-y-0"
            x-transition:leave-end="opacity-0 -translate-y-1"
            class="absolute z-10 mt-1 w-full bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-lg shadow-lg max-h-48 overflow-y-auto"
          >
            <template x-for="s in filteredSuggestions" :key="s.name">
              <button
                type="button"
                @click="selectSuggestion(s)"
                class="w-full text-left px-3 py-2 text-sm text-zinc-600 dark:text-zinc-400 hover:bg-zinc-50 dark:hover:bg-zinc-800 transition-colors"
                x-text="s.name"
              ></button>
            </template>
          </div>
        </div>
        <p class="text-xs text-zinc-400 dark:text-zinc-500 mt-2"><span x-text="tags.length"></span> / 10 tags</p>
      </div>
    </section>

    <!-- Variante 3: Tags con colores por categoria -->
    <section class="relative space-y-4">
      <h2 class="text-sm font-medium text-zinc-900 dark:text-zinc-100">Variante 3 — Tags con colores por categoria</h2>

      <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl shadow-sm p-6" x-data="tagsInput()" @click.outside="showSuggestions = false">
        <label class="block text-sm font-medium text-zinc-600 dark:text-zinc-400 mb-2">Habilidades</label>

        <div class="flex flex-wrap gap-1.5 mb-3">
          <span class="text-xs text-zinc-400 dark:text-zinc-500 flex items-center gap-1">
            <span class="w-2 h-2 rounded-full bg-emerald-400"></span> Frontend
          </span>
          <span class="text-xs text-zinc-400 dark:text-zinc-500 flex items-center gap-1">
            <span class="w-2 h-2 rounded-full bg-blue-400"></span> Backend
          </span>
          <span class="text-xs text-zinc-400 dark:text-zinc-500 flex items-center gap-1">
            <span class="w-2 h-2 rounded-full bg-amber-400"></span> DevOps
          </span>
        </div>

        <div class="relative">
          <div class="flex flex-wrap gap-2 border border-zinc-300 dark:border-zinc-700 rounded-lg px-3 py-2 focus-within:ring-2 focus-within:ring-blue-600 focus-within:border-blue-600 transition-colors min-h-10">
            <template x-for="(tag, index) in tags" :key="index">
              <span
                class="text-xs font-medium px-2.5 py-0.5 rounded-full inline-flex items-center gap-1"
                :class="getCategoryClasses(tag)"
              >
                <span x-text="tag"></span>
                <button type="button" @click="removeTag(index)" class="hover:opacity-70">
                  <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                  </svg>
                </button>
              </span>
            </template>
            <input
              type="text"
              x-model="input"
              @input="showSuggestions = input.trim().length >= 2"
              @keydown.enter.prevent="if (filteredSuggestions.length) selectSuggestion(filteredSuggestions[0])"
              @keydown.backspace="if (!input && tags.length) removeTag(tags.length - 1)"
              @keydown.escape="showSuggestions = false"
              :disabled="tags.length >= 10"
              :placeholder="tags.length >= 10 ? 'Limite alcanzado' : 'Escribe 2+ caracteres...'"
              class="flex-1 min-w-24 border-0 p-0 text-sm text-zinc-900 dark:text-zinc-100 placeholder-zinc-400 focus:outline-none focus:ring-0 bg-transparent disabled:cursor-not-allowed"
            />
          </div>

          <!-- Dropdown sugerencias con categoria -->
          <div
            x-show="showSuggestions && filteredSuggestions.length > 0"
            x-cloak
            x-transition:enter="transition ease-out duration-150"
            x-transition:enter-start="opacity-0 -translate-y-1"
            x-transition:enter-end="opacity-100 translate-y-0"
            x-transition:leave="transition ease-in duration-100"
            x-transition:leave-start="opacity-100 translate-y-0"
            x-transition:leave-end="opacity-0 -translate-y-1"
            class="absolute z-10 mt-1 w-full bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-lg shadow-lg max-h-48 overflow-y-auto"
          >
            <template x-for="s in filteredSuggestions" :key="s.name">
              <button
                type="button"
                @click="selectSuggestion(s)"
                class="w-full text-left px-3 py-2 text-sm text-zinc-600 dark:text-zinc-400 hover:bg-zinc-50 dark:hover:bg-zinc-800 transition-colors flex items-center justify-between"
              >
                <span x-text="s.name"></span>
                <span
                  class="text-xs font-medium px-2 py-0.5 rounded-full"
                  :class="{
                    'bg-emerald-50 dark:bg-emerald-950 text-emerald-600': s.category === 'frontend',
                    'bg-blue-100 text-blue-600 dark:text-blue-400': s.category === 'backend',
                    'bg-amber-50 dark:bg-amber-950 text-amber-600': s.category === 'devops'
                  }"
                  x-text="s.category"
                ></span>
              </button>
            </template>
          </div>
        </div>
        <p class="text-xs text-zinc-400 dark:text-zinc-500 mt-2"><span x-text="tags.length"></span> / 10 tags</p>
      </div>
    </section>
  </div>

  <style>[x-cloak] { display: none !important; }</style>
  <script>
    function tagsInput() {
      return {
        tags: [],
        input: '',
        showSuggestions: false,
        allSuggestions: [
          { name: 'React', category: 'frontend' },
          { name: 'Vue', category: 'frontend' },
          { name: 'Angular', category: 'frontend' },
          { name: 'Svelte', category: 'frontend' },
          { name: 'Alpine.js', category: 'frontend' },
          { name: 'Tailwind', category: 'frontend' },
          { name: 'Bootstrap', category: 'frontend' },
          { name: 'Node.js', category: 'backend' },
          { name: 'Express', category: 'backend' },
          { name: 'Django', category: 'backend' },
          { name: 'Flask', category: 'backend' },
          { name: 'Laravel', category: 'backend' },
          { name: 'Spring', category: 'backend' },
          { name: 'Rails', category: 'backend' },
        ],
        get filteredSuggestions() {
          const q = this.input.trim().toLowerCase();
          if (q.length < 2) return [];
          return this.allSuggestions.filter(
            s => s.name.toLowerCase().includes(q) && !this.tags.includes(s.name)
          );
        },
        addTag(name) {
          const val = (name || '').trim();
          if (val && this.tags.length < 10 && !this.tags.includes(val)) {
            this.tags.push(val);
          }
          this.input = '';
          this.showSuggestions = false;
        },
        removeTag(index) {
          this.tags.splice(index, 1);
        },
        selectSuggestion(s) {
          this.addTag(s.name);
        },
        getCategoryClasses(tagName) {
          const s = this.allSuggestions.find(x => x.name === tagName);
          if (!s) return 'bg-blue-100 text-blue-600 dark:text-blue-400';
          return {
            'bg-emerald-50 dark:bg-emerald-950 text-emerald-600': s.category === 'frontend',
            'bg-blue-100 text-blue-600 dark:text-blue-400': s.category === 'backend',
            'bg-amber-50 dark:bg-amber-950 text-amber-600': s.category === 'devops',
          };
        },
      };
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
