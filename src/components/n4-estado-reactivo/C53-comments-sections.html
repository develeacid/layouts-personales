<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LayoutOS · C53 Comments Sections</title>
  <link rel="stylesheet" href="/public/css/main.css" />
</head>
<body class="h-full bg-page antialiased">

  <div class="max-w-4xl mx-auto px-4 sm:px-6 py-16 space-y-16" x-data="commentsSection()">

    <header>
      <p class="text-xs font-medium uppercase tracking-wide text-zinc-400 dark:text-zinc-500">C53 · Nivel 4</p>
      <h1 class="text-2xl font-semibold tracking-tight text-zinc-900 dark:text-zinc-100 mt-1">Comments Sections</h1>
      <p class="text-sm text-zinc-600 dark:text-zinc-400 mt-1">Comentarios con replies anidados y likes reactivos.</p>
    </header>

    <!-- Variante 1: Lista de comentarios con replies -->
    <section class="relative space-y-4">
      <h2 class="text-xs font-medium uppercase tracking-wide text-zinc-400 dark:text-zinc-500">Comentarios con replies</h2>

      <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl shadow-sm p-6 space-y-6">
        <template x-for="comment in comments" :key="comment.id">
          <div class="space-y-4">
            <!-- Comentario principal -->
            <div class="flex gap-3">
              <div class="w-10 h-10 rounded-full bg-zinc-200 flex items-center justify-center text-xs font-medium text-zinc-600 dark:text-zinc-400 shrink-0"
                   x-text="comment.initials"></div>
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2">
                  <span class="text-sm font-semibold text-zinc-900 dark:text-zinc-100" x-text="comment.author"></span>
                  <span class="text-xs text-zinc-400 dark:text-zinc-500" x-text="comment.date"></span>
                </div>
                <p class="text-sm text-zinc-600 dark:text-zinc-400 mt-1" x-text="comment.text"></p>
                <div class="flex items-center gap-4 mt-2">
                  <button class="inline-flex items-center gap-1 text-xs transition-colors duration-150"
                          :class="comment.liked ? 'text-rose-500' : 'text-zinc-400 dark:text-zinc-500 hover:text-rose-500'"
                          @click="toggleLike(comment.id)">
                    <svg class="w-4 h-4" :fill="comment.liked ? 'currentColor' : 'none'" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                    </svg>
                    <span x-text="comment.likes"></span>
                  </button>
                  <button class="inline-flex items-center gap-1 text-xs text-zinc-400 dark:text-zinc-500 hover:text-blue-600 transition-colors duration-150"
                          @click="toggleReply(comment.id)">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6" />
                    </svg>
                    Responder
                  </button>
                </div>

                <!-- Reply form inline -->
                <div x-show="comment.showReply" x-cloak x-transition class="mt-3">
                  <div class="flex gap-3">
                    <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-xs font-medium text-blue-600 shrink-0">Tú</div>
                    <div class="flex-1">
                      <textarea x-model="comment.replyText" rows="2" placeholder="Escribe una respuesta..."
                                class="input w-full text-sm resize-none"></textarea>
                      <div class="flex items-center justify-end gap-2 mt-2">
                        <button class="btn-ghost text-xs" @click="toggleReply(comment.id)">Cancelar</button>
                        <button class="btn-primary text-xs" :disabled="!comment.replyText.trim()"
                                :class="!comment.replyText.trim() && 'opacity-50 cursor-not-allowed'"
                                @click="addReply(comment.id)">Responder</button>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <!-- Replies anidados -->
            <template x-for="reply in comment.replies" :key="reply.id">
              <div class="flex gap-3 ml-12">
                <div class="w-10 h-10 rounded-full bg-zinc-200 flex items-center justify-center text-xs font-medium text-zinc-600 dark:text-zinc-400 shrink-0"
                     x-text="reply.initials"></div>
                <div class="flex-1 min-w-0">
                  <div class="flex items-center gap-2">
                    <span class="text-sm font-semibold text-zinc-900 dark:text-zinc-100" x-text="reply.author"></span>
                    <span class="text-xs text-zinc-400 dark:text-zinc-500" x-text="reply.date"></span>
                  </div>
                  <p class="text-sm text-zinc-600 dark:text-zinc-400 mt-1" x-text="reply.text"></p>
                  <div class="flex items-center gap-4 mt-2">
                    <button class="inline-flex items-center gap-1 text-xs transition-colors duration-150"
                            :class="reply.liked ? 'text-rose-500' : 'text-zinc-400 dark:text-zinc-500 hover:text-rose-500'"
                            @click="reply.liked = !reply.liked; reply.likes += reply.liked ? 1 : -1">
                      <svg class="w-4 h-4" :fill="reply.liked ? 'currentColor' : 'none'" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                      </svg>
                      <span x-text="reply.likes"></span>
                    </button>
                  </div>
                </div>
              </div>
            </template>

            <!-- Separador entre comentarios -->
            <div class="border-t border-zinc-100"></div>
          </div>
        </template>
      </div>
    </section>

    <!-- Variante 2: Formulario nuevo comentario -->
    <section class="relative space-y-4">
      <h2 class="text-xs font-medium uppercase tracking-wide text-zinc-400 dark:text-zinc-500">Nuevo comentario</h2>

      <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl shadow-sm p-6">
        <div class="flex gap-3">
          <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center text-xs font-medium text-blue-600 shrink-0">Tú</div>
          <div class="flex-1">
            <textarea x-model="newComment" rows="3" placeholder="Escribe un comentario..."
                      maxlength="500"
                      class="input w-full text-sm resize-none"></textarea>
            <div class="flex items-center justify-between mt-3">
              <span class="text-xs"
                    :class="newComment.length >= 450 ? 'text-amber-500' : 'text-zinc-400 dark:text-zinc-500'"
                    x-text="newComment.length + '/500'"></span>
              <button class="btn-primary text-sm" :disabled="!newComment.trim()"
                      :class="!newComment.trim() && 'opacity-50 cursor-not-allowed'"
                      @click="addComment()">Publicar</button>
            </div>
          </div>
        </div>
      </div>
    </section>

  </div>

  <style>[x-cloak] { display: none !important; }</style>

  <script>
    function commentsSection() {
      return {
        comments: [
          {
            id: 1,
            author: 'Laura Méndez',
            initials: 'LM',
            text: 'Excelente artículo. La explicación sobre el manejo de estado reactivo con Alpine.js me pareció muy clara y práctica.',
            date: 'hace 2 horas',
            likes: 5,
            liked: false,
            showReply: false,
            replyText: '',
            replies: [
              {
                id: 101,
                author: 'Carlos Ruiz',
                initials: 'CR',
                text: 'Totalmente de acuerdo. Especialmente útil la parte de computed properties.',
                date: 'hace 1 hora',
                likes: 2,
                liked: false
              }
            ]
          },
          {
            id: 2,
            author: 'Diego Herrera',
            initials: 'DH',
            text: '¿Alguien sabe si este patrón funciona bien con listas de más de 1000 elementos? Me preocupa el rendimiento.',
            date: 'hace 5 horas',
            likes: 3,
            liked: false,
            showReply: false,
            replyText: '',
            replies: [
              {
                id: 201,
                author: 'Ana Torres',
                initials: 'AT',
                text: 'Para listas grandes recomiendo virtualización. Alpine funciona bien hasta unos 500 items sin problemas.',
                date: 'hace 4 horas',
                likes: 4,
                liked: false
              },
              {
                id: 202,
                author: 'Laura Méndez',
                initials: 'LM',
                text: 'También puedes paginar del lado del servidor y solo renderizar lo visible.',
                date: 'hace 3 horas',
                likes: 1,
                liked: false
              }
            ]
          },
          {
            id: 3,
            author: 'Sofía Vargas',
            initials: 'SV',
            text: 'Me encanta lo limpio que queda el código sin necesidad de un bundler. Perfecto para prototipos rápidos.',
            date: 'hace 1 día',
            likes: 8,
            liked: true,
            showReply: false,
            replyText: '',
            replies: []
          },
          {
            id: 4,
            author: 'Andrés López',
            initials: 'AL',
            text: 'Buen contenido. Sería genial un artículo de seguimiento sobre cómo integrar esto con un backend REST.',
            date: 'hace 2 días',
            likes: 6,
            liked: false,
            showReply: false,
            replyText: '',
            replies: []
          },
          {
            id: 5,
            author: 'Marta Ríos',
            initials: 'MR',
            text: 'Justo lo que necesitaba para mi proyecto. Implementé el patrón de paginación y funciona de maravilla.',
            date: 'hace 3 días',
            likes: 4,
            liked: false,
            showReply: false,
            replyText: '',
            replies: []
          }
        ],
        newComment: '',
        nextId: 6,

        toggleLike(id) {
          const comment = this.comments.find(c => c.id === id);
          if (comment) {
            comment.liked = !comment.liked;
            comment.likes += comment.liked ? 1 : -1;
          }
        },

        toggleReply(id) {
          const comment = this.comments.find(c => c.id === id);
          if (comment) {
            comment.showReply = !comment.showReply;
            if (!comment.showReply) comment.replyText = '';
          }
        },

        addReply(id) {
          const comment = this.comments.find(c => c.id === id);
          if (comment && comment.replyText.trim()) {
            comment.replies.push({
              id: Date.now(),
              author: 'Tú',
              initials: 'Tú',
              text: comment.replyText.trim(),
              date: 'ahora',
              likes: 0,
              liked: false
            });
            comment.replyText = '';
            comment.showReply = false;
          }
        },

        addComment() {
          if (this.newComment.trim()) {
            this.comments.unshift({
              id: this.nextId++,
              author: 'Tú',
              initials: 'Tú',
              text: this.newComment.trim(),
              date: 'ahora',
              likes: 0,
              liked: false,
              showReply: false,
              replyText: '',
              replies: []
            });
            this.newComment = '';
          }
        }
      };
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
